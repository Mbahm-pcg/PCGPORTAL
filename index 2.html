// ─── Scorecard PDF Parser ─────────────────────────────────────────────────────

async function parseExcelScorecard(file) {
  const XLSX = window.XLSX;
  if (!XLSX) throw new Error('SheetJS library not loaded. Please refresh the page.');
  const ab = await file.arrayBuffer();
  const wb = XLSX.read(ab, { type:'array' });

  // Find the scorecard sheet (note: intentional typo "Scorcard" in the file)
  const sheetName = wb.SheetNames.find(n => /scorcard|scorecard/i.test(n)) || wb.SheetNames[0];
  const ws = wb.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:"" });

  // Detect draft status from filename
  const isDraft = /draft/i.test(file.name);

  const result = { weekEnd: null, weekNum: null, isDraft, stores: [] };

  // Extract week info from early rows
  for (let i = 0; i < Math.min(10, rows.length); i++) {
    const rowText = rows[i].join(' ');
    const wnm = rowText.match(/Week\s*[#:]*\s*(\d+)/i);
    if (wnm && !result.weekNum) result.weekNum = parseInt(wnm[1]);
    // Date range like "03/01/2026-03/07/2026" or "03/01/2026 - 03/07/2026"
    const wem = rowText.match(/(\d{2}\/\d{2}\/\d{2,4})\s*[-–]\s*(\d{2}\/\d{2}\/\d{2,4})/);
    if (wem && !result.weekEnd) result.weekEnd = wem[2]; // use end date
  }

  // Find column headers row (has "SWLY" in it)
  let headerRowIdx = -1;
  let headers = [];
  for (let i = 0; i < rows.length; i++) {
    const cells = rows[i].map(c => String(c).trim().toUpperCase());
    if (cells.some(c => c === 'SWLY' || c.includes('SW LY'))) {
      headerRowIdx = i;
      headers = cells;
      break;
    }
  }
  if (headerRowIdx < 0) throw new Error('Could not find column headers (SWLY) in spreadsheet.');

  // Map column indices
  const colIdx = {};
  // Normalize headers: collapse spaces, strip trailing spaces
  const norm = h => h.replace(/\s+/g, ' ').trim();

  const colMap = {
    'SWLY': 'swly', 'SW LY CC': 'sw_ly_cc', 'PW SALE': 'pwSale', 'PW CC': 'pwCC',
    'LW SALE': 'lwSale', 'LW CC': 'lwCC', 'DIFF SALE': 'diffSale',
    'DIFF CC': 'diffCC',
    'DCP $': 'dcpDollar', 'DCP$': 'dcpDollar',
    'DCP %': 'dcpPct', 'DCP%': 'dcpPct',
    'DONUTS $': 'donutsDollar', 'DONUTS$': 'donutsDollar',
    'DONUTS %': 'donutsPct', 'DONUTS%': 'donutsPct',
    'BAKERY $': 'donutsDollar', 'BAKERY$': 'donutsDollar',
    'BAKERY %': 'donutsPct', 'BAKERY%': 'donutsPct',
    'LABOR': 'laborDollar', 'LABOR $': 'laborDollar', 'LABOR$': 'laborDollar',
    'HOURS': 'hours',
    'MISC': 'miscDollar', 'MISC $': 'miscDollar', 'MISC$': 'miscDollar',
    'LABOR %': 'laborPct', 'LABOR%': 'laborPct',
    'TOTAL COST $': 'totalDollar', 'TOTAL$': 'totalDollar', 'TOTAL $': 'totalDollar',
    'TOTAL %': 'totalPct', 'TOTAL%': 'totalPct',
    'W ER TAX': 'werTax', 'WER TAX': 'werTax',
    'FC SALE': 'fcSale', 'FC COST': 'fcCost', 'TARGET': 'targetPct', 'TARGET%': 'targetPct',
  };

  // First pass: match named headers
  headers.forEach((h, i) => {
    const hn = norm(h);
    for (const [key, field] of Object.entries(colMap)) {
      if (hn === key) {
        if (!colIdx[field]) colIdx[field] = i;
      }
    }
  });

  // Second pass: resolve bare "%" columns by position
  // A bare "%" column inherits meaning from the preceding named column
  headers.forEach((h, i) => {
    if (norm(h) !== '%') return;
    // Look backwards to find what this % belongs to
    for (let j = i - 1; j >= 0; j--) {
      const prev = norm(headers[j]);
      if (prev === '%' || prev === '') continue;
      if (/DIFF|SALE/.test(prev) && !colIdx.diffPct) { colIdx.diffPct = i; break; }
      if (/DCP/.test(prev) && !colIdx.dcpPct) { colIdx.dcpPct = i; break; }
      if (/DONUT|BAKERY/.test(prev) && !colIdx.donutsPct) { colIdx.donutsPct = i; break; }
      if (/LABOR|HOUR|MISC/.test(prev) && !colIdx.laborPct) { colIdx.laborPct = i; break; }
      break;
    }
  });

  // Parse store rows (after header)
  let currentDistrict = null;
  for (let i = headerRowIdx + 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row.length === 0) continue;

    const firstCell = String(row[0] || '').trim();

    // District header row
    const distMatch = firstCell.match(/District\s*#?\s*(\d+)/i);
    if (distMatch) {
      currentDistrict = parseInt(distMatch[1]);
      continue;
    }

    // Skip subtotal, mgmt fee, grand total rows
    if (/sub\s*total|mgmt\s*fee|grand\s*total|management|aws/i.test(firstCell)) continue;

    // Store row: starts with 6-digit PC
    const pcMatch = firstCell.match(/^(\d{6})/);
    if (!pcMatch) continue;

    const pc = pcMatch[1];
    const getVal = (field) => {
      const idx = colIdx[field];
      if (idx === undefined || idx >= row.length) return 0;
      const v = row[idx];
      if (typeof v === 'number') return v;
      const str = String(v).replace(/[$,\s%]/g, '');
      return parseFloat(str) || 0;
    };

    const swly = getVal('swly');
    const lwSale = getVal('lwSale');
    const swlyPct = swly > 0 ? +((lwSale - swly) / swly * 100).toFixed(1) : 0;
    const diffPctRaw = getVal('diffPct');
    // Excel might store as decimal (0.05 = 5%) or as whole number
    const diffPct = Math.abs(diffPctRaw) < 1 && diffPctRaw !== 0 ? +(diffPctRaw * 100).toFixed(1) : diffPctRaw;
    const dcpPctRaw = getVal('dcpPct');
    const dcpPct = Math.abs(dcpPctRaw) < 1 && dcpPctRaw !== 0 ? +(dcpPctRaw * 100).toFixed(1) : dcpPctRaw;
    const donutsPctRaw = getVal('donutsPct');
    const donutsPct = Math.abs(donutsPctRaw) < 1 && donutsPctRaw !== 0 ? +(donutsPctRaw * 100).toFixed(1) : donutsPctRaw;
    const laborPctRaw = getVal('laborPct');
    const laborPct = Math.abs(laborPctRaw) < 1 && laborPctRaw !== 0 ? +(laborPctRaw * 100).toFixed(1) : laborPctRaw;
    const totalPctRaw = getVal('totalPct');
    const totalPct = Math.abs(totalPctRaw) < 1 && totalPctRaw !== 0 ? +(totalPctRaw * 100).toFixed(1) : totalPctRaw;
    const targetPctRaw = getVal('targetPct');
    const targetPct = Math.abs(targetPctRaw) < 1 && targetPctRaw !== 0 ? +(targetPctRaw * 100).toFixed(1) : targetPctRaw;
    const werTaxRaw = getVal('werTax');
    const werTax = Math.abs(werTaxRaw) < 1 && werTaxRaw !== 0 ? +(werTaxRaw * 100).toFixed(1) : werTaxRaw;

    result.stores.push({
      pc,
      district: currentDistrict,
      swly,
      sw_ly_cc: getVal('sw_ly_cc'),
      pwSale: getVal('pwSale'),
      pwCC: getVal('pwCC'),
      lwSale,
      lwCC: getVal('lwCC'),
      diffSale: getVal('diffSale'),
      diffPct,
      swlyPct,
      diffCC: getVal('diffCC'),
      dcpDollar: getVal('dcpDollar'),
      dcpPct,
      donutsDollar: getVal('donutsDollar'),
      donutsPct,
      laborDollar: getVal('laborDollar'),
      hours: getVal('hours'),
      miscDollar: getVal('miscDollar'),
      laborPct,
      totalDollar: getVal('totalDollar'),
      totalPct,
      werTax,
      fcSale: getVal('fcSale'),
      fcCost: getVal('fcCost'),
      targetPct,
    });
  }

  return result;
}

async function extractPDFLines(file) {
  const lib = window['pdfjs-dist/build/pdf'] || window.pdfjsLib;
  if (!lib) throw new Error('PDF.js library not loaded. Please refresh the page.');
  lib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const ab = await file.arrayBuffer();
  const pdf = await lib.getDocument({ data: ab }).promise;
  const allLines = [];
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const tc   = await page.getTextContent();
    // Collect all items with their exact Y
    const items = tc.items
      .filter(i => i.str.trim())
      .map(i => ({ x: i.transform[4], y: i.transform[5], text: i.str.trim() }));
    if (!items.length) continue;
    // Sort by Y descending so we process top-to-bottom
    items.sort((a, b) => b.y - a.y);
    // Bucket items into rows using a 4px tolerance
    const rows = [];
    for (const item of items) {
      const existing = rows.find(r => Math.abs(r.y - item.y) <= 4);
      if (existing) {
        existing.items.push(item);
        existing.y = (existing.y + item.y) / 2; // update centroid
      } else {
        rows.push({ y: item.y, items: [item] });
      }
    }
    // Sort each row's items left-to-right, then join
    rows.sort((a, b) => b.y - a.y);
    for (const row of rows) {
      row.items.sort((a, b) => a.x - b.x);
      const line = row.items.map(i => i.text).join(' ').replace(/\s+/g, ' ').trim();
      if (line) allLines.push(line);
    }
  }
  return allLines;
}

function parseScorecardLines(lines) {
  const result = { weekEnd: null, weekNum: null, stores: [] };
  const fullText = lines.join(' ');
  const wnm = fullText.match(/Week\s*[#:]*\s*(\d+)/i);
  if (wnm) result.weekNum = parseInt(wnm[1]);
  const wem = fullText.match(/(\d{2}\/\d{2}\/\d{2,4})/);
  if (wem) result.weekEnd = wem[1];

  for (const line of lines) {
    const pcm = line.match(/^(\d{6})\s*[-–]\s*/);
    if (!pcm) continue;
    if (/mgmt fee|aws/i.test(line)) continue;
    const pc = pcm[1];

    // Everything from the first '$' onward is pure data — no address numbers bleed in
    const dollarStart = line.indexOf('$');
    if (dollarStart < 0) continue;
    const dataPart = line.slice(dollarStart);

    // Tokenize in strict left-to-right order:
    //   '$' followed by digits  → type:'$'
    //   digits followed by '%'  → type:'%'
    //   standalone digits       → type:'n'
    const tokens = [];
    const re = /\$\s*([\d,]+\.?\d*)|(\d+\.?\d*)\s*%|([\d,]+\.?\d*)/g;
    let m;
    while ((m = re.exec(dataPart)) !== null) {
      if      (m[1] !== undefined) tokens.push({ t:'$', v: parseFloat(m[1].replace(/,/g,'')) });
      else if (m[2] !== undefined) tokens.push({ t:'%', v: parseFloat(m[2]) });
      else { const v = parseFloat(m[3].replace(/,/g,'')); if (!isNaN(v)) tokens.push({ t:'n', v }); }
    }
    if (tokens.length < 12) continue;

    // ── Token positions (left → right as they appear in PDF) ─────────────
    // 0: $ SWLY          1: n SW_LY_CC
    // 2: $ PW_Sale        3: n PW_CC
    // 4: $ LW_Sale        5: n LW_CC       ← explicit columns, NOT computed
    // 6: $ Diff_Sale
    // 7: % Diff_%   — OR  $ anomaly (D3: $0.19 = 19%)
    // 8: n Diff_CC
    // 9: $ DCP$          10: % DCP%
    // 11: $ Donuts$      12: % Donuts%
    // 13: $ Labor$       14: n Hours
    // 15: $ Misc  (OPTIONAL)  — if present, shifts everything after by 1
    // then: % Labor%  $ Total  % Total%  % WERTax  $ FC_Sale  $ FC_Cost  % Target

    const swly      = tokens[0]?.v || 0;
    const sw_ly_cc  = tokens[1]?.v || 0;
    const pwSale    = tokens[2]?.v || 0;
    const pwCC      = tokens[3]?.v || 0;
    const lwSale    = tokens[4]?.v || 0;   // LW Sale — direct from scorecard
    const lwCC      = tokens[5]?.v || 0;   // LW CC   — direct from scorecard
    const diffSale  = tokens[6]?.v || 0;

    // Anomaly: token[7] is '$' with value < 1 (e.g. $0.19 = 19%)
    const isAnom  = tokens[7]?.t === '$' && (tokens[7]?.v || 0) < 1.0;
    const diffPct = isAnom ? +((tokens[7]?.v || 0) * 100).toFixed(1) : (tokens[7]?.v || 0);
    const diffCC  = tokens[8]?.v || 0;

    const swlyPct = swly > 0 ? +((lwSale - swly) / swly * 100).toFixed(1) : 0;

    const dcpDollar    = tokens[9]?.v  || 0;
    const dcpPct       = tokens[10]?.v || 0;
    const donutsDollar = tokens[11]?.v || 0;
    const donutsPct    = tokens[12]?.v || 0;
    const laborDollar  = tokens[13]?.v || 0;
    const hours        = tokens[14]?.v || 0;

    // Misc: token[15] is type '$' → Misc dollar present
    const hasMisc    = tokens[15]?.t === '$';
    const miscDollar = hasMisc ? (tokens[15]?.v || 0) : 0;
    let i            = hasMisc ? 16 : 15;

    const laborPct    = tokens[i]?.v || 0; i++;
    const totalDollar = tokens[i]?.v || 0; i++;
    const totalPct    = tokens[i]?.v || 0; i++;
    const werTax      = tokens[i]?.v || 0; i++;
    const fcSale      = tokens[i]?.v || 0; i++;
    const fcCost      = tokens[i]?.v || 0; i++;
    const targetPct   = tokens[i]?.v || 0;

    result.stores.push({
      pc, swly, sw_ly_cc, pwSale, pwCC, lwSale, lwCC, diffSale, diffPct, swlyPct, diffCC,
      dcpDollar, dcpPct, donutsDollar, donutsPct,
      laborDollar, hours, miscDollar, laborPct,
      totalDollar, totalPct, werTax,
      fcSale, fcCost, targetPct
    });
  }
  return result;
}

// ─── Admin: Analytics ────────────────────────────────────────────────────────

function AdminAnalytics({ stores, users, districts, th, salesWeeks, setSalesWeeks, cloudStatus, user }) {
  // Role flags
  const canUpload   = user?.username === 'mike.bahm';
  const isDMViewer  = user?.userType === 'dm';
  const dmDistrict  = isDMViewer ? (user?.district || null) : null;

  const [uploading,  setUploading]  = useState(false);
  const [uploadErr,  setUploadErr]  = useState(null);
  const [selWeek,    setSelWeek]    = useState(0);
  const [sortCol,    setSortCol]    = useState('lwSale');
  const [sortDir,    setSortDir]    = useState(-1);
  const [distFilter, setDistFilter] = useState(isDMViewer ? (dmDistrict || 0) : 0);
  const [debugLines, setDebugLines] = useState(null);
  const [showDebug,  setShowDebug]  = useState(false);
  const fileRef = useRef(null);
  const detailTableRef = useRef(null);

  const fmtSales = n => { if (!n) return '—'; if (n >= 1000000) return `$${(n/1000000).toFixed(2)}M`; return `$${(n/1000).toFixed(1)}K`; };
  const fmtPct   = (n, plus=true) => { if (n === undefined || isNaN(n) || n === 0) return '—'; return `${plus && n > 0 ? '+' : ''}${n.toFixed(1)}%`; };
  const fmtNum   = n => n ? n.toLocaleString('en', { maximumFractionDigits: 0 }) : '—';
  const laborClr  = p => p > 28 ? '#ff6b6b' : p > 23 ? '#ffa94d' : '#69db7c';
  const totalClr  = p => p > 55 ? '#ff6b6b' : p > 50 ? '#ffa94d' : '#69db7c';
  const dcpClr    = p => p > 22 ? '#ff6b6b' : p > 19 ? '#ffa94d' : '#69db7c';
  const bakeryClr = p => p > 8  ? '#ff6b6b' : p > 6  ? '#ffa94d' : '#69db7c';
  const diffClr   = p => p > 0 ? '#69db7c' : p < 0 ? '#ff6b6b' : th.muted;

  const handleUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setUploading(true); setUploadErr(null);
    try {
      let parsed;
      if (file.name.match(/\.xlsx?$/i)) {
        parsed = await parseExcelScorecard(file);
      } else {
        const lines = await extractPDFLines(file);
        parsed = parseScorecardLines(lines);
      }
      if (parsed.stores.length === 0) throw new Error('No store rows found. Check that this is the DM Weekly Report file.');
      setSalesWeeks(prev => {
        const deduped = prev.filter(w => !(w.weekEnd === parsed.weekEnd && w.weekNum === parsed.weekNum));
        return [parsed, ...deduped].sort((a, b) => (b.weekEnd || '').localeCompare(a.weekEnd || ''));
      });
      setSelWeek(0);
    } catch (err) {
      setUploadErr(err.message || 'Failed to parse file.');
    } finally {
      setUploading(false);
      if (fileRef.current) fileRef.current.value = '';
    }
  };

  const week     = salesWeeks[selWeek];

  // Enrich parsed stores with portal store metadata
  const enriched = React.useMemo(() => {
    if (!week) return [];
    return week.stores.map(row => {
      const s = stores.find(st => String(st.pc) === String(row.pc));
      return { ...row, name: s?.name || row.pc, city: s?.city || '', district: s?.district || null, status: s?.status || '' };
    });
  }, [week, stores]);

  // DMs are locked to their own district; admins can filter freely
  const effectiveFilter = isDMViewer ? dmDistrict : distFilter;
  const filtered = effectiveFilter ? enriched.filter(r => r.district === effectiveFilter) : enriched;
  const sorted   = [...filtered].sort((a, b) => sortDir * (b[sortCol] - a[sortCol]));

  // Totals — DMs only see their district, admins see all
  const totalsBase = isDMViewer ? filtered : enriched;
  const totalLW   = totalsBase.reduce((a, r) => a + r.lwSale,  0);
  const totalPW   = totalsBase.reduce((a, r) => a + r.pwSale,  0);
  const totalLY   = totalsBase.reduce((a, r) => a + r.swly,    0);
  const totalCC   = totalsBase.reduce((a, r) => a + r.lwCC,    0);
  const totalFC   = totalsBase.reduce((a, r) => a + r.fcSale,  0);
  const vsLW    = totalPW > 0 ? (totalLW - totalPW) / totalPW * 100 : 0;
  const vsLY    = totalLY > 0 ? (totalLW - totalLY) / totalLY * 100 : 0;
  const avgSales = totalsBase.length ? totalLW / totalsBase.length : 0;
  const avg      = arr => arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0;
  const avgLabor = avg(totalsBase.filter(r=>r.laborPct>0).map(r => r.laborPct));
  const avgFC    = avg(totalsBase.filter(r=>r.dcpPct>0).map(r => r.dcpPct));

  // District aggregation — DMs only see their own district row
  const distAgg = {};
  for (const row of enriched) {
    const d = row.district;
    if (!d) continue;
    if (isDMViewer && d !== dmDistrict) continue;  // DMs only see their district
    if (!distAgg[d]) distAgg[d] = { district: d, count: 0, lwSale: 0, pwSale: 0, swly: 0, lwCC: 0, fcSale: 0, labor: [], dcp: [], total: [] };
    distAgg[d].count++;
    distAgg[d].lwSale += row.lwSale;
    distAgg[d].pwSale += row.pwSale;
    distAgg[d].swly   += row.swly;
    distAgg[d].lwCC   += row.lwCC;
    distAgg[d].fcSale += row.fcSale;
    if (row.laborPct > 0) distAgg[d].labor.push(row.laborPct);
    if (row.dcpPct   > 0) distAgg[d].dcp.push(row.dcpPct);
    if (row.totalPct > 0) distAgg[d].total.push(row.totalPct);
  }
  const distList = Object.values(distAgg).sort((a, b) => a.district - b.district).map(d => {
    const dm = Object.values(districts || {}).find(x => x.num === d.district);
    return { ...d, dmName: dm?.name || '', vsPW: d.pwSale > 0 ? (d.lwSale - d.pwSale) / d.pwSale * 100 : 0, vsLY: d.swly > 0 ? (d.lwSale - d.swly) / d.swly * 100 : 0, avgLabor: avg(d.labor), avgDCP: avg(d.dcp), avgTotal: avg(d.total) };
  });

  // Flagged stores — DMs only see their own
  const concerns = totalsBase.filter(r => r.laborPct > 30 || r.totalPct > 60 || r.diffPct < -10);

  const SortHdr = ({ col, label }) => (
    <span style={{ cursor: 'pointer', userSelect: 'none', color: sortCol === col ? O : th.muted, whiteSpace: 'nowrap' }}
      onClick={() => { if (sortCol === col) setSortDir(d => -d); else { setSortCol(col); setSortDir(-1); } }}>
      {label}{sortCol === col ? (sortDir < 0 ? ' ↓' : ' ↑') : ' ↕'}
    </span>
  );

  const thS = { padding: '0.4rem 0.5rem', color: th.muted, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.5, fontSize: '0.72rem', whiteSpace: 'nowrap' };
  const tdS = { padding: '0.45rem 0.5rem' };

  return (
    <div className="fade-in">

      {/* ── Upload / Week selector bar ── */}
      <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '1.25rem', flexWrap: 'wrap' }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontFamily: "'Raleway'", fontWeight: 800, fontSize: '1.1rem', color: th.text }}>
            📊 {isDMViewer ? `District ${dmDistrict} Analytics` : 'Weekly Analytics'}
          </div>
          {cloudStatus === 'loading' && <span style={{ fontSize:'0.68rem', color:th.muted }}>☁️ Loading…</span>}
          {cloudStatus === 'saving'  && <span style={{ fontSize:'0.68rem', color:'#74c0fc' }}>☁️ Saving…</span>}
          {cloudStatus === 'saved'   && <span style={{ fontSize:'0.68rem', color:'#69db7c' }}>☁️ Saved</span>}
          {cloudStatus === 'error'   && <span style={{ fontSize:'0.68rem', color:'#ffa94d' }}>⚠️ Cloud unavailable — using local storage</span>}
          {week && <div style={{ fontSize: '0.78rem', color: th.muted, marginTop: '0.1rem' }}>Week #{week.weekNum} · {week.weekEnd}{week.isDraft ? <span style={{ color: '#ffa94d', fontWeight: 700, marginLeft: '0.4rem', fontSize: '0.7rem', border: '1px solid #ffa94d', borderRadius: '4px', padding: '1px 6px', verticalAlign: 'middle' }}>DRAFT</span> : ''} · {isDMViewer ? `${filtered.length} stores in your district` : `${week.stores.length} stores`}</div>}
        </div>
        {salesWeeks.length > 1 && (
          <select style={{ ...inp(th), width: 'auto', padding: '0.4rem 0.7rem', fontSize: '0.8rem' }} value={selWeek} onChange={e => setSelWeek(+e.target.value)}>
            {salesWeeks.map((w, i) => <option key={i} value={i}>Wk #{w.weekNum} — {w.weekEnd}{w.isDraft ? ' (Draft)' : ''}</option>)}
          </select>
        )}
        {canUpload && (
          <label style={{ ...btn(th, { padding: '0.5rem 1rem', fontSize: '0.8rem', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: '0.4rem' }), opacity: uploading ? 0.7 : 1 }}>
            <input ref={fileRef} type="file" accept=".xlsx,.xls,.pdf" style={{ display: 'none' }} onChange={handleUpload} disabled={uploading} />
            {uploading ? '⏳ Parsing...' : '📊 Upload Weekly Report'}
          </label>
        )}
        {canUpload && salesWeeks.length > 0 && (
          <button style={btn(th, { padding: '0.5rem 0.6rem', background: th.card3, color: '#ff6b6b' })}
            onClick={() => { if (window.confirm('Remove all saved scorecard data?')) { setSalesWeeks([]); cloudDelete('pcg_sales_v1'); try { localStorage.removeItem('pcg_sales_v1'); } catch {} } }}>🗑</button>
        )}
        {canUpload && debugLines && (
          <button style={btn(th, { padding: '0.5rem 0.6rem', background: th.card3, color: showDebug ? O : th.muted, fontSize: '0.72rem' })}
            onClick={() => setShowDebug(d => !d)}>
            {showDebug ? '🔍 Hide Debug' : '🔍 Show Debug'}
          </button>
        )}
      </div>

      {debugLines && showDebug && (
        <div style={{ ...card(th), padding: '0.75rem 1rem', marginBottom: '1rem', maxHeight: 300, overflowY: 'auto' }}>
          <div style={{ fontWeight: 700, color: O, fontSize: '0.78rem', marginBottom: '0.5rem' }}>🔍 Raw extracted lines (store rows only)</div>
          {debugLines.filter(l => /^\d{6}\s*[-–]/.test(l) && !/mgmt fee|aws/i.test(l)).map((l, i) => (
            <div key={i} style={{ fontSize: '0.65rem', color: th.muted, fontFamily: 'monospace', marginBottom: '0.25rem', wordBreak: 'break-all' }}>{l}</div>
          ))}
        </div>
      )}

      {uploadErr && (
        <div style={{ ...card(th), padding: '0.75rem 1rem', marginBottom: '1rem', borderLeft: '3px solid #ff6b6b', color: '#ff6b6b', fontSize: '0.85rem' }}>
          ⚠️ {uploadErr}
        </div>
      )}

      {/* ── Empty state ── */}
      {!week && (
        <div style={{ ...card(th), padding: '3rem 2rem', textAlign: 'center' }}>
          <div style={{ fontSize: '2.5rem', marginBottom: '0.75rem' }}>📋</div>
          {isDMViewer ? (<>
            <div style={{ fontFamily: "'Raleway'", fontWeight: 700, fontSize: '1.05rem', color: th.text, marginBottom: '0.5rem' }}>No Scorecard Data Available Yet</div>
            <div style={{ color: th.muted, fontSize: '0.875rem', maxWidth: 420, margin: '0 auto', lineHeight: 1.65 }}>
              Weekly scorecard data is uploaded by the VP of Operations each week (typically Tuesday). Check back after Tuesday for your district's analytics.
            </div>
          </>) : (<>
            <div style={{ fontFamily: "'Raleway'", fontWeight: 700, fontSize: '1.05rem', color: th.text, marginBottom: '0.5rem' }}>Upload Your Weekly DM Scorecard</div>
            <div style={{ color: th.muted, fontSize: '0.875rem', maxWidth: 420, margin: '0 auto', lineHeight: 1.65 }}>
              Upload the <strong>Global DM Scorecard PDF</strong> each week (typically available Tuesday) to see real sales data, district comparisons, labor %, food cost %, and store performance rankings.
            </div>
          </>)}
        </div>
      )}

      {week && (<>

        {/* ── KPI Cards ── */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(165px,1fr))', gap: '0.75rem', marginBottom: '1.25rem' }}>
          {[
            { icon: '💵', label: 'Weekly Net Sales',      value: fmtSales(totalLW),          sub: `${fmtSales(avgSales)}/store avg`,                             color: '#69db7c' },
            { icon: '📈', label: 'vs Prior Week',         value: fmtPct(vsLW),               sub: `${fmtSales(Math.abs(totalLW - totalPW))} ${vsLW >= 0 ? 'increase' : 'decrease'}`, color: vsLW >= 0 ? '#69db7c' : '#ff6b6b' },
            { icon: '📅', label: 'vs Same Wk Last Year',  value: fmtPct(vsLY),               sub: `${enriched.length} stores reporting`,                         color: vsLY >= 0 ? '#69db7c' : '#ffa94d' },
            { icon: '👥', label: 'Total Guest Count',     value: fmtNum(totalCC),            sub: `${fmtNum(Math.round(totalCC/enriched.length||0))} avg/store`,  color: '#74c0fc' },
            { icon: '⚙️', label: 'Avg Labor %',           value: `${avgLabor.toFixed(1)}%`,  sub: `Avg Food Cost ${avgFC.toFixed(1)}%`,                           color: laborClr(avgLabor) },
            { icon: '🔮', label: 'Next Wk Forecast',      value: fmtSales(totalFC),          sub: `${fmtSales(totalFC / (enriched.length||1))}/store avg`,        color: '#b197fc' },
          ].map(k => (
            <div key={k.label} style={{ ...card(th), padding: '1rem 1.125rem', borderTop: `3px solid ${k.color}` }}>
              <div style={{ fontSize: '1.4rem', marginBottom: '0.35rem' }}>{k.icon}</div>
              <div style={{ fontFamily: "'Raleway'", fontWeight: 800, fontSize: '1.45rem', color: (k.label==='vs Prior Week'||k.label==='vs Same Wk Last Year') ? k.color : th.text }}>{k.value}</div>
              <div style={{ fontSize: '0.7rem', color: th.muted, marginTop: '0.15rem' }}>{k.sub}</div>
              <div style={{ fontSize: '0.68rem', fontWeight: 600, color: th.muted, marginTop: '0.3rem', textTransform: 'uppercase', letterSpacing: 0.5 }}>{k.label}</div>
            </div>
          ))}
        </div>

        {/* ── District Breakdown ── */}
        <div style={{ ...card(th), padding: '1.125rem', marginBottom: '1.125rem' }}>
          <div style={{ fontFamily: "'Raleway'", fontWeight: 700, fontSize: '0.9rem', color: th.text, marginBottom: '0.875rem' }}>🏘️ District Breakdown — Week #{week.weekNum}{week.isDraft ? <span style={{ color: '#ffa94d', fontWeight: 700, marginLeft: '0.5rem', fontSize: '0.7rem', border: '1px solid #ffa94d', borderRadius: '4px', padding: '1px 6px' }}>DRAFT</span> : ''}</div>
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.8rem' }}>
              <thead>
                <tr style={{ borderBottom: `2px solid ${th.cardBorder}` }}>
                  {['District', 'DM', 'Stores', 'LW Net Sales', 'vs PW', 'vs LY', 'Guests', 'Labor %', 'FC %', 'Total %'].map(h => (
                    <th key={h} style={{ ...thS, textAlign: h === 'District' || h === 'DM' ? 'left' : 'center' }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {distList.map((d, i) => (
                  <tr key={d.district} style={{ borderBottom: `1px solid ${th.cardBorder}`, background: i % 2 ? th.card2 + '30' : 'transparent', cursor:'pointer', transition:'background 0.15s' }}
                    onClick={() => { setDistFilter(d.district); setTimeout(() => detailTableRef.current?.scrollIntoView({ behavior:'smooth', block:'start' }), 100); }}
                    onMouseEnter={e=>e.currentTarget.style.background=O+'15'}
                    onMouseLeave={e=>e.currentTarget.style.background=i%2?th.card2+'30':'transparent'}>
                    <td style={{ ...tdS, fontWeight: 700, color: O }}>District {d.district}</td>
                    <td style={{ ...tdS, color: th.text }}>{d.dmName || '—'}</td>
                    <td style={{ ...tdS, color: th.muted, textAlign: 'center' }}>{d.count}</td>
                    <td style={{ ...tdS, fontWeight: 700, color: th.text, textAlign: 'center' }}>{fmtSales(d.lwSale)}</td>
                    <td style={{ ...tdS, fontWeight: 600, color: diffClr(d.vsPW), textAlign: 'center' }}>{fmtPct(d.vsPW)}</td>
                    <td style={{ ...tdS, fontWeight: 600, color: diffClr(d.vsLY), textAlign: 'center' }}>{fmtPct(d.vsLY)}</td>
                    <td style={{ ...tdS, color: th.muted, textAlign: 'center' }}>{fmtNum(d.lwCC)}</td>
                    <td style={{ ...tdS, fontWeight: 700, color: laborClr(d.avgLabor), textAlign: 'center' }}>{d.avgLabor > 0 ? d.avgLabor.toFixed(1)+'%' : '—'}</td>
                    <td style={{ ...tdS, color: th.muted, textAlign: 'center' }}>{d.avgDCP > 0 ? d.avgDCP.toFixed(1)+'%' : '—'}</td>
                    <td style={{ ...tdS, fontWeight: 600, color: totalClr(d.avgTotal), textAlign: 'center' }}>{d.avgTotal > 0 ? d.avgTotal.toFixed(1)+'%' : '—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

        {/* ── Concerns Banner ── */}
        {concerns.length > 0 && (
          <div style={{ ...card(th), padding: '0.875rem 1.125rem', marginBottom: '1.125rem', borderLeft: '3px solid #ffa94d' }}>
            <div style={{ fontWeight: 700, color: '#ffa94d', fontSize: '0.82rem', marginBottom: '0.4rem' }}>⚠️ {concerns.length} store{concerns.length > 1 ? 's' : ''} flagged for review</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.35rem' }}>
              {concerns.map(r => (
                <span key={r.pc} style={{ fontSize: '0.72rem', padding: '0.2rem 0.55rem', borderRadius: '1rem', background: th.card3, color: th.text }}>
                  {r.name}
                  {r.laborPct > 30 ? ` · Labor ${r.laborPct.toFixed(0)}%` : ''}
                  {r.totalPct > 60 ? ` · Total ${r.totalPct.toFixed(0)}%` : ''}
                  {r.diffPct < -10 ? ` · ↓${Math.abs(r.diffPct).toFixed(0)}% vs PW` : ''}
                </span>
              ))}
            </div>
          </div>
        )}

        {/* ── Store Performance Table ── */}
        <div ref={detailTableRef} style={{ ...card(th), padding: '1.125rem' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '0.875rem', flexWrap: 'wrap' }}>
            <div style={{ fontFamily: "'Raleway'", fontWeight: 700, fontSize: '0.9rem', color: th.text, flex: 1 }}>
              📍 {isDMViewer ? `Your District ${dmDistrict} Stores` : `Store Performance — ${filtered.length} stores`}
            </div>
            {!isDMViewer && (
              <select style={{ ...inp(th), width: 'auto', padding: '0.3rem 0.6rem', fontSize: '0.75rem' }} value={distFilter} onChange={e => setDistFilter(+e.target.value)}>
                <option value={0}>All Districts</option>
                {distList.map(d => <option key={d.district} value={d.district}>District {d.district}</option>)}
              </select>
            )}
          </div>
          <div style={{ overflowX: 'auto', overflowY: 'auto', maxHeight: '65vh' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.8rem' }}>
              <thead style={{ position: 'sticky', top: 0, zIndex: 2 }}>
                <tr style={{ borderBottom: `2px solid ${th.cardBorder}`, background: th.card }}>
                  <th style={{ ...thS, textAlign: 'left',  background: th.card }}>#</th>
                  <th style={{ ...thS, textAlign: 'left',  background: th.card }}>Store</th>
                  <th style={{ ...thS, textAlign: 'left',  background: th.card }}>Dist</th>
                  <th style={{ ...thS, textAlign: 'right', background: th.card }}><SortHdr col="lwSale"    label="LW Net Sales" /></th>
                  <th style={{ ...thS, textAlign: 'right', background: th.card }}><SortHdr col="diffPct"   label="vs PW" /></th>
                  <th style={{ ...thS, textAlign: 'right', background: th.card }}><SortHdr col="swlyPct"   label="vs LY" /></th>
                  <th style={{ ...thS, textAlign: 'right', background: th.card }}><SortHdr col="lwCC"      label="Guests" /></th>
                  <th style={{ ...thS, textAlign: 'right', background: th.card }}><SortHdr col="dcpPct"    label="DCP %" /></th>
                  <th style={{ ...thS, textAlign: 'right', background: th.card }}><SortHdr col="donutsPct" label="Bakery %" /></th>
                  <th style={{ ...thS, textAlign: 'right', background: th.card }}><SortHdr col="laborPct"  label="Labor %" /></th>
                  <th style={{ ...thS, textAlign: 'right', background: th.card }}><SortHdr col="totalPct"  label="Total %" /></th>
                  <th style={{ ...thS, textAlign: 'right', background: th.card }}><SortHdr col="fcSale"    label="Forecast" /></th>
                  <th style={{ ...thS, textAlign: 'right', background: th.card }}>Target</th>
                </tr>
              </thead>
              <tbody>
                {sorted.map((r, i) => (
                  <tr key={r.pc} style={{ borderBottom: `1px solid ${th.cardBorder}`, background: i % 2 ? th.card2 + '30' : 'transparent' }}>
                    <td style={{ ...tdS, color: th.muted, fontSize: '0.72rem' }}>{i + 1}</td>
                    <td style={{ ...tdS }}>
                      <div style={{ fontWeight: 600, color: th.text, whiteSpace: 'nowrap' }}>{r.name}</div>
                      <div style={{ fontSize: '0.7rem', color: th.muted }}>{r.city || `PC ${r.pc}`}</div>
                    </td>
                    <td style={{ ...tdS, fontWeight: 600, color: O, fontSize: '0.75rem' }}>D{r.district || '?'}</td>
                    <td style={{ ...tdS, fontWeight: 700, color: th.text, textAlign: 'right' }}>${r.lwSale.toLocaleString('en', { maximumFractionDigits: 0 })}</td>
                    <td style={{ ...tdS, fontWeight: 600, color: diffClr(r.diffPct),   textAlign: 'right' }}>{fmtPct(r.diffPct)}</td>
                    <td style={{ ...tdS, fontWeight: 600, color: diffClr(r.swlyPct),   textAlign: 'right' }}>{fmtPct(r.swlyPct)}</td>
                    <td style={{ ...tdS, color: th.muted,                              textAlign: 'right' }}>{fmtNum(r.lwCC)}</td>
                    <td style={{ ...tdS, fontWeight: 700, color: dcpClr(r.dcpPct),    textAlign: 'right' }}>{r.dcpPct > 0 ? r.dcpPct.toFixed(1)+'%' : '—'}</td>
                    <td style={{ ...tdS, fontWeight: 700, color: bakeryClr(r.donutsPct), textAlign: 'right' }}>{r.donutsPct > 0 ? r.donutsPct.toFixed(1)+'%' : '—'}</td>

                    <td style={{ ...tdS, fontWeight: 600, color: totalClr(r.totalPct), textAlign: 'right' }}>{r.totalPct > 0 ? r.totalPct.toFixed(1)+'%' : '—'}</td>
                    <td style={{ ...tdS, color: '#b197fc', fontWeight: 600,            textAlign: 'right' }}>{fmtSales(r.fcSale)}</td>
                    <td style={{ ...tdS, color: th.muted, fontSize: '0.75rem',         textAlign: 'right' }}>{r.targetPct > 0 ? r.targetPct.toFixed(0)+'%' : '—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

        {/* ── Total Network Performance ── */}
        <div style={{ ...card(th), padding: '1.25rem', marginTop: '1.125rem', borderTop: `3px solid ${O}` }}>
          <div style={{ fontFamily: "'Raleway'", fontWeight: 800, fontSize: '1rem', color: th.text, marginBottom: '1rem' }}>
            {distFilter
              ? `👤 District ${distFilter} — ${Object.values(districts||{}).find(x=>x.num===distFilter)?.name || ''} · Week #${week.weekNum} · ${week.weekEnd}`
              : `🏢 Total Network Performance — Week #${week.weekNum} · ${week.weekEnd}`}
          </div>
          {(() => {
            const src       = filtered;
            const netSales  = src.reduce((a, r) => a + r.lwSale,   0);
            const pwSales   = src.reduce((a, r) => a + r.pwSale,   0);
            const swlySales = src.reduce((a, r) => a + r.swly,     0);
            const guests    = src.reduce((a, r) => a + r.lwCC,     0);
            const forecast  = src.reduce((a, r) => a + r.fcSale,   0);
            const avgOf     = (arr, key) => { const f = arr.filter(r => r[key] > 0); return f.length ? f.reduce((a,r)=>a+r[key],0)/f.length : 0; };
            const avgDCP    = avgOf(src, 'dcpPct');
            const avgBakery = avgOf(src, 'donutsPct');
            const avgLabor  = avgOf(src, 'laborPct');
            const avgTot    = avgOf(src, 'totalPct');
            const vsPW      = pwSales   > 0 ? (netSales - pwSales)   / pwSales   * 100 : 0;
            const vsLY2     = swlySales > 0 ? (netSales - swlySales) / swlySales * 100 : 0;
            const fmtFull = n => '$' + Math.round(n).toLocaleString('en-US');
            const salesLabel = distFilter ? 'District Net Sales' : 'Total Network Sales';
            const metrics = [
              { label: 'vs Prior Week',    value: fmtPct(vsPW),                 color: diffClr(vsPW)      },
              { label: 'vs Same Wk LY',   value: fmtPct(vsLY2),                color: diffClr(vsLY2)     },
              { label: 'Total Guests',     value: fmtNum(guests),               color: '#74c0fc'          },
              { label: 'Avg DCP %',        value: avgDCP.toFixed(1)+'%',        color: dcpClr(avgDCP)     },
              { label: 'Avg Bakery %',     value: avgBakery.toFixed(1)+'%',     color: bakeryClr(avgBakery) },
              { label: 'Avg Labor %',      value: avgLabor.toFixed(1)+'%',      color: laborClr(avgLabor) },
              { label: 'Avg Total Cost %', value: avgTot.toFixed(1)+'%',        color: totalClr(avgTot)   },
              { label: 'Next Wk Forecast', value: fmtSales(forecast),           color: '#b197fc'          },
            ];
            return (<>
              {/* ── Hero Sales Card ── */}
              <div style={{
                position: 'relative', overflow: 'hidden', borderRadius: '0.875rem',
                marginBottom: '0.875rem', padding: '2rem 2.5rem', textAlign: 'center',
                background: 'linear-gradient(135deg, #0a2e0a 0%, #0d3d12 40%, #0a2e0a 100%)',
                border: '1px solid #69db7c44',
                boxShadow: '0 4px 32px #69db7c22',
              }}>
                {/* Money symbol watermarks */}
                {['$','$','$','$','$'].map((s,i) => (
                  <span key={i} style={{
                    position:'absolute', fontSize: i%2===0 ? '8rem' : '5rem',
                    opacity: 0.04, fontWeight:900, color:'#69db7c', userSelect:'none', pointerEvents:'none',
                    top: ['-10%','20%','50%','-5%','35%'][i],
                    left: ['-2%','18%','60%','75%','88%'][i],
                    transform: `rotate(${[-15,10,-8,20,-12][i]}deg)`,
                  }}>$</span>
                ))}
                <div style={{ position:'relative', zIndex:1 }}>
                  <div style={{ fontSize:'0.7rem', color:'#69db7c99', fontWeight:700,
                    textTransform:'uppercase', letterSpacing:3, marginBottom:'0.5rem' }}>
                    {salesLabel}
                  </div>
                  <div style={{
                    fontFamily:"'Raleway'", fontWeight:900, fontSize:'clamp(2rem, 5vw, 3.5rem)',
                    color:'#69db7c', letterSpacing:1,
                    textShadow:'0 0 40px #69db7c66, 0 2px 4px rgba(0,0,0,0.5)',
                    lineHeight:1.1,
                  }}>
                    {fmtFull(netSales)}
                  </div>
                  <div style={{ display:'flex', justifyContent:'center', gap:'1.5rem', marginTop:'0.75rem', flexWrap:'wrap' }}>
                    <span style={{ fontSize:'0.78rem', color: diffClr(vsPW), fontWeight:700 }}>
                      {vsPW >= 0 ? '▲' : '▼'} {Math.abs(vsPW).toFixed(1)}% vs last week
                    </span>
                    <span style={{ fontSize:'0.78rem', color: diffClr(vsLY2), fontWeight:700 }}>
                      {vsLY2 >= 0 ? '▲' : '▼'} {Math.abs(vsLY2).toFixed(1)}% vs last year
                    </span>
                  </div>
                </div>
              </div>
              {/* ── Rest of metrics ── */}
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(148px, 1fr))', gap: '0.75rem' }}>
                {metrics.map(m => (
                  <div key={m.label} style={{ background: th.card2, borderRadius: '0.625rem', padding: '0.875rem 1rem', borderLeft: `3px solid ${m.color}` }}>
                    <div style={{ fontFamily: "'Raleway'", fontWeight: 800, fontSize: '1.3rem', color: m.color }}>{m.value}</div>
                    <div style={{ fontSize: '0.68rem', color: th.muted, marginTop: '0.25rem', textTransform: 'uppercase', letterSpacing: 0.6, fontWeight: 600 }}>{m.label}</div>
                  </div>
                ))}
              </div>
            </>);
          })()}
        </div>

      </>)}
    </div>
  );
}

function formatPhone(raw) {
  const digits = (raw || "").replace(/\D/g, "").slice(0, 10);
  if (digits.length < 4)  return digits;
  if (digits.length < 7)  return `(${digits.slice(0,3)}) ${digits.slice(3)}`;
  return `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`;
}
function handlePhoneChange(val, setter, field) {
  const digits = val.replace(/\D/g, "").slice(0, 10);
  setter(f => ({ ...f, [field]: formatPhone(digits) }));
}

function ContactsPage({ contacts, setContacts, vendors, setVendors, isAdmin, currentUser, th }) {
  const [search, setSearch] = useState("");

  const [showInternal, setShowInternal] = useState(() => { try { return JSON.parse(localStorage.getItem('pcg_show_internal') ?? 'true'); } catch { return true; } });
  const [showVendors, setShowVendors] = useState(() => { try { return JSON.parse(localStorage.getItem('pcg_show_vendors') ?? 'true'); } catch { return true; } });
  const [dragId, setDragId] = useState(null);

  useEffect(() => { localStorage.setItem('pcg_show_internal', JSON.stringify(showInternal)); }, [showInternal]);
  useEffect(() => { localStorage.setItem('pcg_show_vendors', JSON.stringify(showVendors)); }, [showVendors]);

  // Migration: dept string → depts array
  useEffect(() => {
    const needsMigration = contacts.some(c => c.dept !== undefined && !c.depts);
    if (needsMigration) {
      setContacts(cs => cs.map(c => {
        if (c.dept !== undefined && !c.depts) {
          const { dept, ...rest } = c;
          return { ...rest, depts: [dept], importance: c.importance || 0, sortOrder: c.sortOrder || 0 };
        }
        return { ...c, importance: c.importance || 0, sortOrder: c.sortOrder || 0 };
      }));
    }
  }, []);

  const nextId = (arr) => Math.max(0, ...arr.map(x=>x.id)) + 1;
  const getDepts = (c) => c.depts || (c.dept ? [c.dept] : []);

  const DEPT_OPTIONS = ["Leadership","Accounting","HR & Payroll","IT","Construction & Dev","Facilities","Operations","Other"];

  const openAdd = (type) => { setModal(type); setEditItem(null); setDeptDropOpen(false); setForm(type==="contact" ? { name:"",title:"",phone:"",email:"",depts:["Operations"],importance:0,districts:[],customDept:"" } : { company:"",contact:"",phone:"",notes:"" }); };
  const openEdit = (type, item) => { setModal(type); setEditItem(item.id); setDeptDropOpen(false); setForm({...item, depts: getDepts(item), importance: item.importance||0, districts: item.districts||[], customDept: item.customDept||"" }); };

  const save = () => {
    if (modal === "contact") {
      if (!form.name) return;
      const saveData = { ...form };
      delete saveData.dept; // remove legacy field
      if (!saveData.depts || saveData.depts.length === 0) saveData.depts = ["Operations"];
      setContacts(cs => editItem ? cs.map(c=>c.id===editItem?{...saveData,id:editItem}:c) : [...cs,{...saveData,id:nextId(contacts),sortOrder:0}]);
    } else {
      if (!form.company) return;
      setVendors(vs => editItem ? vs.map(v=>v.id===editItem?{...form,id:editItem}:v) : [...vs,{...form,id:nextId(vendors)}]);
    }
    setModal(null); setEditItem(null); setDeptDropOpen(false);
  };

  const del = (type, id) => {
    if (type==="contact") setContacts(cs=>cs.filter(c=>c.id!==id));
    else setVendors(vs=>vs.filter(v=>v.id!==id));
  };

  const filteredC = contacts.filter(c => {
    if (!search.trim()) return true;
    const s = search.toLowerCase();
    const depts = getDepts(c);
    return c.name.toLowerCase().includes(s) || c.title.toLowerCase().includes(s) || depts.some(d => d.toLowerCase().includes(s)) || (c.customDept||"").toLowerCase().includes(s);
  }).sort((a,b) => {
    const ai = a.importance || 0, bi = b.importance || 0;
    if (bi !== ai) return bi - ai;
    const as = a.sortOrder || 0, bs = b.sortOrder || 0;
    if (as !== bs) return as - bs;
    return (a.name||"").localeCompare(b.name||"");
  });

  const filteredV = vendors.filter(v => !search.trim() || v.company.toLowerCase().includes(search.toLowerCase()) || (v.contact||"").toLowerCase().includes(search.toLowerCase()));

  // Drag handlers for contacts
  const handleDragStart = (id) => setDragId(id);
  const handleDragOver = (e) => e.preventDefault();
  const handleDrop = (targetId) => {
    if (dragId === null || dragId === targetId) return;
    setContacts(cs => {
      const updated = [...cs];
      const dragItem = updated.find(c=>c.id===dragId);
      const targetItem = updated.find(c=>c.id===targetId);
      if (!dragItem || !targetItem) return cs;
      if ((dragItem.importance||0) !== (targetItem.importance||0)) return cs;
      const sameTier = updated.filter(c=>(c.importance||0)===(dragItem.importance||0)).sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0));
      const dragIdx = sameTier.findIndex(c=>c.id===dragId);
      const targetIdx = sameTier.findIndex(c=>c.id===targetId);
      sameTier.splice(dragIdx,1);
      sameTier.splice(targetIdx,0,dragItem);
      sameTier.forEach((c,i) => { const u = updated.find(x=>x.id===c.id); if(u) u.sortOrder = i; });
      return updated;
    });
    setDragId(null);
  };

  const toggleDept = (dept) => {
    setForm(f => {
      const cur = f.depts || [];
      return { ...f, depts: cur.includes(dept) ? cur.filter(d=>d!==dept) : [...cur, dept] };

    </div>

          <button style={btn(th)} onClick={()=>openAdd("vendor")}>+ Vendor</button>
        </>}
      </div>

      {/* ── Contacts section ── */}
      <div style={{ marginBottom:"2.25rem" }}>
        <div style={{ display:"flex", alignItems:"center", gap:"0.625rem", marginBottom:"1.125rem" }}>
          <span style={{ fontSize:"1.125rem" }}>👥</span>
          <span style={{ fontFamily:"'Raleway'", fontWeight:800, fontSize:"1.0625rem", color:th.text }}>Internal Contacts</span>
          <button onClick={()=>setShowInternal(s=>!s)} style={{ background:th.card3, border:"none", borderRadius:"0.375rem", padding:"0.25rem 0.625rem", fontSize:"0.6875rem", color:th.muted, cursor:"pointer", fontWeight:600 }}>
            {showInternal ? "Hide" : "Show"}
          </button>
          <div style={{ flex:1, height:1, background:th.cardBorder, marginLeft:6 }} />
          <span style={{ fontSize:"0.75rem", color:th.muted }}>{contacts.length} contacts</span>
        </div>

        {showInternal && (
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))", gap:"0.75rem" }}>
            {filteredC.map(c => {
              const depts = getDepts(c);
              const primaryDept = depts[0] || "Other";
              const dc = DEPT_COLORS[primaryDept] || DEPT_COLORS["Other"];
              return (
                <div key={c.id} draggable={isAdmin} onDragStart={()=>handleDragStart(c.id)} onDragOver={handleDragOver} onDrop={()=>handleDrop(c.id)}
                  style={{ ...card(th), padding:20, position:"relative", cursor: isAdmin ? "grab" : "default", opacity: dragId===c.id ? 0.5 : 1 }}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=O+"55"}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=th.cardBorder}>
                  {isAdmin && (
                    <div style={{ position:"absolute", top:12, right:12, display:"flex", gap:"0.375rem" }}>
                      <button onClick={()=>openEdit("contact",c)} style={{ background:th.card3, border:"none", borderRadius:"0.375rem", padding:"0.188rem 0.5rem", fontSize:"0.6875rem", color:th.muted, cursor:"pointer" }}>Edit</button>
                      <button onClick={()=>del("contact",c.id)} style={{ background:"#ff444418", border:"none", borderRadius:"0.375rem", padding:"0.188rem 0.5rem", fontSize:"0.6875rem", color:"#ff6666", cursor:"pointer" }}>✕</button>
                    </div>
                  )}
                  <div style={{ display:"flex", alignItems:"center", gap:"0.75rem", marginBottom:"0.875rem", paddingRight: isAdmin ? 80 : 0 }}>
                    <div style={{ width:42, height:42, borderRadius:"50%", background:dc.bg, border:`2px solid ${dc.color}44`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"1.0rem", fontWeight:800, color:dc.color, flexShrink:0 }}>
                      {c.name.split(" ").map(w=>w[0]).join("").slice(0,2)}
                    </div>
                    <div>
                      <div style={{ display:"flex", alignItems:"center", gap:"0.375rem" }}>
                        <span style={{ fontWeight:700, fontSize:"0.875rem", color:th.text }}>{c.name}</span>

                    </div>
                  </div>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:"0.25rem", marginBottom:"0.5rem" }}>
                    {depts.map(d => {
                      const ddc = DEPT_COLORS[d] || DEPT_COLORS["Other"];
                      const label = d === "Other" && c.customDept ? c.customDept : d;
                      return <span key={d} style={{ fontSize:"0.625rem", fontWeight:600, padding:"0.188rem 0.562rem", borderRadius:"1.25rem", background:ddc.bg, color:ddc.color, letterSpacing:0.5 }}>{label}</span>;
                    })}
                  </div>
                  {depts.includes("Operations") && c.districts && c.districts.length > 0 && (
                    <div style={{ display:"flex", gap:"0.25rem", marginBottom:"0.375rem" }}>
                      {c.districts.map(d => (

                  <div style={{ marginTop:"0.5rem", display:"flex", flexDirection:"column", gap:"0.5rem" }}>
                    <a href={"tel:"+c.phone.replace(/\D/g,"")} style={{ display:"flex", alignItems:"center", gap:"0.5rem", textDecoration:"none", color:th.text }}>
                      <span style={{ fontSize:"0.875rem" }}>📞</span>

                    <a href={"mailto:"+c.email} style={{ display:"flex", alignItems:"center", gap:"0.5rem", textDecoration:"none", color:th.text }}>
                      <span style={{ fontSize:"0.875rem" }}>✉️</span>
                      <span style={{ fontSize:"0.8125rem", color:O }}>{c.email}</span>
                    </a>
                  </div>
                </div>
              );
            })}
            {filteredC.length===0 && <div style={{ color:th.muted, fontSize:"0.875rem", padding:20 }}>No contacts found.</div>}
          </div>
        )}
      </div>

      {/* ── Vendors section ── */}

        <div style={{ display:"flex", alignItems:"center", gap:"0.625rem", marginBottom:"1.125rem" }}>

          <button onClick={()=>setShowVendors(s=>!s)} style={{ background:th.card3, border:"none", borderRadius:"0.375rem", padding:"0.25rem 0.625rem", fontSize:"0.6875rem", color:th.muted, cursor:"pointer", fontWeight:600 }}>
            {showVendors ? "Hide" : "Show"}

          <div style={{ flex:1, height:1, background:th.cardBorder, marginLeft:6 }} />

        </div>

        {showVendors && (
          <div style={{ ...card(th), overflow:"hidden" }}>

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = window.atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

async function registerServiceWorker() {
  if (!('serviceWorker' in navigator)) return null;
  try {
    const reg = await navigator.serviceWorker.register('/sw.js');
    return reg;
  } catch (e) { console.warn('SW registration failed:', e); return null; }
}

async function subscribeToPush(userId) {
  try {
    const reg = await registerServiceWorker();
    if (!reg || !('PushManager' in window)) return false;

    const permission = await Notification.requestPermission();
    if (permission !== 'granted') return false;

    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
      });
    }

    await fetch('/.netlify/functions/push', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'subscribe', userId, subscription: sub.toJSON() }),
    });
    return true;
  } catch (e) { console.warn('Push subscribe failed:', e); return false; }
}

async function unsubscribeFromPush(userId) {
  try {
    const reg = await navigator.serviceWorker?.ready;
    if (!reg) return;
    const sub = await reg.pushManager.getSubscription();
    if (sub) {
      const endpoint = sub.endpoint;
      await sub.unsubscribe();
      await fetch('/.netlify/functions/push', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'unsubscribe', userId, endpoint }),
      });
    }
  } catch (e) { console.warn('Push unsubscribe failed:', e); }
}

// Dispatch notifications to email, SMS, and push based on user preferences
function dispatchNotifications(recipientEmails, subject, htmlBody, smsBody, allUsers, pushUrl, pushTag) {
  // Email: send to recipients whose matching user has emailNotify !== false (default on)
  const emailRecipients = recipientEmails.filter(email => {
    const u = allUsers.find(usr => (usr.email || '').toLowerCase() === email.toLowerCase());
    return !u || u.emailNotify !== false; // send if no matching user or user hasn't disabled
  });
  if (emailRecipients.length > 0) sendNotifyEmail(emailRecipients, subject, htmlBody);

  // SMS: send to users whose email matches a recipient, have smsNotify enabled, and have a phone number
  const smsNumbers = [];
  for (const email of recipientEmails) {
    const u = allUsers.find(usr => (usr.email || '').toLowerCase() === email.toLowerCase());
    if (u && u.smsNotify && u.phone) {
      const digits = u.phone.replace(/\D/g, '');
      if (digits.length >= 10) smsNumbers.push(digits);
    }
  }
  if (smsNumbers.length > 0) sendNotifySMS(smsNumbers, smsBody);

  // Push: send to users whose email matches a recipient and have pushNotify enabled
  const pushUserIds = [];
  for (const email of recipientEmails) {
    const u = allUsers.find(usr => (usr.email || '').toLowerCase() === email.toLowerCase());
    if (u && u.pushNotify && u.id) pushUserIds.push(u.id);
  }
  if (pushUserIds.length > 0) sendPushNotification(pushUserIds, subject, smsBody, pushUrl || '/', pushTag || undefined);
}

function sumRVC(revenueCenters = []) {
  const s = revenueCenters.reduce((acc, r) => ({
    netSales:  acc.netSales  + (r.netSlsTtl  || 0),
    guests:    acc.guests    + (r.chkCnt     || 0),  // checks = guests
    forecast:  acc.forecast  + (r.slsFcst    || 0),
    voids:     acc.voids     + (r.vdTtl      || 0),
    voidCnt:   acc.voidCnt   + (r.vdCnt      || 0),
    errCor:    acc.errCor    + (r.errCorTtl  || 0),
    discounts: acc.discounts + ((r.itmDscTtl ||0) + (r.subDscTtl||0)),
    tax:       acc.tax       + (r.taxCollTtl || 0),
  }), { netSales:0, guests:0, forecast:0, voids:0, voidCnt:0, errCor:0, discounts:0, tax:0 });
  s.avgCheck = s.guests > 0 ? s.netSales / s.guests : 0;
  return s;
}

// ─── Trend Bar Chart ─────────────────────────────────────────────────────────
function TrendChart({ data, G, th, onBarClick }) {
  const rawMax = Math.max(...data.map(d => d.netSales), 1);
  // Round ceiling up to nearest $25k, minimum $100k
  const STEP = 25000;
  const chartMax = Math.max(100000, Math.ceil(rawMax / STEP) * STEP);
  const H = 110, W_BAR = 44, GAP = 12;
  const LABEL_H = 44; // space below baseline for day + date labels
  const totalW = data.length * (W_BAR + GAP) - GAP;
  const fmtK = v => v >= 1000 ? '$' + (v/1000).toFixed(0) + 'k' : '$' + Math.round(v);
  // Y-axis gridlines at 25k intervals
  const gridLines = [];
  for (let v = STEP; v <= chartMax; v += STEP) {
    gridLines.push(v);
  }
  return (
    <div style={{ padding:'1rem 1.25rem', background: th.card2, borderRadius:'0.75rem',
      border:`1px solid ${G}22`, marginBottom:'1.125rem' }}>
      <div style={{ fontSize:'0.72rem', fontWeight:700, color:G, letterSpacing:1.5,
        textTransform:'uppercase', marginBottom:'0.75rem' }}>📈 Weekly Sales Trend (Sun–Sat)</div>
      <div style={{ overflowX: 'auto', overflow: 'visible' }}>
        <svg viewBox={`-38 -30 ${totalW + 58} ${H + LABEL_H + 30}`}
          style={{ width:'100%', minWidth: data.length * (W_BAR + GAP) + 40, height: H + LABEL_H + 30, overflow:'visible', display:'block' }}>
          {/* Gridlines + Y-axis labels */}
          {gridLines.map(v => {
            const y = H - (v / chartMax) * H;
            return (
              <g key={v}>
                <line x1={0} y1={y} x2={totalW} y2={y} stroke={`${G}18`} strokeWidth={1} strokeDasharray="3 3" />
                <text x={-6} y={y + 4} textAnchor="end" fontSize="10" fill={`${th.muted}99`}>{fmtK(v)}</text>
              </g>
            );
          })}
          {/* Bars */}
          {data.map((d, i) => {
            const barH = d.hasData ? Math.max(4, (d.netSales / chartMax) * H) : 0;
            const x = i * (W_BAR + GAP);
            return (
              <g key={d.date}>
                {/* Bar */}
                <rect x={x} y={H - barH} width={W_BAR} height={barH}
                  fill={d.isSelected ? G : `${G}55`} rx={3}
                  style={{ filter: d.isSelected ? `drop-shadow(0 0 6px ${G})` : 'none' }} />
                {/* Value label above bar */}
                {d.hasData && (
                  <text x={x + W_BAR/2} y={H - barH - 6} textAnchor="middle"
                    fontSize="11" fill={d.isSelected ? G : `${G}bb`} fontWeight={d.isSelected ? '800':'500'}>
                    {fmtK(d.netSales)}
                  </text>
                )}
                {/* Day name */}
                <text x={x + W_BAR/2} y={H + 18} textAnchor="middle"
                  fontSize="12" fill={d.isSelected ? G : th.muted} fontWeight={d.isSelected ? '800':'500'}>
                  {d.dayLabel}
                </text>
                {/* Date */}
                <text x={x + W_BAR/2} y={H + 34} textAnchor="middle"
                  fontSize="11" fill={d.isSelected ? `${G}cc` : `${th.muted}aa`} fontWeight={d.isSelected ? '700' : '400'}>
                  {d.date}
                </text>
                {/* Clickable overlay */}
                <rect x={x} y={0} width={W_BAR} height={H + LABEL_H}
                  fill="transparent" style={{ cursor: d.hasData ? 'pointer' : 'default' }}
                  onClick={() => d.hasData && d.dateKey && onBarClick && onBarClick(d.dateKey)} />
              </g>
            );
          })}
          {/* Baseline */}
          <line x1={0} y1={H} x2={totalW} y2={H} stroke={`${G}44`} strokeWidth={1.5} />
        </svg>
      </div>
    </div>
  );
}
