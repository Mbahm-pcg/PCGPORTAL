// ─── Admin: User Management ──────────────────────────────────────────────────

function AdminUsers({ users, setUsers, currentUser, th, showAlert }) {
  const [addMode, setAddMode] = useState(false);
  const [editId, setEditId] = useState(null);
  const [showPw, setShowPw]   = useState(false);
  const [form, setForm] = useState({ username:"", password:"", name:"", role:"Manager", initials:"", isAdmin:false, region:"PA", active:true, email:"", phone:"" });
  const [search, setSearch] = useState("");
  const [welcomeSent, setWelcomeSent] = useState(null);

  const nextId = () => Math.max(0, ...users.map(u => u.id)) + 1;
  const initials = (name) => name.split(" ").map(w => w[0]).join("").toUpperCase().slice(0,2);

  const [emailAction, setEmailAction] = useState(null); // { userId, type, status }

  const sendWelcomeEmail = async (newUser) => {
    if (!newUser.email) return;
    const subject = "Welcome to the PCG Company Portal!";
    const htmlBody = `
      <h2 style="color:#333;margin-bottom:8px;">Welcome, ${newUser.name}! 👋</h2>
      <p style="color:#555;font-size:15px;">Your account has been created on the <strong>PCG Company Portal</strong>.</p>
      <div style="background:#f8f8f8;border-radius:8px;padding:16px 20px;margin:16px 0;">
        <p style="margin:4px 0;font-size:14px;"><strong>Portal URL:</strong> <a href="https://pcg-ops.netlify.app/" style="color:#FF671F;">https://pcg-ops.netlify.app/</a></p>
        <p style="margin:4px 0;font-size:14px;"><strong>Username:</strong> ${newUser.username}</p>
        <p style="margin:4px 0;font-size:14px;"><strong>Password:</strong> ${newUser.password}</p>
      </div>
      <p style="color:#555;font-size:14px;">On your first login, you'll be asked to change your password and set up your profile.</p>
      <div style="background:#FFF3E0;border:1px solid #FFE0B2;border-radius:8px;padding:16px 20px;margin:16px 0;">
        <h3 style="margin:0 0 8px;font-size:14px;color:#E65100;">📱 Add to Home Screen (Use Like an App)</h3>
        <p style="margin:4px 0;font-size:13px;color:#555;"><strong>iPhone/iPad:</strong> Open the link in Safari → Tap the <strong>Share</strong> button (box with arrow) → Tap <strong>"Add to Home Screen"</strong></p>
        <p style="margin:4px 0;font-size:13px;color:#555;"><strong>Android:</strong> Open the link in Chrome → Tap the <strong>⋮ menu</strong> (3 dots) → Tap <strong>"Add to Home Screen"</strong></p>
        <p style="margin:4px 0;font-size:13px;color:#555;"><strong>Desktop:</strong> Open in Chrome → Click the <strong>install icon</strong> in the address bar, or bookmark the page</p>
      </div>
      <p style="color:#999;font-size:12px;">If you have any issues, contact IT for help.</p>
    `;
    try {
      await sendNotifyEmail([newUser.email], subject, htmlBody);
      setWelcomeSent("success");
    } catch(e) { setWelcomeSent("error"); }
    setTimeout(() => setWelcomeSent(null), 4000);
  };

  const resendWelcome = async (u) => {
    if (!u.email) { showAlert("error", "No email on file for " + u.name); return; }
    setEmailAction({ userId: u.id, type: "welcome", status: "sending" });
    try {
      await sendWelcomeEmail(u);
      setEmailAction({ userId: u.id, type: "welcome", status: "ok" });
      showAlert("success", `Welcome email sent to ${u.email}`);
    } catch(e) {
      setEmailAction({ userId: u.id, type: "welcome", status: "fail" });
      showAlert("error", "Failed to send welcome email");
    }
    setTimeout(() => setEmailAction(null), 3000);
  };

  const sendPasswordReset = async (u) => {
    if (!u.email) { showAlert("error", "No email on file for " + u.name); return; }
    setEmailAction({ userId: u.id, type: "reset", status: "sending" });
    const subject = "PCG Portal — Your Password Has Been Reset";
    const htmlBody = `
      <h2 style="color:#333;margin-bottom:8px;">Password Reset</h2>
      <p style="color:#555;font-size:15px;">Hi ${u.name}, your password for the <strong>PCG Company Portal</strong> has been reset by an administrator.</p>
      <div style="background:#f8f8f8;border-radius:8px;padding:16px 20px;margin:16px 0;">
        <p style="margin:4px 0;font-size:14px;"><strong>Portal URL:</strong> <a href="https://pcg-ops.netlify.app/" style="color:#FF671F;">https://pcg-ops.netlify.app/</a></p>
        <p style="margin:4px 0;font-size:14px;"><strong>Username:</strong> ${u.username}</p>
        <p style="margin:4px 0;font-size:14px;"><strong>New Password:</strong> ${u.password}</p>
      </div>
      <p style="color:#555;font-size:14px;">Please log in and change your password as soon as possible.</p>
      <p style="color:#999;font-size:12px;">If you did not request this change, contact IT immediately.</p>
    `;
    try {
      await sendNotifyEmail([u.email], subject, htmlBody);
      setEmailAction({ userId: u.id, type: "reset", status: "ok" });
      showAlert("success", `Password reset email sent to ${u.email}`);
    } catch(e) {
      setEmailAction({ userId: u.id, type: "reset", status: "fail" });
      showAlert("error", "Failed to send password reset email");
    }
    setTimeout(() => setEmailAction(null), 3000);
  };

  const save = () => {
    if (!form.username || !form.name) return;
    const ini = form.initials || initials(form.name);
    if (editId) {
      setUsers(us => us.map(u => u.id === editId ? { ...u, ...form, initials: ini } : u));
      setEditId(null);
    } else {
      const newUser = { ...form, id: nextId(), initials: ini, mustSetup: true };
      setUsers(us => [...us, newUser]);
      sendWelcomeEmail(newUser);
      setAddMode(false);
    }
    setForm({ username:"", password:"", name:"", role:"Store Manager", initials:"", isAdmin:false, userType:"manager", region:"PA", active:true, darkMode:false, email:"", phone:"" });
  };

  const startEdit = (u) => { setEditId(u.id); setForm({ ...u }); setAddMode(true); };
  const toggleActive = (id) => setUsers(us => us.map(u => u.id === id ? { ...u, active: !u.active } : u));
  const del = (id) => {
    const target = users.find(u => u.id === id);
    if (!canManageUser(currentUser, target)) return;
    setUsers(us => us.filter(u => u.id !== id));
  };

  const filtered = users.filter(u => !search.trim() || u.name.toLowerCase().includes(search.toLowerCase()) || u.username.toLowerCase().includes(search.toLowerCase()));

  const ROLE_OPTIONS = isFullAdmin(currentUser)
    ? ["Vice President","Chief Executive Officer","Chief Operating Officer","Chief Financial Officer","Chief of Staff","IT Administrator","HR / IT Staff","Office Staff","District Manager","Store Manager","Construction & Development"]
    : ["District Manager","Store Manager","Construction & Development"];
  const USERTYPE_OPTIONS = isFullAdmin(currentUser)
    ? [["executive","Executive Team"],["it","IT Team"],["office_staff","Office Staff"],["dm","District Manager"],["manager","Store Manager"],["vendor","Vendor"],["construction","Construction & Development"]]
    : [["dm","District Manager"],["manager","Store Manager"],["vendor","Vendor"],["construction","Construction & Development"]];

  return (
    <div className="fade-in">
      <div style={{ display:"flex", gap:"0.75rem", marginBottom:"1.5rem", alignItems:"center", flexWrap:"wrap" }}>
        <input style={{ ...inp(th), maxWidth:300 }} placeholder="🔍 Search users..." value={search} onChange={e=>setSearch(e.target.value)} />
        {canManageUser(currentUser, {userType:"manager"}) && <button style={btn(th)} onClick={() => { setAddMode(a=>!a); setEditId(null); setForm({ username:"",password:"",name:"",role:"Store Manager",initials:"",isAdmin:false,userType:"manager",region:"PA",active:true,email:"",phone:"" }); }}>
          {addMode && !editId ? "✕ Cancel" : "+ Add User"}
        </button>}
      </div>

      {addMode && (
        <div style={{ ...card(th), padding:20, marginBottom:"1.5rem", border:`1px solid ${O}44` }} className="fade-in">
          <div style={{ fontSize:"0.8125rem", fontWeight:600, color:O, marginBottom:"1.0rem", textTransform:"uppercase", letterSpacing:1 }}>{editId ? "Edit User" : "New User"}</div>
          <div className="add-link-grid" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0.75rem", marginBottom:"0.75rem" }}>
            <input style={inp(th)} placeholder="Full Name" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} />
            <input style={inp(th)} placeholder="Username" value={form.username} onChange={e=>setForm(f=>({...f,username:e.target.value}))} />
            <div style={{ position:"relative" }}><input style={inp(th)} placeholder="Password" type={showPw?"text":"password"} autoComplete="new-password" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))} /><button type="button" onClick={()=>setShowPw(s=>!s)} style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:th.muted, cursor:"pointer", fontSize:"0.75rem" }}>{showPw?"Hide":"Show"}</button></div>
            <select style={inp(th)} value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))}>
              {ROLE_OPTIONS.map(r=><option key={r}>{r}</option>)}
            </select>
            <select style={inp(th)} value={form.userType||"manager"} onChange={e=>setForm(f=>({...f,userType:e.target.value}))}>
              {USERTYPE_OPTIONS.map(([v,l])=><option key={v} value={v}>{l}</option>)}
            </select>
            <select style={inp(th)} value={form.region} onChange={e=>setForm(f=>({...f,region:e.target.value}))}>
              <option value="All">All Regions</option>
              <option value="PA">PA Only</option>
              <option value="NJ">NJ Only</option>
            </select>
            <div style={{ display:"flex", alignItems:"center", gap:"0.75rem", padding:"0.625rem 0.875rem", background:th.inputBg, border:`1px solid ${th.inputBorder}`, borderRadius:"0.5rem" }}>
              <label style={{ display:"flex", alignItems:"center", gap:"0.5rem", cursor:"pointer", fontSize:"0.8125rem", color:th.text }}>
                <input type="checkbox" checked={form.isAdmin} onChange={e=>setForm(f=>({...f,isAdmin:e.target.checked}))} style={{ accentColor:O, width:16, height:16 }} />
                Admin Access
              </label>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:"0.75rem", padding:"0.625rem 0.875rem", background:th.inputBg, border:`1px solid ${th.inputBorder}`, borderRadius:"0.5rem" }}>
              <label style={{ display:"flex", alignItems:"center", gap:"0.5rem", cursor:"pointer", fontSize:"0.8125rem", color:th.text }}>
                <input type="checkbox" checked={!!form.darkMode} onChange={e=>setForm(f=>({...f,darkMode:e.target.checked}))} style={{ accentColor:"#888", width:16, height:16 }} />
                🌙 Dark Mode
              </label>
            </div>
          </div>
          <div style={{ fontSize:"0.75rem", fontWeight:600, color:th.muted, marginBottom:"0.5rem", textTransform:"uppercase", letterSpacing:0.5 }}>Contact Info</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0.75rem", marginBottom:"0.75rem" }}>
            <input style={inp(th)} type="email" placeholder="📧 Email address" value={form.email||""} onChange={e=>setForm(f=>({...f,email:e.target.value}))} />
            <input style={inp(th)} placeholder="📱 Phone number" value={form.phone||""} onChange={e=>handlePhoneChange(e.target.value, setForm, "phone")} />
          </div>
          {welcomeSent && (
            <div style={{ padding:"0.5rem 0.75rem", borderRadius:"0.375rem", marginBottom:"0.75rem", fontSize:"0.8rem", fontWeight:600,
              background: welcomeSent==="success" ? "#00d08418" : "#ff444418",
              color: welcomeSent==="success" ? "#00d084" : "#ff6666" }}>
              {welcomeSent==="success" ? "✅ Welcome email sent!" : "⚠️ Welcome email failed — user was still created."}
            </div>
          )}
          <div style={{ display:"flex", gap:"0.625rem" }}>
            <button style={btn(th)} onClick={save}>{editId ? "Save Changes" : "Create User"}</button>
            <button style={btn(th, { background:th.card3, color:th.muted })} onClick={() => { setAddMode(false); setEditId(null); }}>Cancel</button>
          </div>
        </div>
      )}

      <div style={{ ...card(th), overflow:"hidden" }}>
        {/* Table header */}
        <div style={{ display:"grid", gridTemplateColumns:"1.2fr 0.8fr 0.9fr 0.6fr 0.8fr auto auto auto auto", gap:"0.5rem", padding:"0.75rem 1.25rem", background:th.card2, borderBottom:`1px solid ${th.cardBorder}`, fontSize:"0.6875rem", fontWeight:600, color:th.muted, textTransform:"uppercase", letterSpacing:1 }}>
          <span>Name</span><span>Contact</span><span>Role</span><span>Region</span><span>Last Login</span><span>Admin</span><span>Status</span><span>Mode</span><span>Actions</span>
        </div>
        {filtered.length === 0 && <div style={{ padding:40, textAlign:"center", color:th.muted, fontSize:"0.875rem" }}>No users found.</div>}
        {filtered.map((u, i) => (
          <div key={u.id} style={{ display:"grid", gridTemplateColumns:"1.2fr 0.8fr 0.9fr 0.6fr 0.8fr auto auto auto auto", gap:"0.5rem", padding:"0.875rem 1.25rem", borderBottom: i < filtered.length-1 ? `1px solid ${th.cardBorder}` : "none", alignItems:"center" }}>
            <div style={{ display:"flex", alignItems:"center", gap:"0.625rem" }}>
              <div style={{ width:32, height:32, borderRadius:"50%", background: u.isAdmin ? O : th.card3, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"0.75rem", fontWeight:700, color: u.isAdmin ? W : th.muted, flexShrink:0 }}>{u.initials}</div>
              <div>
                <div style={{ fontSize:"0.8125rem", fontWeight:600, color:th.text }}>{u.name}</div>
                <div style={{ fontSize:"0.6875rem", color:th.muted }}>@{u.username}</div>
              </div>
            </div>
            <div style={{ minWidth:0 }}>
              {u.email && <div style={{ fontSize:"0.6875rem", color:th.muted, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }} title={u.email}>📧 {u.email}</div>}
              {u.phone && <div style={{ fontSize:"0.6875rem", color:th.muted }}>📱 {u.phone}</div>}
              {!u.email && !u.phone && <div style={{ fontSize:"0.6875rem", color:th.muted, opacity:0.4 }}>—</div>}
            </div>
            <div style={{ fontSize:"0.8125rem", color:th.muted }}>{u.role}</div>
            <div style={{ fontSize:"0.8125rem", color:th.muted }}>{u.region}</div>
            <div style={{ fontSize:"0.6875rem", color:th.muted }}>
              {u.lastLogin ? (
                <div>
                  <div>{new Date(u.lastLogin).toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" })}</div>
                  <div style={{ fontSize:"0.625rem", opacity:0.7 }}>{new Date(u.lastLogin).toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit" })}</div>
                </div>
              ) : <span style={{ opacity:0.4 }}>Never</span>}
            </div>
            <div style={{ textAlign:"center" }}>
              <span style={{ fontSize:"0.6875rem", padding:"0.188rem 0.5rem", borderRadius:"1.25rem", fontWeight:600,
              background: u.userType==="executive"?"#0d3d1222":u.userType==="it"?"#1e3a5f22":u.userType==="office_staff"?"#4c1d9522":u.userType==="dm"?"#78350f22":u.userType==="vendor"?"#06b6d422":u.userType==="construction"?"#c2410c22":"#1f293722",
              color: u.userType==="executive"?"#34d399":u.userType==="it"?"#3b82f6":u.userType==="office_staff"?"#8b5cf6":u.userType==="dm"?"#f59e0b":u.userType==="vendor"?"#06b6d4":u.userType==="construction"?"#fb923c":"#9ca3af" }}>
              {u.userType==="executive"?"Executive":u.userType==="it"?"IT Team":u.userType==="office_staff"?"Office Staff":u.userType==="dm"?"District Mgr":u.userType==="vendor"?"Vendor":u.userType==="construction"?"Construction":"Manager"}
            </span>
            </div>
            <div style={{ textAlign:"center" }}>
              <span style={{ fontSize:"0.6875rem", padding:"0.188rem 0.5rem", borderRadius:"1.25rem", background: u.active ? "#69db7c22" : "#ff666622", color: u.active ? "#69db7c" : "#ff6666", fontWeight:600 }}>{u.active ? "Active" : "Inactive"}</span>
            </div>
            <div style={{ textAlign:"center" }}>
              <span style={{ fontSize:"0.812rem" }} title={u.darkMode ? "Dark mode on" : "Light mode"}>{u.darkMode ? "🌙" : "☀️"}</span>
            </div>
            <div style={{ display:"flex", gap:"0.375rem", flexWrap:"wrap" }}>
              {canManageUser(currentUser, u) && <button onClick={() => startEdit(u)} style={{ ...btn(th, { padding:"0.312rem 0.625rem", fontSize:"0.688rem" }) }}>Edit</button>}
              {canManageUser(currentUser, u) && <button onClick={() => toggleActive(u.id)} style={{ ...btn(th, { padding:"0.312rem 0.625rem", fontSize:"0.6875rem", background:th.card3, color:th.muted }) }}>{u.active ? "Disable" : "Enable"}</button>}
              {isFullAdmin(currentUser) && (
                <button onClick={() => sendPasswordReset(u)}
                  disabled={!u.email || (emailAction?.userId === u.id && emailAction?.status === "sending")}
                  title={u.email ? "Send password reset email" : "No email on file — add email first"}
                  style={{ ...btn(th, { padding:"0.312rem 0.625rem", fontSize:"0.6875rem", background:"#3b82f622", color:"#3b82f6", opacity: u.email ? 1 : 0.4 }) }}>
                  {emailAction?.userId === u.id && emailAction?.type === "reset" ? (emailAction.status === "sending" ? "⏳" : emailAction.status === "ok" ? "✅" : "❌") : "🔑"}
                </button>
              )}
              {isFullAdmin(currentUser) && !u.lastLogin && (
                <button onClick={() => resendWelcome(u)}
                  disabled={!u.email || (emailAction?.userId === u.id && emailAction?.status === "sending")}
                  title={u.email ? "Resend welcome email" : "No email on file — add email first"}
                  style={{ ...btn(th, { padding:"0.312rem 0.625rem", fontSize:"0.6875rem", background:"#10b98122", color:"#10b981", opacity: u.email ? 1 : 0.4 }) }}>
                  {emailAction?.userId === u.id && emailAction?.type === "welcome" ? (emailAction.status === "sending" ? "⏳" : emailAction.status === "ok" ? "✅" : "❌") : "📧"}
                </button>
              )}
              {isFullAdmin(currentUser) && <button onClick={() => del(u.id)} style={{ ...btn(th, { padding:"0.312rem 0.625rem", fontSize:"0.6875rem", background:"#ff444422", color:"#ff6666" }) }}>✕</button>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Admin: Location Management ──────────────────────────────────────────────

const STATUS_STYLES = {
  "Open":        { color:"#69db7c", bg:"#69db7c18" },
  "Remodel":     { color:"#ffa94d", bg:"#ffa94d18" },
  "Temp Closed":  { color:"#ff6b6b", bg:"#ff6b6b18" },
  "Coming Soon":  { color:"#b197fc", bg:"#b197fc18" },
};


// Get first name of DM from DISTRICTS_SEED for a district number
function dmFirstName(districts, num) {
  const d = districts[num];
  if (!d || !d.name) return "";
  return d.name.split(" ")[0];
}

function AdminLocations({ stores, setStores, districts, user, th }) {
  const [filterState,  setFilterState]  = useState("All");
  const [filterStatus, setFilterStatus] = useState("All");
  const [filterDistrict, setFilterDistrict] = useState("All");
  const [filterNxt,    setFilterNxt]    = useState(false);
  const [filterBaskin, setFilterBaskin] = useState(false);
  const [search,       setSearch]       = useState("");
  const [editStore,    setEditStore]    = useState(null);
  const [addMode,      setAddMode]      = useState(false);
  const [selectedStore, setSelectedStore] = useState(null);
  const [sortCol,      setSortCol]      = useState("pc");
  const [sortDir,      setSortDir]      = useState("asc");

  const emptyStore = { pc:"", paycor:"", legal:"", name:"", address:"", city:"", state:"PA", zip:"", isNextGen:false, baseAsset:"DT", isBaskin:false, isBridge:false, mgr:"", mgrPhone:"", email:"", district:"", dmName:"", status:"Coming Soon", employees:0, sales:0 };
  const [newStore, setNewStore] = useState(emptyStore);

  const isAdmin      = isFullAdmin(user);
  const isOfficeStaff = user?.userType === "office_staff";
  const isDM         = user?.userType === "dm";
  const canEditLocs  = canEditLocations(user);
  const userDist = user?.district;

  const addLocation = () => {
    if (!newStore.address.trim()) return;
    const nextId = Math.max(0, ...stores.map(s=>s.id)) + 1;
    setStores(ss => [...ss, { ...newStore, id: nextId, employees: +newStore.employees||0, sales: +newStore.sales||0 }]);
    setNewStore(emptyStore);
    setAddMode(false);
  };

  const handleSort = (col) => {
    if (sortCol === col) setSortDir(d => d==="asc"?"desc":"asc");
    else { setSortCol(col); setSortDir("asc"); }
  };

  // DMs only see their district's stores
  const baseStores = isDM ? stores.filter(s => s.district === userDist) : stores;

  const filtered = baseStores.filter(s => {
    const matchState    = filterState    === "All" || s.state            === filterState;
    const matchStatus   = filterStatus   === "All" || s.status           === filterStatus;
    const matchDistrict = filterDistrict === "All" || String(s.district) === filterDistrict;
    const matchNxt      = !filterNxt    || s.isNextGen;
    const matchBaskin   = !filterBaskin || s.isBaskin;
    const q = search.trim().toLowerCase();
    const matchSearch   = !q || [s.pc, s.name, s.address, s.city, s.mgr, s.dmName, s.paycor, s.legal, s.baseAsset, s.email]
      .some(v => (v||"").toString().toLowerCase().includes(q));
    return matchState && matchStatus && matchDistrict && matchNxt && matchBaskin && matchSearch;
  }).sort((a,b) => {
    if (sortCol === "employees") return sortDir==="asc" ? a.employees-b.employees : b.employees-a.employees;
    if (sortCol === "district")  return sortDir==="asc" ? (a.district||0)-(b.district||0) : (b.district||0)-(a.district||0);
    const av = (a[sortCol]||"").toString().toLowerCase();
    const bv = (b[sortCol]||"").toString().toLowerCase();
    return sortDir==="asc" ? av.localeCompare(bv) : bv.localeCompare(av);
  });

  const totalEmp   = baseStores.reduce((a,s)=>a+s.employees,0);
  const openCount  = baseStores.filter(s=>s.status==="Open").length;
  const totalSales = baseStores.filter(s=>s.status==="Open").reduce((a,s)=>a+s.sales,0);

  const saveEdit = () => {
    setStores(ss => ss.map(s => s.id === editStore.id ? editStore : s));
    setEditStore(null);
  };

  const BASE_ASSET_TYPES = [
    { code:"DT",   label:"Drive-Thru"  },
    { code:"IL",   label:"In-Line"     },
    { code:"FS",   label:"Free Standing"},
    { code:"GS",   label:"Gas Station" },
    { code:"APOD", label:"APOD"        },
  ];
  const assetLabel = (code) => { const t = BASE_ASSET_TYPES.find(a=>a.code===code); return t ? t.label : code||"—"; };

  // Sortable header cell
  const SortTh = ({label, col, style={}}) => (
    <button onClick={()=>handleSort(col)} style={{
      background:"none", border:"none", cursor:"pointer", textAlign:"left", padding:0,
      fontSize:"0.7rem", fontWeight:600, textTransform:"uppercase", letterSpacing:1,
      color: sortCol===col ? O : th.muted, display:"flex", alignItems:"center", gap:"0.25rem",
      fontFamily:"'Source Sans 3'", ...style
    }}>
      {label}
      <span style={{ fontSize:"0.5625rem", opacity: sortCol===col?1:0.35 }}>
        {sortCol===col ? (sortDir==="asc"?"▲":"▼") : "▲"}
      </span>
    </button>
  );

  const NextGenBadge = () => (
    <span title="Next-Gen Store" style={{ fontSize:"0.65rem", fontWeight:800, padding:"0.15rem 0.5rem", borderRadius:"0.25rem", background:"#b197fc22", color:"#b197fc", letterSpacing:0.5, border:"1px solid #b197fc44", whiteSpace:"nowrap" }}>⚡ NXT</span>
  );
  const BridgeBadge = () => (
    <span title="Bridge Remodel" style={{ fontSize:"0.65rem", fontWeight:800, padding:"0.15rem 0.5rem", borderRadius:"0.25rem", background:"#ffa94d22", color:"#ffa94d", letterSpacing:0.5, border:"1px solid #ffa94d44", whiteSpace:"nowrap" }}>🌉 BRIDGE</span>
  );
  const BaskinBadge = () => (
    <span title="Baskin-Robbins co-brand" style={{ fontSize:"0.65rem", fontWeight:800, padding:"0.15rem 0.5rem", borderRadius:"0.25rem", background:"#ff69b422", color:"#ff69b4", letterSpacing:0.5, border:"1px solid #ff69b444", whiteSpace:"nowrap" }}>🍦 BR</span>
  );

  // Columns: PC# | Property | Address | City/State | DM | Manager | Asset | Status | Edit
  const COLS = "90px 1.2fr 2fr 1.3fr 1.3fr 120px 120px auto";

  return (
    <div className="fade-in">
      {/* KPI row */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(150px,1fr))", gap:"0.75rem", marginBottom:"1.5rem" }}>
        {[
          { label:"Locations",      value: baseStores.length, icon:"📍" },
          { label:"Open",           value: openCount,          icon:"✅" },
          { label:"Employees",      value: totalEmp||"—",      icon:"👥" },
          { label:"Weekly Sales",   value: totalSales ? `$${(totalSales/1000).toFixed(0)}K` : "—", icon:"💵" },
        ].map(k => (
          <div key={k.label} style={{ ...card(th), padding:"1.3rem 1.5rem" }}>
            <div style={{ fontSize:"1.3rem", marginBottom:"0.3rem" }}>{k.icon}</div>
            <div style={{ fontFamily:"'Raleway'", fontWeight:800, fontSize:"2.2rem", color:th.text }}>{k.value}</div>
            <div style={{ fontSize:"0.85rem", color:th.muted, marginTop:"0.3rem" }}>{k.label}</div>
          </div>
        ))}
      </div>

      {/* Filters */}
      <div style={{ display:"flex", gap:"0.5rem", marginBottom:"0.875rem", flexWrap:"wrap", alignItems:"center" }}>
        <input style={{ ...inp(th), maxWidth:240 }} placeholder="🔍 Search..." value={search} onChange={e=>setSearch(e.target.value)} />
        {!isDM && ["All","PA","NJ"].map(s=>(
          <button key={s} onClick={()=>setFilterState(s)} style={btn(th,{ padding:"0.438rem 0.875rem", background:filterState===s?O:th.card3, color:filterState===s?W:th.muted })}>{s}</button>
        ))}
        {["All","Open","Remodel","Temp Closed","Coming Soon"].map(s=>(
          <button key={s} onClick={()=>setFilterStatus(s)} style={btn(th,{ padding:"0.438rem 0.875rem", fontSize:"0.75rem", background:filterStatus===s?O:th.card3, color:filterStatus===s?W:th.muted })}>{s}</button>
        ))}
        {!isDM && (
          <select style={{ ...inp(th), maxWidth:240 }} value={filterDistrict} onChange={e=>setFilterDistrict(e.target.value)}>
            <option value="All">All Districts</option>
            {Object.values(districts||DISTRICTS_SEED).sort((a,b)=>a.num-b.num).map(d=>(
              <option key={d.num} value={String(d.num)}>District {d.num} — {d.name.split(" ")[0]}</option>
            ))}
          </select>
        )}
      </div>

      {/* Add location button + spotlight filters */}
      {isAdmin && (
        <div style={{ display:"flex", gap:"0.5rem", marginBottom:"1.0rem", alignItems:"center", flexWrap:"wrap" }}>
          <button style={btn(th)} onClick={()=>setAddMode(a=>!a)}>
            {addMode ? "✕ Cancel" : "+ Add Location"}
          </button>
          <div style={{ width:1, height:28, background:th.cardBorder, margin:"0 4px" }} />
          <button
            onClick={() => { setFilterNxt(v => !v); setFilterBaskin(false); }}
            style={btn(th, {
              background: filterNxt ? "#b197fc" : th.card3,
              color:      filterNxt ? "#fff"    : th.muted,
              border:     filterNxt ? "2px solid #b197fc" : `2px solid ${th.cardBorder}`,
              boxShadow:  filterNxt ? "0 0 12px #b197fc44" : "none",
              transition:"all .2s",
            })}
          >
            ⚡ Next-Gen{filterNxt ? ` · ${baseStores.filter(s=>s.isNextGen).length}` : ""}
          </button>
          <button
            onClick={() => { setFilterBaskin(v => !v); setFilterNxt(false); }}
            style={btn(th, {
              background: filterBaskin ? "#ff69b4" : th.card3,
              color:      filterBaskin ? "#fff"    : th.muted,
              border:     filterBaskin ? "2px solid #ff69b4" : `2px solid ${th.cardBorder}`,
              boxShadow:  filterBaskin ? "0 0 12px #ff69b444" : "none",
              transition:"all .2s",
            })}
          >
            🍦 Baskin{filterBaskin ? ` · ${baseStores.filter(s=>s.isBaskin).length}` : ""}
          </button>
        </div>
      )}
      {/* Spotlight filters for DMs (no add button) */}
      {!isAdmin && (
        <div style={{ display:"flex", gap:"0.5rem", marginBottom:"1.0rem" }}>
          <button
            onClick={() => { setFilterNxt(v => !v); setFilterBaskin(false); }}
            style={btn(th, {
              background: filterNxt ? "#b197fc" : th.card3,
              color:      filterNxt ? "#fff"    : th.muted,
              border:     filterNxt ? "2px solid #b197fc" : `2px solid ${th.cardBorder}`,
              boxShadow:  filterNxt ? "0 0 12px #b197fc44" : "none",
              transition:"all .2s",
            })}
          >
            ⚡ Next-Gen{filterNxt ? ` · ${baseStores.filter(s=>s.isNextGen).length}` : ""}
          </button>
          <button
            onClick={() => { setFilterBaskin(v => !v); setFilterNxt(false); }}
            style={btn(th, {
              background: filterBaskin ? "#ff69b4" : th.card3,
              color:      filterBaskin ? "#fff"    : th.muted,
              border:     filterBaskin ? "2px solid #ff69b4" : `2px solid ${th.cardBorder}`,
              boxShadow:  filterBaskin ? "0 0 12px #ff69b444" : "none",
              transition:"all .2s",
            })}
          >
            🍦 Baskin{filterBaskin ? ` · ${baseStores.filter(s=>s.isBaskin).length}` : ""}
          </button>
        </div>
      )}

      {/* Add location form */}
      {addMode && isAdmin && (
        <div style={{ ...card(th), padding:20, marginBottom:"1.5rem", border:`1px solid ${O}44` }} className="fade-in">
          <div style={{ fontSize:"0.75rem", fontWeight:700, color:O, letterSpacing:1, textTransform:"uppercase", marginBottom:"0.875rem" }}>New Location</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"0.75rem", marginBottom:"0.875rem" }}>
            <input style={inp(th)} placeholder="PC Number" value={newStore.pc} onChange={e=>setNewStore(s=>({...s,pc:e.target.value}))} />
            <input style={inp(th)} placeholder="Paycor Client ID" value={newStore.paycor} onChange={e=>setNewStore(s=>({...s,paycor:e.target.value}))} />
            <input style={inp(th)} placeholder="Property / Store Name" value={newStore.name} onChange={e=>setNewStore(s=>({...s,name:e.target.value}))} />
            <div style={{ gridColumn:"1/-1" }}><input style={inp(th)} placeholder="Street Address *" value={newStore.address} onChange={e=>setNewStore(s=>({...s,address:e.target.value}))} /></div>
            <input style={inp(th)} placeholder="City" value={newStore.city} onChange={e=>setNewStore(s=>({...s,city:e.target.value}))} />
            <select style={inp(th)} value={newStore.state} onChange={e=>setNewStore(s=>({...s,state:e.target.value}))}>
              <option value="PA">PA</option><option value="NJ">NJ</option>
            </select>
            <input style={inp(th)} placeholder="ZIP Code" value={newStore.zip} onChange={e=>setNewStore(s=>({...s,zip:e.target.value}))} />
            <input style={inp(th)} placeholder="Legal Company Name" value={newStore.legal} onChange={e=>setNewStore(s=>({...s,legal:e.target.value}))} />
            <div style={{ display:"flex", gap:"0.75rem", alignItems:"center" }}>
              <select style={{...inp(th), flex:1}} value={newStore.baseAsset} onChange={e=>setNewStore(s=>({...s,baseAsset:e.target.value}))}>
                {BASE_ASSET_TYPES.map(a=><option key={a.code} value={a.code}>{a.label}</option>)}
              </select>
              <label style={{ display:"flex", alignItems:"center", gap:"0.5rem", cursor:"pointer", fontSize:"0.8125rem", color: newStore.isNextGen?"#b197fc":th.muted, whiteSpace:"nowrap", padding:"0.625rem 0.875rem", background:th.inputBg, border:`1px solid ${newStore.isNextGen?"#b197fc44":th.inputBorder}`, borderRadius:"0.5rem", transition:"all .2s" }}>
                <input type="checkbox" checked={newStore.isNextGen} onChange={e=>setNewStore(s=>({...s,isNextGen:e.target.checked}))} style={{ accentColor:"#b197fc", width:15, height:15 }} />
                ⚡ Next-Gen
              </label>
              <label style={{ display:"flex", alignItems:"center", gap:"0.5rem", cursor:"pointer", fontSize:"0.8125rem", color: newStore.isBaskin?"#ff69b4":th.muted, whiteSpace:"nowrap", padding:"0.625rem 0.875rem", background:th.inputBg, border:`1px solid ${newStore.isBaskin?"#ff69b444":th.inputBorder}`, borderRadius:"0.5rem", transition:"all .2s" }}>
                <input type="checkbox" checked={!!newStore.isBaskin} onChange={e=>setNewStore(s=>({...s,isBaskin:e.target.checked}))} style={{ accentColor:"#ff69b4", width:15, height:15 }} />
                🍦 Baskin
              </label>
            </div>
            <input style={inp(th)} placeholder="Manager Name" value={newStore.mgr} onChange={e=>setNewStore(s=>({...s,mgr:e.target.value}))} />
            <input style={inp(th)} placeholder="Manager Phone" value={newStore.mgrPhone||""} onChange={e=>setNewStore(s=>({...s,mgrPhone:e.target.value}))} />
            <input style={inp(th)} placeholder="Store Email" value={newStore.email} onChange={e=>setNewStore(s=>({...s,email:e.target.value}))} />
            <select style={inp(th)} value={newStore.district||""} onChange={e=>setNewStore(s=>({...s,district:+e.target.value}))}>
              <option value="">— District —</option>
              {Object.values(districts||DISTRICTS_SEED).sort((a,b)=>a.num-b.num).map(d=>(<option key={d.num} value={d.num}>District {d.num} — {d.name.split(' ')[0]}</option>))}
            </select>
            <select style={inp(th)} value={newStore.status} onChange={e=>setNewStore(s=>({...s,status:e.target.value}))}>
              <option>Coming Soon</option><option>Open</option><option>Remodel</option><option>Temp Closed</option>
            </select>
          </div>
          <button style={btn(th)} onClick={addLocation}>Add Location</button>
        </div>
      )}

      {/* Edit modal */}
      {editStore && (
        <div style={{ position:"fixed", inset:0, background:"#00000075", zIndex:500, display:"flex", alignItems:"center", justifyContent:"center", padding:"1.25rem" }} onClick={e=>{if(e.target===e.currentTarget)setEditStore(null)}}>
          <div style={{ ...card(th), padding:"2rem", width:"100%", maxWidth:"min(820px, 96vw)", maxHeight:"92vh", overflowY:"auto" }} className="fade-in">
            <div style={{ fontFamily:"'Raleway'", fontWeight:800, fontSize:"1.25rem", color:th.text, marginBottom:"1.5rem" }}>Edit Location — PC# {editStore.pc}</div>
            {/* helper label style */}
            {(()=>{
              const lbl = { fontSize:"0.72rem", color:th.muted, marginBottom:"0.35rem", textTransform:"uppercase", letterSpacing:0.8, fontWeight:600 };
              const row2 = { display:"grid", gridTemplateColumns:"1fr 1fr", gap:"1rem" };
              const row3 = { display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"1rem" };
              const fld = (label, children) => (
                <div>
                  <div style={lbl}>{label}</div>
                  {children}
                </div>
              );
              return (
                <div style={{ display:"flex", flexDirection:"column", gap:"1rem", marginBottom:"1.25rem" }}>

                  {/* Row 1: PC + Paycor */}
                  <div style={row2}>
                    {fld("PC Number", <input style={{...inp(th), background:th.card3, color:th.muted}} value={editStore.pc} readOnly />)}
                    {fld("Paycor Client ID", <input style={inp(th)} value={editStore.paycor||""} onChange={e=>setEditStore(s=>({...s,paycor:e.target.value}))} />)}
                  </div>

                  {/* Row 2: Property Name full width */}
                  {fld("Property / Store Name", <input style={inp(th)} value={editStore.name||""} onChange={e=>setEditStore(s=>({...s,name:e.target.value}))} />)}

                  {/* Row 3: Legal Company Name full width */}
                  {fld("Legal Company Name", <input style={inp(th)} value={editStore.legal||""} onChange={e=>setEditStore(s=>({...s,legal:e.target.value}))} />)}

                  {/* Row 4: Street Address full width */}
                  {fld("Street Address", <input style={inp(th)} value={editStore.address||""} onChange={e=>setEditStore(s=>({...s,address:e.target.value}))} />)}

                  {/* Row 5: City / State / ZIP — 3 col */}
                  <div style={row3}>
                    {fld("City", <input style={inp(th)} value={editStore.city||""} onChange={e=>setEditStore(s=>({...s,city:e.target.value}))} />)}
                    {fld("State", <select style={inp(th)} value={editStore.state} onChange={e=>setEditStore(s=>({...s,state:e.target.value}))}>
                      <option>PA</option><option>NJ</option>
                    </select>)}
                    {fld("ZIP Code", <input style={inp(th)} placeholder="19000" value={editStore.zip||""} onChange={e=>setEditStore(s=>({...s,zip:e.target.value}))} />)}
                  </div>

                  {/* Row 6: Asset Type + District */}
                  <div style={row2}>
                    {fld("Asset Type", <select style={inp(th)} value={editStore.baseAsset||"DT"} onChange={e=>setEditStore(s=>({...s,baseAsset:e.target.value}))}>
                      {BASE_ASSET_TYPES.map(a=><option key={a.code} value={a.code}>{a.label}</option>)}
                    </select>)}
                    {fld("District", <select style={inp(th)} value={editStore.district||""} onChange={e=>setEditStore(s=>({...s,district:+e.target.value}))}>
                      <option value="">— Unassigned —</option>
                      {Object.values(districts||DISTRICTS_SEED).sort((a,b)=>a.num-b.num).map(d=>(<option key={d.num} value={d.num}>District {d.num} — {d.name}</option>))}
                    </select>)}
                  </div>

                  {/* Row 7: Flags full width */}
                  <div>
                    <div style={lbl}>Flags</div>
                    <div style={{ display:"flex", gap:"0.75rem", flexWrap:"wrap" }}>
                      <label style={{ display:"flex", alignItems:"center", gap:"0.5rem", cursor:"pointer", fontSize:"0.9rem", color:editStore.isNextGen?"#b197fc":th.muted, padding:"0.6rem 1.1rem", background:th.inputBg, border:`1px solid ${editStore.isNextGen?"#b197fc66":th.inputBorder}`, borderRadius:"0.5rem", transition:"all .2s" }}>
                        <input type="checkbox" checked={!!editStore.isNextGen} onChange={e=>setEditStore(s=>({...s,isNextGen:e.target.checked}))} style={{ accentColor:"#b197fc", width:"1rem", height:"1rem" }} />
                        ⚡ Next-Gen
                      </label>
                      <label style={{ display:"flex", alignItems:"center", gap:"0.5rem", cursor:"pointer", fontSize:"0.9rem", color:editStore.isBaskin?"#ff69b4":th.muted, padding:"0.6rem 1.1rem", background:th.inputBg, border:`1px solid ${editStore.isBaskin?"#ff69b466":th.inputBorder}`, borderRadius:"0.5rem", transition:"all .2s" }}>
                        <input type="checkbox" checked={!!editStore.isBaskin} onChange={e=>setEditStore(s=>({...s,isBaskin:e.target.checked}))} style={{ accentColor:"#ff69b4", width:"1rem", height:"1rem" }} />
                        🍦 Baskin-Robbins
                      </label>
                      <label style={{ display:"flex", alignItems:"center", gap:"0.5rem", cursor:"pointer", fontSize:"0.9rem", color:editStore.isBridge?"#ffa94d":th.muted, padding:"0.6rem 1.1rem", background:th.inputBg, border:`1px solid ${editStore.isBridge?"#ffa94d66":th.inputBorder}`, borderRadius:"0.5rem", transition:"all .2s" }}>
                        <input type="checkbox" checked={!!editStore.isBridge} onChange={e=>setEditStore(s=>({...s,isBridge:e.target.checked}))} style={{ accentColor:"#ffa94d", width:"1rem", height:"1rem" }} />
                        🌉 Bridge Remodel
                      </label>
                    </div>
                  </div>

                  {/* Row 8: Manager + Phone */}
                  <div style={row2}>
                    {fld("Manager", <input style={inp(th)} value={editStore.mgr||""} onChange={e=>setEditStore(s=>({...s,mgr:e.target.value}))} />)}
                    {fld("Manager Phone", <input style={inp(th)} placeholder="(215) 555-0100" value={editStore.mgrPhone||""} onChange={e=>setEditStore(s=>({...s,mgrPhone:e.target.value}))} />)}
                  </div>

                  {/* Row 9: Email + Employees + Status */}
                  <div style={row3}>
                    {fld("Store Email", <input style={inp(th)} value={editStore.email||""} onChange={e=>setEditStore(s=>({...s,email:e.target.value}))} />)}
                    {fld("Employees", <input style={inp(th)} type="number" min="0" value={editStore.employees||0} onChange={e=>setEditStore(s=>({...s,employees:+e.target.value}))} />)}
                    {fld("Status", <select style={inp(th)} value={editStore.status} onChange={e=>setEditStore(s=>({...s,status:e.target.value}))}>
                      <option>Open</option><option>Remodel</option><option>Temp Closed</option><option>Coming Soon</option>
                    </select>)}
                  </div>

                </div>
              );
            })()}
            <div style={{ display:"flex", gap:"0.75rem" }}>
              <button style={btn(th)} onClick={saveEdit}>Save Changes</button>
              <button style={btn(th,{background:th.card3,color:th.muted})} onClick={()=>setEditStore(null)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      
      {/* Store Detail Popup */}
      {selectedStore && (() => {
        const s = selectedStore;
        const nxt = s.isNextGen;
        const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent((s.address||"")+" "+(s.city||"")+" "+(s.state||"")+" "+(s.zip||""))}`;
        const gmailUrl = `https://mail.google.com/mail/?view=cm&to=${s.pc}@PeopleCapitalGroup.com`;
        const ss = STATUS_STYLES[s.status] || STATUS_STYLES["Open"];
        return (
          <div onClick={e=>{if(e.target===e.currentTarget)setSelectedStore(null)}}
            style={{ position:"fixed", inset:0, background:"#00000070", zIndex:600, display:"flex", alignItems:"center", justifyContent:"center", padding:20, backdropFilter:"blur(3px)" }}>
            <div style={{ ...card(th), width:"100%", maxWidth:520, borderRadius:"1.0rem", overflow:"hidden", boxShadow:"0 24px 64px #00000060" }} className="fade-in">

              {/* Header band */}
              <div style={{ background:`linear-gradient(135deg, ${O}22, ${nxt?"#b197fc22":"#ffffff08"})`, padding:"1.25rem 1.5rem", borderBottom:`1px solid ${th.cardBorder}`, display:"flex", alignItems:"flex-start", justifyContent:"space-between" }}>
                <div>
                  <div style={{ fontFamily:"'Raleway'", fontWeight:900, fontSize:"1.25rem", color:th.text, marginBottom:"0.25rem" }}>{s.name||s.address}</div>
                  <div style={{ fontSize:"0.75rem", color:th.muted, fontStyle:"italic" }}>{s.legal}</div>
                  <div style={{ display:"flex", gap:"0.375rem", marginTop:"0.5rem", flexWrap:"wrap" }}>
                    {nxt && <span style={{ fontSize:"0.625rem", fontWeight:800, padding:"0.125rem 0.5rem", borderRadius:"0.25rem", background:"#b197fc22", color:"#b197fc", border:"1px solid #b197fc44" }}>⚡ NEXT-GEN</span>}
                    {s.isBaskin && <span style={{ fontSize:"0.625rem", fontWeight:800, padding:"0.125rem 0.5rem", borderRadius:"0.25rem", background:"#ff69b422", color:"#ff69b4", border:"1px solid #ff69b444" }}>🍦 BASKIN-ROBBINS</span>}
                    {s.isBridge && <span style={{ fontSize:"0.625rem", fontWeight:800, padding:"0.125rem 0.5rem", borderRadius:"0.25rem", background:"#ffa94d22", color:"#ffa94d", border:"1px solid #ffa94d44" }}>🌉 BRIDGE REMODEL</span>}
                    <span style={{ fontSize:"0.625rem", fontWeight:700, padding:"0.125rem 0.5rem", borderRadius:"1.25rem", background:ss.bg, color:ss.color }}>{s.status}</span>
                  </div>
                </div>
                <button onClick={()=>setSelectedStore(null)} style={{ background:"none", border:"none", color:th.muted, fontSize:"1.375rem", cursor:"pointer", lineHeight:1, padding:4, flexShrink:0 }}>×</button>
              </div>

              {/* Body */}
              <div style={{ padding:"1.25rem 1.5rem", display:"grid", gridTemplateColumns:"1fr 1fr", gap:"14px 24px" }}>

                {/* PC + Paycor */}
                <div>
                  <div style={{ fontSize:"0.625rem", fontWeight:700, color:th.muted, textTransform:"uppercase", letterSpacing:1, marginBottom:"0.188rem" }}>PC Number</div>
                  <a href={gmailUrl} target="_blank" rel="noopener noreferrer"
                    style={{ fontSize:"0.875rem", fontWeight:700, color:O, textDecoration:"none" }}
                    onMouseEnter={e=>e.currentTarget.style.textDecoration="underline"}
                    onMouseLeave={e=>e.currentTarget.style.textDecoration="none"}>
                    {s.pc} ✉️
                  </a>
                </div>
                <div>
                  <div style={{ fontSize:"0.625rem", fontWeight:700, color:th.muted, textTransform:"uppercase", letterSpacing:1, marginBottom:"0.188rem" }}>Paycor Client ID</div>
                  <div style={{ fontSize:"0.875rem", fontWeight:600, color:th.text }}>{s.paycor||"—"}</div>
                </div>

                {/* Address */}
                <div style={{ gridColumn:"1/-1" }}>
                  <div style={{ fontSize:"0.625rem", fontWeight:700, color:th.muted, textTransform:"uppercase", letterSpacing:1, marginBottom:"0.188rem" }}>Address</div>
                  <a href={mapsUrl} target="_blank" rel="noopener noreferrer"
                    style={{ fontSize:"0.8125rem", color:th.text, textDecoration:"none" }}
                    onMouseEnter={e=>e.currentTarget.style.color=O}
                    onMouseLeave={e=>e.currentTarget.style.color=th.text}>
                    📍 {s.address}, {s.city}, {s.state} {s.zip}
                  </a>
                </div>

                {/* Asset + District */}
                <div>
                  <div style={{ fontSize:"0.625rem", fontWeight:700, color:th.muted, textTransform:"uppercase", letterSpacing:1, marginBottom:"0.188rem" }}>Asset Type</div>
                  <div style={{ fontSize:"0.8125rem", color: nxt?"#b197fc":th.text, fontWeight:600 }}>{assetLabel(s.baseAsset)}</div>
                </div>
                <div>
                  <div style={{ fontSize:"0.625rem", fontWeight:700, color:th.muted, textTransform:"uppercase", letterSpacing:1, marginBottom:"0.188rem" }}>District</div>
                  <div style={{ fontSize:"0.8125rem", color:th.text }}>{s.district ? `District ${s.district} — ${s.dmName}` : "—"}</div>
                </div>

                {/* Manager */}
                <div>
                  <div style={{ fontSize:"0.625rem", fontWeight:700, color:th.muted, textTransform:"uppercase", letterSpacing:1, marginBottom:"0.188rem" }}>Store Manager</div>
                  {s.mgrPhone ? (
                    <a href={`tel:${s.mgrPhone.replace(/\D/g,"")}`}
                      style={{ fontSize:"0.8125rem", color:"#69db7c", textDecoration:"none", fontWeight:600 }}
                      title={`Call ${s.mgr}`}
                      onMouseEnter={e=>e.currentTarget.style.textDecoration="underline"}
                      onMouseLeave={e=>e.currentTarget.style.textDecoration="none"}>
                      📞 {s.mgr||"—"}
                    </a>
                  ) : (
                    <div style={{ fontSize:"0.8125rem", color:th.text }}>{s.mgr||"—"}</div>
                  )}
                  {s.mgrPhone && <div style={{ fontSize:"0.6875rem", color:th.muted, marginTop:"0.125rem" }}>{s.mgrPhone}</div>}
                </div>
                <div>
                  <div style={{ fontSize:"0.625rem", fontWeight:700, color:th.muted, textTransform:"uppercase", letterSpacing:1, marginBottom:"0.188rem" }}>Store Email</div>
                  <div style={{ fontSize:"0.75rem", color:th.muted, wordBreak:"break-all" }}>{s.email||"—"}</div>
                </div>

                {/* Employees */}
                {s.employees > 0 && (
                  <div>
                    <div style={{ fontSize:"0.625rem", fontWeight:700, color:th.muted, textTransform:"uppercase", letterSpacing:1, marginBottom:"0.188rem" }}>Employees</div>
                    <div style={{ fontSize:"0.875rem", fontWeight:700, color:th.text }}>👥 {s.employees}</div>
                  </div>
                )}
              </div>

              {/* Footer actions */}
              <div style={{ padding:"0.75rem 1.5rem", borderTop:`1px solid ${th.cardBorder}`, display:"flex", gap:"0.5rem" }}>
                <a href={mapsUrl} target="_blank" rel="noopener noreferrer" style={{ ...btn(th, { background:th.card3, color:th.muted, textDecoration:"none", fontSize:"0.75rem" }) }}>📍 Maps</a>
                <a href={gmailUrl} target="_blank" rel="noopener noreferrer" style={{ ...btn(th, { background:th.card3, color:th.muted, textDecoration:"none", fontSize:"0.75rem" }) }}>✉️ Email Store</a>
                {canEditLocs && <button onClick={()=>{setEditStore({...s});setSelectedStore(null);}} style={btn(th,{marginLeft:"auto",fontSize:"0.75rem"})}>✏️ Edit</button>}
              </div>
            </div>
          </div>
        );
      })()}

      {/* Store table */}
      <div style={{ ...card(th), overflow:"hidden" }}>
        {/* Header */}
        <div style={{ display:"grid", gridTemplateColumns:COLS, gap:"0.8rem", padding:"1rem 1.5rem", background:th.card2, borderBottom:"1px solid "+th.cardBorder }}>
          <SortTh label="PC #"     col="pc"       />
          <SortTh label="Property" col="name"     />
          <SortTh label="Address"  col="address"  />
          {!isDM && <SortTh label="District Mgr" col="dmName" />}
          {isDM  && <span style={{ fontSize:"0.7rem", fontWeight:600, textTransform:"uppercase", letterSpacing:1, color:th.muted }}>Manager</span>}
          <SortTh label="Manager"  col="mgr"      />
          <SortTh label="Asset"    col="assetType"/>
          <SortTh label="Status"   col="status"   />
          {canEditLocs && <span style={{ fontSize:"0.7rem", fontWeight:600, textTransform:"uppercase", letterSpacing:1, color:th.muted }}>Edit</span>}
        </div>

        {filtered.map((s, i) => {
          const ss  = STATUS_STYLES[s.status] || STATUS_STYLES["Open"];
          const nxt = s.isNextGen;
          return (
            <div key={s.id} style={{ display:"grid", gridTemplateColumns:COLS, gap:"0.8rem", padding:"1rem 1.5rem", borderBottom: i<filtered.length-1?`1px solid ${th.cardBorder}`:"none", alignItems:"center" }}
              onMouseEnter={e=>e.currentTarget.style.background=th.card2}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>

              {/* PC # */}
              <a
                href={`https://mail.google.com/mail/?view=cm&to=${s.pc}@PeopleCapitalGroup.com`}
                target="_blank" rel="noopener noreferrer"
                title={`Email ${s.pc}@PeopleCapitalGroup.com`}
                style={{ fontSize:"0.85rem", fontWeight:700, color:O, textDecoration:"none", display:"flex", alignItems:"center", gap:"0.188rem", cursor:"pointer" }}
                onMouseEnter={e=>e.currentTarget.style.textDecoration="underline"}
                onMouseLeave={e=>e.currentTarget.style.textDecoration="none"}
              >
                {s.pc}
              </a>

              {/* Property name + NXT badge — clickable for detail popup */}
              <div style={{ display:"flex", flexDirection:"column", gap:"0.188rem" }}>
                <button onClick={()=>setSelectedStore(s)} style={{ background:"none", border:"none", padding:0, cursor:"pointer", textAlign:"left" }}>
                  <span style={{ fontSize:"1rem", fontWeight:600, color:th.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", display:"block" }}
                    onMouseEnter={e=>{e.currentTarget.style.color=O;e.currentTarget.style.textDecoration="underline";}}
                    onMouseLeave={e=>{e.currentTarget.style.color=th.text;e.currentTarget.style.textDecoration="none";}}>
                    {s.name||"—"}
                  </span>
                </button>
                <div style={{ display:"flex", gap:"0.25rem", flexWrap:"wrap" }}>
                  {nxt && <NextGenBadge />}
                  {s.isBaskin && <BaskinBadge />}
                  {s.isBridge && <BridgeBadge />}
                </div>
              </div>

              {/* Address + City + State + ZIP combined */}
              <div>
                <a
                  href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent((s.address||"") + " " + (s.city||"") + " " + (s.state||"") + " " + (s.zip||""))}`}
                  target="_blank" rel="noopener noreferrer"
                  title="Open in Google Maps"
                  style={{ fontSize:"0.875rem", color:th.text, textDecoration:"none", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", display:"block" }}
                  onMouseEnter={e=>e.currentTarget.style.color=O}
                  onMouseLeave={e=>e.currentTarget.style.color=th.text}
                >
                  {s.address}
                </a>
                <div style={{ fontSize:"0.75rem", color:th.muted, marginTop:"0.1rem" }}>
                  {s.city && s.city+", "}<span style={{ fontWeight:700, color: s.state==="PA"?"#74c0fc":"#b197fc" }}>{s.state}</span>{s.zip && " "+s.zip}
                </div>
              </div>

              {/* District Mgr (admin) or store Mgr col (DM view) */}
              {!isDM && (
                <div>
                  <div style={{ fontSize:"0.85rem", color:th.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{s.dmName||"—"}</div>
                  <div style={{ fontSize:"0.75rem", color:th.muted }}>District {s.district}</div>
                </div>
              )}
              {isDM && (
                <span style={{ fontSize:"0.85rem", color:th.muted, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{s.mgr||"—"}</span>
              )}

              {/* Store Manager — click to call */}
              {s.mgrPhone ? (
                <a href={`tel:${s.mgrPhone.replace(/\D/g,"")}`}
                  style={{ fontSize:"0.75rem", color:th.muted, textDecoration:"none", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", display:"block" }}
                  title={`Call ${s.mgr}: ${s.mgrPhone}`}
                  onMouseEnter={e=>{e.currentTarget.style.color="#69db7c";e.currentTarget.style.textDecoration="underline";}}
                  onMouseLeave={e=>{e.currentTarget.style.color=th.muted;e.currentTarget.style.textDecoration="none";}}>
                  📞 {s.mgr||"—"}
                </a>
              ) : (
                <span style={{ fontSize:"0.85rem", color:th.muted, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{s.mgr||"—"}</span>
              )}

              {/* Asset Type */}
              <span title={s.baseAsset} style={{ fontSize:"0.8rem", fontWeight:600, color: nxt?"#b197fc":th.muted }}>{assetLabel(s.baseAsset)}</span>

              {/* Status */}
              <span style={{ fontSize:"0.75rem", padding:"0.2rem 0.6rem", borderRadius:"1rem", background:ss.bg, color:ss.color, fontWeight:600, whiteSpace:"nowrap" }}>{s.status}</span>

              {/* Edit — admin only */}
              {canEditLocs && <button onClick={()=>setEditStore({...s})} style={btn(th,{ padding:"0.25rem 0.625rem", fontSize:"0.688rem" })}>Edit</button>}
            </div>
          );
        })}
        {filtered.length === 0 && <div style={{ padding:40, textAlign:"center", color:th.muted }}>No stores match filters.</div>}
      </div>
    </div>
  );
}

function AdminDistricts({ districts, setDistricts, stores, setStores, users, th }) {

  const distList = Object.values(districts).sort((a,b) => a.num - b.num);

    setDistricts(ds => ({ ...ds, [editDist]: { ...ds[editDist], ...distForm } }));

        <div style={{ ...card(th), padding:"0.875rem 1.25rem", marginBottom:"1.25rem", borderLeft:`3px solid #ffa94d`, display:"flex", alignItems:"center", gap:"0.75rem" }}>
