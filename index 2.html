<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html{font-size:clamp(13px, 1.1vw, 22px);}
  body{font-family:'Source Sans 3',sans-serif; font-size:1rem;}
  input,textarea,select{font-family:'Source Sans 3',sans-serif;}
  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-thumb{background:#FF671F44;border-radius:4px;}
  .fade-in{animation:fadeIn .3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .theme-toggle-btn:hover{transform:scale(1.05);}
  .theme-toggle-btn{transition:all .2s ease;}

  @keyframes rippleExpand {
    from { clip-path: circle(0% at var(--rx) var(--ry)); opacity: 1; }
    to   { clip-path: circle(180% at var(--rx) var(--ry)); opacity: 1; }
  }
  @keyframes logoGlow {
    0%   { filter: drop-shadow(0 0 0px #FFD700) brightness(1); }
    30%  { filter: drop-shadow(0 0 28px #FFD700) drop-shadow(0 0 60px #FF671F) brightness(1.3); }
    60%  { filter: drop-shadow(0 0 14px #FFD70088) brightness(1.15); }
    100% { filter: drop-shadow(0 0 0px #FFD700) brightness(1); }
  }
  @keyframes logoSpin {
    0%   { transform: scale(1) rotate(0deg); }
    25%  { transform: scale(1.12) rotate(-6deg); }
    50%  { transform: scale(1.18) rotate(4deg); }
    75%  { transform: scale(1.1) rotate(-2deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  @keyframes particleFly {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0); }
  }
  .logo-transitioning {
    animation: logoGlow 0.7s ease-out, logoSpin 0.7s ease-out;
  }
  .theme-ripple {
    position: fixed; inset: 0; z-index: 9999; pointer-events: none;
    animation: rippleExpand 0.65s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  .particle {
    position: fixed; width: 6px; height: 6px; border-radius: 50%;
    background: #FFD700; pointer-events: none; z-index: 10000;
    animation: particleFly 0.6s ease-out forwards;
  }

  /* Sidebar drawer transition */
  .sidebar-drawer {
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), background 0.3s, border 0.3s;
  }
  .sidebar-overlay {
    position: fixed; inset: 0; background: #00000060; z-index: 199;
    animation: fadeIn .2s ease;
  }

  /* Responsive breakpoints */
  @media (max-width: 768px) {
    html { font-size: 14px !important; }
    body, #root { font-size: 1rem !important; }
    .desktop-sidebar { display: none !important; }
    .mobile-topbar-padding { padding: 12px 16px !important; }
    .main-content-padding { padding: 20px 16px !important; }
    .links-grid { grid-template-columns: 1fr 1fr !important; }
    .add-link-grid { grid-template-columns: 1fr !important; }
    .search-row { flex-wrap: wrap; }
    .search-row input { max-width: 100% !important; width: 100% !important; }
    .notes-grid { grid-template-columns: 1fr !important; }
    .hide-mobile { display: none !important; }
  }
  @media (max-width: 480px) {
    .links-grid { grid-template-columns: 1fr !important; }
  }
  @media (min-width: 769px) {
    .mobile-only { display: none !important; }
    .bottom-nav { display: none !important; }
  }
  /* Chat message delete button — show on hover */
  div:hover > .msg-del-btn { display: flex !important; }
</style>

const { useState, useRef, useCallback, useEffect } = React;

function useIsMobile() {
  const [isMobile, setIsMobile] = useState(() => window.innerWidth <= 768);
  useEffect(() => {
    const handler = () => setIsMobile(window.innerWidth <= 768);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);
  return isMobile;
}

function getPhaseCompletion(project, phase) {
  const countable = phase.items.filter(it => project[it.key] !== "na");
  const done = countable.filter(it => it.type === "bool" ? !!project[it.key] : !!project[it.key]).length;
  return { done, total: countable.length, pct: countable.length ? Math.round((done / countable.length) * 100) : 100 };
}
function getCurrentPhase(project) {
  if (project.completed) return { id: "complete", label: "Complete", icon: "✅", color: "#22c55e", items: [] };
  for (const phase of PROJECT_PHASES) {
    if (getPhaseCompletion(project, phase).pct < 100) return phase;
  }
  return { id: "complete", label: "Complete", icon: "✅", color: "#22c55e", items: [] };
}
function getOverallCompletion(project) {
  const all = PROJECT_PHASES.flatMap(p => p.items);
  const done = all.filter(it => it.type === "bool" ? !!project[it.key] : !!project[it.key]).length;
  return all.length ? Math.round((done / all.length) * 100) : 0;
}

// Spawns gold particles at (cx, cy) and a full-screen ripple overlay
function spawnTransitionFX(cx, cy, newDark) {
  // Particles
  const colors = ["#FFD700","#FF671F","#FFF8DC","#FFB347","#FFFACD"];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    const angle = (i / 18) * Math.PI * 2;
    const dist = 60 + Math.random() * 100;
    p.style.left = cx - 3 + "px";
    p.style.top  = cy - 3 + "px";
    p.style.setProperty("--px", Math.cos(angle) * dist + "px");
    p.style.setProperty("--py", Math.sin(angle) * dist + "px");
    p.style.background = colors[i % colors.length];
    p.style.width  = (4 + Math.random() * 6) + "px";
    p.style.height = p.style.width;
    p.style.animationDelay = (Math.random() * 0.1) + "s";
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 800);
  }

  // Ripple overlay
  const overlay = document.createElement("div");
  overlay.className = "theme-ripple";
  overlay.style.background = newDark ? "#0f0f0f" : "#f0ede8";
  overlay.style.setProperty("--rx", cx + "px");
  overlay.style.setProperty("--ry", cy + "px");
  document.body.appendChild(overlay);
  return overlay;
}

function LinksHub({ links, setLinks, th, user }) {
  const [search, setSearch] = useState("");

  const [editingLink, setEditingLink] = useState(null);
  const [newLink, setNewLink] = useState({ name: "", url: "", desc: "", cat: "Other", visibility: "all" });
  const [editForm, setEditForm] = useState({ name: "", url: "", desc: "", cat: "", visibility: "all" });
  const [dragId, setDragId] = useState(null);
  const [dragCat, setDragCat] = useState(null);
  const [dragOverId, setDragOverId] = useState(null);

  const canAdmin = isFullAdmin(user) || user?.userType === "office_staff";
  const isFieldUser = user?.userType === "dm" || user?.userType === "manager";
  const allCats = Object.keys(links);
  const nextId = () => Math.max(0, ...allCats.flatMap(c => (links[c]||[]).map(l => l.id))) + 1;

  const getVisibleLinks = (cat) => {
    let items = links[cat] || [];
    if (isFieldUser) items = items.filter(l => (l.visibility || "all") === "all");
    items = [...items].sort((a, b) => (a.sortOrder ?? 0) - (b.sortOrder ?? 0));
    const f = search.trim().toLowerCase();
    if (f) items = items.filter(l => l.name.toLowerCase().includes(f) || (l.desc || "").toLowerCase().includes(f));
    return items;
  };

  const visibleCats = allCats.filter(cat => getVisibleLinks(cat).length > 0 || (canAdmin && !search.trim()));

  const addLink = () => {
    if (!newLink.name || !newLink.url) return;
    const url = newLink.url.startsWith("http") ? newLink.url : "https://" + newLink.url;
    setLinks(prev => {
      const cat = newLink.cat || "Other";
      const existing = prev[cat] || [];
      return { ...prev, [cat]: [...existing, { id: nextId(), name: newLink.name, url, desc: newLink.desc, visibility: newLink.visibility || "all", sortOrder: existing.length }] };
    });
    setNewLink({ name: "", url: "", desc: "", cat: "Other", visibility: "all" });
    setAddMode(false);
  };

  const removeLink = (cat, id) => {
    setLinks(prev => {
      const updated = { ...prev, [cat]: prev[cat].filter(l => l.id !== id) };
      updated[cat].forEach((l, i) => l.sortOrder = i);
      return updated;
    });
  };

  const startEdit = (cat, link) => {
    setEditingLink(link.id);
    setEditForm({ name: link.name, url: link.url, desc: link.desc || "", cat, visibility: link.visibility || "all" });
  };

  const saveEdit = (originalCat) => {
    if (!editForm.name || !editForm.url) return;
    const url = editForm.url.startsWith("http") ? editForm.url : "https://" + editForm.url;
    setLinks(prev => {
      const updated = { ...prev };
      updated[originalCat] = (updated[originalCat] || []).filter(l => l.id !== editingLink);
      const targetCat = editForm.cat || originalCat;
      if (!updated[targetCat]) updated[targetCat] = [];
      updated[targetCat] = [...updated[targetCat], { id: editingLink, name: editForm.name, url, desc: editForm.desc, visibility: editForm.visibility, sortOrder: updated[targetCat].length }];
      if (updated[originalCat]?.length === 0 && originalCat !== targetCat) delete updated[originalCat];
      else updated[originalCat].forEach((l, i) => l.sortOrder = i);
      return updated;
    });
    setEditingLink(null);
  };

  const handleDragStart = (cat, id) => { setDragId(id); setDragCat(cat); };
  const handleDragOver = (e, id) => { e.preventDefault(); setDragOverId(id); };
  const handleDragEnd = () => { setDragId(null); setDragCat(null); setDragOverId(null); };
  const handleDrop = (cat, targetId) => {
    if (dragId === null || dragId === targetId || dragCat !== cat) { handleDragEnd(); return; }
    setLinks(prev => {
      const catLinks = [...(prev[cat] || [])];
      const dragIdx = catLinks.findIndex(l => l.id === dragId);
      const targetIdx = catLinks.findIndex(l => l.id === targetId);
      if (dragIdx === -1 || targetIdx === -1) return prev;
      const [item] = catLinks.splice(dragIdx, 1);
      catLinks.splice(targetIdx, 0, item);
      catLinks.forEach((l, i) => l.sortOrder = i);
      return { ...prev, [cat]: catLinks };
    });
    handleDragEnd();
  };

  const catSelectOpts = [...new Set([...allCats, "Other"])];

  };

      setMyNotes(n => n.map(x => x.id === editing ? { ...x, ...form, updated: new Date().toLocaleDateString() } : x));

      setMyNotes(n => [...n, { id: nextId(), ...form, author: user.name, userId: user.id, created: new Date().toLocaleDateString(), updated: new Date().toLocaleDateString() }]);
      setAdding(false);
    }
    setForm({ title: "", body: "" });
  };
  const del = id => setMyNotes(n => n.filter(x => x.id !== id));
  const edit = note => { setEditing(note.id); setForm({ title: note.title, body: note.body }); setAdding(true); };

  return (
    <div className="fade-in">
      {!adding ? (
        <button style={{ ...btn(th), marginBottom:"1.5rem" }} onClick={() => { setAdding(true); setEditing(null); setForm({ title: "", body: "" }); }}>+ New Note</button>
      ) : (
        <div style={{ ...card(th), padding: 20, marginBottom:"1.5rem", border: `1px solid ${O}44` }} className="fade-in">
          <input style={{ ...inp(th), marginBottom:"0.625rem", fontSize:"1.0rem", fontWeight: 600 }} placeholder="Note title..." value={form.title} onChange={e => setForm(f => ({ ...f, title: e.target.value }))} />
          <textarea style={{ ...inp(th), minHeight: 140, resize: "vertical", lineHeight: 1.6 }} placeholder="Write your note..." value={form.body} onChange={e => setForm(f => ({ ...f, body: e.target.value }))} />
          <div style={{ display: "flex", gap:"0.625rem", marginTop:"0.75rem" }}>
            <button style={btn(th)} onClick={save}>{editing ? "Save Changes" : "Save Note"}</button>
            <button style={btn(th, { background: th.card3, color: th.muted })} onClick={() => { setAdding(false); setEditing(null); }}>Cancel</button>
          </div>
        </div>
      )}
      {myNotes.length === 0 && !adding && (
        <div style={{ textAlign: "center", color: th.muted, padding: 60, fontSize:"0.875rem" }}>No notes yet — click "New Note" to add one.</div>
      )}
      <div className="notes-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap:"0.875rem" }}>
        {myNotes.map(note => (
          <div key={note.id} style={{ ...card(th), padding: 20 }} className="fade-in">
            <div style={{ fontFamily: "'Raleway'", fontWeight: 700, fontSize:"0.9375rem", color: th.text, marginBottom:"0.5rem" }}>{note.title}</div>
            <div style={{ fontSize:"0.8125rem", color: th.muted, lineHeight: 1.7, whiteSpace: "pre-wrap", marginBottom:"1.0rem", maxHeight: 120, overflow: "hidden" }}>{note.body}</div>
            <div style={{ fontSize:"0.6875rem", color: th.subtle, marginBottom:"0.75rem" }}>Updated {note.updated}</div>
            <div style={{ display: "flex", gap:"0.5rem" }}>
              <button onClick={() => edit(note)} style={btn(th, { padding: "6px 14px", fontSize:"0.75rem" })}>Edit</button>
              <button onClick={() => del(note.id)} style={btn(th, { padding: "6px 14px", fontSize:"0.75rem", background: th.card3, color: th.muted })}>Delete</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

const PRI = {
  High:   { color: "#ff6b6b", bg: "#ff6b6b18" },
  Medium: { color: "#ffa94d", bg: "#ffa94d18" },
  Low:    { color: "#69db7c", bg: "#69db7c18" },
};

function Avatar({ name, size=28, isOrange=false, th }) {
  const initials = name ? name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase() : "?";
  return (
    <div title={name} style={{ width:size, height:size, borderRadius:"50%", background: isOrange ? O : th.card3, border:`2px solid ${isOrange ? O+"66" : th.cardBorder}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:size*0.38, fontWeight:700, color: isOrange ? "#fff" : th.muted, flexShrink:0 }}>
      {initials}
    </div>
  );
}

function Todos({ todos, setTodos, user, users, th }) {
  const emptyForm = { text:"", priority:"Medium", assigneeIds: [user.id], dueDate:"", note:"" };
  const [form, setForm]         = useState(emptyForm);
  const [addOpen, setAddOpen]   = useState(false);
  const [viewTab, setViewTab]   = useState("mine"); // "mine" | "assigned" | "all"
  const [detailId, setDetailId] = useState(null);
  const [assignDropOpen, setAssignDropOpen] = useState(false);

  const getUserById = (id) => users.find(u => u.id === id);

  // Migrate old single-assignee tasks to multi-assignee on first render
  useEffect(() => {
    const needsMigration = todos.some(t => t.assigneeId !== undefined && !t.assigneeIds);
    if (needsMigration) {
      setTodos(ts => ts.map(t => {
        if (t.assigneeId !== undefined && !t.assigneeIds) {
          const { assigneeId, ...rest } = t;
          return { ...rest, assigneeIds: [assigneeId] };
        }
        return t;
      }));
    }
  }, []);

  // Helper to get assigneeIds safely (handles old format during migration)
  const getAssigneeIds = (t) => t.assigneeIds || (t.assigneeId !== undefined ? [t.assigneeId] : []);
  const isMyTask = (t) => getAssigneeIds(t).includes(user.id);

  const add = () => {
    if (!form.text.trim()) return;
    setTodos(t => [...t, {
      id: Date.now(),
      text: form.text,
      priority: form.priority,
      assigneeIds: form.assigneeIds.map(Number),
      assignedById: user.id,
      dueDate: form.dueDate,
      note: form.note,
      done: false,
      completedAt: null,
      created: new Date().toLocaleDateString(),
      createdTs: Date.now(),
    }]);
    setForm(emptyForm);
    setAddOpen(false);
  };

  const toggle = (id) => setTodos(ts => ts.map(t =>
    t.id === id ? { ...t, done: !t.done, completedAt: !t.done ? new Date().toLocaleDateString() : null } : t
  ));
  const del = (id) => setTodos(ts => ts.filter(t => t.id !== id));

  // Tab filter logic
  const visibleTodos = todos.filter(t => {
    if (viewTab === "mine")     return isMyTask(t);
    if (viewTab === "assigned") return t.assignedById === user.id && !isMyTask(t);
    return true; // "all" — only show to admins
  });

  const open = visibleTodos.filter(t => !t.done);
  const done = visibleTodos.filter(t => t.done);
  const sortedOpen = ["High","Medium","Low"].flatMap(p => open.filter(t => t.priority === p));

  const detailTask = todos.find(t => t.id === detailId);

  const isOverdue = (t) => t.dueDate && !t.done && new Date(t.dueDate) < new Date();

  // Summary counts for assigned-out tasks (what I gave to others)
  const assignedOut = todos.filter(t => t.assignedById === user.id && !isMyTask(t));
  const assignedDone    = assignedOut.filter(t => t.done).length;
  const assignedPending = assignedOut.filter(t => !t.done).length;

  return (
    <div className="fade-in">

      {/* ── Tab Bar ── */}
      <div style={{ display:"flex", gap:"0.5rem", marginBottom:"1.25rem", flexWrap:"wrap", alignItems:"center", justifyContent:"space-between" }}>
        <div style={{ display:"flex", gap:"0.375rem" }}>
          {[
            { id:"mine",     label:`My Tasks`,      count: todos.filter(t=>isMyTask(t)&&!t.done).length },
            { id:"assigned", label:`Assigned Out`,   count: assignedPending },
            ...((isFullAdmin(user) || user?.userType==="office_staff") ? [{ id:"all", label:"All Tasks", count: todos.filter(t=>!t.done).length }] : []),
          ].map(tb => (
            <button key={tb.id} onClick={()=>setViewTab(tb.id)} style={{
              ...btn(th, { padding:"0.5rem 1.0rem", fontSize:"0.8125rem",
              background: viewTab===tb.id ? O : th.card3,
              color: viewTab===tb.id ? "#fff" : th.muted })
            }}>
              {tb.label}
              {tb.count > 0 && <span style={{ marginLeft:6, background: viewTab===tb.id ? "#ffffff33" : O+"33", color: viewTab===tb.id ? "#fff" : O, borderRadius:"0.625rem", padding:"0.062rem 0.438rem", fontSize:"0.6875rem", fontWeight:700 }}>{tb.count}</span>}
            </button>
          ))}
        </div>
        <button style={btn(th)} onClick={()=>setAddOpen(a=>!a)}>
          {addOpen ? "✕ Cancel" : "+ New Task"}
        </button>
      </div>

      {/* ── Assigned-out summary banner ── */}
      {viewTab === "assigned" && assignedOut.length > 0 && (
        <div style={{ ...card(th), padding:"0.875rem 1.25rem", marginBottom:"1.25rem", display:"flex", gap:"1.5rem", borderLeft:`3px solid ${O}` }} className="fade-in">
          <div><span style={{ fontFamily:"'Raleway'", fontWeight:800, fontSize:"1.25rem", color:O }}>{assignedOut.length}</span><div style={{ fontSize:"0.6875rem", color:th.muted, marginTop:"0.125rem" }}>Total Assigned</div></div>
          <div><span style={{ fontFamily:"'Raleway'", fontWeight:800, fontSize:"1.25rem", color:"#69db7c" }}>{assignedDone}</span><div style={{ fontSize:"0.6875rem", color:th.muted, marginTop:"0.125rem" }}>Completed</div></div>
          <div><span style={{ fontFamily:"'Raleway'", fontWeight:800, fontSize:"1.25rem", color:"#ffa94d" }}>{assignedPending}</span><div style={{ fontSize:"0.6875rem", color:th.muted, marginTop:"0.125rem" }}>Still Pending</div></div>
        </div>
      )}

      {/* ── Add Task Form ── */}
      {addOpen && (
        <div style={{ ...card(th), padding:20, marginBottom:"1.5rem", border:`1px solid ${O}44` }} className="fade-in">
          <div style={{ fontSize:"0.75rem", fontWeight:700, color:O, letterSpacing:1, textTransform:"uppercase", marginBottom:"0.875rem" }}>New Task</div>
          <textarea
            style={{ ...inp(th), marginBottom:"0.75rem", minHeight:72, resize:"vertical", lineHeight:1.6 }}
            placeholder="Task description..."
            value={form.text}
            onChange={e=>setForm(f=>({...f,text:e.target.value}))}
          />
          <div className="add-link-grid" style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"0.625rem", marginBottom:"0.875rem" }}>
            {/* Assign to (multi-select) */}
            <div style={{ position:"relative" }}>
              <div style={{ fontSize:"0.6875rem", color:th.muted, marginBottom:"0.312rem", textTransform:"uppercase", letterSpacing:0.8 }}>Assign To</div>
              <div onClick={()=>setAssignDropOpen(o=>!o)} style={{ ...inp(th), cursor:"pointer", display:"flex", alignItems:"center", flexWrap:"wrap", gap:"0.25rem", minHeight:38 }}>
                {form.assigneeIds.length === 0 ? <span style={{ color:th.muted, fontSize:"0.8125rem" }}>Select...</span> :
                  form.assigneeIds.map(id => { const u = getUserById(Number(id)); return u ? (
                    <span key={id} style={{ background:O+"22", color:O, fontSize:"0.625rem", fontWeight:600, padding:"0.125rem 0.375rem", borderRadius:"0.75rem", display:"inline-flex", alignItems:"center", gap:"0.188rem", whiteSpace:"nowrap" }}>
                      {u.name.split(" ")[0]}{u.id===user.id?" (me)":""}
                      <span onClick={e=>{e.stopPropagation();setForm(f=>({...f,assigneeIds:f.assigneeIds.filter(i=>i!==id)}))}} style={{ cursor:"pointer", marginLeft:2 }}>✕</span>
                    </span>
                  ) : null; })
                }
              </div>
              {assignDropOpen && (
                <div style={{ position:"absolute", top:"100%", left:0, right:0, zIndex:20, ...card(th), padding:0, maxHeight:200, overflow:"auto", boxShadow:"0 4px 16px #00000030", marginTop:4 }}>
                  {users.filter(u=>u.active!==false).map(u=>(
                    <label key={u.id} style={{ display:"flex", alignItems:"center", gap:"0.5rem", padding:"0.375rem 0.625rem", cursor:"pointer", fontSize:"0.8125rem", color:th.text, borderBottom:`1px solid ${th.cardBorder}` }}>
                      <input type="checkbox" checked={form.assigneeIds.includes(u.id)} style={{ accentColor:O }}
                        onChange={e=>setForm(f=>({...f, assigneeIds: e.target.checked ? [...f.assigneeIds, u.id] : f.assigneeIds.filter(i=>i!==u.id) }))} />
                      <span style={{ fontWeight:form.assigneeIds.includes(u.id)?600:400 }}>{u.name}{u.id===user.id?" (me)":""}</span>
                    </label>
                  ))}
                </div>
              )}
            </div>
            {/* Priority */}
            <div>
              <div style={{ fontSize:"0.6875rem", color:th.muted, marginBottom:"0.312rem", textTransform:"uppercase", letterSpacing:0.8 }}>Priority</div>
              <select style={inp(th)} value={form.priority} onChange={e=>setForm(f=>({...f,priority:e.target.value}))}>
                <option>High</option><option>Medium</option><option>Low</option>
              </select>
            </div>
            {/* Due Date */}
            <div>
              <div style={{ fontSize:"0.6875rem", color:th.muted, marginBottom:"0.312rem", textTransform:"uppercase", letterSpacing:0.8 }}>Due Date</div>
              <input type="date" style={inp(th)} value={form.dueDate} onChange={e=>setForm(f=>({...f,dueDate:e.target.value}))} />
            </div>
          </div>
          <input style={{ ...inp(th), marginBottom:"0.875rem" }} placeholder="Add a note (optional)..." value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} />
          <button style={btn(th)} onClick={add}>Create Task</button>
        </div>
      )}

      {/* ── Empty state ── */}
      {visibleTodos.length === 0 && !addOpen && (
        <div style={{ textAlign:"center", color:th.muted, padding:60, fontSize:"0.875rem" }}>
          {viewTab==="mine" ? "No tasks assigned to you." : viewTab==="assigned" ? "You haven\'t assigned any tasks to others yet." : "No tasks exist yet."}
        </div>
      )}

      {/* ── Open Tasks ── */}
      {sortedOpen.length > 0 && (
        <div style={{ marginBottom:"1.75rem" }}>
          <div style={{ fontSize:"0.75rem", color:th.muted, letterSpacing:1.5, textTransform:"uppercase", marginBottom:"0.75rem" }}>
            {viewTab==="mine" ? "Pending" : "Pending"} ({sortedOpen.length})
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:"0.5rem" }}>
            {sortedOpen.map(task => {
              const taskAssigneeIds = getAssigneeIds(task);
              const assignees = taskAssigneeIds.map(id => getUserById(id)).filter(Boolean);
              const assignedBy = getUserById(task.assignedById);
              const overdue    = isOverdue(task);
              const isMine     = isMyTask(task);
              return (
                <div key={task.id}
                  style={{ ...card(th), padding:"0.875rem 1.125rem", display:"flex", alignItems:"flex-start", gap:"0.875rem", transition:"border .15s", borderLeft: overdue ? "3px solid #ff6b6b" : `3px solid transparent` }}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=overdue?"#ff6b6b":O+"55"}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=overdue?"#ff6b6b":"transparent"}>

                  <input type="checkbox" checked={false} onChange={()=>toggle(task.id)}
                    disabled={!isMine}
                    title={!isMine ? "Only an assignee can complete this task" : ""}
                    style={{ width:18, height:18, accentColor:O, cursor: isMine?"pointer":"not-allowed", marginTop:"0.125rem", flexShrink:0 }} />

                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:"0.875rem", color:th.text, fontWeight:500, marginBottom:"0.25rem" }}>{task.text}</div>
                    {task.note && <div style={{ fontSize:"0.75rem", color:th.muted, fontStyle:"italic", marginBottom:"0.375rem" }}>"{task.note}"</div>}
                    <div style={{ display:"flex", gap:"0.625rem", flexWrap:"wrap", alignItems:"center" }}>
                      <span style={{ fontSize:"0.6875rem", fontWeight:600, padding:"0.125rem 0.562rem", borderRadius:"1.25rem", color:PRI[task.priority].color, background:PRI[task.priority].bg }}>{task.priority}</span>
                      {task.dueDate && (
                        <span style={{ fontSize:"0.6875rem", color: overdue?"#ff6b6b":th.muted }}>
                          {overdue?"⚠️ Overdue":"📅"} {new Date(task.dueDate+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}
                        </span>
                      )}
                      <span style={{ fontSize:"0.6875rem", color:th.subtle }}>Added {task.created}</span>
                    </div>
                  </div>

                  {/* Assignee / assigned-by avatars */}
                  <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:"0.375rem", flexShrink:0 }}>
                    {viewTab!=="mine" && assignees.length > 0 && (
                      <div style={{ display:"flex", alignItems:"center", gap:"0.25rem" }}>
                        <span style={{ fontSize:"0.625rem", color:th.subtle }}>to</span>
                        <div style={{ display:"flex", alignItems:"center" }}>
                          {assignees.slice(0, 3).map((a, i) => (
                            <div key={a.id} style={{ marginLeft: i > 0 ? -8 : 0, zIndex: 3 - i, position:"relative" }} title={a.name}>
                              <Avatar name={a.name} size={26} isOrange={true} th={th} />
                            </div>
                          ))}
                          {assignees.length > 3 && (
                            <span style={{ fontSize:"0.5625rem", fontWeight:700, color:th.muted, marginLeft:4 }}>+{assignees.length - 3}</span>
                          )}
                        </div>
                        {assignees.length === 1 && <span style={{ fontSize:"0.6875rem", color:th.muted, maxWidth:80, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{assignees[0].name.split(" ")[0]}</span>}
                      </div>
                    )}
                    {viewTab==="mine" && assignedBy && assignedBy.id !== user.id && (
                      <div style={{ display:"flex", alignItems:"center", gap:"0.375rem" }}>
                        <span style={{ fontSize:"0.625rem", color:th.subtle }}>from</span>
                        <Avatar name={assignedBy.name} size={26} th={th} />
                        <span style={{ fontSize:"0.6875rem", color:th.muted }}>{assignedBy.name.split(" ")[0]}</span>
                      </div>
                    )}
                    <button onClick={()=>del(task.id)} style={{ background:"none", border:"none", color:th.subtle, cursor:"pointer", fontSize:"1.125rem", lineHeight:1, padding:0 }}>×</button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── Completed ── */}
      {done.length > 0 && (
        <div>
          <div style={{ fontSize:"0.75rem", color:th.muted, letterSpacing:1.5, textTransform:"uppercase", marginBottom:"0.75rem" }}>Completed ({done.length})</div>
          <div style={{ display:"flex", flexDirection:"column", gap:"0.5rem" }}>
            {done.map(task => {
              const taskAssigneeIds = getAssigneeIds(task);
              const assignees = taskAssigneeIds.map(id => getUserById(id)).filter(Boolean);
              const isMine     = isMyTask(task);
              return (
                <div key={task.id} style={{ ...card(th), padding:"0.875rem 1.125rem", display:"flex", alignItems:"center", gap:"0.875rem", opacity:0.6 }}>
                  <input type="checkbox" checked={true} onChange={()=>toggle(task.id)}
                    disabled={!isMine}
                    style={{ width:18, height:18, accentColor:O, cursor: isMine?"pointer":"not-allowed", flexShrink:0 }} />
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ textDecoration:"line-through", fontSize:"0.875rem", color:th.muted }}>{task.text}</div>
                    <div style={{ fontSize:"0.6875rem", color:th.subtle, marginTop:"0.125rem" }}>
                      ✓ Completed {task.completedAt || ""}
                      {!isMine && assignees.length > 0 && ` · by ${assignees.map(a=>a.name).join(", ")}`}
                    </div>
                  </div>
                  {viewTab==="assigned" && assignees.length > 0 && (
                    <div style={{ display:"flex", alignItems:"center", gap:"0.25rem" }}>
                      {assignees.slice(0, 3).map((a, i) => (
                        <div key={a.id} style={{ marginLeft: i > 0 ? -6 : 0 }} title={a.name}>
                          <Avatar name={a.name} size={24} isOrange={true} th={th} />
                        </div>
                      ))}
                      {assignees.length > 3 && <span style={{ fontSize:"0.5625rem", color:th.muted }}>+{assignees.length-3}</span>}
                      {assignees.length === 1 && <span style={{ fontSize:"0.6875rem", color:th.muted }}>{assignees[0].name.split(" ")[0]}</span>}
                    </div>
                  )}
                  <span style={{ fontSize:"0.625rem", fontWeight:700, padding:"0.125rem 0.5rem", borderRadius:"0.625rem", background:"#69db7c18", color:"#69db7c" }}>Done</span>
                  <button onClick={()=>del(task.id)} style={{ background:"none", border:"none", color:th.subtle, cursor:"pointer", fontSize:"1.125rem" }}>×</button>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}
