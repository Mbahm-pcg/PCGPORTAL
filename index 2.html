    }
    return count;
  }, [chatChannels, chatMessages, chatReadState, user]);

  // Migration: add email/phone fields to users + merge new seed users
  useEffect(() => {
    let updated = [...users];
    let changed = false;
    // Add email/phone defaults
    if (updated.some(u => u.email === undefined)) {
      updated = updated.map(u => ({ ...u, email: u.email || "", phone: u.phone || "" }));
      changed = true;
    }
    // Merge any new USERS_SEED entries (e.g. kiosk users) not yet in saved data
    for (const seed of USERS_SEED) {
      if (!updated.find(u => u.id === seed.id)) {
        updated.push({ ...seed, email: seed.email || "", phone: seed.phone || "" });
        changed = true;
      }
    }
    if (changed) setUsers(updated);
  }, []);

  // Migrate project data from seed data + fix stale timestamps
  useEffect(() => {
    let updated = [...projects];
    let changed = false;
    for (const seed of PROJECTS_SEED) {
      const existing = updated.find(p => p.id === seed.id);
      if (existing && !existing.zip && seed.zip) {
        existing.zip = seed.zip;
        changed = true;
      }
      // Also add constructionCompleteBy field if missing
      if (existing && existing.constructionCompleteBy === undefined) {
        existing.constructionCompleteBy = "";
        changed = true;
      }
      // Fix stale seed timestamps: if not user-edited and updatedAt is a future/completion date, reset to past
      if (existing && (!existing.lastEditedBy || existing.lastEditedBy === "System") && existing.updatedAt && existing.updatedAt > "2025-02-01") {
        existing.updatedAt = "2025-01-01T00:00:00Z";
        existing.lastEditedAt = "2025-01-01T00:00:00Z";
        existing.createdAt = "2025-01-01T00:00:00Z";
        changed = true;
      }
    }
    if (changed) setProjects(updated); // Use raw setProjects — this is a migration, not a user edit
  }, []);

  // Deep-link: ?project=ID → open that project after login
  useEffect(() => {
    if (!user) return;
    const params = new URLSearchParams(window.location.search);
    const projId = parseInt(params.get('project'));
    if (projId) {
      setTab('projects');
      deepLinkRef.current = projId;
      window.history.replaceState({}, '', window.location.pathname);
    }
  }, [user]);

  // Close drawer when switching to desktop
  useEffect(() => { if (!isMobile) setDrawerOpen(false); }, [isMobile]);

  // Auto-save all data to localStorage whenever anything changes
  useEffect(() => {
    saveToStorage({ links, notes, todos, users, stores, districts, contacts, vendors, dark, projects, notifications, dailyReports, globalNotifyEmails });
  }, [links, notes, todos, users, stores, districts, contacts, vendors, dark, projects, notifications, dailyReports, globalNotifyEmails]);

  // Save sales data separately (can be large)
  // Load from cloud on mount, fallback to localStorage
  useEffect(() => {
    setCloudStatus('loading');
    cloudLoad('pcg_sales_v1').then(data => {
      if (data && Array.isArray(data) && data.length > 0) {
        setSalesWeeks(data);
      } else {
        try {
          const local = JSON.parse(localStorage.getItem('pcg_sales_v1') || '[]');
          if (local.length > 0) { setSalesWeeks(local); cloudSave('pcg_sales_v1', local); }
        } catch {}
      }
      setCloudStatus('idle');
    }).catch(() => {
      try { const local = JSON.parse(localStorage.getItem('pcg_sales_v1') || '[]'); setSalesWeeks(local); } catch {}
      setCloudStatus('error');
    });
  }, []);

  // Save to cloud + localStorage on change
  useEffect(() => {
    if (salesWeeks.length === 0) return;
    setCloudStatus('saving');
    try { localStorage.setItem('pcg_sales_v1', JSON.stringify(salesWeeks)); } catch {}
    cloudSave('pcg_sales_v1', salesWeeks).then(ok => {
      setCloudStatus(ok ? 'saved' : 'error');
      setTimeout(() => setCloudStatus('idle'), 2500);
    });
  }, [salesWeeks]);

  // Cloud sync projects — merge by updatedAt timestamp to avoid overwriting newer local edits
  useEffect(() => {
    cloudLoad('pcg_projects_v1').then(cloudData => {
      cloudProjectsLoaded.current = true;
      if (cloudData && Array.isArray(cloudData) && cloudData.length > 0) {
        setProjects(localProjects => {
          const cloudMap = new Map(cloudData.map(p => [p.id, p]));
          const localMap = new Map(localProjects.map(p => [p.id, p]));
          const merged = [];
          // For each project, keep whichever has the newer updatedAt
          const allIds = new Set([...cloudMap.keys(), ...localMap.keys()]);
          allIds.forEach(id => {
            const cloud = cloudMap.get(id);
            const local = localMap.get(id);
            if (cloud && local) {
              merged.push((local.updatedAt || "") >= (cloud.updatedAt || "") ? local : cloud);
            } else {
              merged.push(cloud || local);
            }
          });
          return merged;
        });
      }
    }).catch(() => { cloudProjectsLoaded.current = true; });
  }, []);
  useEffect(() => {
    if (!cloudProjectsLoaded.current) return;
    if (!projectsUserEdited.current) return;
    if (projects.length === 0) return;
    projectsUserEdited.current = false;
    cloudSave('pcg_projects_v1', projects);
  }, [projects]);

  // Cloud sync users
  useEffect(() => {
    cloudLoad('pcg_users_v1').then(data => {
      cloudUsersLoaded.current = true;
      if (data && Array.isArray(data) && data.length > 0) {
        // Merge: cloud users win for existing IDs, keep any local-only users too
        setUsers(localUsers => {
          const cloudMap = new Map(data.map(u => [u.id, u]));
          const localMap = new Map(localUsers.map(u => [u.id, u]));
          // Start with cloud data, then add any local-only users
          const merged = [...data];
          localUsers.forEach(u => { if (!cloudMap.has(u.id)) merged.push(u); });
          return merged;
        });
      }
    }).catch(() => { cloudUsersLoaded.current = true; });
  }, []);
  useEffect(() => {
    if (!cloudUsersLoaded.current) return;
    if (users.length === 0) return;
    cloudSave('pcg_users_v1', users);
  }, [users]);

  // Cloud sync daily reports — merge by updatedAt timestamp to avoid overwriting other users' reports
  useEffect(() => {
    cloudLoad('pcg_daily_reports_v1').then(cloudData => {
      cloudDailyReportsLoaded.current = true;
      if (cloudData && Array.isArray(cloudData) && cloudData.length > 0) {
        setDailyReports(localReports => {
          const cloudMap = new Map(cloudData.map(r => [r.id, r]));
          const localMap = new Map(localReports.map(r => [r.id, r]));
          const merged = [];
          const allIds = new Set([...cloudMap.keys(), ...localMap.keys()]);
          allIds.forEach(id => {
            const cloud = cloudMap.get(id);
            const local = localMap.get(id);
            if (cloud && local) {
              // Always prefer cloud if local has stripped photos (localStorage quota workaround)
              const localHasStripped = (local.workLogs || []).some(w => (w.photos || []).some(p => p._photoStripped));
              if (localHasStripped) {
                merged.push(cloud);
              } else {
                // Pick whichever is newer
                merged.push((local.updatedAt || "") >= (cloud.updatedAt || "") ? local : cloud);
              }
            } else {
              merged.push(cloud || local);
            }
          });
          return merged;
        });
      }
    }).catch(() => { cloudDailyReportsLoaded.current = true; });
  }, []);
  useEffect(() => {
    // Note: intentionally NOT guarding on cloudDailyReportsLoaded — if user saves a report
    // before cloud sync completes, we still need to persist it. dailyReportsUserEdited is
    // sufficient to distinguish user edits from cloud-load state updates.
    if (!dailyReportsUserEdited.current) return;
    if (dailyReports.length === 0) return;
    dailyReportsUserEdited.current = false;
    cloudSave('pcg_daily_reports_v1', dailyReports);
  }, [dailyReports]);

  // Cloud sync stores
  useEffect(() => {
    cloudLoad('pcg_stores_v1').then(data => {
      cloudStoresLoaded.current = true;
      if (data && Array.isArray(data) && data.length > 0) {
        setStores(local => {
          const cloudMap = new Map(data.map(s => [s.pc || s.id, s]));
          const localMap = new Map(local.map(s => [s.pc || s.id, s]));
          const merged = [...data];
          local.forEach(s => { const k = s.pc || s.id; if (!cloudMap.has(k)) merged.push(s); });
          return merged;
        });
      }
    }).catch(() => { cloudStoresLoaded.current = true; });
  }, []);
  useEffect(() => {
    if (!cloudStoresLoaded.current) return;
    if (stores.length === 0) return;
    cloudSave('pcg_stores_v1', stores);
  }, [stores]);

  // Cloud sync districts
  useEffect(() => {
    cloudLoad('pcg_districts_v1').then(data => {
      cloudDistrictsLoaded.current = true;
      if (data && typeof data === 'object' && Object.keys(data).length > 0) setDistricts(data);
    }).catch(() => { cloudDistrictsLoaded.current = true; });
  }, []);
  useEffect(() => {
    if (!cloudDistrictsLoaded.current) return;
    if (!districts || Object.keys(districts).length === 0) return;
    cloudSave('pcg_districts_v1', districts);
  }, [districts]);

  // Cloud sync contacts
  useEffect(() => {
    cloudLoad('pcg_contacts_v1').then(data => {
      cloudContactsLoaded.current = true;
      if (data && Array.isArray(data) && data.length > 0) setContacts(data);
    }).catch(() => { cloudContactsLoaded.current = true; });
  }, []);
  useEffect(() => {
    if (!cloudContactsLoaded.current) return;
    if (contacts.length === 0) return;
    cloudSave('pcg_contacts_v1', contacts);
  }, [contacts]);

  // Cloud sync vendors
  useEffect(() => {
    cloudLoad('pcg_vendors_v1').then(data => {
      cloudVendorsLoaded.current = true;
      if (data && Array.isArray(data) && data.length > 0) setVendors(data);
    }).catch(() => { cloudVendorsLoaded.current = true; });
  }, []);
  useEffect(() => {
    if (!cloudVendorsLoaded.current) return;
    if (vendors.length === 0) return;
    cloudSave('pcg_vendors_v1', vendors);
  }, [vendors]);

  // Cloud sync links
  useEffect(() => {
    cloudLoad('pcg_links_v1').then(data => {
      cloudLinksLoaded.current = true;
      if (data && Array.isArray(data) && data.length > 0) setLinks(data);
    }).catch(() => { cloudLinksLoaded.current = true; });
  }, []);
  useEffect(() => {
    if (!cloudLinksLoaded.current) return;
    if (links.length === 0) return;
    cloudSave('pcg_links_v1', links);
  }, [links]);

  // Cloud sync notes
  useEffect(() => {
    cloudLoad('pcg_notes_v1').then(data => {
      cloudNotesLoaded.current = true;
      if (data && Array.isArray(data) && data.length > 0) setNotes(data);
    }).catch(() => { cloudNotesLoaded.current = true; });
  }, []);
  useEffect(() => {
    if (!cloudNotesLoaded.current) return;
    if (notes.length === 0) return;
    cloudSave('pcg_notes_v1', notes);
  }, [notes]);

  // Cloud sync todos
  useEffect(() => {
    cloudLoad('pcg_todos_v1').then(data => {
      cloudTodosLoaded.current = true;
      if (data && Array.isArray(data) && data.length > 0) setTodos(data);
    }).catch(() => { cloudTodosLoaded.current = true; });
  }, []);
  useEffect(() => {
    if (!cloudTodosLoaded.current) return;
    if (todos.length === 0) return;
    cloudSave('pcg_todos_v1', todos);
  }, [todos]);

  // Cloud sync notifications
  useEffect(() => {
    cloudLoad('pcg_notifications_v1').then(data => {
      cloudNotificationsLoaded.current = true;
      if (data && Array.isArray(data)) setNotifications(data);
    }).catch(() => { cloudNotificationsLoaded.current = true; });
  }, []);
  useEffect(() => {
    if (!cloudNotificationsLoaded.current) return;
    cloudSave('pcg_notifications_v1', notifications);
  }, [notifications]);

  // Cloud sync global notify emails
  useEffect(() => {
    cloudLoad('pcg_global_notify_v1').then(data => {
      cloudGlobalNotifyLoaded.current = true;
      if (data && Array.isArray(data) && data.length > 0) setGlobalNotifyEmails(data);
    }).catch(() => { cloudGlobalNotifyLoaded.current = true; });
  }, []);
  useEffect(() => {
    if (!cloudGlobalNotifyLoaded.current) return;
    if (globalNotifyEmails.length === 0) return;
    cloudSave('pcg_global_notify_v1', globalNotifyEmails);
  }, [globalNotifyEmails]);

  // Cloud sync chat data
  const chatPollRef = useRef(null);
  useEffect(() => {
    Promise.all([
      cloudLoad('pcg_chat_channels_v1'),
      cloudLoad('pcg_chat_messages_v1'),
      cloudLoad('pcg_chat_read_v1'),
    ]).then(([ch, ms, rd]) => {
      cloudChatLoaded.current = true;
      if (ch && Array.isArray(ch)) setChatChannels(ch);
      if (ms && Array.isArray(ms)) setChatMessages(ms);
      if (rd && typeof rd === 'object' && rd !== null) setChatReadState(rd);
    }).catch(() => { cloudChatLoaded.current = true; });
  }, []);
  useEffect(() => { if (cloudChatLoaded.current && chatChannels.length > 0) cloudSave('pcg_chat_channels_v1', chatChannels); }, [chatChannels]);
  useEffect(() => { if (cloudChatLoaded.current && chatMessages.length > 0) cloudSave('pcg_chat_messages_v1', chatMessages); }, [chatMessages]);
  useEffect(() => { if (cloudChatLoaded.current && Object.keys(chatReadState).length > 0) cloudSave('pcg_chat_read_v1', chatReadState); }, [chatReadState]);
  // Cloud sync announcements
  useEffect(() => {
    Promise.all([
      cloudLoad('pcg_announcements_v1'),
      cloudLoad('pcg_announcements_dismissed_v1'),
    ]).then(([ann, dis]) => {
      cloudAnnouncementsLoaded.current = true;
      if (ann && Array.isArray(ann)) setAnnouncements(ann);
      if (dis && typeof dis === 'object' && dis !== null) setAnnouncementsDismissed(dis);
    }).catch(() => { cloudAnnouncementsLoaded.current = true; });
  }, []);
  useEffect(() => { if (cloudAnnouncementsLoaded.current && announcements.length > 0) cloudSave('pcg_announcements_v1', announcements); }, [announcements]);
  useEffect(() => { if (cloudAnnouncementsLoaded.current && Object.keys(announcementsDismissed).length > 0) cloudSave('pcg_announcements_dismissed_v1', announcementsDismissed); }, [announcementsDismissed]);

  // Register service worker for PWA push notifications
  useEffect(() => { registerServiceWorker(); }, []);
  // Re-subscribe to push if user already has pushNotify enabled (handles expired subs / new devices)
  useEffect(() => {
    if (user && user.pushNotify) subscribeToPush(user.id);
  }, [user?.id]);

  // Poll for new chat data every 12 seconds
  useEffect(() => {
    if (!user) return;
    chatPollRef.current = setInterval(async () => {
      try {
        const [ch, ms, rd, ann, dis] = await Promise.all([
          cloudLoad('pcg_chat_channels_v1'),
          cloudLoad('pcg_chat_messages_v1'),
          cloudLoad('pcg_chat_read_v1'),
          cloudLoad('pcg_announcements_v1'),
          cloudLoad('pcg_announcements_dismissed_v1'),
        ]);
        if (ch && Array.isArray(ch)) setChatChannels(ch);
        if (ms && Array.isArray(ms)) setChatMessages(ms);
        if (rd && typeof rd === 'object' && rd !== null) setChatReadState(rd);
        if (ann && Array.isArray(ann)) setAnnouncements(ann);
        if (dis && typeof dis === 'object' && dis !== null) setAnnouncementsDismissed(dis);
      } catch {}
    }, 12000);
    return () => clearInterval(chatPollRef.current);
  }, [user]);

  // Email alerts for unread @mentions (check every 5 minutes)
  const mentionAlertRef = useRef({});
  useEffect(() => {
    if (!user) return;
    const interval = setInterval(() => {
      const fiveMinAgo = new Date(Date.now() - 5 * 60 * 1000).toISOString();
      // Find messages with @mentions that are older than 5 min and unread by the mentioned user
      chatMessages.forEach(m => {
        if (m.deleted || !m.mentions || m.mentions.length === 0) return;
        if (m.timestamp > fiveMinAgo) return; // too recent
        if (mentionAlertRef.current[m.id]) return; // already alerted
        m.mentions.forEach(username => {
          const mentionedUser = users.find(u => u.username === username);
          if (!mentionedUser) return;
          const ch = chatChannels.find(c => c.id === m.channelId);
          const lastRead = chatReadState[`${mentionedUser.id}_${m.channelId}`] || "1970-01-01";
          if (m.timestamp <= lastRead) return; // they already read it
          // Send alert to global notify list
          const chName = ch ? (ch.type === "dm" ? "Direct Message" : ch.name || "Chat") : "Chat";
          dispatchNotifications(globalNotifyEmails,
            `PCG Chat: ${m.senderName} mentioned @${username}`,
            `<h3 style="color:#FF671F">Chat Mention</h3>
            <p style="font-size:13px;color:#666">In <strong>${chName}</strong></p>
            <div style="margin:12px 0;padding:12px;background:#f8f8f8;border-radius:8px;font-size:14px">
              <strong>${m.senderName}:</strong> ${m.text}
            </div>
            <p style="font-size:12px;color:#888">@${username} was mentioned but hasn't read this message yet.</p>`,
            `PCG Chat: ${m.senderName} mentioned @${username} in ${chName}: "${m.text.substring(0, 100)}"`,
            users, '/', `chat_mention_${m.id}`
          );
        });
        mentionAlertRef.current[m.id] = true;
      });
    }, 5 * 60 * 1000);
    return () => clearInterval(interval);
  }, [user, chatMessages, chatChannels, chatReadState, users, globalNotifyEmails]);

  // Notification: deadline/overdue check (runs on mount + every hour)
  useEffect(() => {
    const mkId = () => `notif_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
    const checkDeadlines = () => {
      const now = new Date();
      const sevenDays = 7 * 24 * 60 * 60 * 1000;
      const oneDayAgo = now.getTime() - 24 * 60 * 60 * 1000;
      const newNotifs = [];
      for (const p of projects) {
        if (!p.dueDate) continue;
        const due = new Date(p.dueDate);
        const diff = due - now;
        const overall = getOverallCompletion(p);
        if (overall === 100) continue;
        // Check if already notified in last 24h for this type+project
        const recentlyNotified = (type) => notifications.some(n => n.projectId === p.id && n.type === type && new Date(n.createdAt).getTime() > oneDayAgo);
        if (diff < 0 && !recentlyNotified("overdue")) {
          newNotifs.push({ id: mkId(), type: "overdue", projectId: p.id, projectName: p.nickname || p.pc, message: `${p.nickname || p.pc} is overdue`, createdAt: now.toISOString(), read: false });
        } else if (diff > 0 && diff < sevenDays && !recentlyNotified("deadline_approaching")) {
          newNotifs.push({ id: mkId(), type: "deadline_approaching", projectId: p.id, projectName: p.nickname || p.pc, message: `${p.nickname || p.pc} due in ${Math.ceil(diff / 86400000)} days`, createdAt: now.toISOString(), read: false });
        }
      }
      if (newNotifs.length > 0) setNotifications(prev => [...newNotifs, ...prev]);
    };
    checkDeadlines();
    const interval = setInterval(checkDeadlines, 3600000);
    return () => clearInterval(interval);
  }, [projects.length]);

  // Notification: detect project changes (phase changes, checklist updates, new projects)
  const prevProjectsRef = useRef(projects);
  // Helper: merge global + per-project emails, deduplicated
  const getNotifyRecipients = (p) => {
    const perProject = p.notifyEmails ? p.notifyEmails.split(",").map(e => e.trim()).filter(Boolean) : [];
    const all = [...globalNotifyEmails, ...perProject];
    return [...new Set(all.map(e => e.toLowerCase()))].filter(Boolean);
  };
  // Helper: build a checklist item label lookup
  const itemLabels = {};
  PROJECT_PHASES.forEach(ph => ph.items.forEach(it => { itemLabels[it.key] = { label: it.label, type: it.type, phase: ph.label }; }));
  useEffect(() => {
    // Only dispatch notifications for actual user edits, not cloud sync / initial load
    if (!projectsUserEdited.current) {
      prevProjectsRef.current = projects;
      return;
    }
    const mkId = () => `notif_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
    const prev = prevProjectsRef.current;
    const now = new Date().toISOString();
    const newNotifs = [];
    for (const p of projects) {
      const old = prev.find(pp => pp.id === p.id);
      const recipients = getNotifyRecipients(p);
      const projLabel = p.nickname || p.pc;
      const projInfo = `<p style="color:#666;font-size:13px">PC# ${p.pc || "N/A"} · ${p.address || ""}${p.city ? ", " + p.city : ""} ${p.state || ""} · ${p.type}</p>`;
      const editorName = p.lastEditedBy || user?.name || "Unknown";
      const editorTime = p.lastEditedAt ? new Date(p.lastEditedAt).toLocaleString() : new Date().toLocaleString();
      const editedByHtml = `<p style="font-size:12px;color:#888;margin-top:12px;border-top:1px solid #eee;padding-top:8px">✏️ ${editorName} · ${editorTime}</p>`;

      if (!old) {
        // ── New project ──
        newNotifs.push({ id: mkId(), type: "project_added", projectId: p.id, projectName: projLabel, message: `New project: ${projLabel}`, createdAt: now, read: false });
        if (recipients.length > 0) {
          dispatchNotifications(recipients, `New PCG Project: ${projLabel}`,
            `<h3 style="color:#FF671F">New Project Added</h3>${projInfo}
            <table style="width:100%;border-collapse:collapse;font-size:13px;margin-top:12px">
              <tr><td style="padding:6px 0;color:#666"><strong>Type:</strong></td><td>${p.type}</td></tr>
              <tr><td style="padding:6px 0;color:#666"><strong>Due Date:</strong></td><td>${p.dueDate || "TBD"}</td></tr>
              <tr><td style="padding:6px 0;color:#666"><strong>Target Completion:</strong></td><td>${p.completionDate || "TBD"}</td></tr>
              ${p.notes ? `<tr><td style="padding:6px 0;color:#666"><strong>Notes:</strong></td><td>${p.notes}</td></tr>` : ""}
            </table>
            ${editedByHtml}
            ${projectEmailLink(p.id, projLabel)}`,
            `PCG: New project "${projLabel}" (${p.type}) — Due: ${p.dueDate || "TBD"}`,
            users, `/?project=${p.id}`, `new_${p.id}`);
        }
      } else {
        // ── Phase change ──
        const oldPhase = getCurrentPhase(old);
        const newPhase = getCurrentPhase(p);
        if (oldPhase.id !== newPhase.id) {
          newNotifs.push({ id: mkId(), type: "phase_change", projectId: p.id, projectName: projLabel, message: `${projLabel} → ${newPhase.label}`, createdAt: now, read: false });
          if (recipients.length > 0) {
            const oldPct = getOverallCompletion(old);
            const newPct = getOverallCompletion(p);
            dispatchNotifications(recipients, `PCG Phase Change: ${projLabel} → ${newPhase.label}`,
              `<h3 style="color:#FF671F">Phase Change</h3>${projInfo}
              <div style="margin:12px 0;padding:12px 16px;background:#f8f8f8;border-radius:8px;font-size:14px">
                <span style="color:#999">${oldPhase.icon} ${oldPhase.label}</span>
                <span style="margin:0 8px;color:#FF671F;font-weight:bold">→</span>
                <span style="color:#111;font-weight:bold">${newPhase.icon} ${newPhase.label}</span>
              </div>
              <p style="font-size:13px;color:#666">Progress: ${oldPct}% → <strong>${newPct}%</strong></p>
              ${editedByHtml}
              ${projectEmailLink(p.id, projLabel)}`,
              `PCG: ${projLabel} phase → ${newPhase.label} (${newPct}%)`,
              users, `/?project=${p.id}`, `phase_${p.id}_${newPhase.id}`);
          }
        }

        // ── Checklist item changes ──
        const changes = [];
        for (const key of Object.keys(itemLabels)) {
          const info = itemLabels[key];
          if (old[key] !== p[key]) {
            if (info.type === "bool") {
              changes.push(`<tr><td style="padding:4px 8px;color:#666;font-size:13px">${info.phase} → ${info.label}</td><td style="padding:4px 8px;font-size:13px">${old[key] ? "✓ Done" : "○ Pending"} → <strong>${p[key] ? "✓ Done" : "○ Pending"}</strong></td></tr>`);
            } else {
              const oldVal = old[key] ? new Date(old[key]).toLocaleDateString() : "Not set";
              const newVal = p[key] ? new Date(p[key]).toLocaleDateString() : "Cleared";
              changes.push(`<tr><td style="padding:4px 8px;color:#666;font-size:13px">${info.phase} → ${info.label}</td><td style="padding:4px 8px;font-size:13px">${oldVal} → <strong>${newVal}</strong></td></tr>`);
            }
          }
        }
        if (changes.length > 0 && recipients.length > 0) {
          newNotifs.push({ id: mkId(), type: "checklist_update", projectId: p.id, projectName: projLabel, message: `${projLabel}: ${changes.length} item${changes.length > 1 ? "s" : ""} updated`, createdAt: now, read: false });
          const newPct = getOverallCompletion(p);
          dispatchNotifications(recipients, `PCG Project Update: ${projLabel} (${newPct}% complete)`,
            `<h3 style="color:#FF671F">Project Checklist Updated</h3>${projInfo}
            <table style="width:100%;border-collapse:collapse;margin-top:12px;border:1px solid #eee;border-radius:8px">
              <tr style="background:#f4f4f4"><th style="padding:8px;text-align:left;font-size:12px;color:#666">Item</th><th style="padding:8px;text-align:left;font-size:12px;color:#666">Change</th></tr>
              ${changes.join("")}
            </table>
            <p style="font-size:13px;color:#666;margin-top:12px">Overall Progress: <strong>${newPct}%</strong></p>
            ${editedByHtml}
            ${projectEmailLink(p.id, projLabel)}`,
            `PCG: ${projLabel} updated (${changes.length} item${changes.length > 1 ? "s" : ""}) — ${newPct}% complete`,
            users, `/?project=${p.id}`, `update_${p.id}_${Date.now()}`);
        }
      }
    }
    if (newNotifs.length > 0) setNotifications(prev => [...newNotifs, ...prev]);
    prevProjectsRef.current = projects;
  }, [projects]);

  // Collect all data into one object for export/import
  const getAllData = () => ({ links, notes, todos, users, stores, districts, contacts, vendors, dark, projects, notifications, dailyReports, globalNotifyEmails, chatChannels, chatMessages, chatReadState, announcements, announcementsDismissed });

  const handleExport = () => {
    exportData(getAllData());
    showAlert("success", "Data exported successfully!");
  };

  const handleImport = (file) => {
    importData(file, (parsed) => {
      if (parsed.links)    setLinks(parsed.links);
      if (parsed.notes)    setNotes(parsed.notes);
      if (parsed.todos)    setTodos(parsed.todos);
      if (parsed.users)    setUsers(parsed.users);
      if (parsed.stores)   setStores(parsed.stores);
      if (parsed.contacts) setContacts(parsed.contacts);
      if (parsed.vendors)  setVendors(parsed.vendors);
      if (parsed.projects) setProjectsUser(parsed.projects);
      if (parsed.notifications) setNotifications(parsed.notifications);
      if (parsed.dailyReports) setDailyReportsUser(parsed.dailyReports);
      if (parsed.globalNotifyEmails) setGlobalNotifyEmails(parsed.globalNotifyEmails);
      if (parsed.chatChannels) setChatChannels(parsed.chatChannels);
      if (parsed.chatMessages) setChatMessages(parsed.chatMessages);
      if (parsed.chatReadState) setChatReadState(parsed.chatReadState);
      if (parsed.announcements) setAnnouncements(parsed.announcements);
      if (parsed.announcementsDismissed) setAnnouncementsDismissed(parsed.announcementsDismissed);
      if (parsed.dark !== undefined) setDark(parsed.dark);
      showAlert("success", `Data imported from ${parsed.exportedAt ? new Date(parsed.exportedAt).toLocaleDateString() : "file"}`);
    }, (err) => {
      showAlert("error", "Import failed: " + err);
    });
  };

  const showAlert = (type, msg) => {
    setDataAlert({ type, msg });
    setTimeout(() => setDataAlert(null), 3500);
  };

  const handleToggle = useCallback(() => {
    const newDark = !dark;
    setLogoAnim(true);
    setTimeout(() => setLogoAnim(false), 750);
    const origin = logoRef.current || toggleBtnRef.current;
    if (origin) {
      const rect = origin.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top  + rect.height / 2;
      const overlay = spawnTransitionFX(cx, cy, newDark);
      setTimeout(() => { setDark(newDark); overlay.remove(); }, 350);
    } else {
      setDark(newDark);
    }
  }, [dark]);

  if (!user) return <Login onLogin={(u) => { const now = new Date().toISOString(); const updated = { ...u, lastLogin: now }; setUser(updated); setUsers(us => us.map(x => x.id === u.id ? { ...x, lastLogin: now } : x)); if (u.darkMode !== undefined) setDark(u.darkMode); if (u.userType === "vendor") setTab("projects"); }} dark={dark} users={users} toggleDark={() => {
    const newDark = !dark;
    setDark(newDark);
  }} />;

  // ── First-Login Setup ──────────────────────────────────────────────────────
  if (user.mustSetup) {
    return <FirstLoginSetup user={user} setUser={setUser} setUsers={setUsers} th={th} />;
  }

  // ── Kiosk: Pulse TV ─────────────────────────────────────────────────────────
  if (user.userType === "kiosk_pulse") {
    return (
      <div style={{ minHeight:"100vh", background:th.bg, transition:"background .3s" }}>
        {/* Lock button */}
        <button onClick={()=>setUser(null)} style={{
          position:"fixed", top:16, right:16, zIndex:100,
          background:th.card3, border:`1px solid ${th.cardBorder}`, borderRadius:"0.5rem",
          padding:"0.4rem 0.75rem", cursor:"pointer", display:"flex", alignItems:"center", gap:"0.375rem",
          color:th.muted, fontSize:"0.75rem", fontWeight:600, fontFamily:"'Source Sans 3'",
          transition:"opacity 0.3s", opacity:0.4
        }}
        onMouseEnter={e=>e.currentTarget.style.opacity=1}
        onMouseLeave={e=>e.currentTarget.style.opacity=0.4}>
          🔒 Lock
        </button>
        <div style={{ padding:"1.5rem 2rem" }}>
          <AdminPulse stores={stores} districts={districts} th={th} user={user} />
        </div>
      </div>
    );
  }

  // ── Kiosk: Upload Station ───────────────────────────────────────────────────
  if (user.userType === "kiosk_upload") {
    return (
      <div style={{ minHeight:"100vh", background:th.bg, transition:"background .3s", display:"flex", alignItems:"center", justifyContent:"center" }}>
        {/* Lock button */}
        <button onClick={()=>setUser(null)} style={{
          position:"fixed", top:16, right:16, zIndex:100,
          background:th.card3, border:`1px solid ${th.cardBorder}`, borderRadius:"0.5rem",
          padding:"0.4rem 0.75rem", cursor:"pointer", display:"flex", alignItems:"center", gap:"0.375rem",
          color:th.muted, fontSize:"0.75rem", fontWeight:600, fontFamily:"'Source Sans 3'",
          transition:"opacity 0.3s", opacity:0.4
        }}
        onMouseEnter={e=>e.currentTarget.style.opacity=1}
        onMouseLeave={e=>e.currentTarget.style.opacity=0.4}>
          🔒 Lock
        </button>
        <KioskUpload th={th} salesWeeks={salesWeeks} setSalesWeeks={setSalesWeeks} />
      </div>
    );
  }

  // Role flags — used in sidebar + content rendering guards
  const isOfficeStaff = user?.userType === "office_staff";
  const isDM          = user?.userType === "dm";
  const isConstruction = user?.userType === "construction";

  const SidebarContent = ({ onNav }) => (
    <>
      {/* Logo area */}
      <div style={{ padding: "24px 20px 12px", borderBottom: `1px solid ${th.sidebarBorder}` }}>
        <img
          ref={logoRef}
          src={LOGOS[th.logoSeal]}
          alt="People Capital Group"
          className={logoAnim ? "logo-transitioning" : ""}
          onClick={handleToggle}
          style={{ width: 80, height: 80, objectFit: "contain", display: "block", margin: "0 auto 10px", cursor: "pointer", transition: "filter 0.1s" }}
          title="Click to toggle theme"
        />
        <div style={{ textAlign: "center" }}>
          <div style={{ fontFamily: "'Raleway'", fontWeight: 800, fontSize:"0.75rem", color: th.text, lineHeight: 1.2, letterSpacing: 0.3 }}>PEOPLE CAPITAL GROUP</div>
          <div style={{ fontSize:"0.625rem", color: th.muted, letterSpacing: 0.5, marginTop:"0.125rem" }}>Company Portal</div>
        </div>
        {/* User card */}
        <div style={{ display: "flex", alignItems: "center", gap:"0.625rem", cursor:"pointer", padding:"0.5rem 0.625rem", borderRadius:"0.5rem", transition:"background 0.15s", marginTop:"0.75rem", background: th.card3 }}
          onClick={()=>setShowProfile(true)}
          onMouseEnter={e=>e.currentTarget.style.background=th.card2}
          onMouseLeave={e=>e.currentTarget.style.background=th.card3}>
          <div style={{ width: "2.25rem", height: "2.25rem", borderRadius: "50%", background: O, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize:"0.75rem", color: W, flexShrink: 0 }}>{user.initials}</div>
          <div style={{ overflow: "hidden", flex: 1, minWidth: 0 }}>
            <div style={{ display:"flex", alignItems:"center", gap:"0.3rem" }}>
              <span style={{ fontSize: "0.8125rem", fontWeight: 600, color: th.text, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{user.name}</span>
              {isFullAdmin(user) && <span style={{ fontSize:"0.55rem", fontWeight:700, padding:"0.05rem 0.35rem", borderRadius:"0.5rem", background:O+"22", color:O, letterSpacing:0.5, flexShrink:0 }}>{user.userType==="executive"?"EXEC":"IT"}</span>}
              {user.userType==="office_staff" && <span style={{ fontSize:"0.55rem", fontWeight:700, padding:"0.05rem 0.35rem", borderRadius:"0.5rem", background:"#8b5cf622", color:"#8b5cf6", letterSpacing:0.5, flexShrink:0 }}>OFFICE</span>}
              {user.userType==="dm" && <span style={{ fontSize:"0.55rem", fontWeight:700, padding:"0.05rem 0.35rem", borderRadius:"0.5rem", background:"#f59e0b22", color:"#f59e0b", letterSpacing:0.5, flexShrink:0 }}>D{user.district}</span>}
            </div>
            <div style={{ fontSize: "0.6875rem", color: th.muted }}>{user.role}</div>
          </div>
          <span style={{ fontSize: "0.75rem", color: th.muted, flexShrink: 0 }}>⚙️</span>
        </div>
        {/* User actions row */}
        <div style={{ display:"flex", alignItems:"center", gap:"0.375rem", marginTop:"0.5rem" }}>
          <div onClick={handleToggle} style={{
            width:32, height:18, borderRadius:"0.625rem", background: dark ? O : "#ccc",
            position:"relative", cursor:"pointer", transition:"background .25s", flexShrink:0
          }}>
            <div style={{
              position:"absolute", top:2.5, left: dark ? 16 : 2.5, width:13, height:13,
              borderRadius:"50%", background:"#fff", transition:"left .25s",
              boxShadow:"0 1px 3px #00000030"
            }} />
          </div>
          <span style={{ fontSize:"0.65rem", color:th.muted, flex:1 }}>{dark ? "Dark" : "Light"}</span>
          {(isFullAdmin(user) || isOfficeStaff) && (
            <>
              <button onClick={handleExport} title="Export data" style={{ padding:"0.3rem 0.5rem", background:th.card3, border:"none", borderRadius:"0.3rem", color:O, fontSize:"0.6rem", cursor:"pointer", fontFamily:"'Source Sans 3'", fontWeight:600 }}>⬇</button>
              <button onClick={()=>importRef.current?.click()} title="Import data" style={{ padding:"0.3rem 0.5rem", background:th.card3, border:"none", borderRadius:"0.3rem", color:O, fontSize:"0.6rem", cursor:"pointer", fontFamily:"'Source Sans 3'", fontWeight:600 }}>⬆</button>
            </>
          )}
          <button onClick={() => setUser(null)} style={{ padding:"0.3rem 0.625rem", background:th.card3, border:"none", borderRadius:"0.3rem", color: th.muted, fontSize:"0.65rem", cursor: "pointer", fontFamily: "'Source Sans 3'", fontWeight:600 }}>Sign Out</button>
        </div>
      </div>
      {/* Nav */}
      <div style={{ padding: "16px 12px", flex: 1, overflowY: "auto" }}>
        {BASE_TABS.map(t => (
          <button key={t.id} onClick={() => { setTab(t.id); onNav && onNav(); }} style={{
            display: "flex", alignItems: "center", gap:"0.625rem", width: "100%",
            padding: "0.75rem 1rem", borderRadius: "0.6rem", border: "none", cursor: "pointer",
            fontFamily: "'Source Sans 3'", fontSize:"0.875rem", fontWeight: tab === t.id ? 600 : 400,
            background: tab === t.id ? th.ob : "none",
            color: tab === t.id ? O : th.muted,
            transition: "all .15s", marginBottom:"0.25rem", textAlign: "left", position: "relative"
          }}>
            <span style={{ fontSize:"0.938rem" }}>{t.icon}</span> {t.label}
            {t.id === "chat" && chatUnreadCount > 0 && (
              <span style={{ marginLeft: "auto", minWidth: 20, height: 20, borderRadius: "1rem", background: "#ff4444", color: "#fff", fontSize: "0.625rem", fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", padding: "0 5px" }}>
                {chatUnreadCount > 99 ? "99+" : chatUnreadCount}
              </span>
            )}
            {t.id === "announcements" && (() => {
              const unread = announcements.filter(a => a.active && !announcementsDismissed[`${user.id}_${a.id}`]).length;
              return unread > 0 ? (
                <span style={{ marginLeft: "auto", minWidth: 20, height: 20, borderRadius: "1rem", background: O, color: "#fff", fontSize: "0.625rem", fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", padding: "0 5px" }}>
                  {unread}
                </span>
              ) : null;
            })()}
          </button>
        ))}
        {user?.userType === "dm" && (
          <>
            <div style={{ margin:"0.7rem 0.25rem 0.5rem", display:"flex", alignItems:"center", gap:"0.5rem" }}>
              <div style={{ flex:1, height:1, background:th.cardBorder }} />
              <span style={{ fontSize:"0.6rem", fontWeight:700, color:"#74c0fc", letterSpacing:1.5, textTransform:"uppercase" }}>My District</span>
              <div style={{ flex:1, height:1, background:th.cardBorder }} />
            </div>
            {getTabs(user).filter(t=>!["links","contacts","notes","todos","chat","announcements"].includes(t.id)).map(t => (
              <button key={t.id} onClick={() => { setTab(t.id); onNav && onNav(); }} style={{
                display:"flex", alignItems:"center", gap:"0.625rem", width:"100%",
                padding:"0.625rem 0.75rem", borderRadius:"0.5rem", border:"none", cursor:"pointer",
                fontFamily:"'Source Sans 3'", fontSize:"1rem", fontWeight: tab===t.id?600:400,
                background: tab===t.id ? "#74c0fc22" : "none",
                color: tab===t.id ? "#74c0fc" : th.muted,
                transition:"all .15s", marginBottom:"0.25rem", textAlign:"left"
              }}>
                <span style={{ fontSize:"0.938rem" }}>{t.icon}</span> {t.label}
              </button>
            ))}
          </>
        )}
        {user?.userType === "construction" && (
          <>
            <div style={{ margin:"0.7rem 0.25rem 0.5rem", display:"flex", alignItems:"center", gap:"0.5rem" }}>
              <div style={{ flex:1, height:1, background:th.cardBorder }} />
              <span style={{ fontSize:"0.6rem", fontWeight:700, color:"#fb923c", letterSpacing:1.5, textTransform:"uppercase" }}>Construction</span>
              <div style={{ flex:1, height:1, background:th.cardBorder }} />
            </div>
            {getTabs(user).filter(t=>!["links","contacts","notes","todos","chat","announcements"].includes(t.id)).map(t => (
              <button key={t.id} onClick={() => { setTab(t.id); onNav && onNav(); }} style={{
                display:"flex", alignItems:"center", gap:"0.625rem", width:"100%",
                padding:"0.625rem 0.75rem", borderRadius:"0.5rem", border:"none", cursor:"pointer",
                fontFamily:"'Source Sans 3'", fontSize:"1rem", fontWeight: tab===t.id?600:400,
                background: tab===t.id ? "#fb923c22" : "none",
                color: tab===t.id ? "#fb923c" : th.muted,
                transition:"all .15s", marginBottom:"0.25rem", textAlign:"left"
              }}>
                <span style={{ fontSize:"0.938rem" }}>{t.icon}</span> {t.label}
              </button>
            ))}
          </>
        )}
        {(isFullAdmin(user) || user?.userType === "office_staff") && (
          <>
            <div style={{ margin:"0.7rem 0.25rem 0.5rem", display:"flex", alignItems:"center", gap:"0.5rem" }}>
              <div style={{ flex:1, height:1, background:th.cardBorder }} />
              <span style={{ fontSize:"0.6rem", fontWeight:700, color:O, letterSpacing:1.5, textTransform:"uppercase" }}>{isFullAdmin(user) ? "Admin" : "Operations"}</span>
              <div style={{ flex:1, height:1, background:th.cardBorder }} />
            </div>
            {getTabs(user).filter(t=>!["links","contacts","notes","todos","announcements"].includes(t.id)).map(t => {
              const isGreen  = t.green;
              const isActive = tab === t.id;
              const C = isGreen ? '#00d084' : O;
              return (
                <button key={t.id} onClick={() => { setTab(t.id); onNav && onNav(); }} style={{
                  display:"flex", alignItems:"center", gap:"0.625rem", width:"100%",
                  padding:"0.625rem 0.75rem", borderRadius:"0.5rem", border:"none", cursor:"pointer",
                  fontFamily:"'Source Sans 3'", fontSize:"1rem", fontWeight: isActive?600:400,
                  background: isActive ? C+"22" : "none",
                  color: isActive ? C : isGreen ? '#00d08488' : th.muted,
                  transition:"all .15s", marginBottom:"0.25rem", textAlign:"left",
                  boxShadow: isActive && isGreen ? `0 0 12px ${C}44` : 'none',
                  position: 'relative',
                }}>
                  <span style={{ fontSize:"0.938rem",
                    filter: isGreen ? `drop-shadow(0 0 4px #00d084)` : 'none' }}>{t.icon}</span>
                  {t.label}
                  {isGreen && !isActive && (
                    <span style={{ marginLeft:'auto', width:6, height:6, borderRadius:'50%',
                      background:'#00d084', boxShadow:'0 0 6px #00d084',
                      animation:'pulseRing 2s ease-out infinite' }} />
                  )}
                </button>
              );
            })}
          </>
        )}
      </div>
      {/* Version */}
      <div style={{ padding:"0.5rem 1.25rem 0.75rem", textAlign:"center" }}>
        <span style={{ fontSize:"0.75rem", color: th.muted, letterSpacing:0.5 }}>Version: 3.14</span>
      </div>
    </>
  );

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: th.bg, transition: "background .3s" }}>

      {/* Desktop sidebar */}
      <div className="desktop-sidebar sidebar-drawer" style={{ width: "clamp(240px, 20vw, 360px)", background: th.sidebar, borderRight: `1px solid ${th.sidebarBorder}`, display: "flex", flexDirection: "column", flexShrink: 0, height: "100vh", overflow: "hidden" }}>
        <SidebarContent />
      </div>

      {/* Mobile drawer overlay */}
      {isMobile && drawerOpen && (
        <div className="sidebar-overlay" onClick={() => setDrawerOpen(false)} />
      )}

      {/* Mobile slide-out drawer */}
      {isMobile && (
        <div className="sidebar-drawer" style={{
          position: "fixed", top: 0, left: 0, height: "100vh", width: "clamp(260px, 20vw, 360px)", zIndex: 200,
          background: th.sidebar, borderRight: `1px solid ${th.sidebarBorder}`,
          display: "flex", flexDirection: "column",
          transform: drawerOpen ? "translateX(0)" : "translateX(-100%)",
          boxShadow: drawerOpen ? "4px 0 32px #00000040" : "none",
        }}>
          {/* Close button */}
          <button onClick={() => setDrawerOpen(false)} style={{
            position: "absolute", top: 14, right: 14, background: "none", border: "none",
            color: th.muted, fontSize:"1.375rem", cursor: "pointer", lineHeight: 1, zIndex: 1
          }}>×</button>
          <SidebarContent onNav={() => setDrawerOpen(false)} />
        </div>
      )}

      {/* Main content */}
      <div style={{ flex: 1, overflow: "auto", transition: "background .3s", paddingBottom: isMobile ? 64 : 0 }}>

        {/* Top bar */}
        <div className="mobile-topbar-padding" style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "1.4vw 5vw", background: th.headerBg, borderBottom: `1px solid ${th.headerBorder}`, position: "sticky", top: 0, zIndex: 10, transition: "background .3s, border .3s" }}>
          <div style={{ display: "flex", alignItems: "center", gap:"0.75rem" }}>
            {/* Hamburger — mobile only */}
            {isMobile && (
              <button onClick={() => setDrawerOpen(o => !o)} style={{
                background: "none", border: "none", cursor: "pointer", padding: 4,
                display: "flex", flexDirection: "column", gap:"0.312rem", color: th.text
              }}>
                <span style={{ display: "block", width: 22, height: 2, background: th.text, borderRadius:"0.125rem", transition: "all .2s" }} />
                <span style={{ display: "block", width: 22, height: 2, background: th.text, borderRadius:"0.125rem", transition: "all .2s" }} />
                <span style={{ display: "block", width: 22, height: 2, background: th.text, borderRadius:"0.125rem", transition: "all .2s" }} />
              </button>
            )}
            <div>
              <h1 style={{ fontFamily: "'Raleway'", fontWeight: 800, fontSize: isMobile ? 17 : 20, color: th.text, letterSpacing: -0.5 }}>
                {TABS.find(t => t.id === tab)?.icon} {TABS.find(t => t.id === tab)?.label}
              </h1>
              <p className="hide-mobile" style={{ color: th.muted, fontSize:"0.75rem", marginTop:"0.125rem" }}>
                {tab === "links" && "All your key resources in one place."}
                {tab === "notes" && "Personal notes — only visible to you when logged in."}
                {tab === "todos" && "Create tasks, assign to teammates, and track progress."}
                {tab === "projects" && "Track construction, remodels, and new store builds."}
                {tab === "announcements" && "Company-wide announcements and updates."}
              </p>
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
            {/* Notification bell */}
            {canViewProjects(user) && (
              <div style={{ position: "relative" }}>
                <button onClick={() => { setShowNotifs(s => !s); setShowChatPanel(false); }} style={{ background: "none", border: "none", cursor: "pointer", fontSize: "1.25rem", position: "relative", padding: 4 }}>
                  🔔
                  {notifications.filter(n => !n.read).length > 0 && (
                    <span style={{ position: "absolute", top: -2, right: -4, width: 18, height: 18, borderRadius: "50%", background: "#ff4444", color: "#fff", fontSize: "0.5625rem", fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center" }}>
                      {notifications.filter(n => !n.read).length}
                    </span>
                  )}
                </button>
                {showNotifs && (
                  <div style={{ position: "absolute", right: 0, top: "100%", marginTop: 8, width: 340, maxHeight: 400, overflow: "auto", ...card(th), padding: 0, boxShadow: "0 8px 32px #00000040", zIndex: 999 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0.75rem 1rem", borderBottom: `1px solid ${th.cardBorder}` }}>
                      <span style={{ fontWeight: 700, fontSize: "0.875rem", color: th.text }}>Notifications</span>
                      {notifications.some(n => !n.read) && (
                        <button onClick={() => setNotifications(ns => ns.map(n => ({ ...n, read: true })))} style={{ background: "none", border: "none", color: O, fontSize: "0.6875rem", cursor: "pointer", fontWeight: 600 }}>Mark all read</button>
                      )}
                    </div>
                    {notifications.length === 0 && <div style={{ padding: "1.5rem", textAlign: "center", color: th.muted, fontSize: "0.8125rem" }}>No notifications</div>}
                    {notifications.slice(0, 30).map(n => (
                      <div key={n.id} onClick={() => {
                        setNotifications(ns => ns.map(nn => nn.id === n.id ? { ...nn, read: true } : nn));
                        setTab("projects");
                        setShowNotifs(false);
                      }} style={{ padding: "0.625rem 1rem", borderBottom: `1px solid ${th.cardBorder}`, cursor: "pointer", background: n.read ? "transparent" : (O + "08") }}>
                        <div style={{ fontSize: "0.8125rem", color: th.text, fontWeight: n.read ? 400 : 600 }}>
                          {n.type === "phase_change" ? "🔄" : n.type === "deadline_approaching" ? "⏰" : n.type === "overdue" ? "🔴" : "🆕"} {n.message}
                        </div>
                        <div style={{ fontSize: "0.625rem", color: th.muted, marginTop: 2 }}>{new Date(n.createdAt).toLocaleString()}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
            {/* Chat quick-access icon */}
            <div style={{ position: "relative" }}>
              <button onClick={() => { setShowChatPanel(s => !s); setShowNotifs(false); setChatQuickReply({ channelId: null, text: "" }); }} style={{ background: "none", border: "none", cursor: "pointer", fontSize: "1.25rem", position: "relative", padding: 4 }}>
                💬
                {chatUnreadCount > 0 && (
                  <span style={{ position: "absolute", top: -2, right: -4, width: 18, height: 18, borderRadius: "50%", background: "#ff4444", color: "#fff", fontSize: "0.5625rem", fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center" }}>
                    {chatUnreadCount > 9 ? "9+" : chatUnreadCount}
                  </span>
                )}
              </button>
              {showChatPanel && (() => {
                const getChanName = (ch) => {
                  if (ch.type === "dm") { const other = users.find(u => u.id === ch.members?.find(id => id !== user.id)); return other ? other.name : "Unknown"; }
                  if (ch.type === "project") { const proj = projects.find(p => p.id === ch.projectId); return proj ? `🏗️ ${proj.nickname || proj.pc}` : ch.name; }
                  return ch.name || "Group Chat";
                };
                const getChanAvatar = (ch) => {
                  if (ch.type === "dm") { const other = users.find(u => u.id === ch.members?.find(id => id !== user.id)); return other ? other.initials : "?"; }
                  if (ch.type === "project") return "🏗️";
                  return "👥";
                };
                const panelChannels = chatChannels
                  .filter(ch => ch.members && ch.members.includes(user.id))
                  .map(ch => {
                    const chMsgs = chatMessages.filter(m => m.channelId === ch.id && !m.deleted);
                    const lastMsg = chMsgs.length > 0 ? chMsgs[chMsgs.length - 1] : null;
                    const lastRead = chatReadState[`${user.id}_${ch.id}`] || "1970-01-01";
                    const unread = chMsgs.filter(m => m.timestamp > lastRead && m.senderId !== user.id).length;
                    return { ...ch, lastMsg, unread, sortTs: lastMsg ? lastMsg.timestamp : ch.createdAt || "1970-01-01" };
                  })
                  .sort((a, b) => b.sortTs.localeCompare(a.sortTs));

                const handleQuickSend = () => {
                  const text = chatQuickReply.text.trim();
                  const chId = chatQuickReply.channelId;
                  if (!text || !chId) return;
                  const newMsg = { id: makeMsgId(), channelId: chId, senderId: user.id, senderName: user.name, senderInitials: user.initials, text, timestamp: new Date().toISOString(), attachments: [], deleted: false };
                  const updated = [...chatMessages, newMsg];
                  setChatMessages(updated);
                  cloudSave("pcg_chat_messages_v1", updated);
                  const readKey = `${user.id}_${chId}`;
                  const updatedRead = { ...chatReadState, [readKey]: newMsg.timestamp };
                  setChatReadState(updatedRead);
                  cloudSave("pcg_chat_read_v1", updatedRead);
                  setChatQuickReply({ channelId: chId, text: "" });
                };

                return (
                  <div style={{ position: "absolute", right: 0, top: "100%", marginTop: 8, width: 360, maxHeight: 480, overflow: "hidden", display: "flex", flexDirection: "column", ...card(th), padding: 0, boxShadow: "0 8px 32px #00000040", zIndex: 999 }}>
                    {/* Header */}
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0.75rem 1rem", borderBottom: `1px solid ${th.cardBorder}`, flexShrink: 0 }}>
                      <span style={{ fontWeight: 700, fontSize: "0.875rem", color: th.text }}>💬 Messages</span>
                      <button onClick={() => { setTab("chat"); setShowChatPanel(false); }} style={{ background: "none", border: "none", color: O, fontSize: "0.6875rem", cursor: "pointer", fontWeight: 600 }}>Open Chat →</button>
                    </div>
                    {/* Conversation list */}
                    <div style={{ flex: 1, overflow: "auto" }}>
                      {panelChannels.length === 0 && <div style={{ padding: "1.5rem", textAlign: "center", color: th.muted, fontSize: "0.8125rem" }}>No conversations yet</div>}
                      {panelChannels.map(ch => {
                        const isSelected = chatQuickReply.channelId === ch.id;
                        const avatarBg = ch.type === "dm" ? O + "22" : ch.type === "project" ? "#8b5cf622" : "#3b82f622";
                        const avatarColor = ch.type === "dm" ? O : ch.type === "project" ? "#8b5cf6" : "#3b82f6";
                        return (
                          <div key={ch.id}>
                            <div onClick={() => setChatQuickReply(prev => ({ channelId: prev.channelId === ch.id ? null : ch.id, text: prev.channelId === ch.id ? "" : prev.text }))}
                              style={{ padding: "0.625rem 1rem", borderBottom: `1px solid ${th.cardBorder}`, cursor: "pointer", background: isSelected ? (O + "10") : "transparent", display: "flex", alignItems: "center", gap: "0.625rem" }}>
                              <div style={{ width: 34, height: 34, borderRadius: "50%", background: avatarBg, color: avatarColor, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: ch.type === "dm" ? "0.625rem" : "0.875rem", flexShrink: 0 }}>
                                {getChanAvatar(ch)}
                              </div>
                              <div style={{ flex: 1, minWidth: 0 }}>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                  <span style={{ fontWeight: ch.unread > 0 ? 700 : 600, fontSize: "0.8125rem", color: th.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{getChanName(ch)}</span>
                                  {ch.lastMsg && <span style={{ fontSize: "0.5625rem", color: th.muted, flexShrink: 0, marginLeft: 8 }}>{new Date(ch.lastMsg.timestamp).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}</span>}
                                </div>
                                <div style={{ fontSize: "0.6875rem", color: th.muted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginTop: 2 }}>
                                  {ch.lastMsg ? (ch.lastMsg.senderId === user.id ? "You: " : "") + ch.lastMsg.text.substring(0, 40) + (ch.lastMsg.text.length > 40 ? "…" : "") : "No messages yet"}
                                </div>
                              </div>
                              {ch.unread > 0 && (
                                <span style={{ minWidth: 20, height: 20, borderRadius: "50%", background: O, color: "#fff", fontSize: "0.625rem", fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                                  {ch.unread > 9 ? "9+" : ch.unread}
                                </span>
                              )}
                            </div>
                            {/* Quick reply input */}
                            {isSelected && (
                              <div style={{ padding: "0.5rem 1rem 0.625rem", borderBottom: `1px solid ${th.cardBorder}`, background: th.card2, display: "flex", gap: "0.375rem", alignItems: "center" }}>
                                <input value={chatQuickReply.text} onChange={e => setChatQuickReply(prev => ({ ...prev, text: e.target.value }))}
                                  onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleQuickSend(); } }}
                                  placeholder="Quick reply..." autoFocus
                                  style={{ ...inp(th), flex: 1, fontSize: "0.8125rem", padding: "0.4rem 0.625rem" }} />
                                <button onClick={handleQuickSend} style={{ ...btn(th, { padding: "0.4rem 0.75rem", background: O, color: "#fff", fontSize: "0.75rem" }) }}>Send</button>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })()}
            </div>
            {/* Hidden file input for import — still accessible via sidebar */}
            <input ref={importRef} type="file" accept=".json" style={{ display:"none" }}
              onChange={e => { if (e.target.files[0]) { handleImport(e.target.files[0]); e.target.value=""; }}} />
          </div>
        </div>

        {/* Announcement modal on login */}
        {(() => {
          const pending = announcements.filter(a => a.active && !announcementsDismissed[`${user.id}_${a.id}`]);
          if (pending.length === 0) return null;
          return (
            <div style={{ position: "fixed", inset: 0, background: "#00000085", zIndex: 9999, display: "flex", alignItems: "center", justifyContent: "center", padding: "1.25rem" }} className="fade-in">
              <div style={{ ...card(th), width: "100%", maxWidth: 520, maxHeight: "85vh", overflow: "auto", borderRadius: "1rem", boxShadow: "0 16px 64px #00000060" }}>
                <div style={{ background: O, padding: "1.25rem 1.5rem", borderRadius: "1rem 1rem 0 0" }}>
                  <div style={{ fontWeight: 800, fontSize: "1.25rem", color: "#fff", fontFamily: "'Raleway'" }}>📢 Announcement{pending.length > 1 ? "s" : ""}</div>
                  <div style={{ fontSize: "0.75rem", color: "#ffffff99", marginTop: 2 }}>People Capital Group</div>
                </div>
                <div style={{ padding: "1.25rem 1.5rem" }}>
                  {pending.map((a, i) => (
                    <div key={a.id} style={{ marginBottom: i < pending.length - 1 ? "1.25rem" : 0, paddingBottom: i < pending.length - 1 ? "1.25rem" : 0, borderBottom: i < pending.length - 1 ? `1px solid ${th.cardBorder}` : "none" }}>
                      <div style={{ fontWeight: 700, fontSize: "1rem", color: th.text, marginBottom: "0.375rem" }}>{a.title}</div>
                      <div style={{ fontSize: "0.875rem", color: th.text, lineHeight: 1.6, whiteSpace: "pre-wrap" }}>{a.message}</div>
                      <div style={{ fontSize: "0.625rem", color: th.muted, marginTop: "0.5rem" }}>Posted {new Date(a.createdAt).toLocaleDateString()} by {a.createdBy}</div>
                    </div>
                  ))}
                </div>
                <div style={{ padding: "0 1.5rem 1.25rem", textAlign: "center" }}>
                  <button onClick={() => {
                    const updates = {};
                    pending.forEach(a => { updates[`${user.id}_${a.id}`] = true; });
                    setAnnouncementsDismissed(prev => ({ ...prev, ...updates }));
                  }} style={{ ...btn(th, { padding: "0.625rem 2.5rem", fontSize: "0.9375rem", background: O, color: "#fff", fontWeight: 700 }) }}>
                    Got it 👍
                  </button>
                </div>
              </div>
            </div>
          );
        })()}

        {/* Toast alert */}
        {dataAlert && (
          <div style={{
            position:"fixed", bottom:24, right:24, zIndex:9998,
            padding:"0.75rem 1.25rem", borderRadius:"0.625rem",
            background: dataAlert.type==="success" ? "#69db7c" : "#ff6b6b",
            color:"#111", fontFamily:"'Source Sans 3'", fontWeight:600, fontSize:"0.8125rem",
            boxShadow:"0 8px 32px #00000040",
            animation:"fadeIn .25s ease",
          }}>
            {dataAlert.type==="success" ? "✓" : "✕"} {dataAlert.msg}
          </div>
        )}

        <div className="main-content-padding" style={{ padding: "3vw 5vw" }}>
          {tab === "links"    && <LinksHub links={links} setLinks={setLinks} th={th} user={user} />}
          {tab === "contacts" && <ContactsPage contacts={contacts} setContacts={setContacts} vendors={vendors} setVendors={setVendors} isAdmin={isFullAdmin(user)} th={th} />}
          {tab === "notes"    && <Notes allNotes={notes} setAllNotes={setNotes} user={user} th={th} />}
          {tab === "todos"    && <Todos todos={todos} setTodos={setTodos} user={user} users={users} th={th} />}
          {tab === "locations" && (isFullAdmin(user) || isOfficeStaff || isDM || isConstruction) && <AdminLocations stores={stores} setStores={setStores} districts={districts} user={user} th={th} />}
          {tab === "districts" && isFullAdmin(user) && <AdminDistricts districts={districts} setDistricts={setDistricts} stores={stores} setStores={setStores} users={users} th={th} />}
          {tab === "users"     && (isFullAdmin(user) || user?.userType === "office_staff") && <AdminUsers users={users} setUsers={setUsers} currentUser={user} th={th} showAlert={showAlert} />}
          {tab === "analytics" && (isFullAdmin(user) || isOfficeStaff || isDM) && <AdminAnalytics stores={stores} users={users} districts={districts} th={th} salesWeeks={salesWeeks} setSalesWeeks={setSalesWeeks} cloudStatus={cloudStatus} user={user} />}
          {tab === "pulse"     && (isFullAdmin(user) || isOfficeStaff) && <AdminPulse stores={stores} districts={districts} th={th} user={user} />}
          {tab === "projects"  && canViewProjects(user) && <AdminProjects projects={projects} setProjects={setProjectsUser} stores={stores} districts={districts} user={user} th={th} showAlert={showAlert} notifications={notifications} setNotifications={setNotifications} setTab={setTab} dailyReports={dailyReports} setDailyReports={setDailyReportsUser} deepLinkRef={deepLinkRef} chatChannels={chatChannels} setChatChannels={setChatChannels} chatMessages={chatMessages} setChatMessages={setChatMessages} chatReadState={chatReadState} setChatReadState={setChatReadState} users={users} />}
          {tab === "settings"  && isFullAdmin(user) && <AdminSettings globalNotifyEmails={globalNotifyEmails} setGlobalNotifyEmails={setGlobalNotifyEmails} th={th} showAlert={showAlert} user={user} announcements={announcements} setAnnouncements={setAnnouncements} />}
          {tab === "chat" && <ChatSection user={user} users={users} projects={projects} channels={chatChannels} setChannels={setChatChannels} messages={chatMessages} setMessages={setChatMessages} readState={chatReadState} setReadState={setChatReadState} th={th} showAlert={showAlert} />}
          {tab === "announcements" && <AnnouncementsPage announcements={announcements} setAnnouncements={setAnnouncements} user={user} th={th} showAlert={showAlert} />}
        </div>
      </div>

      {/* Bottom nav — mobile only */}
      <div className="bottom-nav" style={{
        position: "fixed", bottom: 0, left: 0, right: 0, height: 60, zIndex: 100,
        background: th.sidebar, borderTop: `1px solid ${th.sidebarBorder}`,
        display: "flex", alignItems: "center", justifyContent: "space-around",
        transition: "background .3s, border .3s",
      }}>
        {BASE_TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            flex: 1, display: "flex", flexDirection: "column", alignItems: "center",
            gap:"0.188rem", background: "none", border: "none", cursor: "pointer",
            padding: "8px 0", color: tab === t.id ? O : th.muted,
            fontFamily: "'Source Sans 3'", fontSize:"0.625rem", fontWeight: tab === t.id ? 600 : 400,
            transition: "color .15s", position: "relative",
          }}>
            <span style={{ fontSize:"1.25rem" }}>{t.icon}</span>
            {t.label}
            {t.id === "chat" && chatUnreadCount > 0 && (
              <span style={{ position: "absolute", top: 2, right: "calc(50% - 18px)", width: 16, height: 16, borderRadius: "50%", background: "#ff4444", color: "#fff", fontSize: "0.5rem", fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center" }}>
                {chatUnreadCount > 9 ? "9+" : chatUnreadCount}
              </span>
            )}
          </button>
        ))}

      </div>

      {/* ── Profile Modal ── */}
      {showProfile && <ProfileModal user={user} setUser={setUser} setUsers={setUsers} th={th} onClose={()=>setShowProfile(false)} />}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PCGPortal />);
</script>
</body>
</html>
