          <button onClick={() => setDetailTab("checklist")} style={{ background: detailTab === "checklist" ? O : th.card, color: detailTab === "checklist" ? W : th.muted, border: "none", padding: "0.5rem 1rem", cursor: "pointer", fontSize: "0.8125rem", fontWeight: 600 }}>Checklist</button>
          <button onClick={() => setDetailTab("reports")} style={{ background: detailTab === "reports" ? O : th.card, color: detailTab === "reports" ? W : th.muted, border: "none", padding: "0.5rem 1rem", cursor: "pointer", fontSize: "0.8125rem", fontWeight: 600 }}>
            Daily Reports {dailyReports.filter(r => r.projectId === p.id).length > 0 && <span style={{ marginLeft: 4, background: detailTab === "reports" ? "#ffffff44" : O + "22", color: detailTab === "reports" ? "#fff" : O, padding: "0 6px", borderRadius: "1rem", fontSize: "0.625rem" }}>{dailyReports.filter(r => r.projectId === p.id).length}</span>}
          </button>
          <button onClick={() => {
            setDetailTab("chat");
            // Auto-create project channel if needed
            const projChId = `proj_${p.id}`;
            if (chatChannels && !chatChannels.find(ch => ch.id === projChId)) {
              setChatChannels(prev => [...prev, { id: projChId, type: "project", name: p.nickname || p.pc, members: (allUsers || []).filter(u => u.active).map(u => u.id), createdBy: user.id, createdAt: new Date().toISOString(), projectId: p.id }]);
            }
          }} style={{ background: detailTab === "chat" ? O : th.card, color: detailTab === "chat" ? W : th.muted, border: "none", padding: "0.5rem 1rem", cursor: "pointer", fontSize: "0.8125rem", fontWeight: 600 }}>
            💬 Chat
          </button>
          {p.driveFolder && (
            <a href={p.driveFolder} target="_blank" rel="noreferrer" style={{
              display: "flex", alignItems: "center", gap: "0.35rem",
              padding: "0.5rem 1rem", fontSize: "0.8125rem", fontWeight: 600,
              background: th.card, color: "#4285F4", border: "none", borderLeft: `1px solid ${th.cardBorder}`,
              textDecoration: "none", cursor: "pointer"
            }}
              onMouseEnter={e => { e.currentTarget.style.background = "#4285F418"; }}
              onMouseLeave={e => { e.currentTarget.style.background = th.card; }}>
              <svg width="14" height="12" viewBox="0 0 87.3 78" xmlns="http://www.w3.org/2000/svg">
                <path d="M6.6 66.85L3.15 60.35 28.8 15.1H58.2L6.6 66.85Z" fill="#0066DA"/>
                <path d="M43.65 25.05L28.8 15.1H58.2L87.3 66.85H56.6L43.65 25.05Z" fill="#00AC47"/>
                <path d="M27.55 78L0 78 28.8 15.1 43.65 25.05 27.55 78Z" fill="#EA4335"/>
                <path d="M43.65 25.05L56.6 66.85H87.3L58.2 15.1H28.8L43.65 25.05Z" fill="#00832D"/>
                <path d="M27.55 78L43.65 25.05L56.6 66.85H87.3L84.15 72.8 56.6 78H27.55Z" fill="#2684FC"/>
                <path d="M0 78L27.55 78L43.65 25.05L28.8 15.1L0 78Z" fill="#FFBA00"/>
              </svg>
              Project Folder ↗
            </a>
          )}
        </div>

        {/* Daily Reports section */}
        {detailTab === "reports" && (
          <DailyReportSection project={p} dailyReports={dailyReports} setDailyReports={setDailyReports} user={user} th={th} showAlert={showAlert} editable={editable} />
        )}

        {/* Project Chat section */}
        {detailTab === "chat" && chatChannels && setChatChannels && (
          <ChatSection user={user} users={allUsers || []} projects={projects} channels={chatChannels} setChannels={setChatChannels} messages={chatMessages || []} setMessages={setChatMessages} readState={chatReadState || {}} setReadState={setChatReadState} th={th} showAlert={showAlert} initialChannelId={`proj_${p.id}`} />
        )}

        {/* Phase sections with checklists */}
        {detailTab === "checklist" && PROJECT_PHASES.map(phase => {
          const { done, total, pct } = getPhaseCompletion(p, phase);
          return (
            <div key={phase.id} style={{ ...card(th), padding: "1.25rem", marginBottom: "1rem" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "0.75rem" }}>
                <div style={{ display: "flex", alignItems: "center", gap: "0.5rem" }}>
                  <span style={{ fontSize: "1.125rem" }}>{phase.icon}</span>
                  <span style={{ fontWeight: 700, fontSize: "1rem", color: th.text }}>{phase.label}</span>
                </div>
                <span style={{ fontSize: "0.75rem", fontWeight: 600, color: pct === 100 ? "#22c55e" : phase.color }}>{done}/{total}</span>
              </div>
              <div style={{ height: 6, borderRadius: 3, background: th.card3, marginBottom: "1rem" }}>
                <div style={{ height: "100%", borderRadius: 3, width: pct + "%", background: pct === 100 ? "#22c55e" : phase.color, transition: "width .3s" }} />
              </div>
              <div style={{ display: "grid", gap: "0.5rem" }}>
                {phase.items.map(item => {
                  const isNA = p[item.key] === "na";
                  return (
                  <div key={item.key} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0.5rem 0.75rem", borderRadius: "0.5rem", background: isNA ? (th.card3 || th.card2) : th.card2, opacity: isNA ? 0.55 : 1, transition: "opacity .2s" }}>
                    <span style={{ fontSize: "0.8125rem", color: th.text, textDecoration: isNA ? "line-through" : "none" }}>{item.label}</span>
                    <div style={{ display: "flex", alignItems: "center", gap: "0.5rem" }}>
                    {item.type === "bool" ? (
                      <>
                        {!isNA && (
                          <label style={{ display: "flex", alignItems: "center", gap: "0.375rem", cursor: editable ? "pointer" : "default" }}>
                            <input type="checkbox" checked={!!p[item.key] && p[item.key] !== "na"} onChange={e => updateItem(p.id, item.key, e.target.checked)} disabled={!editable}
                              style={{ accentColor: phase.color, width: 18, height: 18 }} />
                            <span style={{ fontSize: "0.75rem", color: p[item.key] ? "#22c55e" : th.muted, fontWeight: 600 }}>{p[item.key] ? "Done" : "Pending"}</span>
                          </label>
                        )}
                        {isNA && <span style={{ fontSize: "0.7rem", fontWeight: 600, color: th.muted }}>N/A</span>}
                        {editable && (
                          <button onClick={() => updateItem(p.id, item.key, isNA ? false : "na")}
                            style={{ background: isNA ? "#f59e0b33" : th.card3, border: "none", borderRadius: "0.375rem", padding: "0.2rem 0.5rem", fontSize: "0.625rem", fontWeight: 700, color: isNA ? "#f59e0b" : th.muted, cursor: "pointer", letterSpacing: 0.5 }}>
                            {isNA ? "Undo" : "N/A"}
                          </button>
                        )}
                      </>
                    ) : (
                      <div style={{ display: "flex", alignItems: "center", gap: "0.375rem" }}>
                        <input type="date" value={(p[item.key] && p[item.key] !== "na") ? p[item.key] : ""} onChange={e => updateItem(p.id, item.key, e.target.value)} disabled={!editable}
                          style={{ ...inp(th, { width: "auto", padding: "0.312rem 0.5rem", fontSize: "0.75rem", maxWidth: 160 }) }} />
                        {p[item.key] && p[item.key] !== "na" && <span style={{ color: "#22c55e", fontWeight: 700, fontSize: "0.75rem" }}>✓</span>}
                      </div>
                    )}
                    </div>
                  </div>
                  );
                })}
              </div>
            </div>
          );
        })}

        {/* Notes */}
        {detailTab === "checklist" && (
        <div style={{ ...card(th), padding: "1.25rem" }}>
          <div style={{ fontWeight: 700, fontSize: "0.875rem", color: th.text, marginBottom: "0.5rem" }}>Notes</div>
          {editable ? (
            <textarea value={p.notes || ""} onChange={e => updateItem(p.id, "notes", e.target.value)} placeholder="Add notes..."
              style={{ ...inp(th, { minHeight: 80, resize: "vertical" }) }} />
          ) : (
            <p style={{ fontSize: "0.8125rem", color: th.muted }}>{p.notes || "No notes."}</p>
          )}
        </div>
        )}
      </div>
    );
  }

  // ── Table + Board Views ──
  return (
    <div className="fade-in">
      {/* Toolbar */}
      <div style={{ display: "flex", gap: "0.75rem", marginBottom: "1.25rem", alignItems: "center", flexWrap: "wrap" }}>
        <input style={{ ...inp(th), maxWidth: 220 }} placeholder="🔍 Search PC#, name, address..." value={search} onChange={e => setSearch(e.target.value)} />
        <select style={{ ...inp(th, { width: "auto", maxWidth: 150 }) }} value={filterType} onChange={e => setFilterType(e.target.value)}>
          <option value="All">All Types</option>
          <option>Remodel</option><option>Relocation</option><option>New Location</option>
        </select>
        <select style={{ ...inp(th, { width: "auto", maxWidth: 170 }) }} value={filterPhase} onChange={e => setFilterPhase(e.target.value)}>
          <option value="All">All Phases</option>
          {ALL_PHASES.map(ph => <option key={ph.id} value={ph.id}>{ph.label}</option>)}
        </select>
        {/* View toggle */}
        <div style={{ display: "flex", borderRadius: "0.5rem", overflow: "hidden", border: `1px solid ${th.cardBorder}` }}>
          <button onClick={() => setView("table")} style={{ background: view === "table" ? O : th.card, color: view === "table" ? W : th.muted, border: "none", padding: "0.4rem 0.75rem", cursor: "pointer", fontSize: "0.75rem", fontWeight: 600 }}>☰ Table</button>
          <button onClick={() => setView("board")} style={{ background: view === "board" ? O : th.card, color: view === "board" ? W : th.muted, border: "none", padding: "0.4rem 0.75rem", cursor: "pointer", fontSize: "0.75rem", fontWeight: 600 }}>⊞ Board</button>
        </div>
        {editable && view === "table" && (
          <button onClick={() => { setReorderLocked(l => !l); if (reorderLocked) { setSortCol("priority"); setSortDir("asc"); } }}
            title={reorderLocked ? "Unlock to reorder projects by dragging" : "Lock project order"}
            style={{ background: reorderLocked ? th.card3 : O+"22", border: reorderLocked ? `1px solid ${th.cardBorder}` : `1px solid ${O}`, borderRadius: "0.5rem", padding: "0.4rem 0.75rem", cursor: "pointer", fontSize: "0.75rem", fontWeight: 600, color: reorderLocked ? th.muted : O, display: "flex", alignItems: "center", gap: "0.3rem" }}>
            {reorderLocked ? "🔒" : "🔓"} {reorderLocked ? "Reorder" : "Reordering..."}
          </button>
        )}
        {editable && (
          <button style={btn(th)} onClick={() => { setAddMode(a => !a); setEditId(null); setForm({ ...EMPTY_PROJECT }); setManualAddr(false); }}>
            {addMode && !editId ? "✕ Cancel" : "+ Add Project"}
          </button>
        )}
      </div>

      {/* KPI summary */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(120px, 1fr))", gap: "0.625rem", marginBottom: "1.25rem" }}>
        {[
          { label: "Total", value: filtered.length, color: O, phase: "All" },
          { label: "Pre-Const", value: (phaseGroups.pre_construction || []).length, color: "#3b82f6", phase: "pre_construction" },
          { label: "Equipment", value: (phaseGroups.equipment_ordering || []).length, color: "#f59e0b", phase: "equipment_ordering" },
          { label: "Construction", value: (phaseGroups.construction || []).length, color: "#8b5cf6", phase: "construction" },
          { label: "Complete", value: (phaseGroups.complete || []).length, color: "#22c55e", phase: "complete" },
        ].map(k => (
          <div key={k.label} onClick={() => setFilterPhase(filterPhase === k.phase ? "All" : k.phase)}
            style={{ ...card(th), padding: "0.75rem", textAlign: "center", cursor: "pointer", border: filterPhase === k.phase ? `2px solid ${k.color}` : `1px solid ${th.cardBorder}`, transition: "border .15s" }}>
            <div style={{ fontSize: "1.375rem", fontWeight: 800, color: k.color }}>{k.value}</div>
            <div style={{ fontSize: "0.625rem", color: th.muted, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>{k.label}</div>
          </div>
        ))}
      </div>

      {/* Add/Edit form */}
      {addMode && (
        <div style={{ ...card(th), padding: "1.25rem", marginBottom: "1.5rem", border: `1px solid ${O}44` }} className="fade-in">
          <div style={{ fontSize: "0.8125rem", fontWeight: 600, color: O, marginBottom: "1rem", textTransform: "uppercase", letterSpacing: 1 }}>{editId ? "Edit Project" : "New Project"}</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "0.75rem", marginBottom: "0.75rem" }}>
            <div><label style={{ fontSize: "0.6875rem", color: th.muted, fontWeight: 600 }}>PC#</label><input style={inp(th)} placeholder="e.g. 342144" value={form.pc} onChange={e => setForm(f => ({ ...f, pc: e.target.value }))} onBlur={handlePcBlur} /></div>
            <div><label style={{ fontSize: "0.6875rem", color: th.muted, fontWeight: 600 }}>Nickname</label><input style={inp(th)} placeholder="Store name" value={form.nickname} onChange={e => setForm(f => ({ ...f, nickname: e.target.value }))} /></div>
            <div><label style={{ fontSize: "0.6875rem", color: th.muted, fontWeight: 600 }}>Type</label><select style={inp(th)} value={form.type} onChange={e => setForm(f => ({ ...f, type: e.target.value }))}>
              <option>Remodel</option><option>Relocation</option><option>New Location</option>
            </select></div>
            <div><label style={{ fontSize: "0.6875rem", color: th.muted, fontWeight: 600 }}>Priority</label><input type="number" style={inp(th)} placeholder="1" value={form.priority || ""} onChange={e => setForm(f => ({ ...f, priority: parseInt(e.target.value) || 0 }))} /></div>
            <div><label style={{ fontSize: "0.6875rem", color: th.muted, fontWeight: 600 }}>Due Date</label><input type="date" style={inp(th)} value={form.dueDate} onChange={e => setForm(f => ({ ...f, dueDate: e.target.value }))} /></div>
            <div><label style={{ fontSize: "0.6875rem", color: th.muted, fontWeight: 600 }}>Target Completion</label><input type="date" style={inp(th)} value={form.completionDate} onChange={e => setForm(f => ({ ...f, completionDate: e.target.value }))} /></div>
          </div>
          {(manualAddr || !stores.find(s => s.pc === form.pc)) && form.pc && (
            <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 0.5fr 0.75fr", gap: "0.75rem", marginBottom: "0.75rem" }} className="fade-in">
              <div><label style={{ fontSize: "0.6875rem", color: th.muted, fontWeight: 600 }}>Address</label><input style={inp(th)} placeholder="Street address" value={form.address} onChange={e => setForm(f => ({ ...f, address: e.target.value }))} /></div>
              <div><label style={{ fontSize: "0.6875rem", color: th.muted, fontWeight: 600 }}>City</label><input style={inp(th)} value={form.city} onChange={e => setForm(f => ({ ...f, city: e.target.value }))} /></div>
              <div><label style={{ fontSize: "0.6875rem", color: th.muted, fontWeight: 600 }}>State</label><input style={inp(th)} value={form.state} onChange={e => setForm(f => ({ ...f, state: e.target.value }))} /></div>
              <div><label style={{ fontSize: "0.6875rem", color: th.muted, fontWeight: 600 }}>Zip</label><input style={inp(th)} value={form.zip} onChange={e => setForm(f => ({ ...f, zip: e.target.value }))} /></div>
            </div>
          )}
          {stores.find(s => s.pc === form.pc) && form.pc && (
            <div style={{ fontSize: "0.75rem", color: "#22c55e", marginBottom: "0.75rem", fontWeight: 600 }}>✓ Linked to store: {stores.find(s => s.pc === form.pc)?.address}</div>
          )}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0.75rem", marginBottom: "0.75rem" }}>
            <div><label style={{ fontSize: "0.6875rem", color: th.muted, fontWeight: 600 }}>Notify Emails (comma-separated)</label><input style={inp(th)} placeholder="user@example.com" value={form.notifyEmails} onChange={e => setForm(f => ({ ...f, notifyEmails: e.target.value }))} /></div>
            <div><label style={{ fontSize: "0.6875rem", color: th.muted, fontWeight: 600 }}>Google Drive Folder URL</label><input style={inp(th)} placeholder="https://drive.google.com/drive/folders/..." value={form.driveFolder || ""} onChange={e => setForm(f => ({ ...f, driveFolder: e.target.value }))} /></div>
            <div><label style={{ fontSize: "0.6875rem", color: th.muted, fontWeight: 600 }}>Notes</label><input style={inp(th)} placeholder="Optional notes" value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} /></div>
          </div>
          <div style={{ display: "flex", gap: "0.625rem" }}>
            <button style={btn(th)} onClick={save}>{editId ? "Save Changes" : "Create Project"}</button>
            <button style={btn(th, { background: th.card3, color: th.muted })} onClick={() => { setAddMode(false); setEditId(null); }}>Cancel</button>
          </div>
        </div>
      )}

      {/* ── TABLE VIEW ── */}
      {view === "table" && (
        <div style={{ ...card(th), overflow: "hidden" }}>
          <div className="projects-table-wrap" style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: "'Source Sans 3'", fontSize: "0.8125rem" }}>
              <thead>
                <tr style={{ background: th.card2, borderBottom: `1px solid ${th.cardBorder}` }}>
                  {[
                    { col: "priority", label: "#", w: 40 },
                    { col: "nickname", label: "Project", w: null },
                    { col: "type", label: "Type", w: 100 },
                    { col: "pc", label: "PC#", w: 70 },
                    { col: "phase", label: "Current Phase", w: 160 },
                    { col: "progress", label: "Progress", w: 150 },
                    { col: "dueDate", label: "Due Date", w: 100 },
                  ].map(h => (
                    <th key={h.col} onClick={() => toggleSort(h.col)} style={{ padding: "0.625rem 0.75rem", textAlign: "left", fontWeight: 600, fontSize: "0.6875rem", color: th.muted, textTransform: "uppercase", letterSpacing: 0.5, cursor: "pointer", whiteSpace: "nowrap", width: h.w || "auto", userSelect: "none" }}>
                      {h.label}<SortIcon col={h.col} />
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {sorted.length === 0 && (
                  <tr><td colSpan={7} style={{ padding: "2rem", textAlign: "center", color: th.muted }}>No projects found.</td></tr>
                )}
                {sorted.map((p, i) => {
                  const overall = getOverallCompletion(p);
                  const phase = getCurrentPhase(p);
                  const phaseColor = PHASE_COLORS[phase.id] || "#666";
                  const isOverdue = p.dueDate && !p.completionDate && new Date(p.dueDate) < new Date();
                  const isDragTarget = !reorderLocked && dragOverIdx === i && dragIdx !== i;
                  return (
                    <tr key={p.id} onClick={() => { if (!reorderLocked) return; setSelectedProject(p); setView("detail"); }}
                      draggable={!reorderLocked}
                      onDragStart={e => { if (reorderLocked) return; setDragIdx(i); e.dataTransfer.effectAllowed = "move"; e.currentTarget.style.opacity = "0.4"; }}
                      onDragEnd={e => { e.currentTarget.style.opacity = "1"; setDragIdx(null); setDragOverIdx(null); }}
                      onDragOver={e => { if (reorderLocked) return; e.preventDefault(); e.dataTransfer.dropEffect = "move"; setDragOverIdx(i); }}
                      onDragLeave={() => { if (dragOverIdx === i) setDragOverIdx(null); }}
                      onDrop={e => {
                        e.preventDefault();
                        if (reorderLocked || dragIdx === null || dragIdx === i) return;
                        const reordered = [...sorted];
                        const [moved] = reordered.splice(dragIdx, 1);
                        reordered.splice(i, 0, moved);
                        // Update priority for all reordered projects
                        const updates = new Map();
                        reordered.forEach((proj, idx) => { updates.set(proj.id, idx + 1); });
                        setProjects(ps => ps.map(proj => updates.has(proj.id) ? { ...proj, priority: updates.get(proj.id), updatedAt: new Date().toISOString(), lastEditedBy: user?.name || "Unknown", lastEditedAt: new Date().toISOString() } : proj));
                        setDragIdx(null);
                        setDragOverIdx(null);
                      }}
                      style={{ borderBottom: `1px solid ${th.cardBorder}`, cursor: reorderLocked ? "pointer" : "grab", transition: "background .1s, border-top .15s", borderTop: isDragTarget && dragIdx > i ? `2px solid ${O}` : "none", borderBottom: isDragTarget && dragIdx < i ? `2px solid ${O}` : `1px solid ${th.cardBorder}`, opacity: dragIdx === i ? 0.4 : 1 }}
                      onMouseEnter={e => { if (reorderLocked) e.currentTarget.style.background = th.card2; }}
                      onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                      <td style={{ padding: "0.625rem 0.75rem", color: th.muted, fontWeight: 600 }}>
                        {!reorderLocked && <span style={{ cursor: "grab", marginRight: "0.3rem", opacity: 0.5 }}>⠿</span>}
                        {p.priority || "—"}
                      </td>
                      <td style={{ padding: "0.625rem 0.75rem" }}>
                        <div style={{ fontWeight: 600, color: th.text }}>{p.nickname || p.pc}</div>
                        <div style={{ fontSize: "0.6875rem", color: th.muted }}>{p.address ? p.address.split("\n")[0] : ""}{p.city ? `, ${p.city}` : ""}</div>
                      </td>
                      <td style={{ padding: "0.625rem 0.75rem" }}>
                        <span style={{ padding: "0.125rem 0.5rem", borderRadius: "1rem", fontSize: "0.6875rem", fontWeight: 600, background: (TYPE_COLORS[p.type] || "#666") + "22", color: TYPE_COLORS[p.type] || "#666", whiteSpace: "nowrap" }}>{p.type}</span>
                      </td>
                      <td style={{ padding: "0.625rem 0.75rem", color: th.muted, fontFamily: "monospace", fontSize: "0.75rem" }}>{p.pc}</td>
                      <td style={{ padding: "0.625rem 0.75rem" }}>
                        <span style={{ padding: "0.125rem 0.5rem", borderRadius: "1rem", fontSize: "0.6875rem", fontWeight: 600, background: phaseColor + "22", color: phaseColor, whiteSpace: "nowrap" }}>{phase.icon} {phase.label}</span>
                      </td>
                      <td style={{ padding: "0.625rem 0.75rem", minWidth: 130 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: "0.5rem" }}>
                          <div style={{ flex: 1, height: 6, borderRadius: 3, background: th.card3 }}>
                            <div style={{ height: "100%", borderRadius: 3, width: overall + "%", background: overall === 100 ? "#22c55e" : O, transition: "width .3s" }} />
                          </div>
                          <span style={{ fontSize: "0.6875rem", fontWeight: 700, color: overall === 100 ? "#22c55e" : th.text, minWidth: 32, textAlign: "right" }}>{overall}%</span>
                        </div>
                      </td>
                      <td style={{ padding: "0.625rem 0.75rem", whiteSpace: "nowrap" }}>
                        {isOverdue ? (
                          <span style={{ fontSize: "0.6875rem", fontWeight: 700, color: "#ff4444" }}>OVERDUE</span>
                        ) : p.dueDate ? (
                          <span style={{ fontSize: "0.8125rem", color: th.muted }}>{new Date(p.dueDate).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}</span>
                        ) : <span style={{ color: th.muted }}>—</span>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* ── BOARD VIEW ── */}
      {view === "board" && (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "1rem" }} className="projects-board">
          {ALL_PHASES.map(phase => (
            <div key={phase.id}>
              <div style={{ display: "flex", alignItems: "center", gap: "0.375rem", marginBottom: "0.75rem" }}>
                <span style={{ fontSize: "1rem" }}>{phase.icon}</span>
                <span style={{ fontWeight: 700, fontSize: "0.8125rem", color: th.text }}>{phase.label}</span>
                <span style={{ fontSize: "0.6875rem", background: phase.color + "22", color: phase.color, padding: "0.125rem 0.5rem", borderRadius: "1rem", fontWeight: 600 }}>{(phaseGroups[phase.id] || []).length}</span>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: "0.625rem", minHeight: 80 }}>
                {(phaseGroups[phase.id] || []).map(p => {
                  const overall = getOverallCompletion(p);
                  const isOverdue = p.dueDate && !p.completionDate && new Date(p.dueDate) < new Date();
                  const phaseComp = phase.id !== "complete" ? getPhaseCompletion(p, phase) : null;
                  return (
                    <div key={p.id} onClick={() => { setSelectedProject(p); setView("detail"); }}
                      style={{ ...card(th), padding: "0.875rem", cursor: "pointer", borderLeft: `3px solid ${TYPE_COLORS[p.type] || "#666"}`, transition: "box-shadow .15s" }}
                      onMouseEnter={e => e.currentTarget.style.boxShadow = "0 4px 16px #00000020"}
                      onMouseLeave={e => e.currentTarget.style.boxShadow = "none"}>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "0.312rem" }}>
                        <span style={{ fontWeight: 700, fontSize: "0.8125rem", color: th.text }}>{p.nickname || p.pc}</span>
                        <span style={{ padding: "0.125rem 0.4rem", borderRadius: "0.75rem", fontSize: "0.5625rem", fontWeight: 600, background: (TYPE_COLORS[p.type] || "#666") + "22", color: TYPE_COLORS[p.type] || "#666" }}>{p.type}</span>
                      </div>
                      {p.pc && <div style={{ fontSize: "0.6875rem", color: th.muted }}>PC# {p.pc}</div>}
                      <div style={{ height: 5, borderRadius: 3, background: th.card3, margin: "0.375rem 0 0.25rem" }}>
                        <div style={{ height: "100%", borderRadius: 3, width: overall + "%", background: overall === 100 ? "#22c55e" : O, transition: "width .3s" }} />
                      </div>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: "0.625rem", color: th.muted }}>
                        <span>{overall}%{phaseComp ? ` · ${phaseComp.done}/${phaseComp.total}` : ""}</span>
                        {isOverdue && <span style={{ color: "#ff4444", fontWeight: 700 }}>OVERDUE</span>}
                        {!isOverdue && p.dueDate && <span>{new Date(p.dueDate).toLocaleDateString("en-US", { month: "short", day: "numeric" })}</span>}
                      </div>
                    </div>
                  );
                })}
                {(phaseGroups[phase.id] || []).length === 0 && (
                  <div style={{ padding: "1.5rem", textAlign: "center", fontSize: "0.75rem", color: th.muted, border: `1px dashed ${th.cardBorder}`, borderRadius: "0.75rem" }}>No projects</div>
                )}
              </div>
            </div>
          ))}
        </div>
      )}

      <style>{`
        @media (max-width: 768px) {
          .projects-board { grid-template-columns: 1fr !important; }
        }
      `}</style>
    </div>
  );
}


// ── Admin: Settings ───────────────────────────────────────────────────────
function AdminSettings({ globalNotifyEmails, setGlobalNotifyEmails, th, showAlert, user, announcements, setAnnouncements }) {
  const [newEmail, setNewEmail] = useState("");

  const addEmail = () => {
    const email = newEmail.trim().toLowerCase();
    if (!email || !email.includes("@")) { showAlert("error", "Enter a valid email"); return; }
    if (globalNotifyEmails.map(e => e.toLowerCase()).includes(email)) { showAlert("error", "Email already in list"); return; }
    setGlobalNotifyEmails(prev => [...prev, newEmail.trim()]);
    setNewEmail("");
    showAlert("success", "Email added to global notify list");
  };

  const removeEmail = (idx) => {
    setGlobalNotifyEmails(prev => prev.filter((_, i) => i !== idx));
    showAlert("success", "Email removed");
  };

  return (
    <div className="fade-in">
      <div style={{ fontFamily: "'Raleway'", fontWeight: 800, fontSize: "1.25rem", color: th.text, marginBottom: "0.25rem" }}>⚙️ Settings</div>
      <div style={{ color: th.muted, fontSize: "0.8125rem", marginBottom: "1.5rem" }}>System configuration and notification settings.</div>

      {/* Global Notify List */}
      <div style={{ ...card(th), padding: "1.5rem", marginBottom: "1.25rem" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "0.5rem", marginBottom: "0.25rem" }}>
          <span style={{ fontSize: "1.125rem" }}>📧</span>
          <span style={{ fontWeight: 700, fontSize: "1rem", color: th.text }}>Global Project Notifications</span>
        </div>
        <p style={{ fontSize: "0.8125rem", color: th.muted, marginBottom: "1rem" }}>
          These email addresses receive notifications for <strong>all projects</strong> — phase changes, new projects, deadline alerts, and checklist updates.
          Individual projects can also have their own additional notify emails.
        </p>

        {/* Current list */}
        <div style={{ display: "grid", gap: "0.5rem", marginBottom: "1rem" }}>
          {globalNotifyEmails.length === 0 && (
            <div style={{ padding: "1rem", textAlign: "center", color: th.muted, fontSize: "0.8125rem", border: `1px dashed ${th.cardBorder}`, borderRadius: "0.5rem" }}>No global notify emails configured.</div>
          )}
          {globalNotifyEmails.map((email, idx) => (
            <div key={idx} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0.625rem 0.875rem", background: th.card2, borderRadius: "0.5rem" }}>
              <div style={{ display: "flex", alignItems: "center", gap: "0.5rem" }}>
                <span style={{ width: 32, height: 32, borderRadius: "50%", background: O + "22", color: O, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "0.75rem", fontWeight: 700 }}>
                  {email.charAt(0).toUpperCase()}
                </span>
                <span style={{ fontSize: "0.875rem", color: th.text, fontWeight: 500 }}>{email}</span>
              </div>
              <button onClick={() => removeEmail(idx)} style={{ background: "#ff444422", color: "#ff4444", border: "none", borderRadius: "0.375rem", padding: "0.3rem 0.6rem", cursor: "pointer", fontSize: "0.75rem", fontWeight: 600 }}>Remove</button>
            </div>
          ))}
        </div>

        {/* Add new */}
        <div style={{ display: "flex", gap: "0.5rem" }}>
          <input style={{ ...inp(th), flex: 1 }} placeholder="email@example.com" value={newEmail} onChange={e => setNewEmail(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter") addEmail(); }} />
          <button onClick={addEmail} style={btn(th, { padding: "0.5rem 1.25rem", fontSize: "0.8125rem" })}>+ Add</button>
        </div>
      </div>

      {/* Test Notifications */}
      {user?.username === "mike.bahm" && (() => {
        const [testStatus, setTestStatus] = React.useState(null);
        const [testPhone, setTestPhone] = React.useState(user.phone || "");
        const [testEmail, setTestEmail] = React.useState(user.email || "");

        const sendTestSMS = async () => {
          if (!testPhone) { showAlert("error", "Enter a phone number first"); return; }
          setTestStatus("sending_sms");
          try {
            const digits = testPhone.replace(/\D/g, "");
            const res = await fetch('/.netlify/functions/sms', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ to: [digits], message: "PCG Portal Test: SMS notifications are working! 🎉" }),
            });
            const data = await res.json();
            if (res.ok) { setTestStatus("sms_ok"); showAlert("success", "Test SMS sent!"); }
            else { setTestStatus("sms_fail"); showAlert("error", "SMS failed: " + JSON.stringify(data)); }
          } catch(e) { setTestStatus("sms_fail"); showAlert("error", "SMS error: " + e.message); }
          setTimeout(() => setTestStatus(null), 5000);
        };

        const sendTestEmail = async () => {
          if (!testEmail) { showAlert("error", "Enter an email first"); return; }
          setTestStatus("sending_email");
          try {
            await sendNotifyEmail([testEmail], "PCG Portal — Test Notification",
              '<h3 style="color:#FF671F">Test Notification</h3><p>Email notifications are working correctly! 🎉</p><p style="color:#666;font-size:13px">This is a test from the PCG Company Portal settings page.</p>');
            setTestStatus("email_ok"); showAlert("success", "Test email sent!");
          } catch(e) { setTestStatus("email_fail"); showAlert("error", "Email error: " + e.message); }
          setTimeout(() => setTestStatus(null), 5000);
        };

        return (
          <div style={{ ...card(th), padding: "1.5rem", marginBottom: "1.25rem", borderLeft: "3px solid #00d084" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "0.5rem", marginBottom: "0.5rem" }}>
              <span style={{ fontSize: "1.125rem" }}>🧪</span>
              <span style={{ fontWeight: 700, fontSize: "1rem", color: th.text }}>Test Notifications</span>
            </div>
            <p style={{ fontSize: "0.8125rem", color: th.muted, marginBottom: "1rem" }}>
              Send a test message to verify your Twilio SMS and email integrations are working.
            </p>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "1rem" }}>
              <div style={{ background: th.card2, borderRadius: "0.5rem", padding: "1rem" }}>
                <div style={{ fontSize: "0.8rem", fontWeight: 600, color: th.text, marginBottom: "0.5rem" }}>📱 Test SMS (Twilio)</div>
                <input style={{ ...inp(th), marginBottom: "0.5rem" }} placeholder="(555) 555-5555" value={testPhone}
                  onChange={e => { const digits = e.target.value.replace(/\D/g, '').slice(0,10); setTestPhone(formatPhone(digits)); }} />
                <button onClick={sendTestSMS} disabled={testStatus === "sending_sms"} style={btn(th, { width: "100%", padding: "0.5rem", fontSize: "0.8rem", opacity: testStatus === "sending_sms" ? 0.6 : 1 })}>
                  {testStatus === "sending_sms" ? "⏳ Sending..." : testStatus === "sms_ok" ? "✅ Sent!" : testStatus === "sms_fail" ? "❌ Failed" : "📱 Send Test SMS"}
                </button>
              </div>
              <div style={{ background: th.card2, borderRadius: "0.5rem", padding: "1rem" }}>
                <div style={{ fontSize: "0.8rem", fontWeight: 600, color: th.text, marginBottom: "0.5rem" }}>📧 Test Email (Resend)</div>
                <input style={{ ...inp(th), marginBottom: "0.5rem" }} placeholder="email@example.com" value={testEmail}
                  onChange={e => setTestEmail(e.target.value)} />
                <button onClick={sendTestEmail} disabled={testStatus === "sending_email"} style={btn(th, { width: "100%", padding: "0.5rem", fontSize: "0.8rem", opacity: testStatus === "sending_email" ? 0.6 : 1 })}>
                  {testStatus === "sending_email" ? "⏳ Sending..." : testStatus === "email_ok" ? "✅ Sent!" : testStatus === "email_fail" ? "❌ Failed" : "📧 Send Test Email"}
                </button>
              </div>
              <div style={{ background: th.card2, borderRadius: "0.5rem", padding: "1rem" }}>
                <div style={{ fontSize: "0.8rem", fontWeight: 600, color: th.text, marginBottom: "0.5rem" }}>🔔 Test Push Notification</div>
                {(() => {
                  const [pushPerm, setPushPerm] = React.useState(isPushSupported() ? Notification.permission : "unsupported");
                  const [showReset, setShowReset] = React.useState(false);
                  const isChrome = /Chrome/.test(navigator.userAgent) && !/Edg/.test(navigator.userAgent);
                  const isEdge = /Edg/.test(navigator.userAgent);
                  const isSafari = /Safari/.test(navigator.userAgent) && !/Chrome/.test(navigator.userAgent);
                  const isFirefox = /Firefox/.test(navigator.userAgent);
                  const browserName = isSafari ? "Safari" : isEdge ? "Edge" : isChrome ? "Chrome" : isFirefox ? "Firefox" : "your browser";

                  return (
                    <>
                      <div style={{ fontSize: "0.75rem", color: th.muted, marginBottom: "0.5rem", lineHeight: 1.4 }}>
                        {pushPerm === "granted" && "✅ Push enabled"}
                        {pushPerm === "denied" && "❌ Push blocked by browser"}
                        {pushPerm === "default" && "⚠️ Permission not yet granted"}
                        {pushPerm === "unsupported" && "❌ Push not supported in this browser"}
                      </div>

                      {pushPerm === "denied" && (
                        <div style={{ marginBottom: "0.5rem" }}>
                          <button onClick={() => setShowReset(r => !r)} style={{ background: "none", border: "none", color: O, fontSize: "0.75rem", cursor: "pointer", padding: 0, textDecoration: "underline", fontFamily: "'Source Sans 3'" }}>
                            {showReset ? "Hide instructions" : "How to fix this"}
                          </button>
                          {showReset && (
                            <div style={{ marginTop: "0.5rem", padding: "0.625rem", background: th.card3, borderRadius: "0.375rem", fontSize: "0.7rem", color: th.muted, lineHeight: 1.6 }}>
                              {(isChrome || isEdge) && (<>
                                <div style={{ fontWeight: 600, color: th.text, marginBottom: "0.25rem" }}>Reset in {browserName}:</div>
                                <div>1. Click the 🔒 lock icon (or tune icon) in the address bar</div>
                                <div>2. Find "Notifications" and change to <strong>Allow</strong></div>
                                <div>3. Reload this page</div>
                              </>)}
                              {isSafari && (<>
                                <div style={{ fontWeight: 600, color: th.text, marginBottom: "0.25rem" }}>Reset in Safari:</div>
                                <div>1. Go to <strong>Safari &gt; Settings &gt; Websites &gt; Notifications</strong></div>
                                <div>2. Find <strong>pcg-ops.netlify.app</strong> and set to <strong>Allow</strong></div>
                                <div>3. Reload this page</div>
                              </>)}
                              {isFirefox && (<>
                                <div style={{ fontWeight: 600, color: th.text, marginBottom: "0.25rem" }}>Reset in Firefox:</div>
                                <div>1. Click the 🔒 lock icon in the address bar</div>
                                <div>2. Click "Clear permissions" or find Notifications &gt; <strong>Allow</strong></div>
                                <div>3. Reload this page</div>
                              </>)}
                              {!isChrome && !isEdge && !isSafari && !isFirefox && (<>
                                <div style={{ fontWeight: 600, color: th.text, marginBottom: "0.25rem" }}>Reset notification permissions:</div>
                                <div>1. Open your browser's site settings for this page</div>
                                <div>2. Find "Notifications" and change to <strong>Allow</strong></div>
                                <div>3. Reload this page</div>
                              </>)}
                              <button onClick={() => { setPushPerm(Notification.permission); if (Notification.permission === "granted") showAlert("success", "Push is now enabled!"); else showAlert("info", "Still " + Notification.permission + " — follow the steps above, then click again"); }}
                                style={btn(th, { width: "100%", padding: "0.4rem", fontSize: "0.7rem", marginTop: "0.5rem" })}>
                                🔄 I've reset it — check again
                              </button>
                            </div>
                          )}
                        </div>
                      )}

                      {pushPerm === "default" && (
                        <button onClick={async () => {
                          const ok = await subscribeToPush(user.id);
                          setPushPerm(Notification.permission);
                          if (ok) { setTestStatus("push_subscribed"); showAlert("success", "Push notifications enabled!"); }
                          else if (Notification.permission === "denied") { showAlert("error", "Push was blocked. Click 'How to fix this' below."); }
                          else { showAlert("error", "Could not enable push"); }
                          setTimeout(() => setTestStatus(null), 3000);
                        }} style={btn(th, { width: "100%", padding: "0.5rem", fontSize: "0.8rem", marginBottom: "0.5rem" })}>
                          Enable Push
                        </button>
                      )}

                      <button onClick={async () => {
                        if (pushPerm !== "granted") { showAlert("error", "Enable push permissions first"); return; }
                        setTestStatus("sending_push");
                        try {
                          const res = await fetch('/.netlify/functions/push', {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'send', userIds: [user.id], title: 'PCG Portal Test', body: 'Push notifications are working! 🎉', url: '/', tag: 'test_push_' + Date.now() }),
                          });
                          const data = await res.json().catch(() => ({}));
                          if (res.ok) { setTestStatus("push_ok"); showAlert("success", "Test push sent! Check your notifications."); }
                          else { setTestStatus("push_fail"); showAlert("error", "Push failed: " + (data.error || res.status)); }
                        } catch(e) { setTestStatus("push_fail"); showAlert("error", "Push error: " + e.message); }
                        setTimeout(() => setTestStatus(null), 5000);
                      }} disabled={testStatus === "sending_push"} style={btn(th, { width: "100%", padding: "0.5rem", fontSize: "0.8rem", opacity: (testStatus === "sending_push" || pushPerm !== "granted") ? 0.6 : 1 })}>
                        {testStatus === "sending_push" ? "⏳ Sending..." : testStatus === "push_ok" ? "✅ Sent!" : testStatus === "push_fail" ? "❌ Failed" : "🔔 Send Test Push"}
                      </button>
                    </>
                  );
                })()}
              </div>
            </div>
          </div>
        );
      })()}

      {/* Pulse Daily Notifications — mike.bahm only */}
      {user?.username === "mike.bahm" && (() => {
        const [pulseEnabled, setPulseEnabled] = React.useState(true);
        const [pulseEmails, setPulseEmails] = React.useState("mike@peoplecapitalgroup.com");
        const [pulseTime, setPulseTime] = React.useState("22:00");
        const [pulseSaving, setPulseSaving] = React.useState(false);
        const [pulseTestStatus, setPulseTestStatus] = React.useState(null);
        const [lastRun, setLastRun] = React.useState(null);
        const pulseInitRef = React.useRef(false);

        if (!pulseInitRef.current) {
          pulseInitRef.current = true;
          (async () => {
            try {
              const res = await fetch('/.netlify/functions/storage', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'load', key: 'pcg_pulse_notify_config' }),
              });
              if (res.ok) {
                const json = await res.json();
                if (json && json.data) {
                  const cfg = json.data;
                  setPulseEnabled(cfg.enabled !== false);
                  setPulseEmails((cfg.emailRecipients || []).join(', '));
                  setPulseTime(cfg.time || "22:00");
                }
              }
            } catch(e) { console.warn('Could not load pulse config:', e); }
            try {
              const r2 = await fetch('/.netlify/functions/storage', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'load', key: 'pcg_pulse_notify_last_run' }),
              });
              if (r2.ok) {
                const d2 = await r2.json();
                if (d2 && d2.data) setLastRun(d2.data);
              }
            } catch {}
          })();
        }

        const savePulseConfig = async () => {
          setPulseSaving(true);
          try {
            const cfg = {
              enabled: pulseEnabled,
              emailRecipients: pulseEmails.split(',').map(e => e.trim()).filter(Boolean),
              time: pulseTime,
              updatedAt: new Date().toISOString(),
              updatedBy: user.name,
            };
            await fetch('/.netlify/functions/storage', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'save', key: 'pcg_pulse_notify_config', data: cfg }),
            });
            showAlert("success", "Pulse notification settings saved");
          } catch(e) { showAlert("error", "Failed to save: " + e.message); }
          setPulseSaving(false);
        };

        const triggerPulseNow = async () => {
          setPulseTestStatus("sending");
          try {
            const res = await fetch('/.netlify/functions/pulse-notify', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ manual: true }),
            });
            const data = await res.json().catch(() => ({}));
            if (res.ok && data.ok) {
              setPulseTestStatus("ok");
              setLastRun({ ranAt: new Date().toISOString(), ...data });
              showAlert("success", `Pulse sent! $${(data.daily?.netSales || 0).toLocaleString('en-US', {minimumFractionDigits:2})} today, ${data.storesReporting} stores`);
            } else {
              setPulseTestStatus("fail");
              showAlert("error", "Pulse failed: " + (data.error || res.status));
            }
          } catch(e) { setPulseTestStatus("fail"); showAlert("error", "Error: " + e.message); }
          setTimeout(() => setPulseTestStatus(null), 5000);
        };

        return (
          <div style={{ ...card(th), padding: "1.25rem", borderLeft: `3px solid ${O}` }}>
            <div style={{ fontWeight: 700, fontSize: "0.875rem", color: th.text, marginBottom: "0.75rem" }}>Pulse Daily Notifications</div>
            <div style={{ fontSize: "0.8125rem", color: th.muted, marginBottom: "0.75rem", lineHeight: 1.5 }}>
              Automatically fetch daily totals + WTD for all 45 stores and send a summary via push notification and email.
            </div>

            {/* Enable toggle */}
            <div style={{ display: "flex", alignItems: "center", gap: "0.5rem", marginBottom: "0.75rem" }}>
              <div onClick={() => setPulseEnabled(e => !e)} style={{ width: 36, height: 20, borderRadius: "0.625rem", background: pulseEnabled ? O : "#ccc", position: "relative", cursor: "pointer", transition: "background .25s", flexShrink: 0 }}>
                <div style={{ position: "absolute", top: 3, left: pulseEnabled ? 19 : 3, width: 14, height: 14, borderRadius: "50%", background: "#fff", transition: "left .25s", boxShadow: "0 1px 3px #00000030" }} />
              </div>
              <span style={{ fontSize: "0.8125rem", color: th.text, fontWeight: 600 }}>{pulseEnabled ? "Enabled" : "Disabled"}</span>
            </div>

            {/* Schedule display */}
            <div style={{ fontSize: "0.75rem", color: th.muted, marginBottom: "0.75rem", padding: "0.5rem", background: th.card2, borderRadius: "0.375rem" }}>
              Schedule: <strong>Daily at 9:00 PM ET</strong> (cron-based via Netlify)
            </div>

            {/* Email recipients */}
            <div style={{ marginBottom: "0.75rem" }}>
              <label style={{ fontSize: "0.75rem", fontWeight: 600, color: th.text, display: "block", marginBottom: "0.25rem" }}>Email Recipients</label>
              <input style={{ ...inp(th), width: "100%", fontSize: "0.8rem" }} placeholder="email1@example.com, email2@example.com"
                value={pulseEmails} onChange={e => setPulseEmails(e.target.value)} />
              <div style={{ fontSize: "0.65rem", color: th.muted, marginTop: "0.25rem" }}>Comma-separated. Push goes to all subscribed users automatically.</div>
            </div>

            {/* Save button */}
            <button onClick={savePulseConfig} disabled={pulseSaving}
              style={btn(th, { width: "100%", padding: "0.5rem", fontSize: "0.8rem", marginBottom: "0.5rem", opacity: pulseSaving ? 0.6 : 1 })}>
              {pulseSaving ? "Saving..." : "Save Settings"}
            </button>

            {/* Manual trigger */}
            <button onClick={triggerPulseNow} disabled={pulseTestStatus === "sending"}
              style={btn(th, { width: "100%", padding: "0.5rem", fontSize: "0.8rem", background: th.card3, color: th.text, opacity: pulseTestStatus === "sending" ? 0.6 : 1 })}>
              {pulseTestStatus === "sending" ? "⏳ Fetching all stores..." : pulseTestStatus === "ok" ? "✅ Sent!" : pulseTestStatus === "fail" ? "❌ Failed" : "⚡ Run Pulse Now (manual)"}
            </button>

            {/* Last run info */}
            {lastRun && (
              <div style={{ marginTop: "0.75rem", padding: "0.5rem", background: th.card2, borderRadius: "0.375rem", fontSize: "0.7rem", color: th.muted, lineHeight: 1.6 }}>
                <div style={{ fontWeight: 600, color: th.text, marginBottom: "0.25rem" }}>Last Run</div>
                <div>Time: {new Date(lastRun.ranAt).toLocaleString()}</div>
                {lastRun.daily && <div>Daily: ${lastRun.daily.netSales?.toLocaleString('en-US', {minimumFractionDigits:2})} | {lastRun.daily.guests?.toLocaleString()} guests</div>}
                {lastRun.wtd && <div>WTD: ${lastRun.wtd.netSales?.toLocaleString('en-US', {minimumFractionDigits:2})} | {lastRun.wtd.guests?.toLocaleString()} guests ({lastRun.wtd.days} days)</div>}
                <div>Stores: {lastRun.storesReporting}/45 | Push: {lastRun.push?.sent || 0} sent</div>
              </div>
            )}
          </div>
        );
      })()}

      {/* Info card */}
      <div style={{ ...card(th), padding: "1.25rem", borderLeft: `3px solid ${O}` }}>
        <div style={{ fontWeight: 700, fontSize: "0.875rem", color: th.text, marginBottom: "0.5rem" }}>How Notifications Work</div>
        <div style={{ fontSize: "0.8125rem", color: th.muted, lineHeight: 1.6 }}>
          <div style={{ marginBottom: "0.375rem" }}>📬 <strong>Global list</strong> — everyone above gets notified for every project update</div>
          <div style={{ marginBottom: "0.375rem" }}>📋 <strong>Per-project list</strong> — additional emails set in each project's "Notify Emails" field</div>
          <div style={{ marginBottom: "0.375rem" }}>🔔 <strong>Triggers:</strong> New project added, phase changes, checklist updates, deadline warnings</div>
          <div style={{ marginBottom: "0.375rem" }}>📱 <strong>SMS:</strong> Users with a phone number + SMS enabled get texts (via Twilio)</div>
          <div style={{ marginBottom: "0.375rem" }}>⚠️ <strong>SMS matching:</strong> Your user's <em>email</em> must match an address in the global/project notify list</div>
          <div>📧 <strong>Powered by:</strong> Resend (email) + Twilio (SMS) — configure API keys in Netlify env vars</div>
        </div>
      </div>

      {/* Announcements — mike.bahm only */}
      {user?.username === "mike.bahm" && (() => {
        const [annTitle, setAnnTitle] = React.useState("");
        const [annMsg, setAnnMsg] = React.useState("");
        const postAnnouncement = () => {
          if (!annTitle.trim() || !annMsg.trim()) { showAlert("error", "Title and message required"); return; }
          const ann = { id: `ann_${Date.now()}_${Math.random().toString(36).slice(2,6)}`, title: annTitle.trim(), message: annMsg.trim(), createdAt: new Date().toISOString(), createdBy: user.name, active: true };
          setAnnouncements(prev => [ann, ...prev]);
          setAnnTitle(""); setAnnMsg("");
          showAlert("success", "Announcement posted!");
        };
        return (
          <>
            <div style={{ fontWeight: 700, fontSize: "1.125rem", color: th.text, margin: "2rem 0 0.75rem", display: "flex", alignItems: "center", gap: "0.5rem" }}>
              📢 Announcements
              <span style={{ fontSize: "0.6875rem", fontWeight: 500, color: th.muted }}>(shown to all users on login)</span>
            </div>
            <div style={{ ...card(th), padding: "1.25rem", marginBottom: "1rem" }}>
              <label style={{ fontWeight: 600, fontSize: "0.8125rem", color: th.text, marginBottom: "0.25rem", display: "block" }}>Title</label>
              <input placeholder="e.g. Mandatory Training Next Week" value={annTitle} onChange={e => setAnnTitle(e.target.value)}
                style={{ ...inp(th), width: "100%", boxSizing: "border-box", marginBottom: "0.75rem" }} />
              <label style={{ fontWeight: 600, fontSize: "0.8125rem", color: th.text, marginBottom: "0.25rem", display: "block" }}>Message</label>
              <textarea placeholder="Write your announcement here..." value={annMsg} onChange={e => setAnnMsg(e.target.value)} rows={3}
                style={{ ...inp(th), width: "100%", boxSizing: "border-box", marginBottom: "0.75rem", resize: "vertical", fontFamily: "'Source Sans 3'" }} />
              <button onClick={postAnnouncement} style={btn(th, { padding: "0.5rem 1.5rem" })}>📢 Post Announcement</button>
            </div>
            {announcements.length > 0 && (
              <div style={{ ...card(th), padding: "1rem" }}>
                <div style={{ fontWeight: 600, fontSize: "0.8125rem", color: th.text, marginBottom: "0.75rem" }}>Active Announcements</div>
                {announcements.map((a, idx) => (
                  <div key={a.id} style={{ padding: "0.75rem", borderBottom: idx < announcements.length - 1 ? `1px solid ${th.cardBorder}` : "none", opacity: a.active ? 1 : 0.5 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.25rem" }}>
                      <span style={{ fontWeight: 700, fontSize: "0.875rem", color: th.text }}>{a.title}</span>
                      <div style={{ display: "flex", gap: "0.375rem" }}>
                        <button onClick={() => setAnnouncements(prev => prev.map(x => x.id === a.id ? { ...x, active: !x.active } : x))}
                          style={{ ...btn(th, { padding: "0.25rem 0.5rem", fontSize: "0.6875rem", background: a.active ? "#69db7c22" : "#ff666622", color: a.active ? "#69db7c" : "#ff6666" }) }}>
                          {a.active ? "Active" : "Inactive"}
                        </button>
                        <button onClick={() => setAnnouncements(prev => prev.filter(x => x.id !== a.id))}
                          style={{ ...btn(th, { padding: "0.25rem 0.5rem", fontSize: "0.6875rem", background: "#ff444422", color: "#ff6666" }) }}>✕</button>
                      </div>
                    </div>
                    <div style={{ fontSize: "0.8125rem", color: th.muted, marginBottom: "0.25rem" }}>{a.message}</div>
                    <div style={{ fontSize: "0.625rem", color: th.muted }}>{new Date(a.createdAt).toLocaleString()} by {a.createdBy}</div>
                  </div>
                ))}
              </div>
            )}
          </>
        );
      })()}
    </div>
  );
}

// ── Announcements Page ────────────────────────────────────────────────────

                      </div>
                      {canManage && (
                        <div style={{ display: "flex", gap: "0.35rem", flexShrink: 0 }}>
                          <button onClick={() => startEdit(a)} title="Edit" style={{ ...btn(th), padding: "0.3rem 0.55rem", fontSize: "0.7rem" }}>✎</button>
                          <button onClick={() => toggleActive(a.id)} title={a.active ? "Deactivate" : "Activate"}

                      )}

                  </React.Fragment>

// helper: can this user fully administer system (add/edit/delete any user)?
const isFullAdmin = (u) => u && (u.userType === "executive" || u.userType === "it");

// helper: office_staff can add/edit DM and manager accounts only
const canManageUser = (actor, target) => {
  if (!actor) return false;
