  const cdRef = useRef(null);

  const activePCs = stores.filter(s => s.status === 'Open').map(s => s.pc);

  // Get Sun–Sat week dates up to and including today (not busDt, so clicking
  // a past day doesn't shrink the week). dateStr picks which week.
  const localDateStr = (dt) => `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  function getWeekDates(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    const sun = new Date(d);
    sun.setDate(d.getDate() - d.getDay()); // back to Sunday
    const dates = [];
    for (let i = 0; i < 7; i++) {
      const dd = new Date(sun); dd.setDate(sun.getDate() + i);
      const ds = localDateStr(dd);
      if (ds <= todayStr) dates.push(ds);
    }
    return dates;
  }

  function aggResults(results) {
    return Object.values(results).filter(d => d.status === 'ok').reduce((a, d) => ({
      netSales:  a.netSales  + d.data.netSales,
      guests:    a.guests    + d.data.guests,
      voids:     a.voids     + d.data.voids,
      discounts: a.discounts + d.data.discounts,
    }), { netSales:0, guests:0, voids:0, discounts:0 });
  }

  async function fetchDate(date, batchSize = 6, onProg) {
    const results = {};
    for (let i = 0; i < activePCs.length; i += batchSize) {
      await Promise.all(activePCs.slice(i, i + batchSize).map(async pc => {
        try {
          const json = await fetchOpsTotals(pc, date);
          results[pc] = { status:'ok', data: sumRVC(json.revenueCenters) };
        } catch(e) {
          results[pc] = { status:'error', error: e.message };
        }
      }));
      onProg && onProg(Math.round(((i + batchSize) / activePCs.length) * 100));
    }
    return results;
  }

  async function loadAll() {
    setLoading(true); setProgress(0);
    const results = await fetchDate(busDt, 6, p => { setProgress(p); setStoreData({ ...results }); });
    setStoreData(results);
    setDateCache(prev => ({ ...prev, [busDt]: aggResults(results) }));
    setLoading(false); setLastRefresh(new Date()); setCountdown(300);
  }

  async function loadWTD() {
    setWtdLoading(true);
    const dates = getWeekDates(busDt);
    const newCache = { ...dateCache };
    for (const date of dates) {
      if (!newCache[date]) {
        const results = await fetchDate(date, 8);
        newCache[date] = aggResults(results);
        setDateCache({ ...newCache });
      }
    }
    setWtdLoading(false);
  }

  async function runDiagTest() {
    setTesting(true); setTestResult(null);
    try {
      const r1 = await fetch('/.netlify/functions/pulse', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ api:'p228', endpoint:'getLatestBusinessDate', locRef:'302642' }),
      });
      const t1 = await r1.text();
      const r2 = await fetch('/.netlify/functions/pulse', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ api:'p228', endpoint:'getOperationsDailyTotals', locRef:'302642', busDt, include:'locRef,busDt,revenueCenters' }),
      });
      const t2 = await r2.text();
      setTestResult(`getLatestBusinessDate → HTTP ${r1.status}:\n${t1.slice(0,300)}\n\n---\ngetOperationsDailyTotals → HTTP ${r2.status}:\n${t2.slice(0,300)}`);
    } catch(e) { setTestResult('FETCH ERROR: ' + e.message); }
    setTesting(false);
  }

  // Auto-load today's data on mount, then auto-load WTD
  const wtdAutoLoaded = useRef(false);
  const lastWtdWeek   = useRef('');
  useEffect(() => { loadAll(); }, [busDt]);
  useEffect(() => {
    // Determine which week busDt falls in (Sunday start)
    const d = new Date(busDt + 'T12:00:00');
    const sun = new Date(d); sun.setDate(d.getDate() - d.getDay());
    const weekKey = localDateStr(sun);
    if (weekKey !== lastWtdWeek.current) {
      wtdAutoLoaded.current = false;
      lastWtdWeek.current = weekKey;
    }
  }, [busDt]);
  useEffect(() => {
    if (!loading && Object.keys(storeData).length > 0 && !wtdAutoLoaded.current) {
      wtdAutoLoaded.current = true;
      loadWTD();
    }
  }, [loading, storeData]);

  // Auto-refresh
  useEffect(() => {
    if (autoRefresh) {
      cdRef.current = setInterval(() => {
        setCountdown(c => { if (c <= 1) { loadAll(); return 300; } return c - 1; });
      }, 1000);
    }
    return () => clearInterval(cdRef.current);
  }, [autoRefresh, busDt]);

  // WTD computed
  const weekDates   = getWeekDates(busDt);
  const wtdTotals   = weekDates.filter(d => dateCache[d]).reduce((a,d) => ({
    netSales:  a.netSales  + (dateCache[d]?.netSales  || 0),
    guests:    a.guests    + (dateCache[d]?.guests    || 0),
    voids:     a.voids     + (dateCache[d]?.voids     || 0),
    discounts: a.discounts + (dateCache[d]?.discounts || 0),
  }), { netSales:0, guests:0, voids:0, discounts:0 });
  const wtdLoaded   = weekDates.filter(d => dateCache[d]).length;
  const hasWTD      = wtdLoaded > 0;

  // Trend chart data — Sun-Sat week
  const DAY_LABELS  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const trendData   = weekDates.map((date, i) => ({
    date:       date.slice(5),
    dateKey:    date,
    dayLabel:   DAY_LABELS[i] || '',
    netSales:   dateCache[date]?.netSales || 0,
    hasData:    !!dateCache[date],
    isSelected: date === busDt,
  }));

  // Store rows
  const loaded  = Object.values(storeData).filter(d => d.status === 'ok');
  const errored = Object.values(storeData).filter(d => d.status === 'error');
  const totals  = loaded.reduce((a, d) => ({
    netSales:  a.netSales  + d.data.netSales,
    guests:    a.guests    + d.data.guests,
    voids:     a.voids     + d.data.voids,
    discounts: a.discounts + d.data.discounts,
    avgCheck:  0,
  }), { netSales:0, guests:0, voids:0, discounts:0, avgCheck:0 });
  totals.avgCheck = totals.guests > 0 ? totals.netSales / totals.guests : 0;

  const allRows = stores
    .filter(s => distFilter === 0 || s.district === distFilter)
    .map(s => ({ ...s, live: storeData[s.pc] }));

  // Group by district
  const distNums = [...new Set(allRows.map(s => s.district))].filter(Boolean).sort((a,b)=>a-b);
  const dmName   = d => (Object.values(districts||{}).find(x=>x.num===d)?.name || '').split(' ')[0] || `D${d}`;

  const fmtUSD  = v => '$' + Math.round(v).toLocaleString();
  const fmtNum  = v => Math.round(v).toLocaleString();
  const fmtAvg  = v => v > 0 ? '$' + v.toFixed(2) : '—';

  const thS = { padding:'0.45rem 0.65rem', fontFamily:"'Raleway'", fontWeight:700,
    fontSize:'0.68rem', textTransform:'uppercase', letterSpacing:0.8,
    color:th.muted, whiteSpace:'nowrap', background:th.card };
  const tdS = { padding:'0.5rem 0.65rem', fontSize:'0.78rem', color:th.text, verticalAlign:'middle' };

  const distList = Object.values(districts||{}).sort((a,b)=>a.num-b.num);

  const cardS = { background:th.card2, borderRadius:'0.75rem', padding:'1rem 1.25rem',
    borderLeft:`3px solid ${G}`, flex:'1 1 150px', minWidth:130 };

  const toggleCollapse = d => setCollapsed(prev => {
    const next = new Set(prev);
    next.has(d) ? next.delete(d) : next.add(d);
    return next;
  });

  return (
    <div>
      {/* ── Header ── */}
      <div style={{ ...card(th), padding:'1.25rem 1.5rem', marginBottom:'1rem',
        background:'linear-gradient(135deg, #001a0d 0%, #00120a 50%, #001810 100%)',
        border:`1px solid ${G}33`, position:'relative', overflow:'hidden' }}>
        <div style={{ position:'absolute', top:-60, right:-60, width:200, height:200,
          borderRadius:'50%', background:`${G}15`, pointerEvents:'none' }} />
        <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', flexWrap:'wrap', gap:'1rem' }}>
          <div>
            <div style={{ display:'flex', alignItems:'center', gap:'0.75rem', marginBottom:'0.25rem' }}>
              <div style={{ position:'relative', display:'flex', alignItems:'center', justifyContent:'center',
                width:42, height:42, borderRadius:'50%', background:`${G}22`, border:`2px solid ${G}`,
                boxShadow:`0 0 16px ${G}66` }}>
                <span style={{ fontSize:'1.3rem', filter:`drop-shadow(0 0 6px ${G})` }}>💚</span>
                <div style={{ position:'absolute', top:0,left:0,right:0,bottom:0, borderRadius:'50%',
                  border:`2px solid ${G}`, animation:'pulseRing 2s ease-out infinite' }} />
              </div>
              <div>
                <div style={{ fontFamily:"'Raleway'", fontWeight:900, fontSize:'1.4rem', color:G,
                  textShadow:`0 0 20px ${G}99`, letterSpacing:1 }}>PULSE</div>
                <div style={{ fontSize:'0.7rem', color:`${G}99`, fontWeight:600, letterSpacing:2 }}>LIVE NETWORK MONITOR</div>
              </div>
            </div>
            <HeartbeatLine />
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:'0.5rem', alignItems:'flex-end' }}>
            <div style={{ display:'flex', gap:'0.5rem', flexWrap:'wrap', justifyContent:'flex-end' }}>
              <input type="date" value={busDt} onChange={e=>setBusDt(e.target.value)}
                style={{ ...inp(th), width:'auto', fontSize:'0.78rem', padding:'0.4rem 0.6rem',
                  background:'#001a0d', borderColor:`${G}44`, color:G }} />
              <button onClick={loadAll} disabled={loading}
                style={{ ...btn(th, { background:`${G}22`, color:G, border:`1px solid ${G}55`,
                  fontWeight:700, padding:'0.4rem 1rem', fontSize:'0.78rem' }) }}>
                {loading ? '⏳ Loading…' : '⚡ Refresh'}
              </button>
              <button onClick={loadWTD} disabled={wtdLoading || loading}
                style={{ ...btn(th, { background: hasWTD ? `${G}33` : '#1a3a2a',
                  color: hasWTD ? G : `${G}88`, border:`1px solid ${G}33`,
                  fontWeight:700, padding:'0.4rem 1rem', fontSize:'0.78rem' }) }}>
                {wtdLoading ? '⏳ WTD…' : hasWTD ? `✅ WTD (${wtdLoaded}d)` : '📅 Load WTD'}
              </button>
              <button onClick={()=>setAutoRefresh(a=>!a)}
                style={{ ...btn(th, { background: autoRefresh ? `${G}33` : th.card3,
                  color: autoRefresh ? G : th.muted, border: autoRefresh ? `1px solid ${G}55` : 'none',
                  fontSize:'0.78rem', padding:'0.4rem 0.75rem' }) }}>
                {autoRefresh ? `⏱ ${Math.floor(countdown/60)}:${String(countdown%60).padStart(2,'0')}` : '🔄 Auto'}
              </button>
            </div>
            <div style={{ fontSize:'0.68rem', color:`${G}88` }}>
              <span style={{color:G}}>● API connected</span>
              {lastRefresh && (
                <span> · Last refreshed {lastRefresh.toLocaleTimeString()} · {loaded.length}/{activePCs.length} stores
                  {errored.length > 0 && <span style={{color:'#ff6b6b'}}> · {errored.length} errors</span>}
                </span>
              )}
            </div>
          </div>
        </div>
        {loading && (
          <div style={{ marginTop:'0.75rem', background:`${G}22`, borderRadius:4, height:6, overflow:'hidden' }}>
            <div style={{ height:'100%', background:G, borderRadius:4, transition:'width 0.3s',
              width:`${progress}%`, boxShadow:`0 0 8px ${G}` }} />
          </div>
        )}
        {wtdLoading && (
          <div style={{ marginTop:'0.5rem', display:'flex', alignItems:'center', gap:'0.5rem' }}>
            <div style={{ flex:1, background:`${G}22`, borderRadius:4, height:4, overflow:'hidden' }}>
              <div style={{ height:'100%', background:`${G}88`, borderRadius:4, width:'100%',
                animation:'wtdPulse 1.5s ease-in-out infinite' }} />
            </div>
            <span style={{ fontSize:'0.65rem', color:`${G}88` }}>Loading WTD data…</span>
          </div>
        )}
      </div>

      {/* ── Non-Open Stores Banner ── */}
      {(() => {
        const nonOpen = stores.filter(s => s.status !== 'Open');
        if (!nonOpen.length) return null;
        return (
          <div style={{ marginBottom:'0.75rem', padding:'0.6rem 0.85rem', background:'#fd7e1418', borderLeft:`3px solid #fd7e14`, borderRadius:'0.375rem', fontSize:'0.78rem', color:th.muted, lineHeight:1.5 }}>
            <span style={{ fontWeight:700, color:'#fd7e14' }}>Note:</span>{' '}
            {nonOpen.map(s => <span key={s.pc}><strong style={{color:th.text}}>{s.name}</strong> <span style={{ fontSize:'0.68rem', padding:'1px 4px', borderRadius:3, fontWeight:600, color:'#fff', background: s.status === 'Remodel' ? '#fd7e14' : s.status === 'Temp Closed' ? '#dc3545' : '#6c757d' }}>{s.status}</span></span>).reduce((a, b) => [a, ', ', b])}
            {' — '}totals may be lower due to {nonOpen.length === 1 ? 'this store' : 'these stores'} not operating at full capacity.
          </div>
        );
      })()}

      {/* ── KPI Cards ── */}
      {loaded.length > 0 && (
        <div style={{ display:'flex', gap:'0.75rem', flexWrap:'wrap', marginBottom:'1rem' }}>
          {/* Net Sales */}
          <div style={{ ...cardS }}>
            <div style={{ fontFamily:"'Raleway'", fontWeight:900, fontSize:'1.5rem', color:G,
              textShadow:`0 0 12px ${G}66` }}>{fmtUSD(totals.netSales)}</div>
            <div style={{ fontSize:'0.75rem', color:th.muted, textTransform:'uppercase', letterSpacing:0.7, fontWeight:600, marginTop:'0.25rem' }}>Net Sales — {busDt}</div>
          </div>
          {/* Guests */}
          <div style={{ ...cardS, borderColor:'#74c0fc' }}>
            <div style={{ fontFamily:"'Raleway'", fontWeight:900, fontSize:'1.5rem', color:'#74c0fc' }}>{fmtNum(totals.guests)}</div>
            <div style={{ fontSize:'0.75rem', color:th.muted, textTransform:'uppercase', letterSpacing:0.7, fontWeight:600, marginTop:'0.25rem' }}>Guests / Checks</div>
          </div>
          {/* Avg Check */}
          <div style={{ ...cardS, borderColor:'#ffd43b' }}>
            <div style={{ fontFamily:"'Raleway'", fontWeight:900, fontSize:'1.5rem', color:'#ffd43b' }}>{fmtAvg(totals.avgCheck)}</div>
            <div style={{ fontSize:'0.75rem', color:th.muted, textTransform:'uppercase', letterSpacing:0.7, fontWeight:600, marginTop:'0.25rem' }}>Avg Check</div>
          </div>
          {/* Discounts */}
          <div style={{ ...cardS, borderColor:'#f06595' }}>
            <div style={{ fontFamily:"'Raleway'", fontWeight:900, fontSize:'1.5rem', color:'#f06595' }}>{fmtUSD(totals.discounts)}</div>
            <div style={{ fontSize:'0.75rem', color:th.muted, textTransform:'uppercase', letterSpacing:0.7, fontWeight:600, marginTop:'0.25rem' }}>Discounts</div>
          </div>
        </div>
      )}

      {/* ── Week-to-Date Card ── */}
      {hasWTD && (
        <div style={{ ...card(th), padding:'1rem', marginBottom:'1rem', borderLeft:`3px solid ${G}` }}>
          <div style={{ fontSize:'0.85rem', fontWeight:700, color:th.text, marginBottom:'0.75rem' }}>
            Week to Date <span style={{ fontSize:'0.75rem', fontWeight:400, color:th.muted }}>({wtdLoaded} days)</span>
          </div>
          <div style={{ display:'flex', gap:'1.25rem', flexWrap:'wrap' }}>
            <div>
              <div style={{ fontFamily:"'Raleway'", fontWeight:900, fontSize:'1.4rem', color:G }}>{fmtUSD(wtdTotals.netSales)}</div>
              <div style={{ fontSize:'0.75rem', color:th.muted, fontWeight:600, marginTop:'0.15rem' }}>Net Sales</div>
            </div>
            <div>
              <div style={{ fontFamily:"'Raleway'", fontWeight:900, fontSize:'1.4rem', color:'#74c0fc' }}>{fmtNum(wtdTotals.guests)}</div>
              <div style={{ fontSize:'0.75rem', color:th.muted, fontWeight:600, marginTop:'0.15rem' }}>Guests</div>
            </div>
            <div>
              <div style={{ fontFamily:"'Raleway'", fontWeight:900, fontSize:'1.4rem', color:'#ffd43b' }}>{wtdTotals.guests > 0 ? fmtAvg(wtdTotals.netSales / wtdTotals.guests) : '—'}</div>
              <div style={{ fontSize:'0.75rem', color:th.muted, fontWeight:600, marginTop:'0.15rem' }}>Avg Check</div>
            </div>
            <div>
              <div style={{ fontFamily:"'Raleway'", fontWeight:900, fontSize:'1.4rem', color:'#f06595' }}>{fmtUSD(wtdTotals.discounts)}</div>
              <div style={{ fontSize:'0.75rem', color:th.muted, fontWeight:600, marginTop:'0.15rem' }}>Discounts</div>
            </div>
          </div>
        </div>
      )}

      {/* ── Trend Chart ── */}
      {hasWTD && trendData.some(d => d.hasData) && (
        <TrendChart data={trendData} G={G} th={th} onBarClick={(dateKey) => setBusDt(dateKey)} />
      )}

      {/* ── Loading Overlay ── */}
      {loading && Object.keys(storeData).length === 0 && (
        <div style={{ ...card(th), padding:'2.5rem', textAlign:'center', marginBottom:'1rem', background:`linear-gradient(135deg, ${th.card} 0%, ${th.card2} 100%)`, border:`1px solid ${G}33` }}>
          <div style={{ fontSize:'3rem', marginBottom:'0.75rem', animation:'pulseRing 2s ease-out infinite' }}>💚</div>
          <div style={{ fontFamily:"'Raleway'", fontWeight:800, fontSize:'1.1rem', color:G, marginBottom:'0.375rem' }}>Loading Pulse Data...</div>
          <div style={{ fontSize:'0.8rem', color:th.muted, marginBottom:'1rem' }}>
            Fetching data from {activePCs.length} stores
          </div>
          <div style={{ maxWidth:320, margin:'0 auto' }}>
            <div style={{ background:`${G}22`, borderRadius:6, height:10, overflow:'hidden', marginBottom:'0.5rem' }}>
              <div style={{ height:'100%', background:`linear-gradient(90deg, ${G}, #00ff9d)`, borderRadius:6, transition:'width 0.3s ease', width:`${progress}%`, boxShadow:`0 0 12px ${G}` }} />
            </div>
            <div style={{ fontSize:'0.75rem', color:G, fontWeight:700 }}>
              {Math.min(Math.round(progress / 100 * activePCs.length), activePCs.length)}/{activePCs.length} stores loaded — {progress}%
            </div>
          </div>
        </div>
      )}

      {/* ── Empty state ── */}
      {Object.keys(storeData).length === 0 && !loading && (
        <div style={{ ...card(th), padding:'3rem', textAlign:'center' }}>
          <div style={{ fontSize:'3rem', marginBottom:'0.75rem', filter:`drop-shadow(0 0 12px ${G})` }}>💚</div>
          <div style={{ fontFamily:"'Raleway'", fontWeight:700, fontSize:'1.1rem', color:G, marginBottom:'0.5rem' }}>Ready to Monitor</div>
          <div style={{ color:th.muted, fontSize:'0.875rem', marginBottom:'1.25rem' }}>
            Select a date and click <strong style={{color:G}}>⚡ Refresh</strong> to pull live data for all {activePCs.length} active stores.
            Use <strong style={{color:G}}>📅 Load WTD</strong> to fetch the full week trend.
          </div>
          <div style={{ display:'flex', gap:'0.75rem', justifyContent:'center' }}>
            <button onClick={loadAll} style={{ ...btn(th, { background:`${G}22`, color:G, border:`1px solid ${G}55`, fontWeight:700, padding:'0.6rem 2rem', fontSize:'0.9rem' }) }}>⚡ Load Today</button>
            <button onClick={loadWTD} style={{ ...btn(th, { background:'#1a3a2a', color:`${G}88`, border:`1px solid ${G}33`, fontWeight:700, padding:'0.6rem 2rem', fontSize:'0.9rem' }) }}>📅 Load Full Week</button>
          </div>
        </div>
      )}

      {/* ── Store Table ── */}
      {loaded.length > 0 && (
        <div style={{ ...card(th), padding:'1.125rem' }}>
          <div style={{ display:'flex', alignItems:'center', gap:'0.75rem', marginBottom:'0.875rem', flexWrap:'wrap' }}>
            <div style={{ fontFamily:"'Raleway'", fontWeight:700, fontSize:'0.9rem', color:th.text, flex:1 }}>
              📍 Store Breakdown — {busDt}
            </div>
            <select style={{ ...inp(th), width:'auto', padding:'0.3rem 0.6rem', fontSize:'0.75rem' }}
              value={distFilter} onChange={e=>setDistFilter(+e.target.value)}>
              <option value={0}>All Districts</option>
              {distList.map(d=><option key={d.num} value={d.num}>District {d.num} — {d.name.split(' ')[0]}</option>)}
            </select>
          </div>
          <div style={{ overflowX:'auto' }}>
            <table style={{ width:'100%', borderCollapse:'collapse', fontSize:'0.78rem' }}>
              <thead style={{ position:'sticky', top:0, zIndex:2 }}>
                <tr style={{ borderBottom:`2px solid ${th.cardBorder}`, background:th.card }}>
                  {['Store','City','Status','Net Sales','Guests','Avg Check'].map(h => (
                    <th key={h} style={{ ...thS, textAlign: h==='Store'||h==='City'||h==='Status' ? 'left' : 'right' }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {distNums.map(distNum => {
                  const distRows = allRows.filter(s => s.district === distNum)
                    .sort((a,b) => (b.live?.data?.netSales||0) - (a.live?.data?.netSales||0));
                  if (!distRows.length) return null;
                  const distOk = distRows.filter(s => s.live?.status === 'ok');
                  const distTotals = distOk.reduce((a,s) => ({
                    netSales: a.netSales + s.live.data.netSales,
                    guests:   a.guests   + s.live.data.guests,
                  }), { netSales:0, guests:0 });
                  distTotals.avgCheck = distTotals.guests > 0 ? distTotals.netSales / distTotals.guests : 0;
                  const isCollapsed = collapsed.has(distNum);
                  return (
                    <React.Fragment key={distNum}>
                      {/* District header row */}
                      <tr onClick={()=>toggleCollapse(distNum)}
                        style={{ borderBottom:`1px solid ${G}33`, background:`${G}10`, cursor:'pointer' }}>
                        <td style={{ ...tdS, fontWeight:800, color:G, fontSize:'0.75rem', paddingLeft:'0.75rem' }}
                          colSpan={1}>
                          <span style={{ marginRight:'0.4rem', fontSize:'0.65rem' }}>{isCollapsed ? '▶' : '▼'}</span>
                          District {distNum} — {dmName(distNum)}
                        </td>
                        <td style={{ ...tdS, color:th.muted, fontSize:'0.7rem' }}>{distRows.length} stores</td>
                        <td style={{ ...tdS }}>
                          <span style={{ fontSize:'0.68rem', color:G, fontWeight:600 }}>
                            {distOk.length}/{distRows.length} live
                          </span>
                        </td>
                        <td style={{ ...tdS, textAlign:'right', fontWeight:800, color:G }}>{fmtUSD(distTotals.netSales)}</td>
                        <td style={{ ...tdS, textAlign:'right', color:'#74c0fc', fontWeight:700 }}>{fmtNum(distTotals.guests)}</td>
                        <td style={{ ...tdS, textAlign:'right', color:'#ffd43b', fontWeight:700 }}>{fmtAvg(distTotals.avgCheck)}</td>
                      </tr>
                      {/* Store rows */}
                      {!isCollapsed && distRows.map((s, i) => {
                        const live = s.live;
                        const isOk  = live?.status === 'ok';
                        const isErr = live?.status === 'error';
                        return (
                          <tr key={s.pc} style={{ borderBottom:`1px solid ${th.cardBorder}`,

async function fetchWeatherByZip(zip, date) {
  // Open-Meteo geocoding + weather (free, no API key)
  const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(zip)}&count=1&language=en&format=json`);
  const geoData = await geoRes.json();
  let lat, lon;
  if (geoData.results && geoData.results.length > 0) {
    lat = geoData.results[0].latitude;
    lon = geoData.results[0].longitude;
  } else {
    // Try zip as US postal code via zip-to-coords fallback
    const zipRes = await fetch(`https://api.zippopotam.us/us/${zip}`);
    if (!zipRes.ok) throw new Error('Could not find location for zip code');
    const zipData = await zipRes.json();
    lat = parseFloat(zipData.places[0].latitude);
    lon = parseFloat(zipData.places[0].longitude);
  }
  // Fetch hourly weather for the date
  const wxRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,relative_humidity_2m,wind_speed_10m,precipitation,weather_code&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=auto&start_date=${date}&end_date=${date}`);
  const wxData = await wxRes.json();
  const h = wxData.hourly;
  const mapCondition = (code) => {
    if (code <= 1) return "Clear";
    if (code <= 3) return "Partially cloudy";
    if (code <= 48) return "Fog";
    if (code <= 57) return "Cloudy";
    if (code <= 67) return "Rain";
    if (code <= 77) return "Snow";
    if (code <= 82) return "Rain";
    if (code <= 86) return "Snow";
    if (code >= 95) return "Thunderstorm";
    return "Overcast";
  };
  // Hours: 6=index6, 12=index12, 16=index16
  const slots = [6, 12, 16];
  return slots.map(hr => ({
    temp: h.temperature_2m[hr] ? Math.round(h.temperature_2m[hr]) + "°F" : "",
    conditions: mapCondition(h.weather_code[hr] || 0),
    wind: h.wind_speed_10m[hr] ? Math.round(h.wind_speed_10m[hr]) + "" : "",
    precipitation: h.precipitation[hr] ? h.precipitation[hr].toFixed(2) : "0",
    humidity: h.relative_humidity_2m[hr] ? Math.round(h.relative_humidity_2m[hr]) + "%" : "",
  }));
}

  const updateWeather = (idx, field, val) => {

  const autoFillWeather = async () => {

    setWxLoading(false);
  };

  const addWorkLog = () => {
    setRForm(f => ({ ...f, workLogs: [...f.workLogs, { name: "", description: "", quantity: "", totalHours: "", hoursToDate: "", photos: [] }] }));
  };

  const removeWorkLog = (idx) => {
    setRForm(f => ({ ...f, workLogs: f.workLogs.filter((_,i) => i !== idx) }));
  };

  const updateWorkLog = (idx, field, val) => {
    setRForm(f => ({ ...f, workLogs: f.workLogs.map((w,i) => i === idx ? { ...w, [field]: val } : w) }));
  };

  const compressImage = (file, maxWidth = 1600, quality = 0.7) => {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          if (img.width <= maxWidth && file.size < 500000) {
            resolve(ev.target.result);
            return;
          }
          const canvas = document.createElement("canvas");
          const scale = Math.min(1, maxWidth / img.width);
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL("image/jpeg", quality));
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });
  };

  const handlePhotoUpload = (logIdx, e) => {
    const files = Array.from(e.target.files || []);
    files.forEach(async (file) => {
      const compressed = await compressImage(file);
      setRForm(f => ({
        ...f,
        workLogs: f.workLogs.map((w,i) => i === logIdx ? { ...w, photos: [...(w.photos||[]), { data: compressed, name: file.name, timestamp: new Date().toISOString() }] } : w)
      }));
    });
  };

  const removePhoto = (logIdx, photoIdx) => {
    setRForm(f => ({
      ...f,
      workLogs: f.workLogs.map((w,i) => i === logIdx ? { ...w, photos: w.photos.filter((_,j) => j !== photoIdx) } : w)
    }));
  };

  const updateSurvey = (key, val) => {
    setRForm(f => ({ ...f, survey: { ...f.survey, [key]: val } }));
  };
  const updateSurveyNote = (key, val) => {
    setRForm(f => ({ ...f, surveyNotes: { ...f.surveyNotes, [key]: val } }));
  };

  const totalPhotos = (r) => (r.workLogs || []).reduce((s,w) => s + (w.photos?.length || 0), 0);
  const totalWorkers = (r) => (r.workLogs || []).reduce((s,w) => s + (parseInt(w.quantity) || 0), 0);
  const totalHrs = (r) => (r.workLogs || []).reduce((s,w) => s + (parseFloat(w.totalHours) || 0), 0);

  const pdfImportRef = useRef(null);
  const [pdfImporting, setPdfImporting] = useState(false);

  const importPdfReport = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setPdfImporting(true);
    try {
      const ab = await file.arrayBuffer();
      const bytes = new Uint8Array(ab);
      const pdfText = new TextDecoder('latin1').decode(bytes);

      // Strategy 1: Check for embedded JSON data (from PDFs generated by this portal)
      const jsonMarker = pdfText.match(/PCG_REPORT_DATA_START([\s\S]*?)PCG_REPORT_DATA_END/);
      if (jsonMarker) {
        const reportData = JSON.parse(decodeURIComponent(jsonMarker[1]));
        const now = new Date().toISOString();
        const newReport = {
          ...reportData,
          id: nextId(),
          projectId: project.id,
          createdAt: now,
          updatedAt: now,
          importedFromPdf: true,
        };
        setDailyReports(prev => [...prev, newReport]);
        showAlert("success", `Imported report — ${newReport.date} by ${newReport.preparedBy || 'Unknown'} (${(newReport.workLogs||[]).filter(w=>w.name).length} work logs, ${(newReport.workLogs||[]).reduce((s,w)=>s+(w.photos?.length||0),0)} photos)`);
        setPdfImporting(false);
        if (pdfImportRef.current) pdfImportRef.current.value = '';
        return;
      }

      // Strategy 2: Render each page as an image snapshot (for image-based PDFs like html2pdf output)
      const lib = window['pdfjs-dist/build/pdf'] || window.pdfjsLib;
      if (!lib) throw new Error('PDF.js not loaded. Please refresh.');
      lib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const pdf = await lib.getDocument({ data: ab }).promise;

      const pageImages = [];
      for (let p = 1; p <= pdf.numPages; p++) {
        const page = await pdf.getPage(p);
        const scale = 2;
        const vp = page.getViewport({ scale });
        const canvas = document.createElement('canvas');
        canvas.width = vp.width;
        canvas.height = vp.height;
        const ctx = canvas.getContext('2d');
        await page.render({ canvasContext: ctx, viewport: vp }).promise;
        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        pageImages.push({ data: dataUrl, name: `page_${p}.jpg`, timestamp: new Date().toISOString() });
      }

      // Parse filename for date hints: "Drexel Hill Daily Report 3-15-26.pdf"
      let reportDate = new Date().toISOString().slice(0,10);
      const fnDateMatch = file.name.match(/(\d{1,2})-(\d{1,2})-(\d{2,4})/);
      if (fnDateMatch) {
        const yr = fnDateMatch[3].length === 2 ? '20' + fnDateMatch[3] : fnDateMatch[3];
        reportDate = `${yr}-${fnDateMatch[1].padStart(2,'0')}-${fnDateMatch[2].padStart(2,'0')}`;
      }

      const now = new Date().toISOString();
      const newReport = {
        ...EMPTY_DAILY_REPORT,
        id: nextId(),
        projectId: project.id,
        date: reportDate,
        jobNumber: project.pc ? `${project.pc}-001` : '',
        preparedBy: '',
        workLogs: [{ name: "Imported from PDF", description: "Report imported from PDF file: " + file.name, quantity: "", totalHours: "", hoursToDate: "", photos: pageImages }],
        status: 'draft',
        createdAt: now,
        updatedAt: now,
        importedFromPdf: true,
      };

      setDailyReports(prev => [...prev, newReport]);
      showAlert("success", `Imported ${pdf.numPages} page(s) as images from PDF — open the report to review and edit the details.`);
    } catch(err) {
      showAlert("error", "Failed to import PDF: " + err.message);
    } finally {
      setPdfImporting(false);
      if (pdfImportRef.current) pdfImportRef.current.value = '';
    }
  };

  const [pdfLoading, setPdfLoading] = useState(false);
  const [emailModal, setEmailModal] = useState(false);
  const [emailTo, setEmailTo] = useState("");
  const [emailSubject, setEmailSubject] = useState("");
  const [emailSending, setEmailSending] = useState(false);

  const generatePdf = async (reportId, download = true) => {
    const el = document.getElementById(`report-preview-${reportId}`);
    if (!el) return null;
    setPdfLoading(true);
    try {
      const reportData = dailyReports.find(r => r.id === reportId);
      const opt = {
        margin: [0.3, 0.3, 0.3, 0.3],
        filename: `Daily_Report_${reportId}.pdf`,
        image: { type: "jpeg", quality: 0.85 },
        html2canvas: { scale: 1.5, useCORS: true, letterRendering: true, logging: false },
        jsPDF: { unit: "in", format: "letter", orientation: "portrait" },
        pagebreak: { mode: ["css", "legacy"], avoid: [".pdf-no-break", ".work-log-entry", ".photo-item"] },
      };
      const worker = html2pdf().set(opt).from(el).toPdf();
      const pdfDoc = await worker.get('pdf');
      // Embed report JSON as PDF metadata (not visible text) for re-import
      if (reportData) {
        try {
          const stripped = { ...reportData, workLogs: (reportData.workLogs || []).map(w => ({ ...w, photos: (w.photos || []).map(p => ({ name: p.name, timestamp: p.timestamp })) })) };
          pdfDoc.setProperties({ keywords: 'PCG_REPORT:' + encodeURIComponent(JSON.stringify(stripped)) });
        } catch(e2) { /* metadata embedding optional */ }
      }
      if (download) {
        pdfDoc.save(opt.filename);
        setPdfLoading(false);
        return null;
      } else {
        const pdfBlob = pdfDoc.output('blob');
        setPdfLoading(false);
        return pdfBlob;
      }
    } catch(e) {
      showAlert && showAlert("error", "PDF generation failed: " + e.message);
      setPdfLoading(false);
      return null;
    }
  };

  const openEmailModal = (r) => {
    setEmailTo("");
    setEmailSubject(`Daily Construction Report - ${r.date ? new Date(r.date + "T12:00:00").toLocaleDateString("en-US", { month: "2-digit", day: "2-digit", year: "numeric" }) : "Report"} - ${project.nickname || project.pc || ""}`);
    setEmailModal(true);
  };

  const generateEmailPdf = async (reportId) => {
    // Generate a smaller PDF for email by reducing image quality and scale
    const el = document.getElementById(`report-preview-${reportId}`);
    if (!el) return null;
    try {
      const opt = {
        margin: [0.3, 0.3, 0.3, 0.3],
        image: { type: "jpeg", quality: 0.5 },
        html2canvas: { scale: 1, useCORS: true, letterRendering: true, logging: false },
        jsPDF: { unit: "in", format: "letter", orientation: "portrait" },
        pagebreak: { mode: ["css", "legacy"], avoid: [".pdf-no-break", ".work-log-entry", ".photo-item"] },
      };
      const worker = html2pdf().set(opt).from(el).toPdf();
      const pdfDoc = await worker.get('pdf');
      return pdfDoc.output('blob');
    } catch { return null; }
  };

  const sendEmailWithPdf = async (reportId, r) => {
    if (!emailTo.trim()) { showAlert && showAlert("error", "Please enter an email address"); return; }
    setEmailSending(true);
    try {
      // Use lower quality PDF for email to stay under payload limits
      const pdfBlob = await generateEmailPdf(reportId);
      if (!pdfBlob) { showAlert && showAlert("error", "PDF generation failed"); setEmailSending(false); return; }

      // Check size — Netlify function payload limit is ~5.5MB
      const sizeMB = pdfBlob.size / (1024 * 1024);
      if (sizeMB > 4.5) {
        // Too large even with compression — send email without attachment but with link
        const res = await fetch("/.netlify/functions/notify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            to: emailTo.split(",").map(e => e.trim()).filter(Boolean),
            subject: emailSubject,
            body: `<p>Please find the Daily Construction Report summary for <strong>${project.nickname || project.pc}</strong> dated <strong>${r.date ? new Date(r.date + "T12:00:00").toLocaleDateString() : "N/A"}</strong>.</p>
              <p>Prepared by: ${r.preparedBy || "N/A"}</p>
              <p><strong>Note:</strong> This report contains ${(r.workLogs||[]).reduce((s,w)=>s+(w.photos?.length||0),0)} photos and is too large to attach via email (${sizeMB.toFixed(1)}MB). Please view the full report with photos in the <a href="https://pcg-ops.netlify.app">PCG Portal</a> under Projects → ${project.nickname || project.pc} → Daily Reports.</p>
              <hr>
              <h3>Report Summary</h3>
              <p><strong>Weather:</strong> ${(r.weather||[]).map(w => w.time + ': ' + (w.temp||'—') + ' ' + (w.conditions||'')).join(' | ')}</p>
              <p><strong>Work Logs:</strong></p>
              <ul>${(r.workLogs||[]).filter(w=>w.name).map(w => '<li><strong>'+w.name+'</strong> (Qty: '+(w.quantity||0)+') — '+(w.description||'No description')+'</li>').join('')}</ul>
              <p><strong>Total:</strong> ${totalWorkers(r)} workers | ${totalHrs(r)} hours</p>
              ${r.generalNotes ? '<p><strong>General Notes:</strong> '+r.generalNotes+'</p>' : ''}`,
          }),
        });
        if (res.ok) {
          showAlert && showAlert("success", "Email sent (report summary — photos too large to attach)");
          setEmailModal(false);
        } else {
          const errText = await res.text().catch(() => '');
          showAlert && showAlert("error", "Failed to send email" + (errText ? ': ' + errText : ''));
        }
      } else {
        const reader = new FileReader();
        const base64 = await new Promise((resolve) => {
          reader.onload = () => resolve(reader.result.split(",")[1]);
          reader.readAsDataURL(pdfBlob);
        });
        const res = await fetch("/.netlify/functions/notify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            to: emailTo.split(",").map(e => e.trim()).filter(Boolean),
            subject: emailSubject,
            body: `<p>Please find attached the Daily Construction Report for <strong>${project.nickname || project.pc}</strong> dated <strong>${r.date ? new Date(r.date + "T12:00:00").toLocaleDateString() : "N/A"}</strong>.</p><p>Prepared by: ${r.preparedBy || "N/A"}</p>`,
            attachments: [{ filename: `Daily_Report_${r.date || reportId}.pdf`, content: base64 }],
          }),
        });
        if (res.ok) {
          showAlert && showAlert("success", "Email sent with PDF attached");
          setEmailModal(false);
        } else {
          const errText = await res.text().catch(() => '');
          showAlert && showAlert("error", "Failed to send email" + (errText ? ': ' + errText : ''));
        }
      }
    } catch(e) {
      showAlert && showAlert("error", "Email failed: " + e.message);
    }
    setEmailSending(false);
  };

  // ── Report Preview ──
  if (drView === "preview" && editReport !== null) {
    const r = dailyReports.find(rep => rep.id === editReport);
    if (!r) { setDrView("list"); return null; }
    return (
      <div className="fade-in">
        <div style={{ display: "flex", gap: "0.5rem", marginBottom: "1rem" }}>
          <button onClick={() => { setDrView("list"); setEditReport(null); }} style={btn(th, { background: th.card3, color: th.muted, padding: "0.4rem 1rem", fontSize: "0.8125rem" })}>← Back</button>
          {editable && <button onClick={() => startEditReport(r)} style={btn(th, { padding: "0.4rem 1rem", fontSize: "0.8125rem" })}>Edit</button>}
          {editable && <button onClick={() => { saveReport("submitted"); }} style={btn(th, { padding: "0.4rem 1rem", fontSize: "0.8125rem", background: "#22c55e", color: "#fff" })} disabled={r.status==="submitted"}>
            {r.status === "submitted" ? "Submitted" : "Submit & Sign"}
          </button>}
          <button onClick={() => generatePdf(r.id)} disabled={pdfLoading} style={btn(th, { padding: "0.4rem 1rem", fontSize: "0.8125rem", background: "#2563eb", color: "#fff" })}>
            {pdfLoading ? "Generating..." : "Export PDF"}
          </button>
          <button onClick={() => openEmailModal(r)} style={btn(th, { padding: "0.4rem 1rem", fontSize: "0.8125rem", background: "#8b5cf6", color: "#fff" })}>
            Email Report
          </button>
        </div>

        {/* Email Modal */}
        {emailModal && (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 9999 }}>
            <div style={{ background: th.card, borderRadius: "0.75rem", padding: "1.5rem", width: "100%", maxWidth: 480, boxShadow: "0 20px 60px rgba(0,0,0,0.3)" }}>
              <div style={{ fontWeight: 700, fontSize: "1rem", color: th.text, marginBottom: "1rem" }}>Email Daily Report</div>
              <div style={{ marginBottom: "0.75rem" }}>
                <label style={{ fontSize: "0.75rem", color: th.muted, fontWeight: 600, display: "block", marginBottom: "0.25rem" }}>To (comma-separated)</label>
                <input style={inp(th, { fontSize: "0.875rem" })} placeholder="email@example.com" value={emailTo} onChange={e => setEmailTo(e.target.value)} />
              </div>
              <div style={{ marginBottom: "1rem" }}>
                <label style={{ fontSize: "0.75rem", color: th.muted, fontWeight: 600, display: "block", marginBottom: "0.25rem" }}>Subject</label>
                <input style={inp(th, { fontSize: "0.875rem" })} value={emailSubject} onChange={e => setEmailSubject(e.target.value)} />
              </div>
              <div style={{ fontSize: "0.75rem", color: th.muted, marginBottom: "1rem", padding: "0.5rem", background: th.card2, borderRadius: "0.375rem" }}>
                The daily report PDF will be generated and attached automatically.
              </div>
              <div style={{ display: "flex", gap: "0.5rem", justifyContent: "flex-end" }}>
                <button onClick={() => setEmailModal(false)} style={btn(th, { background: th.card3, color: th.muted, padding: "0.4rem 1rem", fontSize: "0.8125rem" })}>Cancel</button>
                <button onClick={() => sendEmailWithPdf(r.id, r)} disabled={emailSending} style={btn(th, { padding: "0.4rem 1rem", fontSize: "0.8125rem", background: "#8b5cf6", color: "#fff" })}>
                  {emailSending ? "Sending..." : "Send Email"}
                </button>
              </div>
            </div>
          </div>
        )}

        {/* Branded report preview */}
        <div id={`report-preview-${r.id}`} style={{ background: "#fff", color: "#111", borderRadius: "0.75rem", overflow: "hidden", border: "1px solid #ddd" }}>
          {/* Header bar */}
          <div style={{ background: "#FF671F", padding: "16px 24px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div>
              <div style={{ color: "#fff", fontWeight: 800, fontSize: "1.25rem", fontFamily: "'Raleway'" }}>Premier Project Developers</div>
              <div style={{ color: "#ffffffcc", fontSize: "0.75rem" }}>Daily Construction Report</div>
            </div>
            <div style={{ color: "#fff", textAlign: "right", fontSize: "0.75rem" }}>
              <div style={{ fontWeight: 700 }}>{r.date ? new Date(r.date + "T12:00:00").toLocaleDateString("en-US", { weekday: "short", month: "2-digit", day: "2-digit", year: "numeric" }) : ""}</div>
              <div>Job # {r.jobNumber || "N/A"}</div>
            </div>
          </div>

          <div style={{ padding: "20px 24px" }}>
            {/* Project info */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0.5rem", marginBottom: "1.25rem", fontSize: "0.8125rem" }}>
              <div><strong>{project.nickname || project.pc}</strong></div>
              <div style={{ textAlign: "right", color: "#666" }}>Prepared by: {r.preparedBy}</div>
              <div style={{ color: "#666" }}>{project.address}{project.city ? `, ${project.city}` : ""} {project.state} {project.zip}</div>
            </div>

            {/* Weather */}
            <div style={{ marginBottom: "1.25rem" }}>
              <div style={{ fontWeight: 700, fontSize: "0.875rem", borderBottom: "2px solid #FF671F", paddingBottom: "0.25rem", marginBottom: "0.75rem" }}>Weather</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: "0.75rem" }}>
                {(r.weather || []).map((w, i) => (
                  <div key={i} style={{ background: "#f9f9f9", borderRadius: "0.5rem", padding: "0.75rem", textAlign: "center" }}>
                    <div style={{ fontWeight: 600, fontSize: "0.75rem", color: "#666" }}>{w.time}</div>
                    <div style={{ fontSize: "1.5rem", fontWeight: 800 }}>{w.temp}{w.temp ? "°" : "—"}</div>
                    <div style={{ fontSize: "1.5rem", marginBottom: "0.125rem" }}>{WEATHER_ICONS[w.conditions] || ""}</div>
                    <div style={{ fontSize: "0.6875rem", color: "#888" }}>{w.conditions || "—"}</div>
                    <div style={{ fontSize: "0.625rem", color: "#aaa", marginTop: "0.25rem" }}>
                      Wind: {w.wind || "0"} MPH | Precip: {w.precipitation || ".0"}" | Hum: {w.humidity || "0"}%
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Work Logs */}
            <div style={{ marginBottom: "1.25rem" }}>
              <div style={{ fontWeight: 700, fontSize: "0.875rem", borderBottom: "2px solid #FF671F", paddingBottom: "0.25rem", marginBottom: "0.75rem" }}>Work Logs</div>
              {(r.workLogs || []).filter(w => w.name).map((w, i) => (
                <div key={i} className="work-log-entry" style={{ marginBottom: "1rem", borderBottom: "1px solid #eee", paddingBottom: "0.75rem", pageBreakInside: "avoid", breakInside: "avoid" }}>
                  <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr", gap: "0.5rem", fontSize: "0.8125rem", marginBottom: "0.5rem" }}>
                    <div><strong>{w.name}</strong></div>
                    <div style={{ textAlign: "center" }}>Qty: {w.quantity || 0}</div>
                    <div style={{ textAlign: "center" }}>Hours: {w.totalHours || 0}</div>
                    <div style={{ textAlign: "center" }}>HTD: {w.hoursToDate || 0}</div>
                  </div>
                  {w.description && <div style={{ fontSize: "0.8125rem", color: "#444", marginBottom: "0.5rem" }}>{w.description}</div>}
                  {w.photos && w.photos.length > 0 && (
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: "0.5rem" }}>
                      {w.photos.map((p, pi) => (
                        <div key={pi} className="photo-item" style={{ position: "relative", pageBreakInside: "avoid", breakInside: "avoid" }}>
                          <img src={p.data} alt={p.name} style={{ width: "100%", borderRadius: "0.375rem", aspectRatio: "4/3", objectFit: "cover", maxHeight: "200px" }} />
                          <div style={{ position: "absolute", bottom: 4, left: 4, background: "#000000aa", color: "#fff", fontSize: "0.5rem", padding: "1px 4px", borderRadius: 3 }}>
                            {p.timestamp ? new Date(p.timestamp).toLocaleString("en-US", { month: "2-digit", day: "2-digit", year: "2-digit", hour: "2-digit", minute: "2-digit" }) : ""}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              ))}
              {(r.workLogs || []).filter(w => w.name).length === 0 && <div style={{ fontSize: "0.8125rem", color: "#999" }}>No work logs recorded.</div>}
              <div style={{ display: "flex", justifyContent: "flex-end", fontSize: "0.8125rem", fontWeight: 600, paddingTop: "0.5rem", borderTop: "1px solid #ddd" }}>
                Total: {totalWorkers(r)} workers | {totalHrs(r)} hours
              </div>
            </div>

            {/* Materials / Equipment / Notes sections */}
            {[
              { label: "Materials", val: r.materials },
              { label: "Equipment", val: r.equipment },
              { label: "General Notes", val: r.generalNotes },
              { label: "Site Safety Observations", val: r.safetyNotes },
              { label: "Quality Control Observations", val: r.qualityNotes },
            ].map(sec => (
              <div key={sec.label} className="pdf-no-break" style={{ marginBottom: "1rem" }}>
                <div style={{ fontWeight: 700, fontSize: "0.875rem", borderBottom: "2px solid #FF671F", paddingBottom: "0.25rem", marginBottom: "0.5rem" }}>{sec.label}</div>
                <div style={{ fontSize: "0.8125rem", color: sec.val ? "#333" : "#999" }}>{sec.val || "No entry"}</div>
              </div>
            ))}

            {/* Survey */}
            <div className="pdf-no-break" style={{ marginBottom: "1rem" }}>
              <div style={{ fontWeight: 700, fontSize: "0.875rem", borderBottom: "2px solid #FF671F", paddingBottom: "0.25rem", marginBottom: "0.5rem" }}>Survey</div>
              <table style={{ width: "100%", fontSize: "0.8125rem", borderCollapse: "collapse" }}>
                <thead><tr style={{ borderBottom: "1px solid #ddd" }}>
                  <th style={{ textAlign: "left", padding: "0.4rem 0", color: "#666", fontWeight: 600 }}>Question</th>
                  <th style={{ width: 50, textAlign: "center", color: "#666", fontWeight: 600 }}>N/A</th>
                  <th style={{ width: 50, textAlign: "center", color: "#666", fontWeight: 600 }}>No</th>
                  <th style={{ width: 50, textAlign: "center", color: "#666", fontWeight: 600 }}>Yes</th>
                  <th style={{ textAlign: "left", padding: "0.4rem 0.5rem", color: "#666", fontWeight: 600 }}>Notes</th>
                </tr></thead>
                <tbody>{SURVEY_QUESTIONS.map((q, i) => (
                  <tr key={q.key} style={{ borderBottom: "1px solid #eee" }}>
                    <td style={{ padding: "0.4rem 0" }}>{i+1}. {q.label}</td>
                    <td style={{ textAlign: "center" }}>{r.survey?.[q.key] === null ? "●" : ""}</td>
                    <td style={{ textAlign: "center" }}>{r.survey?.[q.key] === false ? "●" : ""}</td>
                    <td style={{ textAlign: "center" }}>{r.survey?.[q.key] === true ? "●" : ""}</td>
                    <td style={{ padding: "0.4rem 0.5rem", color: "#666", fontSize: "0.75rem" }}>{r.surveyNotes?.[q.key] || ""}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>

            {/* Signature */}
            {r.signature && (
              <div style={{ marginTop: "1.5rem", paddingTop: "1rem", borderTop: "2px solid #333" }}>
                <div style={{ fontSize: "0.8125rem" }}>I, <strong>{r.signature}</strong>, have reviewed and completed this report.</div>
                <div style={{ fontSize: "0.75rem", color: "#666" }}>{r.signedAt ? new Date(r.signedAt).toLocaleString() : ""}</div>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  // ── Create / Edit Report Form ──
  if (drView === "create") {
    return (
      <div className="fade-in">
        <div style={{ display: "flex", gap: "0.5rem", marginBottom: "1rem", flexWrap: "wrap" }}>
          <button onClick={() => { setDrView("list"); setEditReport(null); }} style={btn(th, { background: th.card3, color: th.muted, padding: "0.4rem 1rem", fontSize: "0.8125rem" })}>← Cancel</button>
          <button onClick={() => saveReport("draft")} style={btn(th, { padding: "0.4rem 1rem", fontSize: "0.8125rem" })}>Save Draft</button>
          <button onClick={() => saveReport("submitted")} style={btn(th, { padding: "0.4rem 1rem", fontSize: "0.8125rem", background: "#22c55e", color: "#fff" })}>Submit & Sign</button>
        </div>

        <div style={{ fontSize: "0.75rem", fontWeight: 600, color: "#FF671F", textTransform: "uppercase", letterSpacing: 1, marginBottom: "1rem" }}>
          {editReport ? "Edit Daily Report" : "New Daily Report"}
        </div>

        {/* Basic info */}
        <div style={{ ...card(th), padding: "1.25rem", marginBottom: "1rem" }}>
          <div style={{ fontWeight: 700, fontSize: "0.875rem", color: th.text, marginBottom: "0.75rem" }}>Report Details</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "0.75rem" }}>
            <div><label style={{ fontSize: "0.6875rem", color: th.muted, fontWeight: 600 }}>Date</label><input type="date" style={inp(th)} value={rForm.date} onChange={e => setRForm(f => ({ ...f, date: e.target.value }))} /></div>
            <div><label style={{ fontSize: "0.6875rem", color: th.muted, fontWeight: 600 }}>Job #</label><input style={inp(th)} value={rForm.jobNumber} onChange={e => setRForm(f => ({ ...f, jobNumber: e.target.value }))} /></div>
            <div><label style={{ fontSize: "0.6875rem", color: th.muted, fontWeight: 600 }}>Prepared By</label><input style={inp(th)} value={rForm.preparedBy} onChange={e => setRForm(f => ({ ...f, preparedBy: e.target.value }))} /></div>
          </div>
        </div>

        {/* Weather */}
        <div style={{ ...card(th), padding: "1.25rem", marginBottom: "1rem" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.75rem" }}>
            <div style={{ fontWeight: 700, fontSize: "0.875rem", color: th.text }}>
              {wxLoading ? "⏳ Loading Weather..." : "🌤️ Weather"}
              {project.zip && <span style={{ fontSize: "0.7rem", color: th.muted, fontWeight: 400, marginLeft: "0.5rem" }}>({project.zip})</span>}
            </div>
            <button onClick={autoFillWeather} disabled={wxLoading} style={btn(th, { padding: "0.25rem 0.6rem", fontSize: "0.65rem", opacity: wxLoading ? 0.6 : 1 })}>
              🔄 Refresh
            </button>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: "0.75rem" }}>
            {rForm.weather.map((w, i) => {
              const icon = WEATHER_ICONS[w.conditions] || "🌡️";
              const hasData = !!w.temp;
              return (
              <div key={i} style={{ background: th.card2, borderRadius: "0.75rem", padding: "1rem", textAlign: "center" }}>
                <div style={{ fontWeight: 600, fontSize: "0.7rem", color: th.muted, marginBottom: "0.5rem", textTransform: "uppercase", letterSpacing: 1 }}>{w.time}</div>
                {hasData ? (
                  <>
                    <div style={{ fontSize: "2rem", marginBottom: "0.25rem", lineHeight: 1 }}>{icon}</div>
                    <div style={{ fontSize: "1.25rem", fontWeight: 700, color: th.text, marginBottom: "0.125rem" }}>{w.temp}</div>
                    <div style={{ fontSize: "0.7rem", color: th.muted, marginBottom: "0.5rem" }}>{w.conditions}</div>
                    <div style={{ display: "flex", justifyContent: "center", gap: "0.75rem", fontSize: "0.65rem", color: th.muted }}>
                      <span title="Wind">💨 {w.wind} mph</span>
                      <span title="Humidity">💧 {w.humidity}</span>
                      {parseFloat(w.precipitation) > 0 && <span title="Precipitation">🌧️ {w.precipitation}"</span>}
                    </div>
                  </>
                ) : wxLoading ? (
                  <div style={{ padding: "1rem 0", color: th.muted, fontSize: "0.8rem" }}>Loading...</div>
                ) : (
                  <div style={{ padding: "0.5rem 0", color: th.muted, fontSize: "0.75rem" }}>No data</div>
                )}
                {/* Hidden editable fields — toggle with pencil */}
                <details style={{ marginTop: "0.5rem", textAlign: "left" }}>
                  <summary style={{ fontSize: "0.6rem", color: th.muted, cursor: "pointer", textAlign: "center" }}>✏️ Edit</summary>
                  <div style={{ display: "grid", gap: "0.3rem", marginTop: "0.375rem" }}>
                    <input style={inp(th, { fontSize: "0.7rem" })} placeholder="Temp (°F)" value={w.temp} onChange={e => updateWeather(i, "temp", e.target.value)} />
                    <select style={inp(th, { fontSize: "0.7rem" })} value={w.conditions} onChange={e => updateWeather(i, "conditions", e.target.value)}>
                      <option value="">Conditions...</option>
                      {WEATHER_CONDITIONS.map(c => <option key={c}>{WEATHER_ICONS[c] || ""} {c}</option>)}
                    </select>
                    <input style={inp(th, { fontSize: "0.7rem" })} placeholder="Wind MPH" value={w.wind} onChange={e => updateWeather(i, "wind", e.target.value)} />
                    <input style={inp(th, { fontSize: "0.7rem" })} placeholder="Precip (in)" value={w.precipitation} onChange={e => updateWeather(i, "precipitation", e.target.value)} />
                    <input style={inp(th, { fontSize: "0.7rem" })} placeholder="Humidity %" value={w.humidity} onChange={e => updateWeather(i, "humidity", e.target.value)} />
                  </div>
                </details>
              </div>
              );
            })}
          </div>
        </div>

        {/* Work Logs */}
        <div style={{ ...card(th), padding: "1.25rem", marginBottom: "1rem" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.75rem" }}>
            <div style={{ fontWeight: 700, fontSize: "0.875rem", color: th.text }}>Work Logs</div>
            <button onClick={addWorkLog} style={btn(th, { padding: "0.3rem 0.75rem", fontSize: "0.75rem" })}>+ Add Entry</button>
          </div>
          {rForm.workLogs.map((wl, idx) => (
            <div key={idx} style={{ background: th.card2, borderRadius: "0.5rem", padding: "1rem", marginBottom: "0.75rem" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.5rem" }}>
                <span style={{ fontSize: "0.6875rem", fontWeight: 600, color: th.muted }}>Entry #{idx+1}</span>
                {rForm.workLogs.length > 1 && <button onClick={() => removeWorkLog(idx)} style={{ background: "none", border: "none", color: "#ff4444", cursor: "pointer", fontSize: "0.75rem" }}>Remove</button>}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: "0.5rem", marginBottom: "0.5rem" }}>
                <div><label style={{ fontSize: "0.625rem", color: th.muted, fontWeight: 600 }}>Trade/Name</label><input style={inp(th, { fontSize: "0.8125rem" })} placeholder="e.g. Framing, Plumbing" value={wl.name} onChange={e => updateWorkLog(idx, "name", e.target.value)} /></div>
                <div><label style={{ fontSize: "0.625rem", color: th.muted, fontWeight: 600 }}>Workers</label><input type="number" style={inp(th, { fontSize: "0.8125rem" })} placeholder="0" value={wl.quantity} onChange={e => updateWorkLog(idx, "quantity", e.target.value)} /></div>
              </div>
              <div style={{ marginBottom: "0.5rem" }}>
                <label style={{ fontSize: "0.625rem", color: th.muted, fontWeight: 600 }}>Description</label>
                <textarea style={inp(th, { fontSize: "0.8125rem", minHeight: 50, resize: "vertical" })} placeholder="Work performed..." value={wl.description} onChange={e => updateWorkLog(idx, "description", e.target.value)} />
              </div>
              {/* Photos */}
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: "0.5rem", marginBottom: "0.375rem" }}>
                  <label style={{ fontSize: "0.625rem", color: th.muted, fontWeight: 600 }}>Photos</label>
                  <label style={{ ...btn(th, { padding: "0.2rem 0.5rem", fontSize: "0.625rem", cursor: "pointer" }) }}>
                    + Upload
                    <input type="file" accept="image/*" multiple style={{ display: "none" }} onChange={e => handlePhotoUpload(idx, e)} />
                  </label>
                </div>
                {wl.photos && wl.photos.length > 0 && (
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(80px, 1fr))", gap: "0.375rem" }}>
                    {wl.photos.map((p, pi) => (
                      <div key={pi} style={{ position: "relative" }}>
                        <img src={p.data} alt={p.name} style={{ width: "100%", borderRadius: "0.375rem", aspectRatio: "1", objectFit: "cover" }} />
                        <button onClick={() => removePhoto(idx, pi)} style={{ position: "absolute", top: 2, right: 2, background: "#ff4444", color: "#fff", border: "none", borderRadius: "50%", width: 18, height: 18, fontSize: "0.625rem", cursor: "pointer", lineHeight: "18px", padding: 0 }}>×</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>

        {/* Materials / Equipment / Notes */}
        <div style={{ ...card(th), padding: "1.25rem", marginBottom: "1rem" }}>
          <div style={{ fontWeight: 700, fontSize: "0.875rem", color: th.text, marginBottom: "0.75rem" }}>Additional Details</div>
          <div style={{ display: "grid", gap: "0.75rem" }}>
            {[
              { key: "materials", label: "Materials" },
              { key: "equipment", label: "Equipment" },
              { key: "generalNotes", label: "General Notes" },
              { key: "safetyNotes", label: "Site Safety Observations" },
              { key: "qualityNotes", label: "Quality Control Observations" },
            ].map(f => (
              <div key={f.key}>
                <label style={{ fontSize: "0.6875rem", color: th.muted, fontWeight: 600 }}>{f.label}</label>
                <textarea style={inp(th, { fontSize: "0.8125rem", minHeight: 50, resize: "vertical" })} placeholder={`${f.label}...`} value={rForm[f.key]} onChange={e => setRForm(prev => ({ ...prev, [f.key]: e.target.value }))} />
              </div>
            ))}
          </div>
        </div>

        {/* Survey */}
        <div style={{ ...card(th), padding: "1.25rem", marginBottom: "1rem" }}>
          <div style={{ fontWeight: 700, fontSize: "0.875rem", color: th.text, marginBottom: "0.75rem" }}>End of Day Survey</div>
          <div style={{ display: "grid", gap: "0.5rem" }}>
            {SURVEY_QUESTIONS.map(q => (
              <div key={q.key} style={{ display: "grid", gridTemplateColumns: "1fr auto auto auto 1fr", gap: "0.5rem", alignItems: "center", padding: "0.375rem 0.5rem", background: th.card2, borderRadius: "0.375rem" }}>
                <span style={{ fontSize: "0.8125rem", color: th.text }}>{q.label}</span>
                {[{ label: "N/A", val: null }, { label: "No", val: false }, { label: "Yes", val: true }].map(opt => (
                  <button key={opt.label} onClick={() => updateSurvey(q.key, opt.val)}
                    style={{ padding: "0.25rem 0.625rem", borderRadius: "0.375rem", fontSize: "0.6875rem", fontWeight: 600, cursor: "pointer", border: "1px solid " + th.cardBorder,
                      background: rForm.survey[q.key] === opt.val ? (opt.val === true ? "#22c55e22" : opt.val === false ? "#ff444422" : th.card3) : "transparent",
                      color: rForm.survey[q.key] === opt.val ? (opt.val === true ? "#22c55e" : opt.val === false ? "#ff4444" : th.muted) : th.muted }}>
                    {opt.label}
                  </button>
                ))}
                <input style={inp(th, { fontSize: "0.75rem" })} placeholder="Notes..." value={rForm.surveyNotes[q.key] || ""} onChange={e => updateSurveyNote(q.key, e.target.value)} />
              </div>
            ))}
          </div>
        </div>

        {/* Save buttons at bottom */}
        <div style={{ display: "flex", gap: "0.5rem" }}>
          <button onClick={() => saveReport("draft")} style={btn(th, { padding: "0.5rem 1.25rem" })}>Save Draft</button>
          <button onClick={() => saveReport("submitted")} style={btn(th, { padding: "0.5rem 1.25rem", background: "#22c55e", color: "#fff" })}>Submit & Sign</button>
        </div>
      </div>
    );
  }

  // ── Report List ──
  return (
    <div className="fade-in">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1rem" }}>
        <div style={{ fontWeight: 700, fontSize: "1rem", color: th.text }}>Daily Reports</div>
        {editable && <div style={{ display: "flex", gap: "0.5rem" }}>
          <button onClick={startCreate} style={btn(th, { padding: "0.4rem 1rem", fontSize: "0.8125rem" })}>+ New Report</button>
          <label style={{ ...btn(th, { padding: "0.4rem 1rem", fontSize: "0.8125rem", background: th.card3, color: th.muted, cursor: "pointer" }), display: "inline-flex", alignItems: "center", gap: "0.25rem", opacity: pdfImporting ? 0.6 : 1 }}>
            <input ref={pdfImportRef} type="file" accept=".pdf" style={{ display: "none" }} onChange={importPdfReport} disabled={pdfImporting} />
            {pdfImporting ? "⏳ Importing..." : "📄 Import PDF"}
          </label>
        </div>}
      </div>

      {projReports.length === 0 ? (
        <div style={{ ...card(th), padding: "2rem", textAlign: "center" }}>
          <div style={{ fontSize: "2rem", marginBottom: "0.5rem" }}>📋</div>
          <div style={{ color: th.muted, fontSize: "0.875rem" }}>No daily reports yet.</div>
          {editable && <div style={{ display: "flex", gap: "0.5rem", justifyContent: "center", marginTop: "0.75rem" }}>
            <button onClick={startCreate} style={{ ...btn(th), fontSize: "0.8125rem" }}>Create First Report</button>
            <label style={{ ...btn(th, { background: th.card3, color: th.muted, cursor: "pointer" }), display: "inline-flex", alignItems: "center", gap: "0.25rem", fontSize: "0.8125rem", opacity: pdfImporting ? 0.6 : 1 }}>
              <input ref={pdfImportRef} type="file" accept=".pdf" style={{ display: "none" }} onChange={importPdfReport} disabled={pdfImporting} />
              {pdfImporting ? "⏳ Importing..." : "📄 Import PDF"}
            </label>
          </div>}
        </div>
      ) : (
        <div style={{ display: "grid", gap: "0.625rem" }}>
          {projReports.map(r => (
            <div key={r.id} style={{ ...card(th), padding: "1rem", display: "grid", gridTemplateColumns: "auto 1fr auto", gap: "1rem", alignItems: "center", cursor: "pointer" }}
              onClick={() => { setEditReport(r.id); setDrView("preview"); }}>
              <div style={{ width: 48, height: 48, borderRadius: "0.5rem", background: r.status === "submitted" ? "#22c55e22" : "#f59e0b22", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "1.25rem" }}>
                {r.status === "submitted" ? "✅" : "📝"}
              </div>
              <div>
                <div style={{ fontWeight: 600, fontSize: "0.875rem", color: th.text }}>
                  {r.date ? new Date(r.date + "T12:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric", year: "numeric" }) : "No date"}
                </div>
                <div style={{ fontSize: "0.75rem", color: th.muted }}>
                  {r.preparedBy || "—"} · {(r.workLogs||[]).filter(w=>w.name).length} logs · {totalPhotos(r)} photos · {totalWorkers(r)} workers
                </div>
              </div>
              <div style={{ display: "flex", gap: "0.375rem", alignItems: "center" }}>
                <span style={{ padding: "0.188rem 0.5rem", borderRadius: "1rem", fontSize: "0.625rem", fontWeight: 600, background: r.status === "submitted" ? "#22c55e22" : "#f59e0b22", color: r.status === "submitted" ? "#22c55e" : "#f59e0b" }}>
                  {r.status === "submitted" ? "Submitted" : "Draft"}
                </span>
                {editable && <button onClick={e => { e.stopPropagation(); deleteReport(r.id); }} style={{ background: "none", border: "none", color: "#ff4444", cursor: "pointer", fontSize: "0.875rem", padding: "0.25rem" }}>🗑</button>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Admin: Project Tracker ────────────────────────────────────────────────────
function AdminProjects({ projects, setProjects, stores, districts, user, th, showAlert, notifications, setNotifications, setTab, dailyReports: _dr, setDailyReports, deepLinkRef, chatChannels, setChatChannels, chatMessages, setChatMessages, chatReadState, setChatReadState, users: allUsers }) {
  const dailyReports = _dr || [];
  const [view, setView] = useState("table"); // "table" | "board" | "detail"
  const [selectedProject, setSelectedProject] = useState(null);
  const [detailTab, setDetailTab] = useState("checklist"); // "checklist" | "reports"
  const [addMode, setAddMode] = useState(false);
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({ ...EMPTY_PROJECT });
  const [filterType, setFilterType] = useState("All");
  const [filterPhase, setFilterPhase] = useState("All");
  const [search, setSearch] = useState("");
  const [manualAddr, setManualAddr] = useState(false);
  const [sortCol, setSortCol] = useState("priority");
  const [sortDir, setSortDir] = useState("asc");
  const [reorderLocked, setReorderLocked] = useState(true);
  const [dragIdx, setDragIdx] = useState(null);
  const [dragOverIdx, setDragOverIdx] = useState(null);

  // Deep-link: auto-open project from email link
  useEffect(() => {
    if (deepLinkRef?.current) {
      const proj = projects.find(p => p.id === deepLinkRef.current);
      if (proj) { setSelectedProject(proj); setView("detail"); }
      deepLinkRef.current = null;
    }
  }, []);

  const editable = canEditProjects(user);
  const nextId = () => Math.max(0, ...projects.map(p => p.id)) + 1;

  // Auto-fill from stores when PC# changes
  const handlePcBlur = () => {
    const match = stores.find(s => s.pc === form.pc);
    if (match) {
      setForm(f => ({ ...f, address: match.address || "", city: match.city || "", state: match.state || "", zip: match.zip || "", district: match.district, nickname: f.nickname || match.name || "" }));
      setManualAddr(false);
    } else {
      setManualAddr(true);
    }
  };

  const save = () => {
    if (!form.pc && !form.nickname) { showAlert("error", "PC# or nickname required"); return; }
    const now = new Date().toISOString();
    if (editId) {
      setProjects(ps => ps.map(p => p.id === editId ? { ...form, id: editId, updatedAt: now, lastEditedBy: user?.name || "Unknown", lastEditedAt: now } : p));
      showAlert("success", "Project updated");
      setEditId(null);
    } else {
      const newProj = { ...form, id: nextId(), createdAt: now, createdBy: user?.name || "", updatedAt: now, lastEditedBy: user?.name || "Unknown", lastEditedAt: now };
      setProjects(ps => [...ps, newProj]);
      showAlert("success", "Project added");
    }
    setForm({ ...EMPTY_PROJECT });
    setAddMode(false);
  };

  const startEdit = (p) => { setEditId(p.id); setForm({ ...p }); setAddMode(true); setManualAddr(!stores.find(s => s.pc === p.pc)); };
  const deleteProject = (id) => { setProjects(ps => ps.filter(p => p.id !== id)); showAlert("success", "Project deleted"); };

  // Update a single checklist item
  const updateItem = (projId, key, value) => {
    if (!editable) return;
    const editNow = new Date().toISOString();
    setProjects(ps => ps.map(p => p.id === projId ? { ...p, [key]: value, updatedAt: editNow, lastEditedBy: user?.name || "Unknown", lastEditedAt: editNow } : p));
  };

  // Filter & sort
  const isDM = user?.userType === "dm";
  const filtered = projects.filter(p => {
    if (isDM && p.district !== user.district) return false;
    if (filterType !== "All" && p.type !== filterType) return false;
    if (filterPhase !== "All" && getCurrentPhase(p).id !== filterPhase) return false;
    if (search.trim()) {
      const q = search.toLowerCase();
      return (p.pc || "").toLowerCase().includes(q) || (p.nickname || "").toLowerCase().includes(q) || (p.address || "").toLowerCase().includes(q);
    }
    return true;
  });

  // Sort for table view
  const sorted = [...filtered].sort((a, b) => {
    let av, bv;
    if (sortCol === "priority") { av = a.priority || 99; bv = b.priority || 99; }
    else if (sortCol === "nickname") { av = (a.nickname || a.pc || "").toLowerCase(); bv = (b.nickname || b.pc || "").toLowerCase(); }
    else if (sortCol === "type") { av = a.type; bv = b.type; }
    else if (sortCol === "phase") { av = getCurrentPhase(a).label; bv = getCurrentPhase(b).label; }
    else if (sortCol === "progress") { av = getOverallCompletion(a); bv = getOverallCompletion(b); }
    else if (sortCol === "dueDate") { av = a.dueDate || "9999"; bv = b.dueDate || "9999"; }
    else { av = a[sortCol] || ""; bv = b[sortCol] || ""; }
    const cmp = av < bv ? -1 : av > bv ? 1 : 0;
    return sortDir === "asc" ? cmp : -cmp;
  });

  const toggleSort = (col) => { if (sortCol === col) setSortDir(d => d === "asc" ? "desc" : "asc"); else { setSortCol(col); setSortDir("asc"); } };
  const SortIcon = ({ col }) => sortCol === col ? (sortDir === "asc" ? " ▲" : " ▼") : "";

  // Group by current phase for board view
  const phaseGroups = {};
  const ALL_PHASES = [...PROJECT_PHASES, { id: "complete", label: "Complete", icon: "✅", color: "#22c55e", items: [] }];
  ALL_PHASES.forEach(ph => { phaseGroups[ph.id] = []; });
  filtered.forEach(p => { const ph = getCurrentPhase(p); if (phaseGroups[ph.id]) phaseGroups[ph.id].push(p); });

  const TYPE_COLORS = { Remodel: "#3b82f6", Relocation: "#f59e0b", "New Location": "#22c55e" };
  const PHASE_COLORS = { pre_construction: "#3b82f6", equipment_ordering: "#f59e0b", construction: "#8b5cf6", complete: "#22c55e" };

  // ── Detail / Drill-Down View ──
  if (view === "detail" && selectedProject) {
    const p = projects.find(pr => pr.id === selectedProject.id) || selectedProject;
    const overall = getOverallCompletion(p);
    const store = stores.find(s => s.pc === p.pc);
    const isOverdue = p.dueDate && !p.completionDate && new Date(p.dueDate) < new Date();
    return (
      <div className="fade-in">
        <button onClick={() => { setView("table"); setSelectedProject(null); }} style={{ ...btn(th, { background: th.card3, color: th.muted, marginBottom: "1.25rem", padding: "0.5rem 1rem", fontSize: "0.8125rem" }) }}>
          ← Back to Projects
        </button>

        {/* Project Header */}
        <div style={{ ...card(th), padding: "1.5rem", marginBottom: "1.25rem" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "0.75rem", flexWrap: "wrap", marginBottom: "1rem" }}>
            <h2 style={{ fontFamily: "'Raleway'", fontWeight: 700, fontSize: "1.375rem", color: th.text, margin: 0 }}>{p.nickname || p.pc}</h2>
            <span style={{ padding: "0.188rem 0.625rem", borderRadius: "1rem", fontSize: "0.6875rem", fontWeight: 600, background: (TYPE_COLORS[p.type] || "#666") + "22", color: TYPE_COLORS[p.type] || "#666" }}>{p.type}</span>
            {isOverdue && <span style={{ padding: "0.188rem 0.625rem", borderRadius: "1rem", fontSize: "0.6875rem", fontWeight: 600, background: "#ff444422", color: "#ff4444" }}>OVERDUE</span>}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: "0.75rem", fontSize: "0.8125rem", color: th.muted }}>
            <div><strong style={{ color: th.text }}>PC#:</strong> {p.pc || "N/A"}</div>
            <div><strong style={{ color: th.text }}>Address:</strong> {p.address || "N/A"}{p.city ? `, ${p.city}` : ""}{p.state ? ` ${p.state}` : ""} {p.zip || ""}</div>
            <div><strong style={{ color: th.text }}>Due:</strong> {p.dueDate ? new Date(p.dueDate).toLocaleDateString() : "TBD"}</div>
            <div><strong style={{ color: th.text }}>Target Completion:</strong> {p.completionDate ? new Date(p.completionDate).toLocaleDateString() : "TBD"}</div>
            {store && <div><strong style={{ color: th.text }}>Manager:</strong> {store.mgr || "N/A"}</div>}
            {store && <div><strong style={{ color: th.text }}>District:</strong> {store.district || "N/A"}</div>}
            {p.notifyEmails && <div><strong style={{ color: th.text }}>Notify:</strong> {p.notifyEmails}</div>}
          </div>
          {p.lastEditedBy && (
            <div style={{ marginTop: "0.75rem", padding: "0.5rem 0.75rem", borderRadius: "0.5rem", background: th.card2, fontSize: "0.8125rem", color: th.muted, display: "flex", alignItems: "center", gap: "0.5rem" }}>
              <span style={{ fontSize: "0.875rem" }}>✏️</span>
              <span><strong style={{ color: th.text }}>Last Edited:</strong> {p.lastEditedBy}{p.lastEditedAt ? ` — ${new Date(p.lastEditedAt).toLocaleDateString()} at ${new Date(p.lastEditedAt).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}` : ""}</span>
            </div>
          )}
          {/* Overall progress */}
          <div style={{ marginTop: "1rem" }}>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: "0.75rem", fontWeight: 600, color: th.muted, marginBottom: "0.312rem" }}>
              <span>Overall Progress</span><span>{overall}%</span>
            </div>
            <div style={{ height: 8, borderRadius: 4, background: th.card3 }}>
              <div style={{ height: "100%", borderRadius: 4, width: overall + "%", background: overall === 100 ? "#22c55e" : O, transition: "width .3s" }} />
            </div>
          </div>
          {p.completed && (
            <div style={{ marginTop: "1rem", padding: "0.75rem 1rem", borderRadius: "0.5rem", background: "#22c55e22", border: "1px solid #22c55e44", display: "flex", alignItems: "center", gap: "0.5rem" }}>
              <span style={{ fontSize: "1.125rem" }}>✅</span>
              <span style={{ fontSize: "0.875rem", fontWeight: 600, color: "#22c55e" }}>Project Completed</span>
              {p.completedAt && <span style={{ fontSize: "0.75rem", color: th.muted, marginLeft: "auto" }}>{new Date(p.completedAt).toLocaleDateString()}</span>}
            </div>
          )}
          {editable && (
            <div style={{ display: "flex", gap: "0.5rem", marginTop: "1rem", flexWrap: "wrap" }}>
              <button onClick={() => { startEdit(p); setView("table"); }} style={btn(th, { padding: "0.4rem 1rem", fontSize: "0.8125rem" })}>Edit Project</button>
              {!p.completed ? (
                <button onClick={() => { updateItem(p.id, "completed", true); const now = new Date().toISOString(); setProjects(ps => ps.map(pr => pr.id === p.id ? { ...pr, completedAt: now } : pr)); showAlert("success", "Project marked as completed"); }} style={btn(th, { padding: "0.4rem 1rem", fontSize: "0.8125rem", background: "#22c55e", color: "#fff" })}>
                  ✅ Mark Completed
                </button>
              ) : (
                <button onClick={() => { updateItem(p.id, "completed", false); setProjects(ps => ps.map(pr => pr.id === p.id ? { ...pr, completedAt: "" } : pr)); showAlert("success", "Project reopened"); }} style={btn(th, { padding: "0.4rem 1rem", fontSize: "0.8125rem", background: "#f59e0b22", color: "#f59e0b" })}>
                  ↩ Reopen Project
                </button>
              )}
              <button onClick={() => { deleteProject(p.id); setView("board"); setSelectedProject(null); }} style={btn(th, { padding: "0.4rem 1rem", fontSize: "0.8125rem", background: "#ff444422", color: "#ff4444" })}>Delete</button>
            </div>
          )}
        </div>

        {/* Detail sub-tabs: Checklist | Daily Reports | Chat */}
        <div style={{ display: "flex", borderRadius: "0.5rem", overflow: "hidden", border: `1px solid ${th.cardBorder}`, marginBottom: "1.25rem", alignSelf: "flex-start" }}>
