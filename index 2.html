// ─── Data Persistence ────────────────────────────────────────────────────────
const STORAGE_KEY = "pcg_portal_data_v9";
const DATA_VERSION = 9;

function loadFromStorage() {
  try {
    let raw = localStorage.getItem(STORAGE_KEY);
    // Migrate from v8 → v9
    if (!raw) { const old = localStorage.getItem("pcg_portal_data_v8"); if (old) raw = old; }
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (parsed.version && parsed.version < DATA_VERSION) { parsed.version = DATA_VERSION; parsed.projects = parsed.projects || []; parsed.notifications = parsed.notifications || []; }
    if (parsed.version !== DATA_VERSION) return null;
    // Patch links: add visibility & sortOrder if missing
    if (parsed.links && typeof parsed.links === 'object') {
      for (const cat of Object.keys(parsed.links)) {
        if (Array.isArray(parsed.links[cat])) {
          parsed.links[cat] = parsed.links[cat].map((link, i) => ({
            ...link,
            visibility: link.visibility || "all",
            sortOrder: link.sortOrder ?? i
          }));
        }
      }
    }
    // Patch stale titles from previous versions
    if (parsed.users) {
      parsed.users = parsed.users.map(u => ({
        ...u,
        role: u.role === "VP of Operations" ? "Vice President" : u.role
      }));
    }
    return parsed;
  } catch(e) { return null; }
}

function saveToStorage(data) {
  const payload = { version: DATA_VERSION, savedAt: new Date().toISOString(), ...data };
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  } catch(e) {
    // QuotaExceededError — daily reports with photos are too large.
    // Strip photo data from localStorage copy (photos are preserved in cloud via cloudSave).
    try {
      const slim = { ...payload };
      if (slim.dailyReports && Array.isArray(slim.dailyReports)) {
        slim.dailyReports = slim.dailyReports.map(r => ({
          ...r,
          workLogs: (r.workLogs || []).map(w => ({
            ...w,
            photos: (w.photos || []).map(p => ({ name: p.name, timestamp: p.timestamp, _photoStripped: true }))
          }))
        }));
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(slim));
    } catch(e2) { console.warn("localStorage unavailable even after stripping photos:", e2); }
  }
}

function exportData(data) {
  const payload = { version: DATA_VERSION, exportedAt: new Date().toISOString(), appName: "PCG Company Portal", ...data };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url;
  a.download = `pcg-data-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(file, onSuccess, onError) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.version) throw new Error("Invalid file format");
      onSuccess(parsed);
    } catch(err) { onError(err.message); }
  };
  reader.readAsText(file);
}

// ── Chat Section ─────────────────────────────────────────────────────────────
function ChatSection({ user, users, projects, channels, setChannels, messages, setMessages, readState, setReadState, th, showAlert, initialChannelId }) {
  const [chatView, setChatView] = useState(initialChannelId ? "thread" : "list");
  const [activeChannelId, setActiveChannelId] = useState(initialChannelId || null);
  const [msgText, setMsgText] = useState("");
  const [searchTerm, setSearchTerm] = useState("");
  const [pendingAttachments, setPendingAttachments] = useState([]);
  const [mentionQuery, setMentionQuery] = useState(null); // null or { query, cursorPos }
  const [groupName, setGroupName] = useState("");
  const [groupMembers, setGroupMembers] = useState([]);
  const [dmSearch, setDmSearch] = useState("");
  const [logFilters, setLogFilters] = useState({ channel: "all", user: "all", keyword: "", dateFrom: "", dateTo: "" });
  const messagesEndRef = useRef(null);
  const inputRef = useRef(null);
  const fileRef = useRef(null);
  const isAdmin = isChatAdmin(user);
  const activeUsers = users.filter(u => u.active);

  // Get channel display name
  const getChannelName = (ch) => {
    if (ch.type === "dm") {
      const otherId = ch.members.find(id => id !== user.id);
      const other = users.find(u => u.id === otherId);
      return other ? other.name : "Unknown User";
    }
    if (ch.type === "project") {
      const proj = projects.find(p => p.id === ch.projectId);
      return proj ? `🏗️ ${proj.nickname || proj.pc}` : ch.name;
    }
    return ch.name || "Group Chat";
  };

  // Get channel avatar/initials
  const getChannelAvatar = (ch) => {
    if (ch.type === "dm") {
      const otherId = ch.members.find(id => id !== user.id);
      const other = users.find(u => u.id === otherId);
      return other ? other.initials : "?";
    }
    if (ch.type === "project") return "🏗️";
    return "👥";
  };

  // User's channels, sorted by latest message
  const myChannels = channels
    .filter(ch => ch.members && ch.members.includes(user.id))
    .map(ch => {
      const chMsgs = messages.filter(m => m.channelId === ch.id && !m.deleted);
      const lastMsg = chMsgs.length > 0 ? chMsgs[chMsgs.length - 1] : null;
      const lastRead = readState[`${user.id}_${ch.id}`] || "1970-01-01";
      const unread = chMsgs.filter(m => m.timestamp > lastRead && m.senderId !== user.id).length;
      return { ...ch, lastMsg, lastMsgTime: lastMsg?.timestamp || ch.createdAt, unread };
    })
    .filter(ch => searchTerm ? getChannelName(ch).toLowerCase().includes(searchTerm.toLowerCase()) || (ch.lastMsg?.text || "").toLowerCase().includes(searchTerm.toLowerCase()) : true)
    .sort((a, b) => b.lastMsgTime.localeCompare(a.lastMsgTime));

  // Open a channel thread
  const openThread = (chId) => {
    setActiveChannelId(chId);
    setChatView("thread");
    // Mark as read
    setReadState(prev => ({ ...prev, [`${user.id}_${chId}`]: new Date().toISOString() }));
  };

  // Start DM with a user
  const startDm = (otherUser) => {
    const dmId = getDmChannelId(user.id, otherUser.id);
    const existing = channels.find(ch => ch.id === dmId);
    if (!existing) {
      setChannels(prev => [...prev, {
        id: dmId, type: "dm", name: "", members: [user.id, otherUser.id],
        createdBy: user.id, createdAt: new Date().toISOString(), projectId: null
      }]);
    }
    openThread(dmId);
  };

  // Create group
  const createGroup = () => {
    if (!groupName.trim()) { showAlert("error", "Group name required"); return; }
    if (groupMembers.length === 0) { showAlert("error", "Select at least one member"); return; }
    const members = [...new Set([user.id, ...groupMembers])];
    const ch = {
      id: makeChatId("grp"), type: "group", name: groupName.trim(), members,
      createdBy: user.id, createdAt: new Date().toISOString(), projectId: null
    };
    setChannels(prev => [...prev, ch]);
    setGroupName(""); setGroupMembers([]);
    openThread(ch.id);
    showAlert("success", `Group "${ch.name}" created`);
  };

  // Send message
  const sendMessage = () => {
    if (!msgText.trim() && pendingAttachments.length === 0) return;
    const msg = {
      id: makeMsgId(), channelId: activeChannelId, senderId: user.id,
      senderName: user.name, senderInitials: user.initials,
      text: msgText.trim(), mentions: parseMentions(msgText),
      attachments: pendingAttachments, timestamp: new Date().toISOString(),
      deleted: false, deletedBy: null
    };
    setMessages(prev => [...prev, msg]);
    setMsgText(""); setPendingAttachments([]);
    // Update own read state
    setReadState(prev => ({ ...prev, [`${user.id}_${activeChannelId}`]: msg.timestamp }));

    // Push notification for chat messages
    const ch = channels.find(c => c.id === activeChannelId);
    if (ch && ch.members) {
      const recipientIds = ch.members.filter(id => id !== user.id);
      const pushIds = recipientIds.filter(id => {
        const u = users.find(usr => usr.id === id);
        return u && u.pushNotify;
      });
      if (pushIds.length > 0) {
        const chName = ch.type === "dm" ? "Direct Message" : (ch.name || "Chat");
        const preview = msg.text ? msg.text.substring(0, 100) : "📎 Attachment";
        sendPushNotification(pushIds, `${user.name}`, `${ch.type === "dm" ? "" : chName + ": "}${preview}`, '/', `chat_${msg.id}`);
      }
    }
  };

  // Delete message
  const deleteMessage = (msgId) => {
    setMessages(prev => prev.map(m => m.id === msgId ? { ...m, deleted: true, deletedBy: user.username } : m));
  };

  // Handle attachment
  const handleAttach = (e) => {
    Array.from(e.target.files).forEach(file => {
      if (file.size > 2 * 1024 * 1024) { showAlert("error", `${file.name} exceeds 2MB limit`); return; }
      const reader = new FileReader();
      reader.onload = (ev) => {
        setPendingAttachments(prev => [...prev, { data: ev.target.result, name: file.name, type: file.type }]);
      };
      reader.readAsDataURL(file);
    });
    e.target.value = "";
  };

  // @mention handling in input
  const handleMsgInput = (e) => {
    const val = e.target.value;
    setMsgText(val);
    const cursor = e.target.selectionStart;
    const textBefore = val.slice(0, cursor);
    const atMatch = textBefore.match(/@([\w.]*)$/);
    if (atMatch) {
      setMentionQuery({ query: atMatch[1].toLowerCase(), cursorPos: cursor });
    } else {
      setMentionQuery(null);
    }
  };

  const insertMention = (username) => {
    const before = msgText.slice(0, mentionQuery.cursorPos);
    const after = msgText.slice(mentionQuery.cursorPos);
    const atIdx = before.lastIndexOf("@");
    const newText = before.slice(0, atIdx) + `@${username} ` + after;
    setMsgText(newText);
    setMentionQuery(null);
    inputRef.current?.focus();
  };

  const mentionSuggestions = mentionQuery ? activeUsers.filter(u =>
    u.id !== user.id && (u.username.toLowerCase().includes(mentionQuery.query) || u.name.toLowerCase().includes(mentionQuery.query))
  ).slice(0, 6) : [];

  // Mark as read on initial open (for project embed)
  useEffect(() => {
    if (initialChannelId && activeChannelId === initialChannelId) {
      setReadState(prev => ({ ...prev, [`${user.id}_${initialChannelId}`]: new Date().toISOString() }));
    }
  }, [initialChannelId]);

  // Auto scroll to bottom when messages change
  useEffect(() => {
    if (chatView === "thread") messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages, chatView, activeChannelId]);

  // Get seen-by for a message
  const getSeenBy = (msg) => {
    const ch = channels.find(c => c.id === msg.channelId);
    if (!ch) return [];
    return ch.members.filter(uid => {
      if (uid === msg.senderId) return false;
      const lr = readState[`${uid}_${msg.channelId}`];
      return lr && lr >= msg.timestamp;
    }).map(uid => users.find(u => u.id === uid)).filter(Boolean);
  };

  // Active channel messages
  const activeChannel = channels.find(ch => ch.id === activeChannelId);
  const threadMessages = activeChannelId ? messages.filter(m => m.channelId === activeChannelId).sort((a,b) => a.timestamp.localeCompare(b.timestamp)) : [];

  // Group messages by date
  const groupByDate = (msgs) => {
    const groups = {};
    msgs.forEach(m => {
      const d = new Date(m.timestamp).toLocaleDateString();
      if (!groups[d]) groups[d] = [];
      groups[d].push(m);
    });
    return Object.entries(groups);
  };

  // ── RENDER: Conversation List ──
  if (chatView === "list") return (
    <div className="fade-in">
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "1rem" }}>
        <h2 style={{ fontFamily: "'Raleway'", fontWeight: 700, fontSize: "1.375rem", color: th.text, margin: 0 }}>💬 Chat</h2>
        <div style={{ display: "flex", gap: "0.5rem" }}>
          <button onClick={() => setChatView("newDm")} style={btn(th, { padding: "0.4rem 0.75rem", fontSize: "0.75rem" })}>+ Message</button>
          <button onClick={() => setChatView("newGroup")} style={btn(th, { padding: "0.4rem 0.75rem", fontSize: "0.75rem" })}>+ Group</button>
          {isAdmin && <button onClick={() => setChatView("adminLog")} style={btn(th, { padding: "0.4rem 0.75rem", fontSize: "0.75rem", background: "#ff444422", color: "#ff4444" })}>📋 Log</button>}
        </div>
      </div>
      <input placeholder="Search conversations..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)}
        style={{ ...inp(th), marginBottom: "1rem", width: "100%", boxSizing: "border-box" }} />
      {myChannels.length === 0 && (
        <div style={{ ...card(th), padding: "2rem", textAlign: "center", color: th.muted, fontSize: "0.875rem" }}>
          No conversations yet. Start a new message or create a group!
        </div>
      )}
      {myChannels.map(ch => (
        <div key={ch.id} onClick={() => openThread(ch.id)} style={{
          ...card(th), padding: "0.75rem 1rem", marginBottom: "0.5rem", cursor: "pointer",
          display: "flex", alignItems: "center", gap: "0.75rem",
          border: ch.unread > 0 ? `1px solid ${O}44` : `1px solid ${th.cardBorder}`,
          transition: "border .15s"
        }}>
          <div style={{
            width: 40, height: 40, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: ch.type === "dm" ? "0.75rem" : "1.125rem", fontWeight: 700,
            background: ch.type === "dm" ? O + "22" : ch.type === "project" ? "#8b5cf622" : "#3b82f622",
            color: ch.type === "dm" ? O : ch.type === "project" ? "#8b5cf6" : "#3b82f6",
          }}>
            {getChannelAvatar(ch)}
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontWeight: ch.unread > 0 ? 700 : 500, fontSize: "0.875rem", color: th.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                {getChannelName(ch)}
              </span>
              <span style={{ fontSize: "0.625rem", color: th.muted, whiteSpace: "nowrap", marginLeft: 8 }}>
                {ch.lastMsg ? new Date(ch.lastMsg.timestamp).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }) : ""}
              </span>
            </div>
            <div style={{ fontSize: "0.75rem", color: th.muted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginTop: 2 }}>
              {ch.lastMsg ? (ch.lastMsg.deleted ? "[Message deleted]" : `${ch.lastMsg.senderName.split(" ")[0]}: ${ch.lastMsg.text || (ch.lastMsg.attachments?.length ? "📎 Attachment" : "")}`) : "No messages yet"}
            </div>
          </div>
          {ch.unread > 0 && (
            <span style={{ minWidth: 22, height: 22, borderRadius: "1rem", background: O, color: "#fff", fontSize: "0.6875rem", fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", padding: "0 6px" }}>
              {ch.unread}
            </span>
          )}
        </div>
      ))}
    </div>
  );

  // ── RENDER: New DM ──
  if (chatView === "newDm") {
    const filtered = activeUsers.filter(u => u.id !== user.id && (dmSearch ? (u.name.toLowerCase().includes(dmSearch.toLowerCase()) || u.username.toLowerCase().includes(dmSearch.toLowerCase())) : true));
    return (
      <div className="fade-in">
        <button onClick={() => setChatView("list")} style={{ ...btn(th, { padding: "0.4rem 0.75rem", fontSize: "0.8125rem", background: "none", color: th.muted }), marginBottom: "1rem" }}>← Back</button>
        <h2 style={{ fontFamily: "'Raleway'", fontWeight: 700, fontSize: "1.25rem", color: th.text, margin: "0 0 1rem" }}>New Message</h2>
        <input placeholder="Search users..." value={dmSearch} onChange={e => setDmSearch(e.target.value)}
          style={{ ...inp(th), marginBottom: "1rem", width: "100%", boxSizing: "border-box" }} />
        <div style={{ display: "grid", gap: "0.5rem" }}>
          {filtered.map(u => (
            <div key={u.id} onClick={() => { startDm(u); setDmSearch(""); }} style={{
              ...card(th), padding: "0.75rem 1rem", cursor: "pointer", display: "flex", alignItems: "center", gap: "0.75rem"
            }}>
              <div style={{ width: 36, height: 36, borderRadius: "50%", background: O + "22", color: O, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: "0.75rem" }}>
                {u.initials}
              </div>
              <div>
                <div style={{ fontWeight: 600, fontSize: "0.875rem", color: th.text }}>{u.name}</div>
                <div style={{ fontSize: "0.6875rem", color: th.muted }}>{u.role}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ── RENDER: New Group ──
  if (chatView === "newGroup") return (
    <div className="fade-in">
      <button onClick={() => { setChatView("list"); setGroupName(""); setGroupMembers([]); }} style={{ ...btn(th, { padding: "0.4rem 0.75rem", fontSize: "0.8125rem", background: "none", color: th.muted }), marginBottom: "1rem" }}>← Back</button>
      <h2 style={{ fontFamily: "'Raleway'", fontWeight: 700, fontSize: "1.25rem", color: th.text, margin: "0 0 1rem" }}>Create Group Chat</h2>
      <div style={{ ...card(th), padding: "1rem", marginBottom: "1rem" }}>
        <label style={{ fontWeight: 600, fontSize: "0.8125rem", color: th.text, marginBottom: "0.375rem", display: "block" }}>Group Name</label>
        <input placeholder="e.g. Admins Only" value={groupName} onChange={e => setGroupName(e.target.value)}
          style={{ ...inp(th), width: "100%", boxSizing: "border-box", marginBottom: "1rem" }} />
        <label style={{ fontWeight: 600, fontSize: "0.8125rem", color: th.text, marginBottom: "0.375rem", display: "block" }}>Members ({groupMembers.length} selected)</label>
        <div style={{ maxHeight: 300, overflow: "auto", border: `1px solid ${th.cardBorder}`, borderRadius: "0.5rem", padding: "0.5rem" }}>
          {activeUsers.filter(u => u.id !== user.id).map(u => (
            <label key={u.id} style={{ display: "flex", alignItems: "center", gap: "0.5rem", padding: "0.375rem 0.5rem", cursor: "pointer", borderRadius: "0.375rem", fontSize: "0.8125rem", color: th.text }}>
              <input type="checkbox" checked={groupMembers.includes(u.id)}
                onChange={e => setGroupMembers(prev => e.target.checked ? [...prev, u.id] : prev.filter(id => id !== u.id))}
                style={{ accentColor: O }} />
              <span style={{ fontWeight: 600 }}>{u.name}</span>
              <span style={{ color: th.muted, fontSize: "0.6875rem" }}>({u.role})</span>
            </label>
          ))}
        </div>
      </div>
      <button onClick={createGroup} style={btn(th, { padding: "0.5rem 1.5rem" })}>Create Group</button>
    </div>
  );

  // ── RENDER: Admin Chat Log ──
  if (chatView === "adminLog" && isAdmin) {
    const allMsgs = messages
      .filter(m => {
        if (logFilters.channel !== "all" && m.channelId !== logFilters.channel) return false;
        if (logFilters.user !== "all" && m.senderId !== parseInt(logFilters.user)) return false;
        if (logFilters.keyword && !m.text.toLowerCase().includes(logFilters.keyword.toLowerCase())) return false;
        if (logFilters.dateFrom && m.timestamp < logFilters.dateFrom) return false;
        if (logFilters.dateTo && m.timestamp > logFilters.dateTo + "T23:59:59") return false;
        return true;
      })
      .sort((a, b) => b.timestamp.localeCompare(a.timestamp));

    return (
      <div className="fade-in">
        <button onClick={() => setChatView("list")} style={{ ...btn(th, { padding: "0.4rem 0.75rem", fontSize: "0.8125rem", background: "none", color: th.muted }), marginBottom: "1rem" }}>← Back</button>
        <h2 style={{ fontFamily: "'Raleway'", fontWeight: 700, fontSize: "1.25rem", color: th.text, margin: "0 0 1rem" }}>📋 Chat Activity Log</h2>
        <div style={{ ...card(th), padding: "1rem", marginBottom: "1rem" }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: "0.75rem" }}>
            <div>
              <label style={{ fontSize: "0.6875rem", fontWeight: 600, color: th.muted }}>Channel</label>
              <select value={logFilters.channel} onChange={e => setLogFilters(f => ({ ...f, channel: e.target.value }))} style={inp(th)}>
                <option value="all">All Channels</option>
                {channels.map(ch => <option key={ch.id} value={ch.id}>{getChannelName(ch)}</option>)}
              </select>
            </div>
            <div>
              <label style={{ fontSize: "0.6875rem", fontWeight: 600, color: th.muted }}>User</label>
              <select value={logFilters.user} onChange={e => setLogFilters(f => ({ ...f, user: e.target.value }))} style={inp(th)}>
                <option value="all">All Users</option>
                {activeUsers.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
              </select>
            </div>
            <div>
              <label style={{ fontSize: "0.6875rem", fontWeight: 600, color: th.muted }}>Keyword</label>
              <input placeholder="Search..." value={logFilters.keyword} onChange={e => setLogFilters(f => ({ ...f, keyword: e.target.value }))} style={inp(th)} />
            </div>
            <div>
              <label style={{ fontSize: "0.6875rem", fontWeight: 600, color: th.muted }}>From</label>
              <input type="date" value={logFilters.dateFrom} onChange={e => setLogFilters(f => ({ ...f, dateFrom: e.target.value }))} style={inp(th)} />
            </div>
            <div>
              <label style={{ fontSize: "0.6875rem", fontWeight: 600, color: th.muted }}>To</label>
              <input type="date" value={logFilters.dateTo} onChange={e => setLogFilters(f => ({ ...f, dateTo: e.target.value }))} style={inp(th)} />
            </div>
          </div>
        </div>
        <div style={{ fontSize: "0.75rem", color: th.muted, marginBottom: "0.5rem" }}>{allMsgs.length} message{allMsgs.length !== 1 ? "s" : ""}</div>
        {allMsgs.slice(0, 200).map(m => {
          const ch = channels.find(c => c.id === m.channelId);
          return (
            <div key={m.id} style={{ ...card(th), padding: "0.625rem 1rem", marginBottom: "0.375rem", opacity: m.deleted ? 0.5 : 1 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                <div style={{ display: "flex", alignItems: "center", gap: "0.5rem" }}>
                  <span style={{ fontWeight: 700, fontSize: "0.8125rem", color: th.text }}>{m.senderName}</span>
                  <span style={{ fontSize: "0.625rem", color: th.muted, padding: "1px 6px", borderRadius: "0.25rem", background: th.card2 }}>
                    {ch ? getChannelName(ch) : m.channelId}
                  </span>
                  {m.deleted && <span style={{ fontSize: "0.625rem", color: "#ff4444", fontWeight: 600 }}>DELETED by {m.deletedBy}</span>}
                </div>
                <span style={{ fontSize: "0.625rem", color: th.muted }}>{new Date(m.timestamp).toLocaleString()}</span>
              </div>
              <div style={{ fontSize: "0.8125rem", color: m.deleted ? th.muted : th.text, fontStyle: m.deleted ? "italic" : "normal" }}>
                {m.deleted ? "[Message deleted] " + m.text : m.text}
              </div>
              {m.attachments && m.attachments.length > 0 && (
                <div style={{ fontSize: "0.6875rem", color: O, marginTop: 4 }}>📎 {m.attachments.length} attachment{m.attachments.length > 1 ? "s" : ""}</div>
              )}
            </div>
          );
        })}
      </div>
    );
  }

  // ── RENDER: Thread View ──
  if (chatView === "thread" && activeChannel) {
    const grouped = groupByDate(threadMessages);
    return (
      <div className="fade-in" style={{ display: "flex", flexDirection: "column", height: "calc(100vh - 220px)", maxHeight: "calc(100vh - 220px)" }}>
        {/* Header */}
        <div style={{ display: "flex", alignItems: "center", gap: "0.75rem", marginBottom: "0.75rem", flexShrink: 0 }}>
          <button onClick={() => { setChatView("list"); setActiveChannelId(null); setMsgText(""); setPendingAttachments([]); setMentionQuery(null); }}
            style={{ ...btn(th, { padding: "0.4rem 0.75rem", fontSize: "0.8125rem", background: "none", color: th.muted }) }}>← Back</button>
          <div style={{ width: 36, height: 36, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: activeChannel.type === "dm" ? "0.75rem" : "1rem",
            background: activeChannel.type === "dm" ? O + "22" : activeChannel.type === "project" ? "#8b5cf622" : "#3b82f622",
            color: activeChannel.type === "dm" ? O : activeChannel.type === "project" ? "#8b5cf6" : "#3b82f6" }}>
            {getChannelAvatar(activeChannel)}
          </div>
          <div>
            <div style={{ fontWeight: 700, fontSize: "1rem", color: th.text }}>{getChannelName(activeChannel)}</div>
            <div style={{ fontSize: "0.6875rem", color: th.muted }}>
              {activeChannel.type === "dm" ? "Direct Message" : `${activeChannel.members.length} member${activeChannel.members.length !== 1 ? "s" : ""}`}
            </div>
          </div>
        </div>

        {/* Messages */}
        <div style={{ flex: 1, overflow: "auto", paddingRight: 4, minHeight: 0 }}>
          {threadMessages.length === 0 && (
            <div style={{ textAlign: "center", color: th.muted, fontSize: "0.875rem", marginTop: "3rem" }}>No messages yet. Say hello! 👋</div>
          )}
          {grouped.map(([date, msgs]) => (
            <div key={date}>
              <div style={{ textAlign: "center", margin: "1rem 0 0.5rem", fontSize: "0.625rem", fontWeight: 600, color: th.muted, textTransform: "uppercase", letterSpacing: 1 }}>
                {date === new Date().toLocaleDateString() ? "Today" : date}
              </div>
              {msgs.map(m => {
                const isMine = m.senderId === user.id;
                const canDelete = isMine || isAdmin;
                const seenBy = isMine ? getSeenBy(m) : [];
                return (
                  <div key={m.id} style={{ display: "flex", flexDirection: isMine ? "row-reverse" : "row", gap: "0.5rem", marginBottom: "0.75rem", alignItems: "flex-start" }}>
                    {!isMine && (
                      <div style={{ width: 32, height: 32, borderRadius: "50%", background: O + "22", color: O, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: "0.625rem", flexShrink: 0, marginTop: 2 }}>
                        {m.senderInitials}
                      </div>
                    )}
                    <div style={{ maxWidth: "70%" }}>
                      {!isMine && <div style={{ fontSize: "0.6875rem", fontWeight: 600, color: th.text, marginBottom: 2 }}>{m.senderName}</div>}
                      <div style={{
                        padding: "0.5rem 0.75rem", borderRadius: isMine ? "1rem 1rem 0.25rem 1rem" : "1rem 1rem 1rem 0.25rem",
                        background: m.deleted ? th.card2 : isMine ? O : th.card2,
                        color: m.deleted ? th.muted : isMine ? "#fff" : th.text,
                        fontSize: "0.8125rem", fontStyle: m.deleted ? "italic" : "normal", lineHeight: 1.5,
                        position: "relative"
                      }}>
                        {m.deleted ? "[Message deleted]" : (
                          <>
                            {m.text.split(/@([\w.]+)/g).map((part, i) =>
                              i % 2 === 1 ? <span key={i} style={{ fontWeight: 700, color: isMine ? "#fff" : O }}>@{part}</span> : <span key={i}>{part}</span>
                            )}
                          </>
                        )}
                        {canDelete && !m.deleted && (
                          <button onClick={(e) => { e.stopPropagation(); deleteMessage(m.id); }} title="Delete message"
                            style={{ position: "absolute", top: -8, right: isMine ? "auto" : -8, left: isMine ? -8 : "auto", width: 20, height: 20, borderRadius: "50%", background: "#ff4444", color: "#fff", border: "none", cursor: "pointer", fontSize: "0.5rem", display: "none", alignItems: "center", justifyContent: "center" }}
                            className="msg-del-btn">🗑️</button>
                        )}
                      </div>
                      {/* Attachments */}
                      {!m.deleted && m.attachments && m.attachments.length > 0 && (
                        <div style={{ display: "flex", flexWrap: "wrap", gap: "0.375rem", marginTop: "0.375rem" }}>
                          {m.attachments.map((att, i) =>
                            att.type && att.type.startsWith("image/") ? (
                              <img key={i} src={att.data} alt={att.name} style={{ maxWidth: 200, maxHeight: 150, borderRadius: "0.5rem", cursor: "pointer" }}
                                onClick={() => window.open(att.data, "_blank")} />
                            ) : (
                              <a key={i} href={att.data} download={att.name} style={{ fontSize: "0.75rem", color: O, textDecoration: "underline" }}>📎 {att.name}</a>
                            )
                          )}
                        </div>
                      )}
                      {/* Timestamp + seen */}
                      <div style={{ fontSize: "0.5625rem", color: th.muted, marginTop: 3, textAlign: isMine ? "right" : "left" }}>
                        {new Date(m.timestamp).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}
                        {isMine && seenBy.length > 0 && (
                          <span style={{ marginLeft: 6 }}>✓ Seen by {seenBy.map(u => u.name.split(" ")[0]).join(", ")}</span>
                        )}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          ))}
          <div ref={messagesEndRef} />
        </div>

        {/* Compose area */}
        <div style={{ flexShrink: 0, borderTop: `1px solid ${th.cardBorder}`, paddingTop: "0.75rem", marginTop: "0.5rem" }}>
          {/* Pending attachments preview */}
          {pendingAttachments.length > 0 && (
            <div style={{ display: "flex", gap: "0.5rem", marginBottom: "0.5rem", flexWrap: "wrap" }}>
              {pendingAttachments.map((att, i) => (
                <div key={i} style={{ position: "relative", background: th.card2, borderRadius: "0.5rem", padding: "0.25rem 0.5rem", fontSize: "0.6875rem", color: th.text, display: "flex", alignItems: "center", gap: "0.25rem" }}>
                  📎 {att.name}
                  <button onClick={() => setPendingAttachments(prev => prev.filter((_, j) => j !== i))} style={{ background: "none", border: "none", color: "#ff4444", cursor: "pointer", fontSize: "0.75rem", padding: 0 }}>✕</button>
                </div>
              ))}
            </div>
          )}
          {/* @mention dropdown */}
          {mentionQuery && mentionSuggestions.length > 0 && (
            <div style={{ background: th.card, border: `1px solid ${th.cardBorder}`, borderRadius: "0.5rem", marginBottom: "0.375rem", maxHeight: 180, overflow: "auto", boxShadow: "0 4px 16px #00000030" }}>
              {mentionSuggestions.map(u => (
                <div key={u.id} onClick={() => insertMention(u.username)} style={{ padding: "0.375rem 0.75rem", cursor: "pointer", display: "flex", alignItems: "center", gap: "0.5rem", fontSize: "0.8125rem", color: th.text }}>
                  <span style={{ fontWeight: 700, color: O }}>{u.initials}</span>
                  <span>{u.name}</span>
                  <span style={{ fontSize: "0.6875rem", color: th.muted }}>@{u.username}</span>
                </div>
              ))}
            </div>
          )}
          <div style={{ display: "flex", gap: "0.5rem", alignItems: "flex-end" }}>
            <button onClick={() => fileRef.current?.click()} style={{ ...btn(th, { padding: "0.5rem", fontSize: "1rem", background: th.card2, minWidth: 36 }) }}>📎</button>
            <input ref={fileRef} type="file" accept="image/*,application/pdf,.doc,.docx,.xls,.xlsx" multiple onChange={handleAttach} style={{ display: "none" }} />
            <input ref={inputRef} placeholder="Type a message... (@ to mention)" value={msgText}
              onChange={handleMsgInput}
              onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey && !mentionQuery) { e.preventDefault(); sendMessage(); } }}
              style={{ ...inp(th), flex: 1 }} />
            <button onClick={sendMessage} style={btn(th, { padding: "0.5rem 1rem", background: O, color: "#fff" })}>Send</button>
          </div>
        </div>
      </div>
    );
  }

  // Fallback
  return <div onClick={() => setChatView("list")} style={{ color: th.muted, cursor: "pointer" }}>← Back to Chat</div>;
}

function KioskUpload({ th, salesWeeks, setSalesWeeks }) {
  const [uploading, setUploading] = useState(false);
  const [uploadMsg, setUploadMsg] = useState(null);
  const fileRef = useRef(null);

  const handleUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setUploading(true); setUploadMsg(null);
    try {
      let parsed;
      if (file.name.match(/\.xlsx?$/i)) {
        parsed = await parseExcelScorecard(file);
      } else {
        const lines = await extractPDFLines(file);
        parsed = parseScorecardLines(lines);
      }
      if (parsed.stores.length === 0) throw new Error('No store rows found. Check that this is the DM Weekly Report file.');
      setSalesWeeks(prev => {
        const deduped = prev.filter(w => !(w.weekEnd === parsed.weekEnd && w.weekNum === parsed.weekNum));
        return [parsed, ...deduped].sort((a, b) => (b.weekEnd || '').localeCompare(a.weekEnd || ''));
      });
      setUploadMsg({ type:"success", text:`Week #${parsed.weekNum} (${parsed.weekEnd})${parsed.isDraft ? ' [DRAFT]' : ''} loaded — ${parsed.stores.length} stores. Data is now available to all users.` });
    } catch (err) {
      setUploadMsg({ type:"error", text: err.message || 'Failed to parse file.' });
    } finally {
      setUploading(false);
      if (fileRef.current) fileRef.current.value = '';
    }
  };

  const currentWeek = salesWeeks.length > 0 ? salesWeeks[0] : null;

  return (
    <div style={{ width:"100%", maxWidth:560, padding:"2rem" }}>
      <div style={{ ...card(th), padding:"2.5rem", textAlign:"center" }}>
        <div style={{ fontSize:"3.5rem", marginBottom:"1rem" }}>📊</div>
        <div style={{ fontFamily:"'Raleway'", fontWeight:900, fontSize:"1.5rem", color:th.text, marginBottom:"0.375rem" }}>Weekly Report Upload</div>
        <div style={{ fontSize:"0.85rem", color:th.muted, marginBottom:"2rem" }}>
          Upload the DM Weekly Report (.xlsx) to update analytics for all users.
        </div>

        <label style={{
          ...btn(th, { padding:"0.875rem 2rem", fontSize:"0.95rem", cursor:"pointer", display:"inline-flex", alignItems:"center", gap:"0.5rem", fontWeight:700 }),
          opacity: uploading ? 0.7 : 1
        }}>
          <input ref={fileRef} type="file" accept=".xlsx,.xls,.pdf" style={{ display:'none' }} onChange={handleUpload} disabled={uploading} />
          {uploading ? '⏳ Processing...' : '📊 Upload Weekly Report'}
        </label>

        {uploadMsg && (
          <div style={{ marginTop:"1.25rem", padding:"0.75rem 1rem", borderRadius:"0.5rem", fontSize:"0.85rem", fontWeight:600,
            background: uploadMsg.type==="error" ? "#ff444418" : "#00d08418",
            color: uploadMsg.type==="error" ? "#ff6666" : "#00d084",
            textAlign:"left" }}>
            {uploadMsg.text}
          </div>
        )}

        {currentWeek && (
          <div style={{ marginTop:"1.5rem", padding:"1rem", background:th.card2, borderRadius:"0.5rem", textAlign:"left" }}>
            <div style={{ fontSize:"0.7rem", color:th.muted, textTransform:"uppercase", letterSpacing:0.5, marginBottom:"0.375rem" }}>Currently Loaded</div>
            <div style={{ fontSize:"0.95rem", color:th.text, fontWeight:700 }}>Week #{currentWeek.weekNum} — {currentWeek.weekEnd}{currentWeek.isDraft ? <span style={{ color:'#ffa94d', fontWeight:700, marginLeft:'0.4rem', fontSize:'0.65rem', border:'1px solid #ffa94d', borderRadius:'4px', padding:'1px 6px' }}>DRAFT</span> : ''}</div>
            <div style={{ fontSize:"0.8rem", color:th.muted, marginTop:"0.25rem" }}>{currentWeek.stores.length} stores</div>
          </div>
        )}

        {salesWeeks.length > 1 && (
          <div style={{ marginTop:"1rem", textAlign:"left" }}>
            <div style={{ fontSize:"0.7rem", color:th.muted, textTransform:"uppercase", letterSpacing:0.5, marginBottom:"0.375rem" }}>Previous Weeks</div>
            {salesWeeks.slice(1).map((w, i) => (
              <div key={i} style={{ fontSize:"0.8rem", color:th.muted, padding:"0.25rem 0" }}>
                Week #{w.weekNum} — {w.weekEnd}{w.isDraft ? ' (Draft)' : ''} ({w.stores.length} stores)
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ── First-Login Setup Screen ─────────────────────────────────────────────────
function FirstLoginSetup({ user, setUser, setUsers, th }) {
  const [step, setStep] = useState(1); // 1=password, 2=profile+prefs
  const [form, setForm] = useState({
    newPassword: "", confirmPassword: "", showNew: false, showConfirm: false,
    phone: user.phone || "", email: user.email || "",
    emailNotify: true, smsNotify: false, pushNotify: false,
  });
  const [err, setErr] = useState("");

  const handleStep1 = () => {
    setErr("");
    if (!form.newPassword || form.newPassword.length < 6) { setErr("Password must be at least 6 characters."); return; }
    if (form.newPassword !== form.confirmPassword) { setErr("Passwords do not match."); return; }
    setStep(2);
  };

  const handleFinish = () => {
    setErr("");
    if (!form.phone && form.smsNotify) { setErr("Please add a phone number to enable SMS notifications."); return; }
    const updates = {
      password: form.newPassword,
      phone: form.phone, email: form.email,
      emailNotify: form.emailNotify, smsNotify: form.smsNotify, pushNotify: form.pushNotify,
      mustSetup: false,
    };
    setUsers(us => us.map(u => u.id === user.id ? { ...u, ...updates } : u));
    setUser(prev => ({ ...prev, ...updates }));
  };

  return (
    <div style={{ minHeight:"100vh", background:th.bg, display:"flex", alignItems:"center", justifyContent:"center", padding:20, transition:"background .3s" }}>
      <div style={{ width:"100%", maxWidth:480 }}>
        <div style={{ textAlign:"center", marginBottom:"2rem" }}>
          <div style={{ fontSize:"2.5rem", marginBottom:"0.5rem" }}>👋</div>
          <div style={{ fontFamily:"'Raleway'", fontWeight:800, fontSize:"1.5rem", color:th.text }}>Welcome to PCG Portal</div>
          <div style={{ fontSize:"0.8rem", color:th.muted, marginTop:"0.25rem" }}>Let's set up your account, {user.name.split(" ")[0]}</div>
        </div>

        {/* Progress indicator */}
        <div style={{ display:"flex", alignItems:"center", gap:"0.5rem", justifyContent:"center", marginBottom:"1.5rem" }}>
          <div style={{ width:32, height:32, borderRadius:"50%", background: step >= 1 ? O : th.card3, color: step >= 1 ? W : th.muted, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700, fontSize:"0.8rem", transition:"all .3s" }}>1</div>
          <div style={{ width:40, height:2, background: step >= 2 ? O : th.card3, transition:"background .3s" }} />
          <div style={{ width:32, height:32, borderRadius:"50%", background: step >= 2 ? O : th.card3, color: step >= 2 ? W : th.muted, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700, fontSize:"0.8rem", transition:"all .3s" }}>2</div>
        </div>

        <div style={{ ...card(th), padding:32 }} className="fade-in">
          {step === 1 && (
            <>
              <div style={{ fontSize:"1rem", fontWeight:700, color:th.text, marginBottom:"0.25rem" }}>🔒 Create Your Password</div>
              <div style={{ fontSize:"0.8rem", color:th.muted, marginBottom:"1.25rem" }}>Choose a secure password you'll remember. Must be at least 6 characters.</div>
              <div style={{ display:"grid", gap:"0.75rem", marginBottom:"1rem" }}>
                <div>
                  <label style={{ fontSize:"0.7rem", color:th.muted, fontWeight:600, textTransform:"uppercase", letterSpacing:0.5 }}>New Password</label>
                  <div style={{ position:"relative" }}>
                    <input style={inp(th)} type={form.showNew?"text":"password"} placeholder="Enter new password" value={form.newPassword}
                      onChange={e=>setForm(f=>({...f,newPassword:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&handleStep1()} />
                    <button onClick={()=>setForm(f=>({...f,showNew:!f.showNew}))} style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:th.muted, cursor:"pointer", fontSize:"0.75rem" }}>{form.showNew?"🙈":"👁"}</button>
                  </div>
                </div>
                <div>
                  <label style={{ fontSize:"0.7rem", color:th.muted, fontWeight:600, textTransform:"uppercase", letterSpacing:0.5 }}>Confirm Password</label>
                  <div style={{ position:"relative" }}>
                    <input style={inp(th)} type={form.showConfirm?"text":"password"} placeholder="Confirm password" value={form.confirmPassword}
                      onChange={e=>setForm(f=>({...f,confirmPassword:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&handleStep1()} />
                    <button onClick={()=>setForm(f=>({...f,showConfirm:!f.showConfirm}))} style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:th.muted, cursor:"pointer", fontSize:"0.75rem" }}>{form.showConfirm?"🙈":"👁"}</button>
                  </div>
                </div>
              </div>
              {err && <div style={{ padding:"0.5rem 0.75rem", borderRadius:"0.375rem", marginBottom:"0.75rem", fontSize:"0.8rem", fontWeight:600, background:"#ff444418", color:"#ff6666" }}>{err}</div>}
              <button style={{ ...btn(th), width:"100%", padding:"12px 18px", fontSize:"0.938rem" }} onClick={handleStep1}>Continue →</button>
            </>
          )}

          {step === 2 && (
            <>
              <div style={{ fontSize:"1rem", fontWeight:700, color:th.text, marginBottom:"0.25rem" }}>📋 Your Profile & Notifications</div>
              <div style={{ fontSize:"0.8rem", color:th.muted, marginBottom:"1.25rem" }}>Add your contact info and choose how you'd like to be notified.</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0.75rem", marginBottom:"1rem" }}>
                <div>
                  <label style={{ fontSize:"0.7rem", color:th.muted, fontWeight:600, textTransform:"uppercase", letterSpacing:0.5 }}>Email</label>
                  <input style={inp(th)} type="email" placeholder="your@email.com" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} />
                </div>
                <div>
                  <label style={{ fontSize:"0.7rem", color:th.muted, fontWeight:600, textTransform:"uppercase", letterSpacing:0.5 }}>Phone</label>
                  <input style={inp(th)} placeholder="(555) 555-5555" value={form.phone} onChange={e=>handlePhoneChange(e.target.value, setForm, "phone")} />
                </div>
              </div>
              <div style={{ fontSize:"0.75rem", fontWeight:600, color:th.muted, marginBottom:"0.5rem", textTransform:"uppercase", letterSpacing:0.5 }}>Notification Preferences</div>
              <div style={{ display:"flex", gap:"0.75rem", marginBottom:"1.25rem" }}>
                <label style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0.75rem", background:th.card2, borderRadius:"0.5rem", cursor:"pointer" }}>
                  <div>
                    <div style={{ fontSize:"0.8rem", fontWeight:600, color:th.text }}>📧 Email</div>
                    <div style={{ fontSize:"0.65rem", color:th.muted }}>Project updates via email</div>
                  </div>
                  <div onClick={()=>setForm(f=>({...f,emailNotify:!f.emailNotify}))} style={{
                    width:38, height:22, borderRadius:"0.625rem", background: form.emailNotify ? "#00d084" : "#555",
                    position:"relative", cursor:"pointer", transition:"background .25s", flexShrink:0
                  }}>
                    <div style={{ position:"absolute", top:3, left: form.emailNotify ? 19 : 3, width:16, height:16, borderRadius:"50%", background:"#fff", transition:"left .25s", boxShadow:"0 1px 3px #00000030" }} />
                  </div>
                </label>
                <label style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0.75rem", background:th.card2, borderRadius:"0.5rem", cursor:"pointer", opacity: form.phone ? 1 : 0.5 }}>
                  <div>
                    <div style={{ fontSize:"0.8rem", fontWeight:600, color:th.text }}>📱 SMS</div>
                    <div style={{ fontSize:"0.65rem", color:th.muted }}>{form.phone ? "Text alerts to phone" : "Add phone first"}</div>
                  </div>
                  <div onClick={()=>{ if(form.phone) setForm(f=>({...f,smsNotify:!f.smsNotify})); }} style={{
                    width:38, height:22, borderRadius:"0.625rem", background: form.smsNotify ? "#00d084" : "#555",
                    position:"relative", cursor:"pointer", transition:"background .25s", flexShrink:0
                  }}>
                    <div style={{ position:"absolute", top:3, left: form.smsNotify ? 19 : 3, width:16, height:16, borderRadius:"50%", background:"#fff", transition:"left .25s", boxShadow:"0 1px 3px #00000030" }} />
                  </div>
                </label>
                <label style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0.75rem", background:th.card2, borderRadius:"0.5rem", cursor:"pointer", opacity: isPushSupported() ? 1 : 0.5 }}>
                  <div>
                    <div style={{ fontSize:"0.8rem", fontWeight:600, color:th.text }}>🔔 Push</div>
                    <div style={{ fontSize:"0.65rem", color:th.muted }}>{!isPushSupported() ? "Not supported" : !isStandaloneMode() ? "Install app first" : "Device alerts"}</div>
                  </div>
                  <div onClick={async ()=>{
                    if (!isPushSupported()) return;
                    if (!form.pushNotify) {
                      const ok = await subscribeToPush(user.id);
                      if (ok) setForm(f=>({...f, pushNotify: true}));
                    } else {
                      await unsubscribeFromPush(user.id);
                      setForm(f=>({...f, pushNotify: false}));
                    }
                  }} style={{
                    width:38, height:22, borderRadius:"0.625rem", background: form.pushNotify ? "#00d084" : "#555",
                    position:"relative", cursor:"pointer", transition:"background .25s", flexShrink:0
                  }}>
                    <div style={{ position:"absolute", top:3, left: form.pushNotify ? 19 : 3, width:16, height:16, borderRadius:"50%", background:"#fff", transition:"left .25s", boxShadow:"0 1px 3px #00000030" }} />
                  </div>
                </label>
              </div>
              {err && <div style={{ padding:"0.5rem 0.75rem", borderRadius:"0.375rem", marginBottom:"0.75rem", fontSize:"0.8rem", fontWeight:600, background:"#ff444418", color:"#ff6666" }}>{err}</div>}
              <div style={{ display:"flex", gap:"0.625rem" }}>
                <button style={{ ...btn(th, { background:th.card3, color:th.muted }), padding:"12px 18px" }} onClick={()=>setStep(1)}>← Back</button>
                <button style={{ ...btn(th), flex:1, padding:"12px 18px", fontSize:"0.938rem" }} onClick={handleFinish}>Complete Setup ✓</button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

function ProfileModal({ user, setUser, setUsers, th, onClose }) {
  const [profileForm, setProfileForm] = useState({
    email: user.email || "",
    phone: user.phone || "",
    emailNotify: user.emailNotify !== false,
    smsNotify: user.smsNotify || false,
    pushNotify: user.pushNotify || false,
    currentPassword: "",
    newPassword: "",
    confirmPassword: "",
    showCurrent: false,
    showNew: false,
    showConfirm: false,
  });
  const [profileMsg, setProfileMsg] = useState(null);

  const handleProfileSave = () => {
    if (profileForm.newPassword) {
      if (profileForm.currentPassword !== user.password) {
        setProfileMsg({ type:"error", text:"Current password is incorrect." });
        return;
      }
      if (profileForm.newPassword.length < 6) {
        setProfileMsg({ type:"error", text:"New password must be at least 6 characters." });
        return;
      }
      if (profileForm.newPassword !== profileForm.confirmPassword) {
        setProfileMsg({ type:"error", text:"New passwords do not match." });
        return;
      }
    }
    const notifUpdate = { email: profileForm.email, phone: profileForm.phone, emailNotify: profileForm.emailNotify, smsNotify: profileForm.smsNotify, pushNotify: profileForm.pushNotify, ...(profileForm.newPassword ? { password: profileForm.newPassword } : {}) };
    setUsers(us => us.map(u => u.id === user.id ? { ...u, ...notifUpdate } : u));
    setUser(prev => ({ ...prev, ...notifUpdate }));
    setProfileMsg({ type:"success", text:"Profile updated!" });
    setTimeout(onClose, 1200);
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"#00000075", backdropFilter:"blur(4px)", zIndex:700, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}
      onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>

          <div>
            <div style={{ fontFamily:"'Raleway'", fontWeight:800, fontSize:"1.125rem", color:th.text }}>{user.name}</div>
            <div style={{ fontSize:"0.8rem", color:th.muted }}>{user.role}</div>
            <div style={{ display:"flex", gap:"0.375rem", marginTop:"0.25rem" }}>
              {isFullAdmin(user) && <span style={{ fontSize:"0.6rem", fontWeight:700, padding:"0.1rem 0.4rem", borderRadius:"0.6rem", background:O+"22", color:O }}>{user.userType==="executive"?"EXEC":"IT"}</span>}
              {user.userType==="office_staff" && <span style={{ fontSize:"0.6rem", fontWeight:700, padding:"0.1rem 0.4rem", borderRadius:"0.6rem", background:"#8b5cf622", color:"#8b5cf6" }}>OFFICE</span>}

          <div style={{ padding:"0.5rem 0.75rem", background:th.card2, borderRadius:"0.375rem" }}>
            <div style={{ fontSize:"0.65rem", color:th.muted, textTransform:"uppercase", letterSpacing:0.5, marginBottom:"0.125rem" }}>Username</div>
            <div style={{ fontSize:"0.8rem", color:th.text, fontWeight:600 }}>{user.username}</div>

        <div style={{ display:"flex", gap:"0.625rem" }}>
          <button style={btn(th)} onClick={handleProfileSave}>Save Changes</button>
          <button style={btn(th,{background:th.card3,color:th.muted})} onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

function PCGPortal() {
  // Load persisted data on first render
  const [user, setUser]         = useState(null);

  const cloudAnnouncementsLoaded = useRef(false);
  const cloudStoresLoaded = useRef(false);
  const cloudDistrictsLoaded = useRef(false);
  const cloudContactsLoaded = useRef(false);
  const cloudVendorsLoaded = useRef(false);
  const cloudLinksLoaded = useRef(false);
  const cloudNotesLoaded = useRef(false);
  const cloudTodosLoaded = useRef(false);
  const cloudNotificationsLoaded = useRef(false);
  const cloudGlobalNotifyLoaded = useRef(false);
  const projectsUserEdited = useRef(false);
  const dailyReportsUserEdited = useRef(false);
  const [showNotifs, setShowNotifs] = useState(false);
  const [showChatPanel, setShowChatPanel] = useState(false);
  const [chatQuickReply, setChatQuickReply] = useState({ channelId: null, text: "" });
  const [salesWeeks, setSalesWeeks] = useState([]);
  const [showProfile, setShowProfile] = useState(false);
  const [cloudStatus, setCloudStatus] = useState('idle');
  const [logoAnim, setLogoAnim] = useState(false);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [dataAlert, setDataAlert]   = useState(null); // { type: "success"|"error", msg }
  const importRef = useRef(null);

  const toggleBtnRef = useRef(null);

  const th = getTheme(dark);

  // Wrapper: marks projects as user-edited so cloud save fires

  // Chat unread count

    if (!user) return 0;
    let count = 0;
    for (const ch of chatChannels) {
      if (!ch.members || !ch.members.includes(user.id)) continue;
      const lastRead = chatReadState[`${user.id}_${ch.id}`] || "1970-01-01";
