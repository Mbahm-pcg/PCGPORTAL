<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html{font-size:clamp(13px, 1.1vw, 22px);}
  body{font-family:'Source Sans 3',sans-serif; font-size:1rem;}
  input,textarea,select{font-family:'Source Sans 3',sans-serif;}
  ::-webkit-scrollbar{width:12px;height:12px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#FF671F55;border-radius:6px;border:2px solid transparent;background-clip:padding-box;}
  ::-webkit-scrollbar-thumb:hover{background:#FF671Faa;border:2px solid transparent;background-clip:padding-box;}
  *{scrollbar-width:auto;scrollbar-color:#FF671F55 transparent;}
  .fade-in{animation:fadeIn .3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.92)}}
  @keyframes loginMeshShift{0%{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.15)}100%{transform:rotate(360deg) scale(1)}}
  @keyframes loginFloatUp{0%{transform:translateY(110vh) translateX(0) scale(0.6);opacity:0}10%{opacity:.7}90%{opacity:.7}100%{transform:translateY(-15vh) translateX(40px) scale(1.1);opacity:0}}
  @keyframes loginShake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-6px)}20%,40%,60%,80%{transform:translateX(6px)}}
  @keyframes loginPulseRing{0%{transform:scale(1);opacity:.8}70%{transform:scale(2.2);opacity:0}100%{transform:scale(2.2);opacity:0}}
  @keyframes loginFadeInUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  @keyframes loginGradientFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  .login-enter{animation:loginFadeInUp .7s cubic-bezier(.25,.46,.45,.94) both;}
  .login-input-wrap:focus-within label{transform:translateY(-11px) scale(.72);color:#FF671F;letter-spacing:1.2px;opacity:1;}
  .login-input-wrap input:not(:placeholder-shown)+label{transform:translateY(-11px) scale(.72);letter-spacing:1.2px;opacity:0.7;}
  .login-input-wrap input:-webkit-autofill+label{transform:translateY(-11px) scale(.72);letter-spacing:1.2px;opacity:0.7;}
  .login-shake{animation:loginShake .5s cubic-bezier(.36,.07,.19,.97) both;}
  .google-btn-wrap{transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s ease;}
  .google-btn-wrap:hover{transform:translateY(-4px);box-shadow:0 12px 28px rgba(0,0,0,0.22),0 4px 8px rgba(0,0,0,0.14);}
  .google-btn-wrap:active{transform:translateY(-1px);box-shadow:0 5px 12px rgba(0,0,0,0.18);}
  @keyframes loginExitZoom{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.08)}}
  .login-exit{animation:loginExitZoom .65s cubic-bezier(.4,0,.2,1) both;}
  @keyframes dashEnter{0%{opacity:0;transform:scale(.97)}100%{opacity:1;transform:scale(1)}}
  .dash-enter{animation:dashEnter .5s cubic-bezier(.25,.46,.45,.94) both;}
  @media (prefers-reduced-motion: reduce){*{animation-duration:0.01ms !important;animation-iteration-count:1 !important;transition-duration:0.01ms !important;}}
  .theme-toggle-btn:hover{transform:scale(1.05);}
  .theme-toggle-btn{transition:all .2s ease;}

  @keyframes rippleExpand {
    from { clip-path: circle(0% at var(--rx) var(--ry)); opacity: 1; }
    to   { clip-path: circle(180% at var(--rx) var(--ry)); opacity: 1; }
  }
  @keyframes logoGlow {
    0%   { filter: drop-shadow(0 0 0px #FFD700) brightness(1); }
    30%  { filter: drop-shadow(0 0 28px #FFD700) drop-shadow(0 0 60px #FF671F) brightness(1.3); }
    60%  { filter: drop-shadow(0 0 14px #FFD70088) brightness(1.15); }
    100% { filter: drop-shadow(0 0 0px #FFD700) brightness(1); }
  }
  @keyframes logoSpin {
    0%   { transform: scale(1) rotate(0deg); }
    25%  { transform: scale(1.12) rotate(-6deg); }
    50%  { transform: scale(1.18) rotate(4deg); }
    75%  { transform: scale(1.1) rotate(-2deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  @keyframes particleFly {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0); }
  }
  .logo-transitioning {
    animation: logoGlow 0.7s ease-out, logoSpin 0.7s ease-out;
  }
  .theme-ripple {
    position: fixed; inset: 0; z-index: 9999; pointer-events: none;
    animation: rippleExpand 0.65s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  .particle {
    position: fixed; width: 6px; height: 6px; border-radius: 50%;
    background: #FFD700; pointer-events: none; z-index: 10000;
    animation: particleFly 0.6s ease-out forwards;
  }

  /* Sidebar drawer transition */
  .sidebar-drawer {
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), background 0.3s, border 0.3s;
  }
  .sidebar-overlay {
    position: fixed; inset: 0; background: #00000060; z-index: 199;
    animation: fadeIn .2s ease;
  }

  /* Responsive breakpoints */
  @media (max-width: 768px) {
    html { font-size: 14px !important; }
    body, #root { font-size: 1rem !important; }
    .desktop-sidebar { display: none !important; }
    .mobile-topbar-padding { padding: 12px 16px !important; }
    .main-content-padding { padding: 20px 16px !important; }
    .links-grid { grid-template-columns: 1fr 1fr !important; }
    .add-link-grid { grid-template-columns: 1fr !important; }
    .search-row { flex-wrap: wrap; }
    .search-row input { max-width: 100% !important; width: 100% !important; }
    .notes-grid { grid-template-columns: 1fr !important; }
    .hide-mobile { display: none !important; }
  }
  @media (max-width: 480px) {
    .links-grid { grid-template-columns: 1fr !important; }
  }
  @media (min-width: 769px) {
    .mobile-only { display: none !important; }
    .bottom-nav { display: none !important; }
  }
  /* Bottom nav scroll — hide scrollbar but keep scrollable */
  .bottom-nav { overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }
  .bottom-nav::-webkit-scrollbar { display: none; }
  /* Chat message delete button — show on hover */
  div:hover > .msg-del-btn { display: flex !important; }
  /* Card hover lift */
  .card-hover{transition:all .2s cubic-bezier(.4,0,.2,1);}
  .card-hover:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.15);}

  /* Toast slide animations */
  @keyframes toastSlideIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
  @keyframes toastSlideOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(100%)}}
  @keyframes slideDown{from{opacity:0;transform:translateY(-100%)}to{opacity:1;transform:translateY(0)}}
  @media (max-width: 768px) {
    .orion-fab-btn { bottom: 80px !important; }
    .orion-panel { bottom: 148px !important; max-height: calc(100vh - 178px) !important; }
  }
</style>
</head>

<div id="root"></div>
<script src="app.js"></script>
</body>
