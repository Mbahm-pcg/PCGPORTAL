[build]
  functions = "netlify/functions"
  publish   = "."

# Scheduled Pulse notifications — daily at 9:00 PM Eastern (2:00 AM UTC next day)
[functions.pulse-cron]
  schedule = "0 2 * * *"

# Scheduled Labor aggregation — every 4 hours
[functions.labor-cron]
  schedule = "0 */4 * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
