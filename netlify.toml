[build]
  functions = "netlify/functions"
  publish   = "."

# Scheduled Pulse notifications — daily at 9:00 PM Eastern (2:00 AM UTC next day)
[functions.pulse-cron]
  schedule = "0 2 * * *"

# Scheduled Labor aggregation — 7am, 12pm, 5pm ET (11:00, 16:00, 21:00 UTC)
[functions.labor-cron]
  schedule = "0 11,16,21 * * *"

# Scheduled Analyst — runs after each labor cron (15 min offset) + morning brief at 6am ET
[functions.analyst-cron]
  schedule = "15 10,11,16,21 * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
